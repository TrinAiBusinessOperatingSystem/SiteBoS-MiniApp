<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Personal Bot Config | SiteBoS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', surface: '#ffffff', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #000; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .switch { position: relative; display: inline-block; width: 38px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #000; }
        input:checked + .slider:before { transform: translateX(18px); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #000; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    </style>
</head>
<body class="p-5 pb-24">

    <div class="max-w-md mx-auto space-y-6">
        <header class="mb-6">
            <h1 class="text-xl font-black tracking-tighter uppercase leading-tight">Bot Configuration</h1>
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1 italic">Setup Personalità AI</p>
        </header>

        <div id="main-loader" class="flex flex-col items-center py-20 space-y-4">
            <div class="loader"></div>
            <p class="text-[8px] font-black uppercase text-gray-300">Syncing Parameters...</p>
        </div>

        <div id="config-form" class="hidden space-y-5 animate-fade-in">
            <!-- 1. IDENTITY -->
            <section class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-4">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block">👤 Identity</span>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1">Agent Name</label>
                    <input type="text" id="agent_name" class="w-full bg-gray-50 p-3.5 rounded-xl text-sm font-bold border border-transparent focus:border-black outline-none transition">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1">Role Persona</label>
                    <select id="role_persona" class="w-full bg-gray-50 p-3.5 rounded-xl text-[11px] font-bold border border-transparent focus:border-black outline-none appearance-none">
                        <option value="customer_support">Supporto Clienti</option>
                        <option value="sales_agent">Consulente Vendite</option>
                        <option value="technical_expert">Esperto Tecnico</option>
                    </select>
                </div>
            </section>

            <!-- 2. PERMISSIONS -->
            <section class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-3">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block">🔐 Permissions</span>
                <div class="flex items-center justify-between py-1">
                    <label class="text-[11px] font-bold">Allow Images (Vision)</label>
                    <label class="switch"><input type="checkbox" id="allow_images"><span class="slider"></span></label>
                </div>
                <div class="flex items-center justify-between py-1">
                    <label class="text-[11px] font-bold">Allow Files (PDF/Docs)</label>
                    <label class="switch"><input type="checkbox" id="allow_files"><span class="slider"></span></label>
                </div>
            </section>

            <!-- 3. PERSONALITY -->
            <section class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-4">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block">🧠 Personality</span>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1">Tone</label>
                        <select id="tone" class="w-full bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none appearance-none">
                            <option value="professional">Professional</option>
                            <option value="friendly">Friendly</option>
                            <option value="technical">Technical</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1">Vibe</label>
                        <input type="text" id="vibe" class="w-full bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none transition">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1">Language Style</label>
                        <select id="language_style" class="w-full bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none appearance-none">
                            <option value="formal">Formal (Lei)</option>
                            <option value="casual">Casual (Tu)</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1">Emoji Usage</label>
                        <select id="emoji_usage" class="w-full bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none appearance-none">
                            <option value="none">None</option>
                            <option value="moderate">Moderate</option>
                            <option value="frequent">Frequent</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1">Custom Instructions</label>
                    <textarea id="custom_instructions" rows="4" class="w-full bg-gray-50 p-4 rounded-2xl text-xs border border-transparent focus:border-black outline-none resize-none leading-relaxed"></textarea>
                </div>
            </section>

            <!-- 4. LIMITS -->
            <section class="bg-black text-white rounded-3xl p-5 shadow-xl space-y-4">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-neutral-500 block">📊 Safety & Logic</span>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-neutral-400 uppercase ml-1">Primary Goal</label>
                    <input type="text" id="primary_goal" class="w-full bg-neutral-900 p-3.5 rounded-xl text-[11px] font-bold border border-transparent focus:border-neutral-700 outline-none text-white">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-neutral-400 uppercase ml-1">Max Daily Msg</label>
                        <input type="number" id="max_daily_messages" class="w-full bg-neutral-900 p-3 rounded-xl text-[11px] font-bold outline-none text-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-neutral-400 uppercase ml-1">Max Tokens</label>
                        <input type="number" id="max_tokens" class="w-full bg-neutral-900 p-3 rounded-xl text-[11px] font-bold outline-none text-white">
                    </div>
                </div>
            </section>

            <button class="w-full h-12 bg-black text-white rounded-xl font-black uppercase tracking-widest text-[10px] active:scale-95 transition-all flex items-center justify-center gap-2" onclick="saveData()">
                <i class="fas fa-save text-[10px]"></i> <span id="btn-label">Salva Configurazione</span>
            </button>
            <div id="save-loader" class="hidden flex justify-center py-2"><div class="loader"></div></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const WEBHOOK_URL = 'https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e';
        let fullConfig = {}; 

        tg.expand();
        tg.ready();

        async function loadData() {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, user_id: tg.initDataUnsafe.user?.id, action: "get_bot_config" })
                });
                fullConfig = await response.json();

                document.getElementById('agent_name').value = fullConfig.identity.agent_name;
                document.getElementById('role_persona').value = fullConfig.identity.role_persona;
                document.getElementById('allow_images').checked = fullConfig.permissions.allow_images;
                document.getElementById('allow_files').checked = fullConfig.permissions.allow_files;
                document.getElementById('tone').value = fullConfig.personality.tone;
                document.getElementById('vibe').value = fullConfig.personality.vibe;
                document.getElementById('language_style').value = fullConfig.personality.language_style;
                document.getElementById('emoji_usage').value = fullConfig.personality.emoji_usage;
                document.getElementById('custom_instructions').value = fullConfig.personality.custom_instructions;
                document.getElementById('primary_goal').value = fullConfig.business_logic.primary_goal;
                document.getElementById('max_daily_messages').value = fullConfig.system_safety_limits.max_daily_messages_per_user;
                document.getElementById('max_tokens').value = fullConfig.system_safety_limits.max_tokens_per_chat;

                document.getElementById('main-loader').style.display = 'none';
                document.getElementById('config-form').classList.remove('hidden');
            } catch (err) { tg.showAlert("Errore caricamento."); }
        }

        async function saveData() {
            const btnLabel = document.getElementById('btn-label');
            const saveLoader = document.getElementById('save-loader');
            
            btnLabel.innerText = "Salvataggio...";
            saveLoader.classList.remove('hidden');
            
            fullConfig.identity.agent_name = document.getElementById('agent_name').value;
            fullConfig.identity.role_persona = document.getElementById('role_persona').value;
            fullConfig.permissions.allow_images = document.getElementById('allow_images').checked;
            fullConfig.permissions.allow_files = document.getElementById('allow_files').checked;
            fullConfig.personality.tone = document.getElementById('tone').value;
            fullConfig.personality.vibe = document.getElementById('vibe').value;
            fullConfig.personality.language_style = document.getElementById('language_style').value;
            fullConfig.personality.emoji_usage = document.getElementById('emoji_usage').value;
            fullConfig.personality.custom_instructions = document.getElementById('custom_instructions').value;
            fullConfig.business_logic.primary_goal = document.getElementById('primary_goal').value;
            fullConfig.system_safety_limits.max_daily_messages_per_user = parseInt(document.getElementById('max_daily_messages').value);
            fullConfig.system_safety_limits.max_tokens_per_chat = parseInt(document.getElementById('max_tokens').value);

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, user_id: tg.initDataUnsafe.user?.id, action: "save_bot_config", config: fullConfig })
                });
                if (response.ok) {
                    btnLabel.innerText = "Configurazione Salvata!";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1200);
                }
            } catch (err) { 
                tg.showAlert("Errore."); 
                btnLabel.innerText = "Salva Configurazione";
                saveLoader.classList.add('hidden');
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
