<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blueprint Architect | TrinAI Enterprise</title>
    
    <!-- SDK e Librerie -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        bg: '#fafafa',
                        border: '#eeeeee'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .sortable-ghost { opacity: 0.1; background: #000 !important; }
        .drag-handle-stage, .drag-handle-step { cursor: grab; }
        .drag-handle-stage:active, .drag-handle-step:active { cursor: grabbing; }

        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div>
                            <h1 class="text-6xl mb-4 text-white">🚫</h1>
                            <h2 class="text-xl font-bold uppercase tracking-widest">Accesso Proibito</h2>
                            <p class="opacity-40 text-sm mt-4 leading-relaxed">Apri l'editor direttamente dal pannello SiteBoS su Telegram.</p>
                        </div>
                    </body>`;
                window.stop();
                throw new Error("Unauthorized Access");
            }
        })();
    </script>
</head>
<body class="bg-bg text-black pb-40 overflow-x-hidden">

    <!-- LOADER ENGINE -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4 transition-opacity duration-500">
        <div class="spinner"></div>
        <div id="loaderText" class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400 text-center px-10 leading-loose">
            Architect Engine Initializing...<br>Securing Process Protocol
        </div>
    </div>

    <!-- CONTENUTO PRINCIPALE -->
    <div class="hidden max-w-3xl mx-auto p-5 space-y-8" id="mainContent">
      
        <!-- HEADER ENTERPRISE -->
        <header class="flex justify-between items-start pt-4 fade-in-up">
            <div>
                <div id="typeBadge" class="inline-block px-3 py-1 bg-black text-white text-[9px] font-black uppercase tracking-widest rounded-full mb-2">Architect Mode</div>
                <h1 id="blueprintNameDisplay" class="text-2xl font-black tracking-tighter uppercase leading-none break-words max-w-xs text-black">Process Editor</h1>
                <p id="serviceSkuDisplay" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1 italic">SKU: ...</p>
            </div>
            <div class="text-right flex flex-col items-end">
                <div id="totalTimeDisplay" class="text-2xl font-black leading-none tracking-tighter">0</div>
                <div class="text-[8px] font-black text-gray-300 uppercase tracking-widest">Minutes</div>
            </div>
        </header>

        <!-- SEZIONE 1: CONFIGURAZIONE & COMPLIANCE -->
        <section class="bg-white rounded-[2.5rem] p-8 border border-border shadow-sm space-y-8 fade-in-up">
            <div class="flex justify-between items-center border-b border-gray-50 pb-4">
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-300 italic">Global Context</span>
                <select id="blueprintType" onchange="updateGlobalData('blueprint_type', this.value)" class="bg-gray-50 text-[10px] font-black uppercase outline-none px-4 py-2 rounded-full border border-transparent focus:border-black transition-all appearance-none pr-8">
                    <option value="INTERNAL_PROTOCOL">Internal Protocol</option>
                    <option value="CUSTOMER_SERVICE">Customer Service</option>
                    <option value="PRODUCTION_FLOW">Production Flow</option>
                </select>
            </div>
            
            <div class="space-y-2">
                <label class="text-[9px] font-black uppercase text-gray-400 ml-1">Blueprint Description</label>
                <textarea id="blueprintDesc" rows="3" oninput="updateGlobalData('blueprint_description', this.value)" 
                    class="w-full bg-gray-50 p-5 rounded-[1.5rem] text-sm font-medium border border-transparent focus:border-black outline-none resize-none leading-relaxed"></textarea>
            </div>

            <!-- BOTTONE AI COMPLIANCE (NUOVO) -->
            <div class="p-5 bg-neutral-900 rounded-[2rem] border border-neutral-800 shadow-inner flex items-center justify-between group">
                <div class="flex-1">
                    <p class="text-[9px] font-black uppercase text-neutral-500 tracking-[0.2em]">Compliance Engine</p>
                    <p class="text-[10px] text-neutral-400 font-medium mt-1 pr-4">Verifica la conformità normativa AI (GDPR, D.Lgs 19/2026).</p>
                </div>
                <button onclick="triggerComplianceCheck()" class="bg-white text-black px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all shadow-xl flex items-center gap-2">
                    <i class="fas fa-shield-halved"></i> Verifica
                </button>
            </div>

            <!-- GESTIONE MATERIALI (BOM) -->
            <div class="space-y-4 pt-4 border-t border-gray-50">
                <div class="flex justify-between items-center px-1">
                    <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Bill of Materials (BOM)</span>
                    <button onclick="addMaterial()" class="text-[10px] font-black uppercase text-black bg-gray-100 px-4 py-1.5 rounded-full hover:bg-black hover:text-white transition-all">+ Add Item</button>
                </div>
                <div id="bomContainer" class="space-y-3"></div>
            </div>
        </section>

        <!-- SEZIONE 2: FASI E STEP -->
        <div id="stagesContainer" class="space-y-8 fade-in-up"></div>

        <!-- AGGIUNGI FASE -->
        <button id="btnAddStageBtn" class="w-full border-2 border-dashed border-gray-200 py-12 rounded-[3rem] flex flex-col items-center justify-center gap-4 hover:border-black transition-all active:scale-95 group">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center group-hover:bg-black group-hover:text-white transition-all shadow-sm">
                <i class="fas fa-plus text-xl"></i>
            </div>
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 group-hover:text-black">Assemble New Operational Stage</span>
        </button>
    </div>

    <!-- SAVE BAR DINAMICA -->
    <div class="fixed bottom-8 left-0 w-full px-6 flex items-center justify-between z-[100] gap-4">
        <button onclick="tg.close()" class="w-16 h-16 bg-white text-black rounded-full shadow-2xl flex items-center justify-center text-xl border border-gray-100 active:scale-90 transition">
            <i class="fas fa-times"></i>
        </button>
        <button id="saveBtn" disabled class="flex-1 h-16 bg-black text-white rounded-full shadow-2xl font-black uppercase tracking-[0.2em] text-xs active:scale-95 transition-all disabled:opacity-10 flex items-center justify-center gap-3">
            <i class="fas fa-rocket text-sm"></i> <span id="saveBtnText">Deploy Blueprint</span>
        </button>
    </div>

    <script>
        'use strict';

        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/e742c7c8-107e-4328-882e-c13459413424";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const sopId = urlParams.get('sop_id');
        const messageId = urlParams.get('message_id');
        
        let currentData = null;
        let initialDataString = "";
        let stageSortable = null;

        async function init() {
            if (!sopId) { alert("Architecture Error: SOP ID missing"); return; }
            await loadBlueprint();
            document.getElementById('btnAddStageBtn').onclick = addStage;
            document.getElementById('saveBtn').onclick = handleSave;
        }

        // ── LOAD BACKEND ──
        async function loadBlueprint() {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        _auth: tg.initData,
                        action: 'GET',
                        type: 'BLUEPRINT',
                        sop_id: sopId,
                        message_id: messageId
                    })
                });

                const rawResponse = await response.json();
                const data = Array.isArray(rawResponse) ? rawResponse[0] : rawResponse;
                currentData = data.blueprint || data;

                document.getElementById('blueprintNameDisplay').innerText = currentData.blueprint_name || 'Process Editor';
                document.getElementById('serviceSkuDisplay').innerText = `SKU: ${currentData.service_sku}`;
                document.getElementById('blueprintDesc').value = currentData.blueprint_description || '';
                document.getElementById('blueprintType').value = currentData.blueprint_type || 'INTERNAL_PROTOCOL';

                updateBadge();
                renderBOM();
                renderStages();

                initialDataString = JSON.stringify(currentData);
                document.getElementById('loadingOverlay').classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                }, 500);

            } catch (err) { console.error(err); }
        }

        function updateBadge() {
            const sku = currentData.service_sku || '';
            const badge = document.getElementById('typeBadge');
            if (sku.startsWith('SOP')) { badge.innerText = "PROCEDURA"; badge.className = "inline-block px-3 py-1 bg-stone-400 text-white text-[9px] font-black uppercase tracking-widest rounded-full mb-2"; }
            else if (sku.startsWith('PRO')) { badge.innerText = "PRODUZIONE"; badge.className = "inline-block px-3 py-1 bg-black text-white text-[9px] font-black uppercase tracking-widest rounded-full mb-2"; }
            else { badge.innerText = "SERVIZIO"; badge.className = "inline-block px-3 py-1 bg-blue-600 text-white text-[9px] font-black uppercase tracking-widest rounded-full mb-2"; }
        }

        // ── BOM ENGINE ──
        function renderBOM() {
            const container = document.getElementById('bomContainer');
            container.innerHTML = '';
            const materials = currentData.summary?.bill_of_materials_summary || [];

            materials.forEach((m, idx) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm transition-all";
                div.innerHTML = `
                    <input type="text" value="${m.material_sku}" oninput="updateBOM(${idx}, 'material_sku', this.value)" 
                        class="flex-1 bg-transparent text-[11px] font-black outline-none uppercase placeholder:text-gray-200" placeholder="SKU">
                    <div class="flex items-center bg-gray-50 rounded-lg px-2 border border-gray-100">
                        <input type="number" value="${m.quantity}" oninput="updateBOM(${idx}, 'quantity', this.value)" 
                            class="w-10 bg-transparent text-center text-[10px] font-black py-2 outline-none">
                    </div>
                    <button onclick="removeMaterial(${idx})" class="text-gray-200 hover:text-red-500 transition-colors px-2"><i class="fas fa-times-circle"></i></button>
                `;
                container.appendChild(div);
            });
        }

        function addMaterial() {
            if (!currentData.summary) currentData.summary = { bill_of_materials_summary: [] };
            if (!currentData.summary.bill_of_materials_summary) currentData.summary.bill_of_materials_summary = [];
            currentData.summary.bill_of_materials_summary.push({ material_sku: 'NEW_SKU', quantity: 1, unit_of_measure: 'unit' });
            renderBOM(); checkDirty();
        }

        function updateBOM(i, k, v) { currentData.summary.bill_of_materials_summary[i][k] = (k === 'quantity') ? parseFloat(v) : v; checkDirty(); }
        function removeMaterial(i) { currentData.summary.bill_of_materials_summary.splice(i, 1); renderBOM(); checkDirty(); }

        // ── STAGES ENGINE ──
        function renderStages() {
            const container = document.getElementById('stagesContainer');
            container.innerHTML = '';
            let totalMins = 0;

            (currentData.stages || []).forEach((stage, sIdx) => {
                const stageMins = (stage.steps || []).reduce((acc, st) => acc + (parseInt(st.estimated_time_minutes) || 0), 0);
                totalMins += stageMins;
                const isOpen = stage._ui_open === true;

                const div = document.createElement('div');
                div.className = "stage-card bg-white rounded-[2.5rem] border border-border shadow-sm overflow-hidden";
                div.dataset.sidx = sIdx;
                
                div.innerHTML = `
                    <div class="flex items-center p-6 gap-5 bg-gray-50 border-b border-gray-100">
                        <div class="drag-handle-stage text-gray-200 text-xl"><i class="fas fa-grip-vertical"></i></div>
                        <div class="flex-1 cursor-pointer" onclick="toggleStage(${sIdx})">
                            <div class="flex items-center gap-3 mb-1">
                                <span class="bg-black text-white text-[8px] font-black px-2 py-0.5 rounded-full">${stage.stage_id}</span>
                                <h3 class="text-xs font-black uppercase tracking-tight truncate max-w-[180px]">${stage.stage_name || 'New Stage'}</h3>
                            </div>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">${stage.steps?.length || 0} Steps • ${stageMins} Minutes</p>
                        </div>
                        <div class="flex items-center gap-2">
                             <button onclick="deleteStage(${sIdx})" class="w-8 h-8 flex items-center justify-center text-gray-200 hover:text-red-500"><i class="fas fa-trash-alt text-xs"></i></button>
                             <button onclick="toggleStage(${sIdx})" class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-black active:scale-90 transition-all">
                                <i class="fas fa-chevron-${isOpen ? 'up' : 'down'} text-[10px]"></i>
                             </button>
                        </div>
                    </div>

                    <div class="${isOpen ? 'block' : 'hidden'} p-8 space-y-6 animate-fade-in">
                        <div class="space-y-1">
                            <label class="text-[9px] font-black uppercase text-gray-300 ml-2">Stage Title</label>
                            <input type="text" value="${stage.stage_name || ''}" oninput="updateStage(${sIdx}, 'stage_name', this.value)" 
                                class="w-full bg-gray-50 p-5 rounded-[1.5rem] text-sm font-bold border border-transparent focus:border-black outline-none transition-all">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-black uppercase text-gray-300 ml-2">Stage Description</label>
                            <textarea rows="2" oninput="updateStage(${sIdx}, 'description', this.value)"
                                class="w-full bg-gray-50 p-5 rounded-[1.5rem] text-xs font-medium border border-transparent focus:border-black outline-none resize-none leading-relaxed">${stage.description || ''}</textarea>
                        </div>

                        <div class="step-container space-y-5" id="steps-list-${sIdx}">
                            ${renderSteps(stage.steps || [], sIdx)}
                        </div>

                        <button onclick="addStep(${sIdx})" class="w-full py-5 rounded-[1.5rem] border-2 border-dashed border-gray-100 text-[10px] font-black uppercase tracking-widest text-gray-400 hover:border-black hover:text-black transition-all">+ Add Process Step</button>
                    </div>
                `;
                container.appendChild(div);

                new Sortable(div.querySelector('.step-container'), {
                    group: 'steps', handle: '.drag-handle-step', animation: 150, ghostClass: 'sortable-ghost',
                    onEnd: (evt) => syncStepOrder(evt, sIdx)
                });
            });

            document.getElementById('totalTimeDisplay').innerText = totalMins;
            if (stageSortable) stageSortable.destroy();
            stageSortable = new Sortable(container, { handle: '.drag-handle-stage', animation: 200, ghostClass: 'sortable-ghost', onEnd: syncStageOrder });
        }

        // ── STEPS ENGINE ──
        function renderSteps(steps, sIdx) {
            return steps.map((step, stIdx) => {
                const isOpen = step._ui_open === true;
                const evType = step.quality_check?.evidence_type || 'NONE';
                const skills = (step.resources_needed?.labor?.required_skill_tags || []).join(', ');

                return `
                    <div class="step-card bg-white border border-gray-100 rounded-[2rem] overflow-hidden shadow-sm">
                        <div class="flex items-center p-4 gap-4">
                            <div class="drag-handle-step text-gray-200"><i class="fas fa-grip-vertical"></i></div>
                            <div class="flex-1 cursor-pointer" onclick="toggleStep(${sIdx}, ${stIdx})">
                                <span class="text-[8px] font-black text-gray-300 uppercase block mb-0.5">${step.step_id}</span>
                                <h4 class="text-[11px] font-black uppercase tracking-tight truncate max-w-[150px]">${step.step_name || 'New Step'}</h4>
                            </div>
                            <div class="flex items-center bg-gray-50 rounded-full px-3 py-1.5 border border-gray-100">
                                <input type="number" value="${step.estimated_time_minutes || 0}" 
                                    oninput="updateStepData(${sIdx}, ${stIdx}, 'estimated_time_minutes', this.value)"
                                    class="w-8 bg-transparent text-[10px] font-black outline-none text-center">
                                <span class="text-[8px] font-black text-gray-300 uppercase">m</span>
                            </div>
                            <button onclick="deleteStep(${sIdx}, ${stIdx})" class="text-gray-200 hover:text-red-500 p-2"><i class="fas fa-times-circle"></i></button>
                        </div>

                        <div class="${isOpen ? 'block' : 'hidden'} p-6 pt-0 space-y-6">
                            <div class="h-[1px] bg-gray-50 w-full mb-4"></div>
                            <div class="space-y-1">
                                <label class="text-[8px] font-black uppercase text-gray-400 ml-2">Step Objective</label>
                                <input type="text" value="${step.step_name || ''}" oninput="updateStepData(${sIdx}, ${stIdx}, 'step_name', this.value)"
                                    class="w-full bg-gray-50 p-4 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none transition-all">
                            </div>

                            <div class="space-y-1">
                                <label class="text-[8px] font-black uppercase text-gray-400 ml-2">Operational Instructions</label>
                                <textarea rows="3" oninput="updateStepData(${sIdx}, ${stIdx}, 'instructions', this.value)"
                                    class="w-full bg-gray-50 p-4 rounded-xl text-xs font-medium border border-transparent focus:border-black outline-none resize-none leading-relaxed">${step.instructions || ''}</textarea>
                            </div>

                            <div class="space-y-1">
                                <label class="text-[8px] font-black uppercase text-gray-400 ml-2">Required Skills (Labor)</label>
                                <input type="text" value="${skills}" oninput="updateStepLabor(${sIdx}, ${stIdx}, this.value)"
                                    class="w-full bg-gray-50 p-4 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none transition-all" placeholder="E.g. Admin, Finance, Legal">
                            </div>

                            <!-- QUALITY CHECK -->
                            <div class="bg-black text-white p-6 rounded-[2rem] space-y-5 shadow-xl">
                                <div class="flex justify-between items-center">
                                    <span class="text-[9px] font-black uppercase tracking-[0.2em] text-neutral-500">Quality Protocol</span>
                                    <select onchange="updateStepQC(${sIdx}, ${stIdx}, 'evidence_type', this.value)" 
                                        class="bg-neutral-900 text-[9px] font-black uppercase py-2 px-4 rounded-full outline-none border border-neutral-800 focus:border-neutral-600 transition-all appearance-none pr-8">
                                        <option value="NONE" ${evType==='NONE'?'selected':''}>No Proof</option>
                                        <option value="TEXT" ${evType==='TEXT'?'selected':''}>Textual Proof</option>
                                        <option value="VISION" ${evType==='VISION'?'selected':''}>Gemini Vision</option>
                                        <option value="FILE" ${evType==='FILE'?'selected':''}>File Upload</option>
                                        <option value="SIGNATURE" ${evType==='SIGNATURE'?'selected':''}>Signature</option>
                                    </select>
                                </div>

                                <div class="${evType==='NONE'?'hidden':'space-y-4'} animate-fade-in">
                                    <div class="space-y-1">
                                        <label class="text-[8px] font-black uppercase text-neutral-600 ml-2">Verification Description</label>
                                        <textarea oninput="updateStepQC(${sIdx}, ${stIdx}, 'check_description', this.value)"
                                            class="w-full bg-neutral-900 p-4 rounded-xl text-[11px] font-medium outline-none border border-transparent focus:border-neutral-700 h-20 resize-none text-neutral-300 leading-relaxed">${step.quality_check?.check_description || ''}</textarea>
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[8px] font-black uppercase text-neutral-600 ml-2">Success Criteria</label>
                                        <input type="text" value="${step.quality_check?.acceptance_criteria || ''}" oninput="updateStepQC(${sIdx}, ${stIdx}, 'acceptance_criteria', this.value)"
                                            class="w-full bg-neutral-900 p-4 rounded-xl text-[11px] font-bold outline-none border border-transparent focus:border-neutral-700 text-neutral-300 uppercase tracking-tighter">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ── ARCHITECT LOGIC ──
        function updateGlobalData(k, v) { currentData[k] = v; checkDirty(); }
        function toggleStage(i) { currentData.stages[i]._ui_open = !currentData.stages[i]._ui_open; renderStages(); }
        function toggleStep(si, sti) { currentData.stages[si].steps[sti]._ui_open = !currentData.stages[si].steps[sti]._ui_open; renderStages(); }
        function updateStage(i, k, v) { currentData.stages[i][k] = v; checkDirty(); }
        function updateStepData(si, sti, k, v) { 
            currentData.stages[si].steps[sti][k] = (k === 'estimated_time_minutes') ? parseInt(v || 0) : v; 
            checkDirty(); if(k === 'estimated_time_minutes') renderStages();
        }
        function updateStepLabor(si, sti, v) {
            if(!currentData.stages[si].steps[sti].resources_needed) currentData.stages[si].steps[sti].resources_needed = { labor: {} };
            currentData.stages[si].steps[sti].resources_needed.labor.required_skill_tags = v.split(',').map(s => s.trim()).filter(Boolean);
            checkDirty();
        }
        function updateStepQC(si, sti, k, v) {
            if(!currentData.stages[si].steps[sti].quality_check) currentData.stages[si].steps[sti].quality_check = { is_required: true };
            currentData.stages[si].steps[sti].quality_check[k] = v;
            currentData.stages[si].steps[sti].quality_check.is_required = (v !== 'NONE');
            renderStages(); checkDirty();
        }

        function addStage() {
            currentData.stages.push({ stage_id: '', stage_order: 0, stage_name: 'New Stage', description: '', steps: [], _ui_open: true });
            reindexEverything(); renderStages(); checkDirty();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 300);
        }
        function addStep(si) {
            currentData.stages[si].steps.push({ step_id: '', step_order: 0, step_name: 'New Step', instructions: '', estimated_time_minutes: 5, _ui_open: true, quality_check: { is_required: false, evidence_type: 'NONE' } });
            reindexEverything(); renderStages(); checkDirty();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        function deleteStage(i) { if(confirm("Confirm deletion of entire stage?")) { currentData.stages.splice(i, 1); reindexEverything(); renderStages(); checkDirty(); } }
        function deleteStep(si, sti) { currentData.stages[si].steps.splice(sti, 1); reindexEverything(); renderStages(); checkDirty(); }

        function reindexEverything() {
            currentData.stages.forEach((s, i) => {
                s.stage_order = i; s.stage_id = `STAGE_${String(i).padStart(2, '0')}`;
                s.steps?.forEach((st, j) => {
                    st.step_order = j + 1; st.step_id = `STEP_${String(i).padStart(2, '0')}_${String(j + 1).padStart(2, '0')}`;
                    if(st.resources_needed?.labor) st.resources_needed.labor.estimated_work_minutes = st.estimated_time_minutes;
                });
            });
            if(!currentData.summary) currentData.summary = {};
            currentData.summary.estimated_total_time_minutes = (currentData.stages || []).reduce((acc, s) => acc + (s.steps || []).reduce((stAcc, st) => stAcc + (parseInt(st.estimated_time_minutes) || 0), 0), 0);
        }

        function syncStageOrder(evt) {
            const moved = currentData.stages.splice(evt.oldIndex, 1)[0];
            currentData.stages.splice(evt.newIndex, 0, moved);
            reindexEverything(); renderStages(); checkDirty();
        }
        function syncStepOrder(evt, si) {
            const fromS = parseInt(evt.from.closest('.stage-card').dataset.sidx);
            const moved = currentData.stages[fromS].steps.splice(evt.oldIndex, 1)[0];
            currentData.stages[si].steps.splice(evt.newIndex, 0, moved);
            reindexEverything(); renderStages(); checkDirty();
        }

        function checkDirty() {
            const isDirty = JSON.stringify(currentData) !== initialDataString;
            document.getElementById('saveBtn').disabled = !isDirty;
        }

        // ── COMPLIANCE TRIGGER (NEW ACTION) ──
        async function triggerComplianceCheck() {
            tg.showConfirm("Analyze this blueprint with AI Compliance Engine?", async (ok) => {
                if (!ok) return;
                const btn = event.currentTarget;
                const originalHtml = btn.innerHTML;
                btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Checking...`;
                
                try {
                    const res = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            _auth: tg.initData,
                            action: 'COMPLIANCE_CHECK',
                            type: 'BLUEPRINT',
                            sop_id: sopId,
                            message_id: messageId,
                            payload: currentData
                        })
                    });
                    if (res.ok) {
                        tg.showAlert("Blueprint submitted for AI Compliance Check. Gemini will review standard alignment.");
                    } else throw new Error();
                } catch(e) { tg.showAlert("Compliance Service Offline."); }
                finally { btn.disabled = false; btn.innerHTML = originalHtml; }
            });
        }

        // ── SAVE / DEPLOY ──
        async function handleSave() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            document.getElementById('saveBtnText').innerText = "DEPLOYING...";

            const payload = JSON.parse(JSON.stringify(currentData));
            payload.metadata.last_updated_at = new Date().toISOString();
            payload.stages.forEach(s => { delete s._ui_open; s.steps?.forEach(st => delete st._ui_open); });

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'SAVE', type: 'BLUEPRINT', sop_id: sopId, message_id: messageId, payload })
                });
                if (res.ok) {
                    btn.className = "flex-1 h-16 bg-green-600 text-white rounded-full font-black uppercase text-xs flex items-center justify-center gap-3";
                    document.getElementById('saveBtnText').innerText = "SUCCESSFULLY DEPLOYED";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1500);
                } else throw new Error();
            } catch(e) {
                btn.disabled = false; document.getElementById('saveBtnText').innerText = "RETRY DEPLOY";
                tg.showAlert("Deploy failed.");
            }
        }

        init();
    </script>
</body>
</html>
