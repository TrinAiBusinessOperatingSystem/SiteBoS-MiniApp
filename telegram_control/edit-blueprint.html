<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blueprint Editor | SiteBoS</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem' }
                }
            }
        }
    </script>

    <style>

/* SiteBoS Architect Alignment */
body { background-color: #fafafa !important; color: #000000 !important; }
.card, .section-card, .dark-card, .upload-box { 
    background: white !important; 
    border: 1px solid #eeeeee !important; 
    box-shadow: none !important; 
}
input:focus, textarea:focus, select:focus { 
    border-color: #000000 !important; 
    box-shadow: none !important; 
    outline: none !important;
}
.text-primary, .text-black, .text-blue-600, .text-black { color: #000000 !important; }
.bg-primary, .bg-black, .bg-black, .bg-black { background-color: #000000 !important; color: #ffffff !important; }
.border-primary, .border-black, .border-blue-600, .border-black { border-color: #000000 !important; }
.spinner { border-top-color: #000 !important; }
input[type="checkbox"]:checked { background-color: #000 !important; border-color: #000 !important; }
/* Forza icone pesanti */
.fas, .far, .fal { font-weight: 900 !important; font-family: "Font Awesome 6 Free" !important; }


        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sortable-ghost { opacity: 0.1; background: #000 !important; }
        input[type="checkbox"] { appearance: none; width: 16px; height: 16px; border: 2px solid #000; border-radius: 4px; position: relative; cursor: pointer; }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after { content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; color: white; font-size: 8px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="bg-bg text-black pb-24 overflow-x-hidden">

    <div id="loadingOverlay" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <p class="text-[8px] font-black uppercase tracking-widest text-gray-500">Architect Engine...</p>
    </div>

    <div class="hidden max-w-md mx-auto p-5 space-y-6" id="mainContent">
      
        <!-- HEADER -->
        <header class="flex justify-between items-start pt-2 fade-in-up">
            <div>
                <div id="typeBadge" class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded-full mb-1 italic">Architect</div>
                <h1 id="blueprintNameDisplay" class="text-lg font-black tracking-tighter uppercase leading-none max-w-[200px]">Editor</h1>
                <p id="serviceSkuDisplay" class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mt-0.5">SKU: ...</p>
            </div>
            <div class="text-right">
                <div id="totalTimeDisplay" class="text-xl font-black leading-none tracking-tighter">0</div>
                <div class="text-[7px] font-black text-gray-300 uppercase tracking-widest">Minutes</div>
            </div>
        </header>

        <!-- GLOBAL CONTEXT -->
        <section class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-5 fade-in-up">
            <div class="flex justify-between items-center border-b border-gray-50 pb-3">
                <span class="text-[8px] font-black uppercase text-gray-300 italic tracking-widest">Global Protocol</span>
                <select id="blueprintType" onchange="updateGlobalData('blueprint_type', this.value)" class="bg-gray-50 text-[9px] font-black uppercase outline-none px-3 py-1.5 rounded-full">
                    <option value="INTERNAL_PROTOCOL">Internal</option>
                    <option value="CUSTOMER_SERVICE">Customer</option>
                    <option value="PRODUCTION_FLOW">Production</option>
                </select>
            </div>
            
            <div class="space-y-1">
                <label class="text-[8px] font-black uppercase text-gray-500 ml-1">Process Description</label>
                <textarea id="blueprintDesc" rows="2" oninput="updateGlobalData('blueprint_description', this.value)" 
                    class="w-full bg-gray-50 p-4 rounded-2xl text-xs font-medium border border-transparent focus:border-black outline-none resize-none leading-relaxed transition-all"></textarea>
            </div>

            <div class="p-4 bg-neutral-900 rounded-2xl flex items-center justify-between">
                <div class="flex-1 pr-3">
                    <p class="text-[7px] font-black uppercase text-neutral-500 tracking-widest">Compliance Engine</p>
                    <p class="text-[9px] text-neutral-400 font-medium leading-tight">AI Check Legale/GDPR.</p>
                </div>
                <button onclick="triggerComplianceCheck()" class="bg-white text-black px-4 py-2 rounded-full text-[8px] font-black uppercase tracking-widest shadow-sm active:scale-90">Check</button>
            </div>
        </section>

        <!-- STAGES -->
        <div id="stagesContainer" class="space-y-4"></div>

        <button id="btnAddStageBtn" class="w-full border-2 border-dashed border-gray-200 py-6 rounded-3xl flex flex-col items-center justify-center gap-2 hover:border-black transition-all active:scale-95 group">
            <i class="fas fa-plus text-gray-300 group-hover:text-black"></i>
            <span class="text-[8px] font-black uppercase tracking-widest text-gray-500 group-hover:text-black">Add Stage</span>
        </button>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-lg border-t border-gray-100 z-[100]">
        <div class="flex items-center gap-3 max-w-md mx-auto">
            <button onclick="tg.close()" class="w-10 h-10 bg-white text-black rounded-xl shadow-md flex items-center justify-center text-lg border border-gray-100 active:scale-90 transition">
                <i class="fas fa-times"></i>
            </button>
            <button id="saveBtn" disabled class="flex-1 h-10 bg-black text-white rounded-xl shadow-sm font-black uppercase tracking-widest text-[9px] active:scale-95 transition-all disabled:opacity-20 flex items-center justify-center gap-2">
                <i class="fas fa-rocket text-xs"></i> <span id="saveBtnText">Deploy Process</span>
            </button>
        </div>
    </div>

    <script>
        'use strict';
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/e742c7c8-107e-4328-882e-c13459413424";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');
        const sopId = urlParams.get('sop_id');
        const msg = urlParams.get('msg') || urlParams.get('message_id');
        let currentData = null, initialDataString = "", stageSortable = null;

        async function init() {
            if (!sopId) { alert("SKU Missing"); return; }
            await loadBlueprint();
            document.getElementById('btnAddStageBtn').onclick = addStage;
            document.getElementById('saveBtn').onclick = handleSave;
        }

        async function loadBlueprint() {
            try {
                const res = await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ action: 'GET', type: 'BLUEPRINT', sop_id: sopId, msg: msg, ash: ash, _auth: tg.initData }) 
                });
                const rD = await res.json();
                const bp = (Array.isArray(rD) ? rD[0] : rD).blueprint || (Array.isArray(rD) ? rD[0] : rD);
                currentData = bp;
                document.getElementById('blueprintNameDisplay').innerText = bp.blueprint_name || 'Process Editor';
                document.getElementById('serviceSkuDisplay').innerText = `SKU: ${bp.service_sku}`;
                document.getElementById('blueprintDesc').value = bp.blueprint_description || '';
                document.getElementById('blueprintType').value = bp.blueprint_type || 'INTERNAL_PROTOCOL';
                renderStages();
                initialDataString = JSON.stringify(currentData);
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
            } catch(e) { console.error(e); }
        }

        function renderStages() {
            const container = document.getElementById('stagesContainer'); container.innerHTML = '';
            let totalMins = 0;
            (currentData.stages || []).forEach((stage, sIdx) => {
                const stageMins = (stage.steps || []).reduce((acc, st) => acc + (parseInt(st.estimated_time_minutes) || 0), 0);
                totalMins += stageMins;
                const isOpen = stage._ui_open === true;
                const stageEl = document.createElement('div');
                stageEl.className = "bg-white rounded-3xl border border-border shadow-sm overflow-hidden fade-in-up";
                stageEl.dataset.sidx = sIdx;
                stageEl.innerHTML = `
                    <div class="flex items-center p-4 gap-4 bg-gray-50 border-b border-gray-100">
                        <div class="drag-handle-stage text-gray-200"><i class="fas fa-grip-vertical"></i></div>
                        <div class="flex-1 cursor-pointer" onclick="toggleStage(${sIdx})">
                            <h3 class="text-xs font-black uppercase tracking-tight truncate max-w-[120px]">${stage.stage_name || 'Stage'}</h3>
                            <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">${stage.steps?.length || 0} Steps • ${stageMins}m</p>
                        </div>
                        <div class="flex items-center gap-2">
                             <button onclick="deleteStage(${sIdx})" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt text-[10px]"></i></button>
                             <button onclick="toggleStage(${sIdx})" class="w-8 h-8 rounded-full bg-white border border-gray-200 flex items-center justify-center text-black shadow-sm"><i class="fas fa-chevron-${isOpen?'up':'down'} text-[8px]"></i></button>
                        </div>
                    </div>
                    <div class="${isOpen ? 'block' : 'hidden'} p-5 space-y-5">
                        <input type="text" value="${stage.stage_name}" oninput="updateStage(${sIdx}, 'stage_name', this.value)" 
                            class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none">
                        <div class="step-container space-y-3" id="steps-list-${sIdx}">${renderSteps(stage.steps || [], sIdx)}</div>
                        <button onclick="addStep(${sIdx})" class="w-full py-3 rounded-xl border border-dashed border-gray-100 text-[8px] font-black uppercase tracking-widest text-gray-300">+ Add Step</button>
                    </div>`;
                container.appendChild(stageEl);
                new Sortable(stageEl.querySelector('.step-container'), { group: 'steps', handle: '.drag-handle-step', animation: 150, onEnd: (evt) => syncStepOrder(evt, sIdx) });
            });
            document.getElementById('totalTimeDisplay').innerText = totalMins;
            if (stageSortable) stageSortable.destroy();
            stageSortable = new Sortable(container, { handle: '.drag-handle-stage', animation: 200, onEnd: syncStageOrder });
        }

        function renderSteps(steps, sIdx) {
            return steps.map((step, stIdx) => {
                const isOpen = step._ui_open === true;
                const evType = step.quality_check?.evidence_type || 'NONE';
                return `
                    <div class="bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm">
                        <div class="flex items-center p-3 gap-3">
                            <div class="drag-handle-step text-gray-200 text-xs"><i class="fas fa-grip-vertical"></i></div>
                            <div class="flex-1 cursor-pointer" onclick="toggleStep(${sIdx}, ${stIdx})">
                                <h4 class="text-[10px] font-black uppercase tracking-tight truncate max-w-[120px]">${step.step_name || 'Step'}</h4>
                            </div>
                            <div class="flex items-center bg-gray-50 rounded-lg px-2 py-1 border border-gray-100">
                                <input type="number" value="${step.estimated_time_minutes || 0}" oninput="updateStepData(${sIdx}, ${stIdx}, 'estimated_time_minutes', this.value)" class="w-5 bg-transparent text-[9px] font-black outline-none text-center">
                                <span class="text-[7px] font-black text-gray-300 uppercase">m</span>
                            </div>
                            <button onclick="deleteStep(${sIdx}, ${stIdx})" class="text-gray-200 hover:text-red-500"><i class="fas fa-times-circle text-xs"></i></button>
                        </div>
                        <div class="${isOpen ? 'block' : 'hidden'} p-4 pt-0 space-y-4">
                            <input type="text" value="${step.step_name || ''}" oninput="updateStepData(${sIdx}, ${stIdx}, 'step_name', this.value)" class="w-full bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none" placeholder="Step Title">
                            <textarea rows="2" oninput="updateStepData(${sIdx}, ${stIdx}, 'instructions', this.value)" class="w-full bg-gray-50 p-3 rounded-xl text-[10px] font-medium outline-none resize-none leading-relaxed" placeholder="Instructions">${step.instructions || ''}</textarea>
                            <div class="bg-black text-white p-4 rounded-xl space-y-3">
                                <div class="flex justify-between items-center">
                                    <span class="text-[7px] font-black uppercase text-neutral-500 italic">Quality Protocol</span>
                                    <select onchange="updateStepQC(${sIdx}, ${stIdx}, 'evidence_type', this.value)" class="bg-neutral-900 text-[8px] font-black uppercase py-1 px-2 rounded-full outline-none border border-neutral-800">
                                        <option value="NONE" ${evType==='NONE'?'selected':''}>None</option>
                                        <option value="TEXT" ${evType==='TEXT'?'selected':''}>Note</option>
                                        <option value="VISION" ${evType==='VISION'?'selected':''}>Vision</option>
                                        <option value="FILE" ${evType==='FILE'?'selected':''}>File</option>
                                        <option value="SIGNATURE" ${evType==='SIGNATURE'?'selected':''}>Sign</option>
                                    </select>
                                </div>
                                <div class="${evType==='NONE'?'hidden':'space-y-2'}">
                                    <textarea oninput="updateStepQC(${sIdx}, ${stIdx}, 'check_description', this.value)" class="w-full bg-neutral-900 p-2 rounded-lg text-[9px] outline-none border border-transparent focus:border-neutral-700 h-12 text-neutral-300" placeholder="Verification scope...">${step.quality_check?.check_description || ''}</textarea>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function updateGlobalData(k, v) { currentData[k] = v; checkDirty(); }
        function toggleStage(i) { currentData.stages[i]._ui_open = !currentData.stages[i]._ui_open; renderStages(); }
        function toggleStep(si, sti) { currentData.stages[si].steps[sti]._ui_open = !currentData.stages[si].steps[sti]._ui_open; renderStages(); }
        function updateStage(i, k, v) { currentData.stages[i][k] = v; checkDirty(); }
        function updateStepData(si, sti, k, v) { if (k === 'estimated_time_minutes') { const mins = parseInt(v || 0); currentData.stages[si].steps[sti][k] = mins; if(currentData.stages[si].steps[sti].resources_needed?.labor) currentData.stages[si].steps[sti].resources_needed.labor.estimated_work_minutes = mins; updateLiveTime(); } else { currentData.stages[si].steps[sti][k] = v; } checkDirty(); }
        function updateStepQC(si, sti, k, v) { if(!currentData.stages[si].steps[sti].quality_check) currentData.stages[si].steps[sti].quality_check = { is_required: true }; currentData.stages[si].steps[sti].quality_check[k] = v; currentData.stages[si].steps[sti].quality_check.is_required = (v !== 'NONE'); if(k === 'evidence_type') renderStages(); checkDirty(); }
        function updateLiveTime() { let total = 0; currentData.stages.forEach(s => total += s.steps.reduce((acc, st) => acc + (parseInt(st.estimated_time_minutes)||0), 0)); document.getElementById('totalTimeDisplay').innerText = total; }
        function addStage() { currentData.stages.push({ stage_id:'', stage_order:0, stage_name:'New Stage', description:'', steps:[], _ui_open:true }); reindexAndRender(); }
        function addStep(si) { currentData.stages[si].steps.push({ step_id:'', step_order:0, step_name:'New Step', instructions:'', estimated_time_minutes:5, _ui_open:true, resources_needed: { labor: { required_skill_tags: [], estimated_work_minutes: 5 }, materials: [], assets: [] }, quality_check: { is_required: false, evidence_type: 'NONE' }, logistics_flags: { requires_wip: false, requires_finished: false } }); reindexAndRender(); }
        function deleteStage(i) { if(confirm("Delete stage?")) { currentData.stages.splice(i, 1); reindexAndRender(); } }
        function deleteStep(si, sti) { currentData.stages[si].steps.splice(sti, 1); reindexAndRender(); }
        function reindexAndRender() { currentData.stages.forEach((s, i) => { s.stage_order = i; s.stage_id = `STAGE_${String(i + 1).padStart(2, '0')}`; s.steps.forEach((st, j) => { st.step_order = j + 1; st.step_id = `STEP_${String(i + 1).padStart(2, '0')}_${String(j + 1).padStart(2, '0')}`; }); }); renderStages(); checkDirty(); }
        function syncStageOrder(evt) { const moved = currentData.stages.splice(evt.oldIndex, 1)[0]; currentData.stages.splice(evt.newIndex, 0, moved); reindexAndRender(); }
        function syncStepOrder(evt, si) { const fromS = parseInt(evt.from.closest('.bg-white').dataset.sidx); const moved = currentData.stages[fromS].steps.splice(evt.oldIndex, 1)[0]; currentData.stages[si].steps.splice(evt.newIndex, 0, moved); reindexAndRender(); }
        function checkDirty() { document.getElementById('saveBtn').disabled = (JSON.stringify(currentData) === initialDataString); }

        async function triggerComplianceCheck() {
            tg.showConfirm("Analyze with AI?", async (ok) => {
                if (!ok) return;
                try { await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ _auth: tg.initData, action: 'COMPLIANCE_CHECK', type: 'BLUEPRINT', sop_id: sopId, msg: msg, payload: currentData }) }); tg.showAlert("Analysis in progress..."); } catch(e) { tg.showAlert("Error."); }
            });
        }

        async function handleSave() {
            const btn = document.getElementById('saveBtn'); btn.disabled = true; document.getElementById('saveBtnText').innerText = "DEPLOYING...";
            const payload = JSON.parse(JSON.stringify(currentData));
            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ _auth: tg.initData, action: 'SAVE', type: 'BLUEPRINT', sop_id: sopId, msg: msg, payload: payload }) });
                if (res.ok) { btn.className = "flex-1 h-12 bg-green-600 text-black rounded-xl shadow-sm font-black uppercase text-[10px] flex items-center justify-center gap-2"; document.getElementById('saveBtnText').innerText = "SUCCESS"; if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); setTimeout(() => tg.close(), 1200); }
            } catch(e) { btn.disabled = false; document.getElementById('saveBtnText').innerText = "RETRY"; tg.showAlert("Error."); }
        }
        init();
    </script>
</body>
</html>
