<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blueprint Architect | SiteBoS OS</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sortable-ghost { opacity: 0.1; background: #000 !important; }
        
        input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px; border: 2px solid #000; border-radius: 4px; position: relative; cursor: pointer; transition: 0.2s;
        }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after {
            content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; color: white; font-size: 9px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase tracking-widest">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="bg-bg text-black pb-40 overflow-x-hidden">

    <!-- LOADER -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <p class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-400">Architect Engine Initializing...</p>
    </div>

    <!-- MAIN APP CONTENT -->
    <div class="hidden max-w-2xl mx-auto p-5 space-y-8" id="mainContent">
      
        <!-- HEADER DINAMICO -->
        <header class="flex justify-between items-start pt-4 fade-in-up">
            <div>
                <div id="typeBadge" class="inline-block px-3 py-1 bg-black text-white text-[8px] font-black uppercase tracking-widest rounded-full mb-2 italic">Architect Mode</div>
                <h1 id="blueprintNameDisplay" class="text-xl font-black tracking-tighter uppercase leading-none max-w-[250px]">Blueprint Editor</h1>
                <p id="serviceSkuDisplay" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">SKU: ...</p>
            </div>
            <div class="text-right">
                <div id="totalTimeDisplay" class="text-2xl font-black leading-none tracking-tighter text-black">0</div>
                <div class="text-[8px] font-black text-gray-300 uppercase tracking-widest">Minutes</div>
            </div>
        </header>

        <!-- SEZIONE 1: GLOBAL CONTEXT & COMPLIANCE -->
        <section class="bg-white rounded-[2rem] p-6 border border-border shadow-sm space-y-6 fade-in-up">
            <div class="flex justify-between items-center border-b border-gray-50 pb-4">
                <span class="text-[10px] font-black uppercase text-gray-300 italic tracking-widest">Global Protocol</span>
                <select id="blueprintType" onchange="updateGlobalData('blueprint_type', this.value)" class="bg-gray-50 text-[10px] font-black uppercase outline-none px-4 py-2 rounded-full transition-all">
                    <option value="INTERNAL_PROTOCOL">Internal Protocol</option>
                    <option value="CUSTOMER_SERVICE">Customer Service</option>
                    <option value="PRODUCTION_FLOW">Production Flow</option>
                </select>
            </div>
            
            <div class="space-y-1">
                <label class="text-[9px] font-black uppercase text-gray-400 ml-1 tracking-widest">Process Description</label>
                <textarea id="blueprintDesc" rows="3" oninput="updateGlobalData('blueprint_description', this.value)" 
                    class="w-full bg-gray-50 p-5 rounded-3xl text-sm font-medium border border-transparent focus:border-black outline-none resize-none leading-relaxed transition-all"></textarea>
            </div>

            <!-- COMPLIANCE ENGINE NODE -->
            <div class="p-5 bg-neutral-900 rounded-[2rem] border border-neutral-800 flex items-center justify-between">
                <div class="flex-1 pr-4">
                    <p class="text-[8px] font-black uppercase text-neutral-500 tracking-[0.2em]">Compliance AI Engine</p>
                    <p class="text-[10px] text-neutral-400 font-medium mt-1 leading-tight">Analisi normativa (GDPR, Compliance Fiscale).</p>
                </div>
                <button onclick="triggerComplianceCheck()" class="bg-white text-black px-5 py-2.5 rounded-full text-[9px] font-black uppercase tracking-widest active:scale-90 transition-all shadow-xl">
                    <i class="fas fa-shield-halved mr-1 text-xs"></i> Check
                </button>
            </div>

            <!-- BOM MANAGER -->
            <div class="space-y-4 pt-4 border-t border-gray-50">
                <div class="flex justify-between items-center px-1">
                    <span class="text-[9px] font-black uppercase tracking-widest text-gray-400 italic">Bill of Materials</span>
                    <button onclick="addMaterial()" class="text-[9px] font-black uppercase text-blue-500 hover:text-black transition-all">+ Add Item</button>
                </div>
                <div id="bomContainer" class="space-y-2"></div>
            </div>
        </section>

        <!-- STAGES CONTAINER -->
        <div id="stagesContainer" class="space-y-6"></div>

        <!-- ADD STAGE ACTION -->
        <button id="btnAddStageBtn" class="w-full border-2 border-dashed border-gray-200 py-10 rounded-[2.5rem] flex flex-col items-center justify-center gap-4 hover:border-black transition-all active:scale-95 group">
            <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-black group-hover:text-white transition-all">
                <i class="fas fa-plus"></i>
            </div>
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 group-hover:text-black">Add Stage Architecture</span>
        </button>
    </div>

    <!-- ENTERPRISE FOOTER -->
    <div class="fixed bottom-8 left-0 w-full px-6 flex items-center justify-between z-[100] gap-4">
        <button onclick="tg.close()" class="w-16 h-16 bg-white text-black rounded-full shadow-2xl flex items-center justify-center text-xl border border-gray-100 active:scale-90 transition">
            <i class="fas fa-times"></i>
        </button>
        <button id="saveBtn" disabled class="flex-1 h-16 bg-black text-white rounded-full shadow-2xl font-black uppercase tracking-[0.2em] text-[11px] active:scale-95 transition-all disabled:opacity-10 flex items-center justify-center gap-3">
            <i class="fas fa-rocket text-sm"></i> <span id="saveBtnText">Deploy Process</span>
        </button>
    </div>

    <script>
        'use strict';

        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/e742c7c8-107e-4328-882e-c13459413424";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const sopId = urlParams.get('sop_id');
        const messageId = urlParams.get('message_id');
        
        let currentData = null;
        let initialDataString = "";
        let stageSortable = null;

        // ── INIT ──
        async function init() {
            if (!sopId) { alert("Architecture Error: SKU Missing"); return; }
            await loadBlueprint();
            document.getElementById('btnAddStageBtn').onclick = addStage;
            document.getElementById('saveBtn').onclick = handleSave;
        }

        // ── DATA FETCH ──
        async function loadBlueprint() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'GET', type: 'BLUEPRINT', sop_id: sopId, message_id: messageId })
                });
                const responseData = await res.json();
                const bp = (Array.isArray(responseData) ? responseData[0] : responseData).blueprint || (Array.isArray(responseData) ? responseData[0] : responseData);
                
                currentData = bp;

                // Bind UI Header
                document.getElementById('blueprintNameDisplay').innerText = bp.blueprint_name || 'Process Editor';
                document.getElementById('serviceSkuDisplay').innerText = `SKU: ${bp.service_sku}`;
                document.getElementById('blueprintDesc').value = bp.blueprint_description || '';
                document.getElementById('blueprintType').value = bp.blueprint_type || 'INTERNAL_PROTOCOL';

                updateBadgeStyle(bp.service_sku);
                renderBOM();
                renderStages();
                
                initialDataString = JSON.stringify(currentData);
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');

            } catch(e) { console.error("Loader Error:", e); }
        }

        function updateBadgeStyle(sku) {
            const badge = document.getElementById('typeBadge');
            if (sku.startsWith('SOP')) { badge.innerText = "PROCEDURE"; badge.className = "inline-block px-3 py-1 bg-stone-400 text-white text-[8px] font-black uppercase tracking-widest rounded-full mb-2"; }
            else if (sku.startsWith('PRO')) { badge.innerText = "PRODUCTION"; badge.className = "inline-block px-3 py-1 bg-black text-white text-[8px] font-black uppercase tracking-widest rounded-full mb-2"; }
            else { badge.innerText = "SERVICE"; badge.className = "inline-block px-3 py-1 bg-blue-600 text-white text-[8px] font-black uppercase tracking-widest rounded-full mb-2"; }
        }

        // ── BOM MANAGEMENT (MAPPING 1:1) ──
        function renderBOM() {
            const container = document.getElementById('bomContainer');
            container.innerHTML = '';
            const materials = currentData.summary?.bill_of_materials_summary || [];

            materials.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 bg-white p-3 rounded-2xl border border-gray-100 shadow-sm transition-all";
                div.innerHTML = `
                    <input type="text" value="${m.material_sku}" oninput="updateBOM(${i}, 'material_sku', this.value)" 
                        class="flex-1 bg-transparent text-[10px] font-black outline-none uppercase placeholder:text-gray-300" placeholder="SKU">
                    <input type="number" value="${m.quantity}" oninput="updateBOM(${i}, 'quantity', this.value)" 
                        class="w-10 bg-gray-50 text-center rounded-lg text-[10px] font-black py-2 border-none outline-none">
                    <button onclick="removeMaterial(${i})" class="text-gray-200 hover:text-red-500 transition-colors px-1"><i class="fas fa-times-circle"></i></button>
                `;
                container.appendChild(div);
            });
        }
        function addMaterial() {
            if (!currentData.summary) currentData.summary = { bill_of_materials_summary: [] };
            if (!currentData.summary.bill_of_materials_summary) currentData.summary.bill_of_materials_summary = [];
            currentData.summary.bill_of_materials_summary.push({ material_sku: 'NEW_SKU', quantity: 1, unit_of_measure: 'unit' });
            renderBOM(); checkDirty();
        }
        function updateBOM(i, k, v) { currentData.summary.bill_of_materials_summary[i][k] = (k==='quantity') ? parseFloat(v):v; checkDirty(); }
        function removeMaterial(i) { currentData.summary.bill_of_materials_summary.splice(i, 1); renderBOM(); checkDirty(); }

        // ── STAGES & STEPS ENGINE (FOCUS OPTIMIZED) ──
        function renderStages() {
            const container = document.getElementById('stagesContainer');
            container.innerHTML = '';
            let totalMins = 0;

            (currentData.stages || []).forEach((stage, sIdx) => {
                const stageMins = (stage.steps || []).reduce((acc, st) => acc + (parseInt(st.estimated_time_minutes) || 0), 0);
                totalMins += stageMins;
                const isOpen = stage._ui_open === true;

                const stageEl = document.createElement('div');
                stageEl.className = "stage-card bg-white rounded-[2.5rem] border border-border shadow-sm overflow-hidden fade-in-up";
                stageEl.dataset.sidx = sIdx;
                
                stageEl.innerHTML = `
                    <div class="flex items-center p-6 gap-5 bg-gray-50 border-b border-gray-100">
                        <div class="drag-handle-stage text-gray-200 text-xl"><i class="fas fa-grip-vertical"></i></div>
                        <div class="flex-1 cursor-pointer" onclick="toggleStage(${sIdx})">
                            <div class="flex items-center gap-3 mb-1">
                                <span class="bg-black text-white text-[8px] font-black px-2 py-0.5 rounded-full tracking-tighter">${stage.stage_id}</span>
                                <h3 class="text-sm font-black uppercase tracking-tight truncate max-w-[150px] text-black">${stage.stage_name || 'Stage Area'}</h3>
                            </div>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">${stage.steps?.length || 0} Steps • ${stageMins} Minutes</p>
                        </div>
                        <div class="flex items-center gap-3">
                             <button onclick="deleteStage(${sIdx})" class="text-gray-300 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt text-xs"></i></button>
                             <button onclick="toggleStage(${sIdx})" class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-black active:scale-90 shadow-sm transition-all"><i class="fas fa-chevron-${isOpen?'up':'down'} text-[10px]"></i></button>
                        </div>
                    </div>

                    <div class="${isOpen ? 'block' : 'hidden'} p-8 space-y-8 animate-fade-in">
                        <div class="space-y-1">
                            <label class="text-[8px] font-black uppercase text-gray-300 ml-2 tracking-widest">Stage Title</label>
                            <input type="text" value="${stage.stage_name}" oninput="updateStage(${sIdx}, 'stage_name', this.value)" 
                                class="w-full bg-gray-50 p-5 rounded-[1.5rem] text-sm font-bold border border-transparent focus:border-black outline-none transition-all">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] font-black uppercase text-gray-300 ml-2 tracking-widest">Description</label>
                            <textarea rows="2" oninput="updateStage(${sIdx}, 'description', this.value)"
                                class="w-full bg-gray-50 p-5 rounded-[1.5rem] text-xs font-medium border border-transparent focus:border-black outline-none resize-none leading-relaxed">${stage.description || ''}</textarea>
                        </div>

                        <div class="step-container space-y-5" id="steps-list-${sIdx}">${renderSteps(stage.steps || [], sIdx)}</div>

                        <button onclick="addStep(${sIdx})" class="w-full py-5 rounded-[1.5rem] border-2 border-dashed border-gray-100 text-[9px] font-black uppercase tracking-widest text-gray-300 hover:border-black hover:text-black transition-all">+ Add Operational Step</button>
                    </div>
                `;
                container.appendChild(stageEl);

                new Sortable(stageEl.querySelector('.step-container'), {
                    group: 'steps', handle: '.drag-handle-step', animation: 150, ghostClass: 'sortable-ghost',
                    onEnd: (evt) => syncStepOrder(evt, sIdx)
                });
            });

            document.getElementById('totalTimeDisplay').innerText = totalMins;
            if (stageSortable) stageSortable.destroy();
            stageSortable = new Sortable(container, { handle: '.drag-handle-stage', animation: 200, ghostClass: 'sortable-ghost', onEnd: syncStageOrder });
        }

        function renderSteps(steps, sIdx) {
            return steps.map((step, stIdx) => {
                const isOpen = step._ui_open === true;
                const evType = step.quality_check?.evidence_type || 'NONE';
                const skills = (step.resources_needed?.labor?.required_skill_tags || []).join(', ');

                return `
                    <div class="step-card bg-white border border-gray-100 rounded-[2rem] overflow-hidden shadow-sm">
                        <div class="flex items-center p-4 gap-4">
                            <div class="drag-handle-step text-gray-200"><i class="fas fa-grip-vertical"></i></div>
                            <div class="flex-1 cursor-pointer" onclick="toggleStep(${sIdx}, ${stIdx})">
                                <span class="text-[7px] font-black text-gray-300 uppercase block mb-0.5 tracking-widest">${step.step_id}</span>
                                <h4 class="text-[11px] font-black uppercase tracking-tight truncate max-w-[150px]">${step.step_name || 'Action Step'}</h4>
                            </div>
                            <div class="flex items-center bg-gray-50 rounded-full px-3 py-1.5 border border-gray-100">
                                <input type="number" value="${step.estimated_time_minutes || 0}" 
                                    oninput="updateStepData(${sIdx}, ${stIdx}, 'estimated_time_minutes', this.value)"
                                    class="w-7 bg-transparent text-[10px] font-black outline-none text-center">
                                <span class="text-[8px] font-black text-gray-300 uppercase">m</span>
                            </div>
                            <button onclick="deleteStep(${sIdx}, ${stIdx})" class="text-gray-200 hover:text-red-500 p-1"><i class="fas fa-times-circle"></i></button>
                        </div>

                        <div class="${isOpen ? 'block' : 'hidden'} p-6 pt-0 space-y-6">
                            <div class="h-[1px] bg-gray-50 w-full"></div>
                            
                            <input type="text" value="${step.step_name || ''}" oninput="updateStepData(${sIdx}, ${stIdx}, 'step_name', this.value)"
                                class="w-full bg-gray-50 p-4 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none transition-all" placeholder="Step Title">
                            
                            <textarea rows="3" oninput="updateStepData(${sIdx}, ${stIdx}, 'instructions', this.value)"
                                class="w-full bg-gray-50 p-4 rounded-xl text-xs font-medium border border-transparent focus:border-black outline-none resize-none leading-relaxed" placeholder="Action Instructions">${step.instructions || ''}</textarea>

                            <div class="space-y-1">
                                <label class="text-[8px] font-black uppercase text-gray-300 ml-2 tracking-widest">Operator Skills (Labor)</label>
                                <input type="text" value="${skills}" oninput="updateStepLabor(${sIdx}, ${stIdx}, this.value)"
                                    class="w-full bg-gray-50 p-4 rounded-xl text-[10px] font-bold border border-transparent focus:border-black outline-none transition-all placeholder:text-gray-300" placeholder="E.g. Admin, Finance, Technical">
                            </div>

                            <!-- QUALITY CHECK BLOCK -->
                            <div class="bg-black text-white p-6 rounded-[1.8rem] space-y-5 shadow-2xl">
                                <div class="flex justify-between items-center">
                                    <span class="text-[9px] font-black uppercase tracking-[0.2em] text-neutral-500 italic">Quality Protocol</span>
                                    <select onchange="updateStepQC(${sIdx}, ${stIdx}, 'evidence_type', this.value)" 
                                        class="bg-neutral-900 text-[9px] font-black uppercase py-2 px-4 rounded-full outline-none border border-neutral-800 focus:border-neutral-600 appearance-none pr-8">
                                        <option value="NONE" ${evType==='NONE'?'selected':''}>No Validation</option>
                                        <option value="TEXT" ${evType==='TEXT'?'selected':''}>Evidence: Note</option>
                                        <option value="VISION" ${evType==='VISION'?'selected':''}>Evidence: Gemini Vision</option>
                                        <option value="FILE" ${evType==='FILE'?'selected':''}>Evidence: Document</option>
                                        <option value="SIGNATURE" ${evType==='SIGNATURE'?'selected':''}>Evidence: Signature</option>
                                    </select>
                                </div>

                                <div class="${evType==='NONE'?'hidden':'space-y-4'} animate-fade-in">
                                    <textarea oninput="updateStepQC(${sIdx}, ${stIdx}, 'check_description', this.value)"
                                        class="w-full bg-neutral-900 p-4 rounded-xl text-[11px] font-medium outline-none border border-transparent focus:border-neutral-700 h-20 resize-none text-neutral-300" placeholder="Verification scope for AI...">${step.quality_check?.check_description || ''}</textarea>
                                    
                                    <input type="text" value="${step.quality_check?.acceptance_criteria || ''}" oninput="updateStepQC(${sIdx}, ${stIdx}, 'acceptance_criteria', this.value)"
                                        class="w-full bg-neutral-900 p-4 rounded-xl text-[11px] font-bold outline-none border border-transparent focus:border-neutral-700 text-neutral-300 uppercase tracking-tighter" placeholder="Acceptance Criteria (E.g. Value > 0)">
                                </div>
                            </div>

                            <!-- LOGISTICS FLAGS -->
                            <div class="flex gap-6 pt-2 px-1">
                                <label class="flex items-center gap-2 cursor-pointer text-[9px] font-black uppercase tracking-widest text-gray-500">
                                    <input type="checkbox" ${step.logistics_flags?.requires_wip?'checked':''} onchange="updateLogistics(${sIdx}, ${stIdx}, 'requires_wip', this.checked)"> WIP
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer text-[9px] font-black uppercase tracking-widest text-gray-500">
                                    <input type="checkbox" ${step.logistics_flags?.requires_finished?'checked':''} onchange="updateLogistics(${sIdx}, ${stIdx}, 'requires_finished', this.checked)"> FINISHED
                                </label>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // ── LOGIC ARCHITECT ──
        function updateGlobalData(k, v) { currentData[k] = v; checkDirty(); }
        function toggleStage(i) { currentData.stages[i]._ui_open = !currentData.stages[i]._ui_open; renderStages(); }
        function toggleStep(si, sti) { currentData.stages[si].steps[sti]._ui_open = !currentData.stages[si].steps[sti]._ui_open; renderStages(); }
        function updateStage(i, k, v) { currentData.stages[i][k] = v; checkDirty(); }
        
        function updateStepData(si, sti, k, v) { 
            if (k === 'estimated_time_minutes') {
                const mins = parseInt(v || 0);
                currentData.stages[si].steps[sti][k] = mins;
                if(currentData.stages[si].steps[sti].resources_needed?.labor) currentData.stages[si].steps[sti].resources_needed.labor.estimated_work_minutes = mins;
                updateLiveTime();
            } else {
                currentData.stages[si].steps[sti][k] = v; 
            }
            checkDirty(); 
        }

        function updateStepLabor(si, sti, v) {
            if(!currentData.stages[si].steps[sti].resources_needed) currentData.stages[si].steps[sti].resources_needed = { labor: {}, materials: [], assets: [] };
            currentData.stages[si].steps[sti].resources_needed.labor.required_skill_tags = v.split(',').map(s=>s.trim()).filter(Boolean);
            checkDirty();
        }

        function updateStepQC(si, sti, k, v) {
            if(!currentData.stages[si].steps[sti].quality_check) currentData.stages[si].steps[sti].quality_check = { is_required: true };
            currentData.stages[si].steps[sti].quality_check[k] = v;
            currentData.stages[si].steps[sti].quality_check.is_required = (v !== 'NONE');
            if(k === 'evidence_type') renderStages();
            checkDirty();
        }

        function updateLogistics(si, sti, k, v) {
            if(!currentData.stages[si].steps[sti].logistics_flags) currentData.stages[si].steps[sti].logistics_flags = { requires_wip: false, requires_finished: false };
            currentData.stages[si].steps[sti].logistics_flags[k] = v;
            checkDirty();
        }

        function updateLiveTime() {
            let total = 0;
            currentData.stages.forEach(s => total += s.steps.reduce((acc, st) => acc + (parseInt(st.estimated_time_minutes)||0), 0));
            document.getElementById('totalTimeDisplay').innerText = total;
            if(!currentData.summary) currentData.summary = {};
            currentData.summary.estimated_total_time_minutes = total;
        }

        function addStage() {
            currentData.stages.push({ stage_id:'', stage_order:0, stage_name:'New Stage', description:'', steps:[], _ui_open:true });
            reindexAndRender();
        }
        function addStep(si) {
            currentData.stages[si].steps.push({ 
                step_id:'', step_order:0, step_name:'New Step', instructions:'', estimated_time_minutes:5, _ui_open:true, 
                resources_needed: { labor: { required_skill_tags: [], estimated_work_minutes: 5 }, materials: [], assets: [] },
                quality_check: { is_required: false, evidence_type: 'NONE' },
                logistics_flags: { requires_wip: false, requires_finished: false }
            });
            reindexAndRender();
        }

        function deleteStage(i) { if(confirm("Destroy this stage architecture?")) { currentData.stages.splice(i, 1); reindexAndRender(); } }
        function deleteStep(si, sti) { currentData.stages[si].steps.splice(sti, 1); reindexAndRender(); }

        function reindexAndRender() {
            currentData.stages.forEach((s, i) => {
                s.stage_order = i; s.stage_id = `STAGE_${String(i + 1).padStart(2, '0')}`;
                s.steps.forEach((st, j) => {
                    st.step_order = j + 1; st.step_id = `STEP_${String(i + 1).padStart(2, '0')}_${String(j + 1).padStart(2, '0')}`;
                });
            });
            renderStages(); checkDirty();
        }

        function syncStageOrder(evt) { const moved = currentData.stages.splice(evt.oldIndex, 1)[0]; currentData.stages.splice(evt.newIndex, 0, moved); reindexAndRender(); }
        function syncStepOrder(evt, si) { const fromS = parseInt(evt.from.closest('.stage-card').dataset.sidx); const moved = currentData.stages[fromS].steps.splice(evt.oldIndex, 1)[0]; currentData.stages[si].steps.splice(evt.newIndex, 0, moved); reindexAndRender(); }

        function checkDirty() { document.getElementById('saveBtn').disabled = (JSON.stringify(currentData) === initialDataString); }

        // ── COMPLIANCE ──
        async function triggerComplianceCheck() {
            tg.showConfirm("Analyze Blueprint with AI Compliance Agent?", async (ok) => {
                if (!ok) return;
                try {
                    await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ _auth: tg.initData, action: 'COMPLIANCE_CHECK', type: 'BLUEPRINT', sop_id: sopId, message_id: messageId, payload: currentData })
                    });
                    tg.showAlert("Analysis in progress. Gemini will respond in chat.");
                } catch(e) { tg.showAlert("Engine Offline."); }
            });
        }

        // ── SAVE DEPLOY ──
        async function handleSave() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; document.getElementById('saveBtnText').innerText = "DEPLOYING...";
            const payload = JSON.parse(JSON.stringify(currentData));
            payload.metadata.last_updated_at = new Date().toISOString();
            payload.stages.forEach(s => { delete s._ui_open; s.steps?.forEach(st => delete st._ui_open); });
            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'SAVE', type: 'BLUEPRINT', sop_id: sopId, message_id: messageId, payload: payload })
                });
                if (res.ok) {
                    btn.className = "flex-1 h-16 bg-green-600 text-white rounded-full shadow-2xl font-black uppercase text-xs flex items-center justify-center gap-3";
                    document.getElementById('saveBtnText').innerText = "DEPLOY SUCCESSFUL";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1500);
                } else throw new Error();
            } catch(e) { btn.disabled = false; document.getElementById('saveBtnText').innerText = "RETRY DEPLOY"; tg.showAlert("Deploy error."); }
        }

        init();
    </script>
</body>
</html>
