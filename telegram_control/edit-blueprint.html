<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blueprint Architect | TrinAI Enterprise</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee', sop: '#6b7280', pro: '#000000', ser: '#3b82f6' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, textarea, select { @apply transition-all duration-200; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sortable-ghost { opacity: 0.1; background: #000; }
        .stage-card, .step-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-bg text-black pb-40 overflow-x-hidden">

    <!-- LOADER ENTERPRISE -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4 transition-opacity duration-500">
        <div class="spinner"></div>
        <div id="loaderText" class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Architect Initializing...</div>
    </div>

    <!-- MAIN APP CONTENT -->
    <div class="hidden max-w-3xl mx-auto p-5 space-y-8" id="mainContent">
      
        <!-- HEADER DINAMICO -->
        <header class="flex justify-between items-start pt-4">
            <div>
                <div id="typeBadge" class="inline-block px-3 py-1 bg-black text-white text-[9px] font-black uppercase tracking-widest rounded-full mb-2">Architect Mode</div>
                <h1 id="blueprintName" class="text-2xl font-black tracking-tighter uppercase leading-none">Blueprint Editor</h1>
                <p id="serviceSku" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">SKU: ...</p>
            </div>
            <div class="text-right">
                <div id="totalTime" class="text-xl font-black leading-none">0</div>
                <div class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Minuti Totali</div>
            </div>
        </header>

        <!-- GLOBAL CONFIG -->
        <section class="bg-white rounded-[2.5rem] p-8 border border-border shadow-sm space-y-6">
            <div class="flex justify-between items-center border-b border-gray-50 pb-4">
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-300">Global Context</span>
                <select id="blueprintType" class="bg-transparent text-[10px] font-black uppercase outline-none">
                    <option value="INTERNAL_PROTOCOL">Internal Protocol</option>
                    <option value="CUSTOMER_SERVICE">Customer Service</option>
                    <option value="PRODUCTION_FLOW">Production Flow</option>
                </select>
            </div>
            
            <div class="space-y-2">
                <label class="text-[9px] font-black uppercase text-gray-400 ml-1">Blueprint Description</label>
                <textarea id="blueprintDesc" rows="3" class="w-full bg-gray-50 p-5 rounded-[1.5rem] text-sm font-medium border border-transparent focus:border-black outline-none resize-none"></textarea>
            </div>

            <!-- BOM SUMMARY (Enterprise Material Management) -->
            <div class="space-y-4 pt-4 border-t border-gray-50">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Bill of Materials (BOM)</span>
                    <button onclick="addMaterial()" class="text-[10px] font-black uppercase text-blue-500">+ Aggiungi</button>
                </div>
                <div id="bomContainer" class="space-y-2"></div>
            </div>
        </section>

        <!-- STAGES CONTAINER -->
        <div id="stagesContainer" class="space-y-6"></div>

        <!-- ACTIONS -->
        <button id="btnAddStageBtn" class="w-full border-2 border-dashed border-gray-200 py-8 rounded-[2.5rem] flex items-center justify-center gap-4 hover:border-black transition-all active:scale-95 group">
            <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-black group-hover:text-white transition-all">
                <i class="fas fa-plus"></i>
            </div>
            <span class="text-xs font-black uppercase tracking-widest text-gray-400 group-hover:text-black">Crea Nuova Fase Operativa</span>
        </button>
    </div>

    <!-- ENTERPRISE SAVE BAR -->
    <div class="fixed bottom-8 left-0 w-full px-6 flex items-center justify-between z-[100] gap-4">
        <button onclick="tg.close()" class="w-16 h-16 bg-white text-black rounded-full shadow-2xl flex items-center justify-center text-xl border border-gray-100 active:scale-90 transition">
            <i class="fas fa-times"></i>
        </button>
        <button id="saveBtn" disabled class="flex-1 h-16 bg-black text-white rounded-full shadow-2xl font-black uppercase tracking-[0.2em] text-xs active:scale-95 transition-all disabled:opacity-20 flex items-center justify-center gap-3">
            <i class="fas fa-shield-check text-lg"></i> <span id="saveBtnText">Deploy Blueprint</span>
        </button>
    </div>

    <script>
        'use strict';

        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/e742c7c8-107e-4328-882e-c13459413424";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const sopId = urlParams.get('sop_id');
        const messageId = urlParams.get('message_id');
        
        let currentData = null;
        let initialDataString = "";
        let stageSortable = null;
        let stepSortables = [];

        // ── INIT APP ──
        async function init() {
            if (!sopId) { alert("Architecture Error: SOP ID missing"); return; }
            await loadBlueprint();
            document.getElementById('btnAddStageBtn').onclick = addStage;
            document.getElementById('saveBtn').onclick = handleSave;
        }

        // ── LOAD & MAPPING ──
        async function loadBlueprint() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'GET', type: 'BLUEPRINT', sop_id: sopId, message_id: messageId })
                });
                const data = await res.json();
                const bp = (Array.isArray(data) ? data[0] : data).blueprint || (Array.isArray(data) ? data[0] : data);
                
                currentData = bp;
                
                // Set Global Meta
                document.getElementById('blueprintName').innerText = bp.blueprint_name || 'Nuovo Blueprint';
                document.getElementById('serviceSku').innerText = `SKU: ${bp.service_sku}`;
                document.getElementById('blueprintDesc').value = bp.blueprint_description || '';
                document.getElementById('blueprintType').value = bp.blueprint_type || 'INTERNAL_PROTOCOL';
                
                // Dynamic Badge per prefisso SKU
                const badge = document.getElementById('typeBadge');
                if (bp.service_sku.startsWith('SOP')) { badge.innerText = "PROCEDURA"; badge.className = "inline-block px-3 py-1 bg-gray-500 text-white text-[9px] font-black uppercase rounded-full mb-2"; }
                else if (bp.service_sku.startsWith('PRO')) { badge.innerText = "PRODUZIONE"; badge.className = "inline-block px-3 py-1 bg-black text-white text-[9px] font-black uppercase rounded-full mb-2"; }
                else { badge.innerText = "SERVIZIO"; badge.className = "inline-block px-3 py-1 bg-blue-600 text-white text-[9px] font-black uppercase rounded-full mb-2"; }

                renderBOM();
                renderStages();
                
                initialDataString = JSON.stringify(currentData);
                document.getElementById('loadingOverlay').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                }, 500);

            } catch(e) { console.error(e); }
        }

        // ── BOM RENDERER ──
        function renderBOM() {
            const container = document.getElementById('bomContainer');
            container.innerHTML = '';
            const materials = currentData.summary?.bill_of_materials_summary || [];
            
            materials.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2 bg-gray-50 p-3 rounded-xl border border-gray-100";
                div.innerHTML = `
                    <input type="text" placeholder="Material SKU" value="${m.material_sku}" oninput="updateBOM(${i}, 'material_sku', this.value)" class="flex-1 bg-transparent text-[10px] font-bold outline-none uppercase">
                    <input type="number" placeholder="Qty" value="${m.quantity}" oninput="updateBOM(${i}, 'quantity', this.value)" class="w-12 bg-white text-center rounded-md text-[10px] font-bold py-1 border border-gray-200">
                    <button onclick="removeMaterial(${i})" class="text-gray-300 hover:text-red-500"><i class="fas fa-times-circle"></i></button>
                `;
                container.appendChild(div);
            });
        }

        function addMaterial() {
            if(!currentData.summary) currentData.summary = { bill_of_materials_summary: [] };
            currentData.summary.bill_of_materials_summary.push({ material_sku: 'NEW_ITEM', quantity: 1, unit_of_measure: 'unit' });
            renderBOM(); checkDirty();
        }

        function updateBOM(i, key, val) { currentData.summary.bill_of_materials_summary[i][key] = val; checkDirty(); }
        function removeMaterial(i) { currentData.summary.bill_of_materials_summary.splice(i, 1); renderBOM(); checkDirty(); }

        // ── STAGE RENDERER ──
        function renderStages() {
            const container = document.getElementById('stagesContainer');
            container.innerHTML = '';
            
            let totalMins = 0;

            (currentData.stages || []).forEach((stage, sIdx) => {
                const isOpen = stage._ui_open === true;
                const stageMins = (stage.steps || []).reduce((acc, curr) => acc + (parseInt(curr.estimated_time_minutes) || 0), 0);
                totalMins += stageMins;

                const div = document.createElement('div');
                div.className = 'stage-card bg-white rounded-[2.5rem] border border-border shadow-sm overflow-hidden';
                div.dataset.sidx = sIdx;
                
                div.innerHTML = `
                    <div class="flex items-center p-6 gap-4 bg-gray-50/50 border-b border-gray-50">
                        <div class="drag-handle-stage cursor-grab active:cursor-grabbing text-gray-300"><i class="fas fa-grip-vertical text-xl"></i></div>
                        <div class="flex-1 cursor-pointer" onclick="toggleStage(${sIdx})">
                            <div class="flex items-center gap-2">
                                <span class="text-[8px] font-black bg-gray-200 px-2 py-0.5 rounded-full">${stage.stage_id}</span>
                                <h3 class="text-sm font-black uppercase tracking-tight truncate">${stage.stage_name || 'Nuova Fase'}</h3>
                            </div>
                            <p class="text-[9px] font-bold text-gray-400 mt-1 uppercase tracking-widest">${stage.steps?.length || 0} Step • ${stageMins} Minuti</p>
                        </div>
                        <button onclick="deleteStage(${sIdx})" class="text-gray-300 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>

                    <div class="${isOpen ? 'block' : 'hidden'} p-6 space-y-6">
                        <div class="space-y-1">
                            <label class="text-[9px] font-black uppercase text-gray-300 ml-1">Stage Name</label>
                            <input type="text" value="${stage.stage_name}" oninput="updateStage(${sIdx}, 'stage_name', this.value)" 
                                   class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none">
                        </div>
                        
                        <div class="step-container space-y-4" id="steps-${sIdx}">
                            ${renderSteps(stage.steps, sIdx)}
                        </div>

                        <button onclick="addStep(${sIdx})" class="w-full py-4 rounded-2xl border-2 border-dashed border-gray-100 text-[10px] font-black uppercase text-gray-400 hover:border-black hover:text-black transition-all">+ Aggiungi Step Operativo</button>
                    </div>
                `;
                container.appendChild(div);

                // Sortable per gli Step
                new Sortable(div.querySelector('.step-container'), {
                    group: 'steps',
                    handle: '.drag-handle-step',
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    onEnd: (evt) => syncStepOrder(evt, sIdx)
                });
            });

            document.getElementById('totalTime').innerText = totalMins;
            
            // Sortable per le Fasi
            if (stageSortable) stageSortable.destroy();
            stageSortable = new Sortable(container, {
                handle: '.drag-handle-stage',
                animation: 200,
                ghostClass: 'sortable-ghost',
                onEnd: syncStageOrder
            });
        }

        // ── STEP RENDERER (Full JSON Mapping) ──
        function renderSteps(steps, sIdx) {
            if (!steps || steps.length === 0) return '';
            return steps.map((step, stIdx) => {
                const isOpen = step._ui_open === true;
                const evType = step.quality_check?.evidence_type || 'NONE';
                
                return `
                <div class="step-card bg-gray-50 border border-gray-100 rounded-[2rem] overflow-hidden">
                    <div class="flex items-center p-4 gap-3">
                        <div class="drag-handle-step cursor-grab text-gray-200"><i class="fas fa-grip-vertical"></i></div>
                        <div class="flex-1 cursor-pointer" onclick="toggleStep(${sIdx}, ${stIdx})">
                            <span class="text-[8px] font-black text-gray-400 uppercase">${step.step_id}</span>
                            <p class="text-xs font-bold uppercase truncate">${step.step_name || 'Nuovo Step'}</p>
                        </div>
                        <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-gray-100">
                            <i class="far fa-clock text-[10px] text-gray-300"></i>
                            <input type="number" value="${step.estimated_time_minutes}" oninput="updateStep(${sIdx}, ${stIdx}, 'estimated_time_minutes', this.value)" class="w-8 text-[10px] font-black outline-none bg-transparent">
                        </div>
                        <button onclick="deleteStep(${sIdx}, ${stIdx})" class="text-gray-200 hover:text-red-400"><i class="fas fa-times-circle"></i></button>
                    </div>

                    <div class="${isOpen ? 'block' : 'hidden'} p-5 pt-0 space-y-5">
                        <input type="text" placeholder="Nome Step" value="${step.step_name}" oninput="updateStep(${sIdx}, ${stIdx}, 'step_name', this.value)"
                               class="w-full bg-white p-4 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none shadow-sm">
                        
                        <textarea placeholder="Istruzioni operative..." oninput="updateStep(${sIdx}, ${stIdx}, 'instructions', this.value)"
                                  class="w-full bg-white p-4 rounded-xl text-xs font-medium border border-transparent focus:border-black outline-none shadow-sm h-24 resize-none">${step.instructions || ''}</textarea>

                        <!-- RESOURCE & SKILLS -->
                        <div class="space-y-2">
                            <label class="text-[8px] font-black uppercase text-gray-400 ml-1">Required Skills (Labor)</label>
                            <input type="text" placeholder="Skill tags (separati da virgola)" value="${(step.resources_needed?.labor?.required_skill_tags || []).join(', ')}"
                                   oninput="updateStepSkills(${sIdx}, ${stIdx}, this.value)"
                                   class="w-full bg-white p-3 rounded-xl text-[10px] font-bold border border-transparent focus:border-black outline-none shadow-sm">
                        </div>

                        <!-- QUALITY CHECK BLOCK (The Enterprise Core) -->
                        <div class="bg-black text-white p-5 rounded-[1.5rem] space-y-4">
                            <div class="flex justify-between items-center">
                                <span class="text-[8px] font-black uppercase tracking-widest text-neutral-500">Quality Assurance</span>
                                <select onchange="updateStepQC(${sIdx}, ${stIdx}, 'evidence_type', this.value)" class="bg-neutral-800 text-[8px] font-black uppercase py-1 px-2 rounded-lg outline-none">
                                    <option value="NONE" ${evType==='NONE'?'selected':''}>Nessun Check</option>
                                    <option value="TEXT" ${evType==='TEXT'?'selected':''}>Evidenza Testo</option>
                                    <option value="VISION" ${evType==='VISION'?'selected':''}>Gemini Vision (Foto)</option>
                                    <option value="FILE" ${evType==='FILE'?'selected':''}>Allegato File</option>
                                    <option value="SIGNATURE" ${evType==='SIGNATURE'?'selected':''}>Firma Digitale</option>
                                </select>
                            </div>
                            
                            <div class="${evType==='NONE'?'hidden':'space-y-3'}">
                                <textarea placeholder="Cosa deve controllare l'AI o l'operatore?" oninput="updateStepQC(${sIdx}, ${stIdx}, 'check_description', this.value)"
                                          class="w-full bg-neutral-900 p-3 rounded-xl text-[10px] font-medium outline-none border border-transparent focus:border-neutral-700 h-16 resize-none text-neutral-300">${step.quality_check?.check_description || ''}</textarea>
                                
                                <input type="text" placeholder="Acceptance Criteria (es. Importo > 0)" value="${step.quality_check?.acceptance_criteria || ''}"
                                       oninput="updateStepQC(${sIdx}, ${stIdx}, 'acceptance_criteria', this.value)"
                                       class="w-full bg-neutral-900 p-3 rounded-xl text-[10px] font-bold outline-none border border-transparent focus:border-neutral-700 text-neutral-300">
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ── LOGICA DI AGGIORNAMENTO DATI ──
        function toggleStage(i) { currentData.stages[i]._ui_open = !currentData.stages[i]._ui_open; renderStages(); }
        function toggleStep(si, sti) { currentData.stages[si].steps[sti]._ui_open = !currentData.stages[si].steps[sti]._ui_open; renderStages(); }
        
        function updateStage(i, k, v) { currentData.stages[i][k] = v; checkDirty(); }
        function updateStep(si, sti, k, v) { currentData.stages[si].steps[sti][k] = v; checkDirty(); }
        
        function updateStepSkills(si, sti, val) {
            if(!currentData.stages[si].steps[sti].resources_needed) currentData.stages[si].steps[sti].resources_needed = { labor: {} };
            currentData.stages[si].steps[sti].resources_needed.labor.required_skill_tags = val.split(',').map(s => s.trim()).filter(Boolean);
            checkDirty();
        }

        function updateStepQC(si, sti, k, v) {
            if(!currentData.stages[si].steps[sti].quality_check) currentData.stages[si].steps[sti].quality_check = { is_required: true };
            currentData.stages[si].steps[sti].quality_check[k] = v;
            currentData.stages[si].steps[sti].quality_check.is_required = (v !== 'NONE');
            if (k === 'evidence_type') renderStages();
            checkDirty();
        }

        function addStage() {
            currentData.stages.push({ stage_id: '', stage_order: 0, stage_name: 'Nuova Fase', description: '', steps: [], _ui_open: true });
            reindexEverything(); renderStages(); checkDirty();
            setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 200);
        }

        function addStep(si) {
            currentData.stages[si].steps.push({ step_id: '', step_order: 0, step_name: 'Nuovo Step', instructions: '', estimated_time_minutes: 5, _ui_open: true, quality_check: { is_required: false, evidence_type: 'NONE' } });
            reindexEverything(); renderStages(); checkDirty();
        }

        function deleteStage(i) { if(confirm("Eliminare intera fase?")) { currentData.stages.splice(i, 1); reindexEverything(); renderStages(); checkDirty(); } }
        function deleteStep(si, sti) { currentData.stages[si].steps.splice(sti, 1); reindexEverything(); renderStages(); checkDirty(); }

        // ── AUTO-INDEXING ENGINE ──
        function syncStageOrder(evt) {
            const moved = currentData.stages.splice(evt.oldIndex, 1)[0];
            currentData.stages.splice(evt.newIndex, 0, moved);
            reindexEverything(); renderStages(); checkDirty();
        }

        function syncStepOrder(evt, si) {
            const fromStageIdx = parseInt(evt.from.closest('.stage-card').dataset.sidx);
            const toStageIdx = si; // Si usa l'indice passato dalla funzione
            const moved = currentData.stages[fromStageIdx].steps.splice(evt.oldIndex, 1)[0];
            currentData.stages[toStageIdx].steps.splice(evt.newIndex, 0, moved);
            reindexEverything(); renderStages(); checkDirty();
        }

        function reindexEverything() {
            currentData.stages.forEach((s, i) => {
                s.stage_order = i;
                s.stage_id = `STAGE_${String(i).padStart(2, '0')}`;
                s.steps.forEach((st, j) => {
                    st.step_order = j + 1;
                    st.step_id = `STEP_${String(i).padStart(2, '0')}_${String(j + 1).padStart(2, '0')}`;
                });
            });
        }

        function checkDirty() {
            currentData.blueprint_description = document.getElementById('blueprintDesc').value;
            currentData.blueprint_type = document.getElementById('blueprintType').value;
            const isDirty = JSON.stringify(currentData) !== initialDataString;
            document.getElementById('saveBtn').disabled = !isDirty;
        }

        // ── SAVE LOGIC ──
        async function handleSave() {
            const btn = document.getElementById('saveBtn');
            const txt = document.getElementById('saveBtnText');
            btn.disabled = true;
            txt.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Deploying...`;

            // Pulizia UI flags prima del salvataggio
            const payload = JSON.parse(JSON.stringify(currentData));
            payload.stages.forEach(s => { delete s._ui_open; s.steps.forEach(st => delete st._ui_open); });

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'SAVE', type: 'BLUEPRINT', sop_id: sopId, message_id: messageId, payload })
                });
                
                if (res.ok) {
                    btn.classList.replace('bg-black', 'bg-green-600');
                    txt.innerText = "BLUEPRINT DEPLOYED!";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1500);
                } else { throw new Error(); }
            } catch(e) {
                btn.disabled = false;
                txt.innerText = "RETRY DEPLOY";
                tg.showAlert("Errore durante il salvataggio del processo.");
            }
        }

        init();
    </script>
</body>
</html>
