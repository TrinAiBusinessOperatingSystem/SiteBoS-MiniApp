<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title data-i18n="page_title">Blueprint Editor</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- SortableJS per il Drag & Drop -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        bg: '#fafafa',
                        border: '#eeeeee'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Spinner B&W */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }

        /* Custom Checkbox Black */
        input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px; border: 2px solid #000; border-radius: 4px; position: relative; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after {
            content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; color: white; font-size: 9px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        /* Drag handles grabbing state */
        .drag-handle-stage:active, .drag-handle-step:active { cursor: grabbing !important; }
        
        /* Sortable Ghost (elemento trascinato) */
        .sortable-ghost { opacity: 0.4; background-color: #f3f4f6; border: 2px dashed #000; }
    </style>

    <script>
        // ── SICUREZZA: IL BUTTAFUORI ──
        (function() {
            const isTelegram = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "";
            if (!isTelegram) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div>
                            <h1 class="text-6xl mb-4 text-white">🚫</h1>
                            <h2 class="text-xl font-black uppercase tracking-widest">Accesso Proibito</h2>
                            <p class="opacity-40 text-sm mt-4 leading-relaxed">Apri questo editor direttamente dal pannello SiteBoS su Telegram.</p>
                        </div>
                    </body>`;
                window.stop();
                throw new Error("Unauthorized Access");
            }
        })();
    </script>
</head>
<body class="bg-bg text-black pb-32 overflow-x-hidden">

    <!-- LOADER -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <div id="loaderText" data-i18n="loading" class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">Caricamento...</div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="hidden max-w-2xl mx-auto p-5 space-y-6" id="mainContent">
      
        <!-- HEADER -->
        <header class="mb-4">
            <h1 data-i18n="title" class="text-3xl font-black tracking-tighter uppercase leading-none">Blueprint Operativo</h1>
            <p data-i18n="subtitle" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-2">Definisci il processo</p>
        </header>
  
        <!-- DESCRIZIONE GLOBALE -->
        <div class="bg-white rounded-[2.5rem] p-8 border border-border shadow-sm space-y-4">
            <div class="flex justify-between items-center mb-2">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Descrizione Processo</label>
                <span id="serviceSku" class="font-mono text-[10px] font-bold text-black bg-gray-100 px-3 py-1 rounded-full">SKU: ...</span>
            </div>
            <textarea id="blueprintDesc" rows="3" placeholder="Descrivi il processo operativo generale..." 
                class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-medium border border-transparent focus:border-black outline-none transition resize-none"></textarea>
        </div>
  
        <!-- CONTAINER DELLE FASI (Gestito da JS) -->
        <div id="stagesContainer" class="space-y-4"></div>
  
        <!-- BOTTONE AGGIUNGI FASE -->
        <button id="btnAddStageBtn" class="w-full border-2 border-dashed border-gray-300 py-6 rounded-[2rem] flex items-center justify-center gap-3 hover:border-black transition active:scale-95 group mt-6">
            <i class="fas fa-plus text-gray-400 group-hover:text-black transition"></i> 
            <span data-i18n="btnAddStage" class="text-[10px] font-black uppercase tracking-widest text-gray-500 group-hover:text-black transition">Nuova Fase</span>
        </button>
  
    </div>
  
    <!-- FAB CONTAINER (Salvataggio) -->
    <div class="fixed bottom-6 left-0 w-full px-6 flex items-center justify-between z-[100] gap-4">
        <button onclick="window.history.back()" class="w-16 h-16 bg-white text-black rounded-full shadow-2xl flex items-center justify-center text-xl border border-gray-100 active:scale-90 transition" title="Torna Indietro">
            <i class="fas fa-arrow-left"></i>
        </button>
        <button id="saveBtn" class="flex-1 h-16 bg-black text-white rounded-full shadow-2xl font-black uppercase tracking-widest active:scale-95 transition disabled:opacity-50 flex items-center justify-center gap-3">
            <i class="fas fa-save"></i> <span id="saveBtnText">Salva Blueprint</span>
        </button>
    </div>
  
    <!-- LOGICA E TEMPLATE GENERATOR -->
    <script>
        'use strict';

        const WEBHOOK_URL = "https://trinai.api.workflow.dcmake.it/webhook/e742c7c8-107e-4328-882e-c13459413424";
        const tg = window.Telegram.WebApp;
        try { tg.ready(); tg.expand(); } catch (e) { console.warn("TG WebApp not found"); }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('productId');
        const token = urlParams.get('token');
        const vat = urlParams.get('vat');
        const langParam = urlParams.get('lang') || 'it';

        let currentData = null;
        let stageSortable = null;
        let stepSortables = [];

        const i18n = {
            it: { title: "Blueprint Operativo", subtitle: "Definisci il processo produttivo", btnAddStage: "Nuova Fase", btnSave: "Salva", loading: "Caricamento...", saved: "✅ Salvato!", error: "❌ Errore", phDesc: "Scopo del processo...", phStageName: "Nome Fase (es. Analisi)", phStepName: "Nome Step", phStageDesc: "Descrizione fase...", phStepInstr: "Istruzioni operative...", phQC: "Check Qualità...", phSkills: "Skill (es. Dev, Legal)", lblDesc: "DESCRIZIONE", min: "min", confirmDel: "Eliminare?", step: "Step", lblInstr: "ISTRUZIONI", lblQC: "QUALITY CHECK", lblSkills: "SKILLS", lblWip: "WIP", lblFin: "FINISHED", stepsCount: "passi" },
            en: { title: "Operational Blueprint", subtitle: "Define production process", btnAddStage: "New Stage", btnSave: "Save", loading: "Loading...", saved: "✅ Saved!", error: "❌ Error", phDesc: "Process purpose...", phStageName: "Stage Name", phStepName: "Step Name", phStageDesc: "Stage description...", phStepInstr: "Instructions...", phQC: "Quality Check...", phSkills: "Skills (e.g. Dev)", lblDesc: "DESCRIPTION", min: "min", confirmDel: "Delete?", step: "Step", lblInstr: "INSTRUCTIONS", lblQC: "QUALITY CHECK", lblSkills: "SKILLS", lblWip: "WIP", lblFin: "FINISHED", stepsCount: "steps" }
        };
        const t = i18n[langParam.slice(0,2)] || i18n.it;

        const dom = {
            loader: document.getElementById('loadingOverlay'),
            loaderText: document.getElementById('loaderText'),
            content: document.getElementById('mainContent'),
            stagesContainer: document.getElementById('stagesContainer'),
            sku: document.getElementById('serviceSku'),
            desc: document.getElementById('blueprintDesc'),
            saveBtn: document.getElementById('saveBtn'),
            saveBtnText: document.getElementById('saveBtnText')
        };

        function init() {
            applyTranslations();
            if (!productId || !token || !vat) { alert("Error: Missing Parameters"); return; }
            loadBlueprint();
            dom.stagesContainer.addEventListener('click', handleContainerClick);
            dom.stagesContainer.addEventListener('input', handleInput);
            document.getElementById('btnAddStageBtn').addEventListener('click', addStage);
            document.getElementById('saveBtn').addEventListener('click', handleSave);
        }

        function applyTranslations() {
            document.title = t.title;
            document.querySelector('[data-i18n="title"]').innerText = t.title;
            document.querySelector('[data-i18n="subtitle"]').innerText = t.subtitle;
            document.querySelector('[data-i18n="btnAddStage"]').innerText = t.btnAddStage;
            dom.desc.placeholder = t.phDesc;
            dom.loaderText.textContent = t.loading;
        }

        // AGGIORNATO AL TAILWIND (B&W)
        function renderStages() {
            if (stageSortable) stageSortable.destroy();
            stepSortables.forEach(s => s.destroy());
            stepSortables = [];
            
            dom.stagesContainer.innerHTML = '';
            if (!currentData.stages) currentData.stages = [];

            currentData.stages.forEach((stage, sIdx) => {
                const isOpen = stage._ui_open === true;
                const stepCount = stage.steps?.length || 0;
                const totalTime = (stage.steps || []).reduce((sum, st) => sum + (parseInt(st.estimated_time_minutes) || 0), 0);
                
                const stageEl = document.createElement('div');
                stageEl.className = 'stage-card bg-white rounded-[2.5rem] border border-border shadow-sm overflow-hidden mb-4';
                stageEl.dataset.idx = sIdx;

                stageEl.innerHTML = `
                    <!-- HEADER FASE -->
                    <div class="flex items-center p-5 gap-4 bg-gray-50 border-b border-gray-100 ${!isOpen ? 'border-none' : ''}">
                        <i class="fas fa-grip-vertical drag-handle-stage text-gray-300 text-lg cursor-grab active:cursor-grabbing touch-none flex-shrink-0"></i>
                        
                        <div class="flex-1 cursor-pointer min-w-0" data-action="toggle-stage" data-sidx="${sIdx}">
                            <div class="font-black text-sm uppercase tracking-tight truncate">${stage.stage_name || 'Nuova Fase'}</div>
                            <div class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">${stepCount} ${t.stepsCount} • ${totalTime} ${t.min}</div>
                        </div>
                        
                        <button class="w-8 h-8 flex items-center justify-center rounded-full bg-white border border-gray-200 text-black shadow-sm active:scale-90 transition flex-shrink-0" data-action="toggle-stage-btn" data-sidx="${sIdx}">
                            <i class="fas fa-chevron-${isOpen ? 'up' : 'down'} text-xs"></i>
                        </button>
                        <button class="w-8 h-8 flex items-center justify-center rounded-full text-red-500 hover:bg-red-50 active:scale-90 transition flex-shrink-0" data-action="delete-stage" data-sidx="${sIdx}">
                            <i class="fas fa-trash text-xs"></i>
                        </button>
                    </div>
                    
                    <!-- CORPO FASE (Nascosto se chiuso) -->
                    <div class="${isOpen ? 'block' : 'hidden'} p-6 space-y-4">
                        <input type="text" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none transition" 
                               value="${stage.stage_name || ''}" placeholder="${t.phStageName}" data-type="stage-name" data-sidx="${sIdx}">
                        
                        <textarea rows="2" class="w-full bg-gray-50 p-4 rounded-2xl text-xs font-medium border border-transparent focus:border-black outline-none transition resize-none"
                                  placeholder="${t.phStageDesc}" data-type="stage-desc" data-sidx="${sIdx}">${stage.description || ''}</textarea>
                        
                        <!-- CONTENITORE STEPS -->
                        <div class="step-list-container space-y-3" data-sidx="${sIdx}">
                            ${renderSteps(stage.steps, sIdx)}
                        </div>
                        
                        <button class="w-full py-4 mt-2 rounded-2xl border border-gray-200 text-xs font-black uppercase tracking-widest text-black hover:bg-gray-50 active:scale-95 transition flex items-center justify-center gap-2" 
                                data-action="add-step" data-sidx="${sIdx}">
                            <i class="fas fa-plus"></i> ${t.step}
                        </button>
                    </div>
                `;
                dom.stagesContainer.appendChild(stageEl);

                // Init Sortable per gli Step interni
                const stepSort = new Sortable(stageEl.querySelector('.step-list-container'), {
                    group: 'steps', handle: '.drag-handle-step', animation: 150,
                    touchStartThreshold: 3, delay: 50, delayOnTouchOnly: true,
                    ghostClass: 'sortable-ghost',
                    onEnd: handleSortEndNoRerender
                });
                stepSortables.push(stepSort);
            });

            // Init Sortable per le Fasi (Esterno)
            stageSortable = new Sortable(dom.stagesContainer, {
                handle: '.drag-handle-stage', animation: 150,
                touchStartThreshold: 3, delay: 50, delayOnTouchOnly: true,
                ghostClass: 'sortable-ghost',
                onEnd: handleSortEndNoRerender
            });
        }

        // AGGIORNATO AL TAILWIND (B&W)
        function renderSteps(steps, sIdx) {
            if (!steps || steps.length === 0) return `<div class="text-center py-6 text-[10px] font-bold text-gray-400 uppercase tracking-widest border border-dashed border-gray-200 rounded-2xl">Nessuno step configurato</div>`;
            
            return steps.map((step, stIdx) => {
                const isOpen = step._ui_open;
                const wipBadge = step.logistics_flags?.requires_wip ? `<span class="bg-black text-white px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-wider">WIP</span>` : '';
                const finBadge = step.logistics_flags?.requires_finished ? `<span class="bg-white border border-black text-black px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-wider">FIN</span>` : '';
                const mins = parseInt(step.estimated_time_minutes) || 0;
                
                return `
                <div class="bg-gray-50 border border-gray-100 rounded-[2rem] p-5">
                    
                    <!-- HEADER STEP -->
                    <div class="flex items-center gap-3 mb-4">
                        <i class="fas fa-grip-vertical drag-handle-step text-gray-300 text-lg cursor-grab active:cursor-grabbing touch-none flex-shrink-0"></i>
                        
                        <div class="flex gap-1 flex-shrink-0">${wipBadge} ${finBadge}</div>
                        
                        <div class="flex-1"></div>
                        
                        <button class="w-8 h-8 flex items-center justify-center rounded-full bg-white border border-gray-200 shadow-sm active:scale-90 transition flex-shrink-0" data-action="toggle-step" data-sidx="${sIdx}" data-stidx="${stIdx}">
                            <i class="fas fa-chevron-${isOpen ? 'up' : 'down'} text-xs"></i>
                        </button>
                        <button class="w-8 h-8 flex items-center justify-center rounded-full text-red-500 hover:bg-red-50 active:scale-90 transition flex-shrink-0" data-action="delete-step" data-sidx="${sIdx}" data-stidx="${stIdx}">
                            <i class="fas fa-trash text-xs"></i>
                        </button>
                    </div>

                    <!-- INPUT NOME & TEMPO -->
                    <div class="flex items-center gap-3 mb-3">
                        <input type="text" class="flex-1 bg-white p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none transition"
                               value="${step.step_name || ''}" placeholder="${t.phStepName}" data-type="step-name" data-sidx="${sIdx}" data-stidx="${stIdx}">
                        
                        <div class="flex items-center gap-2 bg-white px-4 py-4 rounded-2xl border border-transparent focus-within:border-black transition w-28">
                            <i class="far fa-clock text-gray-400"></i>
                            <input type="number" min="0" value="${mins}" class="w-full bg-transparent border-none text-sm font-bold text-center outline-none" data-type="step-time" data-sidx="${sIdx}" data-stidx="${stIdx}">
                        </div>
                    </div>

                    <!-- DETTAGLI (Aperti o Chiusi) -->
                    <div class="${isOpen ? 'block' : 'hidden'} space-y-4 pt-2">
                        
                        <div>
                            <label class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-2 ml-1">${t.lblInstr}</label>
                            <textarea rows="3" class="w-full bg-white p-4 rounded-2xl text-xs border border-transparent focus:border-black outline-none transition resize-none"
                                      placeholder="${t.phStepInstr}" data-type="step-instr" data-sidx="${sIdx}" data-stidx="${stIdx}">${step.instructions||''}</textarea>
                        </div>

                        <div>
                            <label class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-600 block mb-2 ml-1">${t.lblQC} (Opzionale)</label>
                            <textarea rows="2" class="w-full bg-white border-l-4 border-l-black p-4 rounded-2xl text-xs outline-none transition resize-none"
                                      placeholder="${t.phQC}" data-type="step-qc" data-sidx="${sIdx}" data-stidx="${stIdx}">${step.quality_check?.check_description||''}</textarea>
                        </div>

                        <div>
                            <label class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-2 ml-1">${t.lblSkills}</label>
                            <input type="text" class="w-full bg-white p-4 rounded-2xl text-xs border border-transparent focus:border-black outline-none transition"
                                   value="${(step.resources_needed?.labor?.required_skill_tags||[]).join(', ')}" placeholder="${t.phSkills}" data-type="step-skills" data-sidx="${sIdx}" data-stidx="${stIdx}">
                        </div>

                        <!-- FLAG DI LOGISTICA -->
                        <div class="flex gap-6 pt-4 border-t border-gray-200">
                            <label class="flex items-center gap-2 cursor-pointer text-xs font-bold uppercase tracking-widest">
                                <input type="checkbox" ${step.logistics_flags?.requires_wip?'checked':''} data-type="flag-wip" data-sidx="${sIdx}" data-stidx="${stIdx}"> 
                                ${t.lblWip}
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer text-xs font-bold uppercase tracking-widest">
                                <input type="checkbox" ${step.logistics_flags?.requires_finished?'checked':''} data-type="flag-fin" data-sidx="${sIdx}" data-stidx="${stIdx}"> 
                                ${t.lblFin}
                            </label>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // LOGICA EVENTI ORIGINALE (Intatta)
        function handleContainerClick(e) {
            const btn = e.target.closest('button');
            const toggleArea = e.target.closest('[data-action="toggle-stage"]');
            
            if (toggleArea && !btn) {
                const sIdx = parseInt(toggleArea.dataset.sidx);
                currentData.stages[sIdx]._ui_open = !currentData.stages[sIdx]._ui_open;
                renderStages();
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                return;
            }
            
            if (!btn) return;
            const action = btn.dataset.action;
            const sIdx = parseInt(btn.dataset.sidx);
            const stIdx = parseInt(btn.dataset.stidx);

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

            if (action === 'toggle-stage-btn') {
                currentData.stages[sIdx]._ui_open = !currentData.stages[sIdx]._ui_open;
                renderStages();
            } else if (action === 'delete-stage') {
                if(confirm(t.confirmDel)) { currentData.stages.splice(sIdx, 1); updateIndexes(); renderStages(); }
            } else if (action === 'add-step') {
                addStep(sIdx);
            } else if (action === 'delete-step') {
                if(confirm(t.confirmDel)) { currentData.stages[sIdx].steps.splice(stIdx, 1); updateIndexes(); renderStages(); }
            } else if (action === 'toggle-step') {
                const step = currentData.stages[sIdx].steps[stIdx];
                step._ui_open = !step._ui_open;
                renderStages();
            }
        }

        function handleInput(e) {
            const el = e.target;
            const type = el.dataset.type;
            if (!type) return;
            
            const sIdx = parseInt(el.dataset.sidx);
            const stIdx = parseInt(el.dataset.stidx);
            const val = el.type === 'checkbox' ? el.checked : el.value;

            if (type === 'stage-name') currentData.stages[sIdx].stage_name = val;
            if (type === 'stage-desc') currentData.stages[sIdx].description = val;
            
            if (type.startsWith('step-')) {
                const step = currentData.stages[sIdx].steps[stIdx];
                if (type === 'step-name') step.step_name = val;
                if (type === 'step-time') step.estimated_time_minutes = parseInt(val)||0;
                if (type === 'step-instr') step.instructions = val;
                if (type === 'step-qc') { if(!step.quality_check) step.quality_check={}; step.quality_check.check_description = val; }
                if (type === 'step-skills') { if(!step.resources_needed) step.resources_needed={labor:{}}; step.resources_needed.labor.required_skill_tags = val.split(',').map(s=>s.trim()).filter(Boolean); }
            }
            
            if (type.startsWith('flag-')) {
                const step = currentData.stages[sIdx].steps[stIdx];
                if(!step.logistics_flags) step.logistics_flags={};
                if(type==='flag-wip') step.logistics_flags.requires_wip = val;
                if(type==='flag-fin') step.logistics_flags.requires_finished = val;
                renderStages();
            }
        }

        function addStage() {
            if (!currentData.stages) currentData.stages = [];
            currentData.stages.push({ stage_name: "Nuova Fase", description: "", steps: [], _ui_open: true });
            updateIndexes(); renderStages();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
        }

        function addStep(sIdx) {
            if (!currentData.stages[sIdx].steps) currentData.stages[sIdx].steps = [];
            currentData.stages[sIdx].steps.push({ step_name: "Nuovo Step", instructions: "", estimated_time_minutes: 15, _ui_open: true });
            updateIndexes(); renderStages();
        }

        function updateIndexes() {
            if (!currentData?.stages) return;
            currentData.stages.forEach((stage, sIdx) => {
                stage.stage_order = sIdx + 1;
                stage.stage_id = `STAGE_${String(sIdx + 1).padStart(2, '0')}`;
                if (stage.steps) {
                    stage.steps.forEach((step, stIdx) => {
                        step.step_order = stIdx + 1;
                        step.step_id = `STEP_${String(sIdx + 1).padStart(2, '0')}_${String(stIdx + 1).padStart(2, '0')}`;
                    });
                }
            });
        }

        function handleSortEndNoRerender(evt) {
            const item = evt.item;
            if (item.classList.contains('stage-card')) {
                const moved = currentData.stages.splice(evt.oldIndex, 1)[0];
                currentData.stages.splice(evt.newIndex, 0, moved);
            } else {
                const fromStageIdx = parseInt(evt.from.closest('.stage-card').dataset.idx);
                const toStageIdx = parseInt(evt.to.closest('.stage-card').dataset.idx);
                const movedStep = currentData.stages[fromStageIdx].steps.splice(evt.oldIndex, 1)[0];
                currentData.stages[toStageIdx].steps.splice(evt.newIndex, 0, movedStep);
            }
            updateIndexes();
            document.querySelectorAll('.stage-card').forEach((el, idx) => el.dataset.idx = idx);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        async function loadBlueprint() {
            showLoader(t.loading);
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'GET', type: 'BLUEPRINT', productId, token, vat })
                });
                const data = await res.json();
                const bp = Array.isArray(data) ? data[0] : data;
                currentData = bp || { stages: [] };
                dom.desc.value = currentData.blueprint_description || '';
                dom.sku.innerText = `SKU: ${currentData.service_sku || 'N/A'}`;
                updateIndexes(); renderStages(); hideLoader();
            } catch(e) { console.error('Load error:', e); showError(e.message); }
        }

        async function handleSave(e) {
            e.preventDefault();
            
            // UI Aggiornata durante salvataggio
            dom.saveBtn.disabled = true;
            dom.saveBtnText.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> Salvataggio...`;

            currentData.blueprint_description = dom.desc.value;
            const payload = JSON.parse(JSON.stringify(currentData));
            payload.stages.forEach(s => { delete s._ui_open; s.steps.forEach(st => delete st._ui_open); });
            
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ action: 'SAVE', type: 'BLUEPRINT', productId, token, vat, payload })
                });
                
                dom.saveBtnText.innerText = "Salvato!";
                dom.saveBtn.classList.replace('bg-black', 'bg-green-500');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => { try { tg.close(); } catch(e) { window.history.back(); } }, 1500);
            } catch(err) { showError(err.message); }
        }

        function showLoader(msg) { dom.loaderText.innerText = msg; dom.loader.classList.remove('hidden'); dom.content.classList.add('hidden'); }
        function hideLoader() { dom.loader.classList.add('hidden'); dom.content.classList.remove('hidden'); }
        function showError(msg) { 
            alert(msg); hideLoader(); 
            dom.saveBtn.disabled = false; dom.saveBtnText.innerText = "Salva Blueprint";
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
