<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SiteBoS Certificator</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'self' https://web.telegram.org https://t.me;">

    <script>
        (function() {
            const isTelegram = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "";
            if (!isTelegram) {
                document.documentElement.innerHTML = `
                    <body style="background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;font-family:sans-serif;padding:30px;">
                        <div>
                            <h1 style="font-size:60px;margin-bottom:20px;">🚫</h1>
                            <h2>Accesso Negato</h2>
                            <p style="opacity:0.7;">Questo modulo di certificazione è accessibile solo tramite l'App SiteBoS ufficiale su Telegram.</p>
                        </div>
                    </body>`;
                window.stop();
                throw new Error("Unauthorized Access");
            }
        })();
    </script>
</head>
<body class="cert-body">

    <div class="cert-container">
        <div class="logo">SiteBoS Certificator</div>
        <div id="subtitle" class="subtitle">Modulo Acquisizione Evidenze</div>
        <div id="status" class="status-text">Inizializzazione...</div>
        <div id="loader" class="loader"></div>

        <!-- MODULO: IMAGE -->
        <div id="section-image" class="module-section">
            <video id="camera-feed" autoplay playsinline webkit-playsinline muted></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <button id="startCamBtn" class="action-btn" onclick="startCamera()">📸 ATTIVA FOTOCAMERA</button>
            <button id="snapBtn" class="action-btn btn-danger" style="display:none;" onclick="takePhoto()">🔴 SCATTA E INVIA</button>
        </div>

        <!-- MODULO: FILE -->
        <div id="section-file" class="module-section">
            <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">
                📄 Seleziona Documento<br>
                <span style="font-size: 11px; color:#666; margin-top:5px; display:block;">(PDF, JPG, PNG - Max 10MB)</span>
            </div>
            <input type="file" id="fileInput" accept=".pdf,image/jpeg,image/png" onchange="handleFileSelect(event)">
            <div id="fileNameDisplay" class="file-name-display">Nessun file selezionato</div>
            <button id="uploadFileBtn" class="action-btn btn-success" disabled onclick="processAndSendFile()">📤 INVIA DOCUMENTO</button>
        </div>

        <!-- MODULO: TEXT -->
        <div id="section-text" class="module-section">
            <textarea id="textInput" placeholder="Inserisci qui il testo richiesto o la nota di validazione..." oninput="validateText()"></textarea>
            <button id="sendTextBtn" class="action-btn btn-success" disabled onclick="sendTextData()">📤 INVIA TESTO</button>
        </div>
    </div>

    <!-- LOGICA ESATTAMENTE IDENTICA ALLA TUA -->
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const statusText = document.getElementById('status');
        const loader = document.getElementById('loader');
        const secImage = document.getElementById('section-image');
        const secFile = document.getElementById('section-file');
        const secText = document.getElementById('section-text');

        const chatId = tg.initDataUnsafe.start_param || tg.initDataUnsafe.user?.id;
        const userId = tg.initDataUnsafe.user?.id;

        let urlParams = {};
        let evidenceType = "IMAGE";
        let videoStream = null;
        let selectedFileBase64 = null;
        let selectedFileMime = null;
        let selectedFileName = null;

        function initApp() {
            const params = new URLSearchParams(window.location.search);
            urlParams = Object.fromEntries(params.entries());
            evidenceType = (urlParams.evidence_type || "IMAGE").toUpperCase();

            if (evidenceType === "FILE") {
                secFile.style.display = "flex";
                statusText.innerText = "Allega il file richiesto";
            } else if (evidenceType === "TEXT") {
                secText.style.display = "flex";
                statusText.innerText = "Inserisci la nota testuale";
            } else {
                secImage.style.display = "flex";
                statusText.innerText = "Scatta una foto live";
            }
        }

        async function startCamera() {
            try {
                document.getElementById('startCamBtn').style.display = 'none';
                loader.style.display = 'block';
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                videoStream = stream;
                const video = document.getElementById('camera-feed');
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    loader.style.display = 'none';
                    video.style.display = 'block';
                    document.getElementById('snapBtn').style.display = 'block';
                    statusText.innerText = 'Inquadra l\'oggetto...';
                };
            } catch (err) {
                loader.style.display = 'none';
                document.getElementById('startCamBtn').style.display = 'block';
                statusText.innerText = '❌ Errore fotocamera.';
                tg.showAlert("È necessario concedere i permessi per scattare la foto.");
            }
        }

        function takePhoto() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            sendToServer(base64, "image/jpeg", `cert_${Date.now()}.jpg`);
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) { tg.showAlert("File troppo grande (Max 10MB)"); return; }
            document.getElementById('fileNameDisplay').innerText = `📎 ${file.name}`;
            selectedFileName = file.name;
            selectedFileMime = file.type;
            const reader = new FileReader();
            reader.onload = (event) => {
                selectedFileBase64 = event.target.result.split(',')[1];
                document.getElementById('uploadFileBtn').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        function processAndSendFile() {
            sendToServer(selectedFileBase64, selectedFileMime, selectedFileName);
        }

        function validateText() {
            document.getElementById('sendTextBtn').disabled = document.getElementById('textInput').value.trim().length < 3;
        }

        function sendTextData() {
            sendToServer(document.getElementById('textInput').value.trim(), "text/plain", "nota.txt", true);
        }

        function sendToServer(content, mimeType, fileName, isPlainText = false) {
            loader.style.display = 'block';
            statusText.innerText = 'Invio in corso...';
            
            const payload = {
                _auth: tg.initData,
                action: "certificator",
                evidence_type: evidenceType,
                mime_type: mimeType,
                file_name: fileName,
                chat_id: chatId,
                user_id: userId,
                ...urlParams
            };

            if (isPlainText) payload.text_content = content;
            else payload.base64_content = content;

            fetch('https://prod.workflow.trinai.it/webhook/ef4aece4-9ec0-4026-a7a7-328562bcbdf6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.ok) {
                    statusText.innerText = '✅ Inviato con successo!';
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1500);
                } else { throw new Error(); }
            })
            .catch(() => {
                loader.style.display = 'none';
                statusText.innerText = '❌ Errore. Riprova.';
                tg.showAlert("Errore durante l'invio al sistema SiteBoS.");
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
