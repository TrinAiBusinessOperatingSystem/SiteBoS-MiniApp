<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SiteBoS Certificator - TrinAI</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        bg: '#fafafa',
                        border: '#eeeeee'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Animazione Spinner B&W */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }

        /* Camera Feed Style */
        #camera-feed {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 2rem;
            background-color: #000;
        }
    </style>

    <script>
        // ── SICUREZZA ──
        (function() {
            const isTelegram = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "";
            if (!isTelegram) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10">
                        <div>
                            <h1 class="text-5xl mb-4 text-white">🚫</h1>
                            <h2 class="text-xl font-black uppercase tracking-widest">Accesso Negato</h2>
                            <p class="opacity-40 text-sm mt-2 font-medium leading-relaxed">Il modulo è accessibile solo tramite l'App SiteBoS ufficiale.</p>
                        </div>
                    </body>`;
                window.stop();
                throw new Error("Unauthorized Access");
            }
        })();
    </script>
</head>
<body class="bg-bg text-black min-h-screen flex flex-col items-center p-6">

    <div class="w-full max-w-lg flex flex-col items-center space-y-8">
        <!-- HEADER -->
        <header class="text-center space-y-1">
            <h1 class="text-3xl font-black tracking-tighter uppercase leading-none">CERTIFICATOR</h1>
            <p id="subtitle" class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em]">Acquisizione Evidenze</p>
        </header>

        <!-- STATUS BOX -->
        <div class="w-full bg-white rounded-[2.5rem] p-8 border border-border shadow-sm flex flex-col items-center text-center space-y-4">
            <div id="status" class="text-sm font-bold tracking-tight">Inizializzazione...</div>
            <div id="loader" class="spinner hidden"></div>
        </div>

        <!-- MODULO: IMAGE (CAMERA) -->
        <div id="section-image" class="hidden w-full flex flex-col items-center space-y-6">
            <div class="relative w-full">
                <video id="camera-feed" class="hidden shadow-2xl" autoplay playsinline webkit-playsinline muted></video>
                <canvas id="canvas" class="hidden"></canvas>
                <!-- Decorative scan line -->
                <div id="scan-line" class="hidden absolute top-0 left-0 w-full h-1 bg-white opacity-20 animate-bounce"></div>
            </div>
            
            <button id="startCamBtn" class="w-full bg-black text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-xl active:scale-95 transition" onclick="startCamera()">
                <i class="fas fa-camera mr-2"></i> Attiva Fotocamera
            </button>
            
            <button id="snapBtn" class="hidden w-full bg-red-600 text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-xl active:scale-95 transition" onclick="takePhoto()">
                🔴 Scatta e Invia
            </button>
        </div>

        <!-- MODULO: FILE -->
        <div id="section-file" class="hidden w-full flex flex-col items-center space-y-6">
            <div class="w-full border-2 border-dashed border-gray-200 bg-white rounded-[2.5rem] p-12 flex flex-col items-center justify-center cursor-pointer hover:border-black transition active:scale-95 group" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-file-upload text-4xl text-gray-200 group-hover:text-black transition mb-4"></i>
                <span class="text-xs font-black uppercase tracking-widest text-gray-400 group-hover:text-black transition">Seleziona Documento</span>
                <span class="text-[9px] font-bold text-gray-300 mt-2 uppercase tracking-tighter">(PDF, JPG, PNG - MAX 10MB)</span>
            </div>
            
            <input type="file" id="fileInput" class="hidden" accept=".pdf,image/jpeg,image/png" onchange="handleFileSelect(event)">
            <div id="fileNameDisplay" class="text-[10px] font-black uppercase tracking-widest text-red-500">Nessun file selezionato</div>
            
            <button id="uploadFileBtn" class="w-full bg-black text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-xl active:scale-95 transition disabled:opacity-20 disabled:active:scale-100" disabled onclick="processAndSendFile()">
                <i class="fas fa-paper-plane mr-2"></i> Invia Documento
            </button>
        </div>

        <!-- MODULO: TEXT -->
        <div id="section-text" class="hidden w-full flex flex-col items-center space-y-6">
            <textarea id="textInput" placeholder="Inserisci qui il testo richiesto o la nota di validazione..." class="w-full bg-white border border-border rounded-[2.5rem] p-8 text-sm font-medium outline-none focus:ring-1 ring-black transition min-h-[200px] shadow-sm" oninput="validateText()"></textarea>
            
            <button id="sendTextBtn" class="w-full bg-black text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-xl active:scale-95 transition disabled:opacity-20 disabled:active:scale-100" disabled onclick="sendTextData()">
                <i class="fas fa-paper-plane mr-2"></i> Invia Nota
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const statusText = document.getElementById('status');
        const loader = document.getElementById('loader');
        const secImage = document.getElementById('section-image');
        const secFile = document.getElementById('section-file');
        const secText = document.getElementById('section-text');

        // DATI DA SDK
        const chatId = tg.initDataUnsafe.start_param || tg.initDataUnsafe.user?.id;
        const userId = tg.initDataUnsafe.user?.id;

        let urlParams = {};
        let evidenceType = "IMAGE";
        let videoStream = null;
        let selectedFileBase64 = null;
        let selectedFileMime = null;
        let selectedFileName = null;

        function initApp() {
            const params = new URLSearchParams(window.location.search);
            urlParams = Object.fromEntries(params.entries());
            evidenceType = (urlParams.evidence_type || "IMAGE").toUpperCase();

            if (evidenceType === "FILE") {
                secFile.classList.remove('hidden');
                statusText.innerText = "Scegli il file da allegare";
            } else if (evidenceType === "TEXT") {
                secText.classList.remove('hidden');
                statusText.innerText = "Inserisci la nota testuale";
            } else {
                secImage.classList.remove('hidden');
                statusText.innerText = "Prepara lo scatto live";
            }
        }

        async function startCamera() {
            try {
                document.getElementById('startCamBtn').classList.add('hidden');
                loader.classList.remove('hidden');
                statusText.innerText = "Accesso fotocamera...";

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                
                videoStream = stream;
                const video = document.getElementById('camera-feed');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    loader.classList.add('hidden');
                    video.classList.remove('hidden');
                    document.getElementById('snapBtn').classList.remove('hidden');
                    document.getElementById('scan-line').classList.remove('hidden');
                    statusText.innerText = "Inquadra l'evidenza";
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                };
            } catch (err) {
                loader.classList.add('hidden');
                document.getElementById('startCamBtn').classList.remove('hidden');
                statusText.innerText = "❌ Accesso negato alla camera";
                tg.showAlert("È necessario autorizzare la fotocamera per scattare foto.");
            }
        }

        function takePhoto() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            sendToServer(base64, "image/jpeg", `cert_${Date.now()}.jpg`);
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            if (file.size > 10 * 1024 * 1024) {
                tg.showAlert("Il file è troppo grande (Max 10MB)");
                return;
            }
            
            document.getElementById('fileNameDisplay').innerText = file.name.toUpperCase();
            selectedFileName = file.name;
            selectedFileMime = file.type;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                selectedFileBase64 = event.target.result.split(',')[1];
                document.getElementById('uploadFileBtn').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        function processAndSendFile() {
            sendToServer(selectedFileBase64, selectedFileMime, selectedFileName);
        }

        function validateText() {
            document.getElementById('sendTextBtn').disabled = document.getElementById('textInput').value.trim().length < 3;
        }

        function sendTextData() {
            sendToServer(document.getElementById('textInput').value.trim(), "text/plain", "nota.txt", true);
        }

        function sendToServer(content, mimeType, fileName, isPlainText = false) {
            loader.classList.remove('hidden');
            statusText.innerText = "TRASMISSIONE DATI...";
            
            const payload = {
                _auth: tg.initData,
                action: "certificator",
                evidence_type: evidenceType,
                mime_type: mimeType,
                file_name: fileName,
                chat_id: chatId,
                user_id: userId,
                ...urlParams
            };

            if (isPlainText) payload.text_content = content;
            else payload.base64_content = content;

            fetch('https://prod.workflow.trinai.it/webhook/ef4aece4-9ec0-4026-a7a7-328562bcbdf6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.ok) {
                    statusText.innerText = "✅ TRASMESSO";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1500);
                } else { throw new Error(); }
            })
            .catch(() => {
                loader.classList.add('hidden');
                statusText.innerText = "❌ ERRORE DI INVIO";
                tg.showAlert("Errore durante la connessione al sistema SiteBoS.");
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
