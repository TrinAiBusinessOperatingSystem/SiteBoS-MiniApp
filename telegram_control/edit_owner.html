<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profile Manager | SiteBoS</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function () {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-black uppercase tracking-widest">Accesso Proibito</h2></div>
                    </body>`;
                window.stop();
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', surface: '#ffffff', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>

    <style>

/* SiteBoS Architect Alignment */
body { background-color: #fafafa !important; color: #000000 !important; }
.card, .section-card, .dark-card, .upload-box { 
    background: white !important; 
    border: 1px solid #eeeeee !important; 
    box-shadow: none !important; 
}
input:focus, textarea:focus, select:focus { 
    border-color: #000000 !important; 
    box-shadow: none !important; 
    outline: none !important;
}
.text-primary, .text-black, .text-blue-600, .text-black { color: #000000 !important; }
.bg-primary, .bg-black, .bg-black, .bg-black { background-color: #000000 !important; color: #ffffff !important; }
.border-primary, .border-black, .border-blue-600, .border-black { border-color: #000000 !important; }
.spinner { border-top-color: #000 !important; }
input[type="checkbox"]:checked { background-color: #000 !important; border-color: #000 !important; }
/* Forza icone pesanti */
.fas, .far, .fal { font-weight: 900 !important; font-family: "Font Awesome 6 Free" !important; }


        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #000; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-spin { border: 3px solid #f3f3f3; border-top: 3px solid #000; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    </style>
</head>
<body class="safe-area-inset h-screen flex flex-col overflow-hidden">

    <!-- HEADER (COMPACT B&W) -->
    <header class="p-5 bg-white border-b border-gray-100 flex justify-between items-center z-50 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-black">
                <i class="fas fa-user-tie text-sm"></i>
            </div>
            <div>
                <h1 class="text-[9px] font-black uppercase tracking-widest text-gray-500 leading-none mb-1">Manager Desk</h1>
                <p class="text-sm font-black tracking-tight">Profilo Owner</p>
            </div>
        </div>
        <button onclick="tg.close()" class="text-gray-300"><i class="fas fa-times-circle text-2xl"></i></button>
    </header>

    <!-- CONTENT -->
    <main class="flex-1 overflow-y-auto p-5 space-y-5 no-scrollbar pb-32">
        
        <!-- STEP 1: IDENTITY -->
        <section class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 space-y-4">
            <div class="flex items-center gap-3">
                <span class="w-6 h-6 bg-black text-white rounded-full flex items-center justify-center text-[10px] font-black">1</span>
                <h2 class="font-black uppercase tracking-widest text-[10px]">Identità & KYC</h2>
            </div>
            <p class="text-[11px] text-gray-500 leading-relaxed italic">Analisi IA del documento di identità.</p>
            
            <div id="dropzone" class="border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center cursor-pointer hover:border-black transition relative overflow-hidden bg-white">
                <input type="file" id="kyc-upload" class="hidden" accept="image/*" onchange="handleKycUpload(this)">
                <div id="upload-placeholder" class="space-y-2">
                    <i class="fas fa-camera text-xl text-gray-300"></i>
                    <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Carica Foto Documento</p>
                </div>
                <div id="upload-preview" class="hidden absolute inset-0 bg-cover bg-center">
                    <div class="absolute inset-0 bg-black/50 flex items-center justify-center backdrop-blur-sm">
                        <div class="text-black text-center">
                            <div class="loader-spin border-t-white mx-auto mb-2"></div>
                            <p class="text-[8px] font-black uppercase tracking-widest">Elaborazione...</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- STEP 2: BUSINESS DATA -->
        <section class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 space-y-4">
            <div class="flex items-center gap-3">
                <span class="w-6 h-6 bg-black text-white rounded-full flex items-center justify-center text-[10px] font-black">2</span>
                <h2 class="font-black uppercase tracking-widest text-[10px]">Dati Aziendali</h2>
            </div>

            <form id="owner-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase text-gray-500 ml-1">Nome</label>
                        <input type="text" name="name" class="w-full bg-white border border-gray-100 rounded-xl px-3 py-2.5 text-xs font-bold focus:border-black outline-none transition">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase text-gray-500 ml-1">Cognome</label>
                        <input type="text" name="surname" class="w-full bg-white border border-gray-100 rounded-xl px-3 py-2.5 text-xs font-bold focus:border-black outline-none transition">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-1">Ragione Sociale</label>
                    <input type="text" name="ragione_sociale" class="w-full bg-white border border-gray-100 rounded-xl px-3 py-2.5 text-xs font-bold focus:border-black outline-none transition">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase text-gray-500 ml-1">P.IVA</label>
                        <input type="text" name="vat_number" class="w-full bg-white border border-gray-100 rounded-xl px-3 py-2.5 text-xs font-bold focus:border-black outline-none transition">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase text-gray-500 ml-1">Settore</label>
                        <select name="sector" class="w-full bg-white border border-gray-100 rounded-xl px-3 py-2.5 text-[10px] font-bold outline-none appearance-none">
                            <option value="Servizi">Servizi</option>
                            <option value="Tech">Tech</option>
                            <option value="Retail">Retail</option>
                            <option value="Food">Food</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-1">Mission Aziendale</label>
                    <textarea name="what_we_do" rows="3" class="w-full bg-white border border-gray-100 rounded-xl px-3 py-2.5 text-xs font-medium focus:border-black outline-none transition resize-none"></textarea>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-1">Gemini API Key</label>
                    <input type="password" name="gemini_key" class="w-full bg-white border border-gray-100 rounded-xl px-3 py-2.5 text-xs font-mono focus:border-black outline-none transition">
                </div>
            </form>
        </section>
    </main>

    <!-- FOOTER NAV (MOBILE ONLY SLIM) -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-lg border-t border-gray-100 z-50">
        <div class="flex gap-3 max-w-md mx-auto">
            <button onclick="saveData()" class="flex-1 h-12 bg-white border border-black text-black rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition">
                Salva Bozza
            </button>
            <button id="btn-activate" onclick="finalizeProvisioning()" class="flex-[1.5] h-12 bg-black text-white rounded-xl font-black text-[10px] uppercase tracking-widest shadow-sm active:scale-95 transition flex items-center justify-center gap-2">
                <span>Attiva Istanza</span><i class="fas fa-rocket text-[10px]"></i>
            </button>
        </div>
    </div>

    <!-- LOADER -->
    <div id="global-loader" class="fixed inset-0 bg-white/95 z-[100] hidden flex flex-col items-center justify-center p-10 text-center transition-opacity">
        <div class="loader-spin mb-4"></div>
        <h3 id="loader-title" class="text-sm font-black uppercase tracking-tighter mb-1">Syncing...</h3>
        <p id="loader-msg" class="text-[10px] text-gray-500 font-medium italic">Collegamento ai motori neurali SiteBoS</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        const WH_URL = "https://prod.workflow.trinai.it/webhook/83acc670-15ae-4da0-ae0e-3587c85bd5f4";
        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');
        let ownerData = {};
        const tgUserId = tg.initDataUnsafe?.user?.id || null;
        
        console.log("TG: UserID", tgUserId);
        console.log("TG: ASH Session", ash);

        function buildEnvelope(payload) { 
            // Implementazione logica ash e _auth obbligatori per la sicurezza
            const env = { _auth: tg.initData, ash: ash, user_id: tgUserId, ...payload };
            console.log("DEBUG: Outgoing Envelope", env);
            return env;
        }

        window.onload = async () => {
            if (!ash) {
                document.body.innerHTML = `
                    <div class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div><h1 class="text-6xl mb-4">⚠️</h1><h2 class="text-xl font-black uppercase tracking-widest">ASH MISSING</h2><p class="text-xs text-gray-500 mt-2">Accesso non autorizzato.</p></div>
                    </div>`;
                return;
            }
            showLoader("Recupero Dati", "Caricamento profilo...");
            await fetchOwnerData();
            hideLoader();
        };

        function showLoader(title, msg) {
            document.getElementById('loader-title').innerText = title;
            document.getElementById('loader-msg').innerText = msg;
            document.getElementById('global-loader').classList.remove('hidden');
        }
        function hideLoader() { document.getElementById('global-loader').classList.add('hidden'); }

        async function fetchOwnerData() {
            console.log("OWNER: Recupero dati...");
            try {
                const response = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(buildEnvelope({ action: 'get_owner_data' }))
                });
                const result = await response.json();
                console.log("OWNER: Dati ricevuti", result);
                if (result.status === 'success' && result.owner_data) {
                    ownerData = result.owner_data;
                    populateForm(ownerData);
                }
            } catch (error) { 
                console.error("OWNER: Errore fetch", error);
                tg.showAlert("Errore recupero dati."); 
            }
        }

        function populateForm(data) {
            const form = document.getElementById('owner-form');
            const fields = ['name', 'surname', 'ragione_sociale', 'vat_number', 'sector', 'what_we_do', 'gemini_key'];
            fields.forEach(f => { if (form.elements[f]) form.elements[f].value = data[f] || ''; });
        }

        function getFormData() {
            const form = document.getElementById('owner-form');
            const data = {};
            new FormData(form).forEach((value, key) => data[key] = value);
            return data;
        }

        async function saveData() {
            showLoader("Salvataggio", "Aggiornamento in corso...");
            const dataUpdate = getFormData();
            console.log("SAVE: Invio aggiornamento", dataUpdate);
            try {
                const response = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(buildEnvelope({ action: 'save_owner_data', data_update: dataUpdate }))
                });
                const res = await response.json();
                console.log("SAVE: Risultato", res);
                if (response.ok) {
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    tg.showScanQrPopup({ text: "Salvato ✅" }); setTimeout(() => tg.closeScanQrPopup(), 1000);
                }
            } catch (error) { 
                console.error("SAVE: Errore", error);
                tg.showAlert("Errore salvataggio."); 
            }
            finally { hideLoader(); }
        }

        document.getElementById('dropzone').onclick = () => document.getElementById('kyc-upload').click();

        async function handleKycUpload(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const preview = document.getElementById('upload-preview');
            const placeholder = document.getElementById('upload-placeholder');
            
            console.log("KYC: Avvio caricamento", file.name);

            const reader = new FileReader();
            reader.onload = (e) => { 
                preview.style.backgroundImage = `url(${e.target.result})`; 
                preview.classList.remove('hidden'); 
                placeholder.classList.add('hidden');
            };
            reader.readAsDataURL(file);

            const base64 = await toBase64(file);
            const geminiKey = document.querySelector('[name="gemini_key"]').value || ownerData.gemini_key;
            
            if (!geminiKey) { 
                tg.showAlert("Inserisci la API Key prima."); 
                preview.classList.add('hidden'); 
                placeholder.classList.remove('hidden');
                return; 
            }

            try {
                console.log("KYC: Analisi IA in corso...");
                const response = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(buildEnvelope({ 
                        action: 'analyze_id', 
                        file_data: base64.split(',')[1], 
                        mime_type: file.type, 
                        gemini_key: geminiKey
                    }))
                });
                const result = await response.json();
                console.log("KYC: Risultato IA", result);
                
                if (result.status === 'success' && result.data) {
                    document.querySelector('[name="name"]').value = result.data.name || '';
                    document.querySelector('[name="surname"]').value = result.data.surname || '';
                    preview.innerHTML = ''; 
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.showAlert("IA non ha riconosciuto il documento.");
                }
            } catch (error) { 
                console.error("KYC: Errore analisi", error);
                tg.showAlert("Errore analisi."); 
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result); reader.onerror = e => reject(e);
        });

        async function finalizeProvisioning() {
            showLoader("Attivazione", "Inizializzazione...");
            const data = getFormData();
            console.log("FINALIZE: Invio dati per provisioning", data);
            try {
                const response = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(buildEnvelope({ 
                        action: 'payment_checkout',
                        owner_data: { ...ownerData, ...data }, 
                        chat_id: ownerData.chat_id || tgUserId 
                    }))
                });
                const result = await response.json();
                console.log("FINALIZE: Risultato", result);
                if (result.status === 'success' || result.telegramPayload) {
                    tg.showConfirm("Attivazione Completata!", () => tg.close());
                }
            } catch (error) { 
                console.error("FINALIZE: Errore", error);
                tg.showAlert("Errore attivazione."); 
            }
            finally { hideLoader(); }
        }
    </script>
</body>
</html>
