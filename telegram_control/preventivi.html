<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Proposal Wizard | SiteBoS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function () {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { primary: '#000000', bg: '#fafafa', surface: '#ffffff', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafafa; color: #000; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .wizard-step { transition: all 0.4s ease; }
        .step-hidden-left { transform: translateX(-20px); opacity: 0; pointer-events: none; position: absolute; }
        .step-hidden-right { transform: translateX(20px); opacity: 0; pointer-events: none; position: absolute; }
        .step-active { transform: translateX(0); opacity: 1; position: relative; }
    </style>
</head>
<body class="safe-area-inset h-screen flex flex-col overflow-hidden text-sm">

    <header class="p-5 bg-white border-b border-gray-100 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-white shadow-md">
                <i class="fas fa-file-invoice-dollar text-sm"></i>
            </div>
            <div>
                <h1 class="text-[9px] font-black uppercase tracking-widest text-gray-400 leading-none mb-1">AI Proposal</h1>
                <p id="step-title" class="text-sm font-black tracking-tight">Selezione</p>
            </div>
        </div>
        <button onclick="tg.close()" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-300">
            <i class="fas fa-times"></i>
        </button>
    </header>

    <div class="h-1 w-full bg-gray-50 overflow-hidden">
        <div id="progress" class="h-full bg-black transition-all duration-500" style="width: 0%"></div>
    </div>

    <main id="wizard-container" class="flex-1 overflow-x-hidden overflow-y-auto p-5 relative no-scrollbar pb-32">
        <div id="step-0" class="wizard-step step-active space-y-5">
            <div class="text-center py-4">
                <h2 class="text-xl font-black tracking-tight uppercase">Cosa vuoi realizzare?</h2>
                <p class="text-gray-400 text-xs font-medium mt-1">Scegli un servizio per la proposta AI.</p>
            </div>
            <div id="service-grid" class="grid gap-3"></div>
        </div>

        <!-- GPCTBA STEPS -->
        <div id="step-1" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest opacity-30">Goals</span><h2 class="text-xl font-black tracking-tight uppercase">Obiettivi</h2></div>
            <textarea id="input-goals" rows="5" class="w-full bg-gray-50 border border-transparent rounded-3xl p-5 text-sm font-medium outline-none focus:border-black transition shadow-sm" placeholder="Cosa vuoi ottenere?"></textarea>
        </div>
        <div id="step-2" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest opacity-30">Plans</span><h2 class="text-xl font-black tracking-tight uppercase">Piani</h2></div>
            <textarea id="input-plans" rows="5" class="w-full bg-gray-50 border border-transparent rounded-3xl p-5 text-sm font-medium outline-none focus:border-black transition shadow-sm" placeholder="Qual è il tuo piano attuale?"></textarea>
        </div>
        <div id="step-3" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest opacity-30">Challenges</span><h2 class="text-xl font-black tracking-tight uppercase">Sfide</h2></div>
            <textarea id="input-challenges" rows="5" class="w-full bg-gray-50 border border-transparent rounded-3xl p-5 text-sm font-medium outline-none focus:border-black transition shadow-sm" placeholder="Quali ostacoli incontri?"></textarea>
        </div>
        <div id="step-4" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest opacity-30">Timeline</span><h2 class="text-xl font-black tracking-tight uppercase">Tempistiche</h2></div>
            <div class="relative">
                <select id="input-timeline" class="w-full bg-gray-50 border border-transparent rounded-3xl p-5 text-sm font-bold outline-none appearance-none focus:border-black transition shadow-sm">
                    <option value="IMMEDIATE">Subito (7 giorni)</option>
                    <option value="1_MONTH">Un mese</option>
                    <option value="3_MONTHS">3 mesi</option>
                </select>
                <i class="fas fa-chevron-down absolute right-6 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none"></i>
            </div>
        </div>
        <div id="step-5" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest opacity-30">Budget</span><h2 class="text-xl font-black tracking-tight uppercase">Investimento</h2></div>
            <div class="grid gap-3">
                <label class="flex items-center gap-4 bg-gray-50 p-5 rounded-3xl border border-transparent active:scale-95 transition shadow-sm cursor-pointer group [&:has(input:checked)]:border-black [&:has(input:checked)]:bg-white">
                    <input type="radio" name="budget" value="LOW" class="w-5 h-5 accent-black"><span class="font-bold text-xs uppercase tracking-tight">Base Setup</span>
                </label>
                <label class="flex items-center gap-4 bg-gray-50 p-5 rounded-3xl border border-transparent active:scale-95 transition shadow-sm cursor-pointer group [&:has(input:checked)]:border-black [&:has(input:checked)]:bg-white">
                    <input type="radio" name="budget" value="MEDIUM" class="w-5 h-5 accent-black"><span class="font-bold text-xs uppercase tracking-tight">Growth Scale</span>
                </label>
            </div>
        </div>
        <div id="step-6" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest opacity-30">Authority</span><h2 class="text-xl font-black tracking-tight uppercase">Decision Maker</h2></div>
            <input type="text" id="input-authority" class="w-full bg-gray-50 border border-transparent rounded-3xl p-5 text-sm font-bold outline-none focus:border-black transition shadow-sm" placeholder="Chi decide?">
        </div>
    </main>

    <footer id="footer-nav" class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-lg border-t border-gray-100 z-[100] hidden">
        <div class="flex gap-3 max-w-md mx-auto">
            <button onclick="prevStep()" class="w-10 h-10 bg-gray-50 text-black rounded-xl flex items-center justify-center active:scale-90 transition border border-gray-100">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button onclick="nextStep()" class="flex-1 bg-black text-white h-10 rounded-xl font-black text-[9px] uppercase tracking-widest shadow-lg active:scale-95 transition flex items-center justify-center gap-2">
                <span id="next-label">Continua</span><i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </footer>

    <div id="global-loader" class="fixed inset-0 bg-white z-[500] flex flex-col items-center justify-center p-10 text-center transition-opacity duration-300">
        <div class="w-10 h-10 border-2 border-gray-100 border-t-black rounded-full animate-spin mb-4"></div>
        <p class="text-[8px] font-black uppercase tracking-[0.3em] text-gray-300">SiteBoS AI Engine...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        const WH_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const params = new URLSearchParams(window.location.search);
        const ashToken = params.get('ash');
        let catalog = [], selection = {}, currentStep = 0, totalSteps = 6;

        window.onload = async () => { 
            if (!ashToken) {
                tg.showAlert("Accesso non autorizzato: ASH Token mancante.");
                return;
            } 
            await initApp(); 
        };

        async function initApp() {
            try {
                const r = await fetch(WH_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_prev_get' }) 
                });
                const d = await r.json(); 
                if (d.success) { 
                    catalog = d.catalog || []; 
                    renderServices(); 
                    hideLoader();
                } else {
                    tg.showAlert("Errore nel caricamento del catalogo.");
                }
            } catch (e) {
                tg.showAlert("Connessione al server fallita.");
            }
        }

        function hideLoader() { 
            const l = document.getElementById('global-loader'); 
            l.classList.add('opacity-0'); 
            setTimeout(() => l.classList.add('hidden'), 300); 
        }

        function renderServices() {
            const g = document.getElementById('service-grid');
            g.innerHTML = catalog.map(s => {
                const qty = selection[s.callback_data]?.qty || 0;
                const isService = s.category?.includes('[SER]') || s.callback_data?.includes('ser_'); // Heuristic
                const icon = isService ? 'fa-concierge-bell' : 'fa-shopping-bag';
                
                return `
                <div class="bg-white p-4 rounded-3xl border border-gray-100 flex items-center justify-between active:scale-[0.98] transition shadow-sm border-l-4 ${qty > 0 ? 'border-l-black bg-gray-50/30' : 'border-l-transparent'}">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-10 h-10 bg-gray-50 rounded-xl flex-shrink-0 flex items-center justify-center text-black shadow-sm">
                            <i class="fas ${icon} text-xs"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="font-bold text-[11px] uppercase tracking-tight truncate">${s.name}</h3>
                            <p class="text-[8px] text-gray-400 font-black uppercase tracking-widest leading-none mt-1">${isService ? 'Servizio AI' : 'Prodotto'}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        ${qty > 0 ? `
                            <button onclick="updateQty('${s.callback_data}', -1)" class="w-8 h-8 bg-white border border-gray-100 rounded-lg flex items-center justify-center shadow-sm active:scale-75 transition">
                                <i class="fas fa-minus text-[8px]"></i>
                            </button>
                            <span class="font-black text-xs min-w-[15px] text-center">${qty}</span>
                        ` : ''}
                        <button onclick="updateQty('${s.callback_data}', 1)" class="w-8 h-8 ${qty > 0 ? 'bg-black text-white' : 'bg-gray-50 text-gray-400'} border border-transparent rounded-lg flex items-center justify-center shadow-sm active:scale-75 transition">
                            <i class="fas fa-plus text-[8px]"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');
            
            updateStepZeroFooter();
        }

        function updateQty(sku, delta) {
            const item = catalog.find(s => s.callback_data === sku);
            if (!item) return;
            
            const current = selection[sku]?.qty || 0;
            const next = current + delta;
            
            if (next <= 0) {
                delete selection[sku];
            } else {
                selection[sku] = { name: item.name, qty: next, sku: item.callback_data };
            }
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(delta > 0 ? 'medium' : 'light');
            renderServices();
        }

        function updateStepZeroFooter() {
            const hasSelection = Object.keys(selection).length > 0;
            const footer = document.getElementById('footer-nav');
            
            if (currentStep === 0) {
                footer.classList.toggle('hidden', !hasSelection);
                document.getElementById('next-label').innerText = "Configura Proposta";
                // Nascondi pulsante back allo step 0
                footer.querySelector('button:first-child').classList.add('invisible');
            } else {
                footer.classList.remove('hidden');
                footer.querySelector('button:first-child').classList.remove('invisible');
                document.getElementById('next-label').innerText = currentStep === totalSteps ? "Genera Proposta" : "Continua";
            }
        }

        function nextStep() {
            if (currentStep === totalSteps) { submitProposal(); return; }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            document.getElementById(`step-${currentStep}`).className = "wizard-step step-hidden-left";
            currentStep++;
            document.getElementById(`step-${currentStep}`).className = "wizard-step step-active";
            updateUI();
        }

        function prevStep() {
            if (currentStep === 0) return;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            document.getElementById(`step-${currentStep}`).className = "wizard-step step-hidden-right";
            currentStep--;
            document.getElementById(`step-${currentStep}`).className = "wizard-step step-active";
            updateUI();
        }

        function updateUI() {
            document.getElementById('progress').style.width = `${(currentStep / totalSteps) * 100}%`;
            const titles = ["Configurazione", "Obiettivi", "Piani", "Sfide", "Timeline", "Budget", "Autorità"];
            document.getElementById('step-title').innerText = titles[currentStep];
            
            const itemsCount = Object.keys(selection).length;
            if (currentStep > 0) {
                document.querySelector('header h1').innerText = itemsCount === 1 
                    ? Object.values(selection)[0].name 
                    : `${itemsCount} Elementi Selezionati`;
            } else {
                document.querySelector('header h1').innerText = "AI Proposal";
            }
            
            updateStepZeroFooter();
        }

        async function submitProposal() {
            const items = Object.values(selection);
            const d = { 
                items: items, 
                gpctba: { 
                    goals: document.getElementById('input-goals').value, 
                    plans: document.getElementById('input-plans').value, 
                    challenges: document.getElementById('input-challenges').value, 
                    timeline: document.getElementById('input-timeline').value, 
                    budget: document.querySelector('input[name="budget"]:checked')?.value, 
                    authority: document.getElementById('input-authority').value 
                } 
            };
            
            tg.showConfirm(`Inviare la richiesta di proposta per ${items.length} elementi?`, async ok => {
                if (ok) {
                    try { 
                        const r = await fetch(WH_URL, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_prev_save', proposal_data: d }) 
                        }); 
                        const res = await r.json();
                        if (res.success || r.ok) {
                            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                            tg.showAlert("Richiesta di proposta inviata!", () => tg.close()); 
                        } else {
                            tg.showAlert("Errore durante l'invio.");
                        }
                    } catch (e) {
                        tg.showAlert("Errore di connessione.");
                    }
                }
            });
        }
    </script>
</body>
</html>
