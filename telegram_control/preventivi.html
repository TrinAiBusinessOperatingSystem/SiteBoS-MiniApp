<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Proposal Wizard | SiteBoS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function () {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', surface: '#ffffff', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #000; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .wizard-step { transition: all 0.4s ease; }
        .step-hidden-left { transform: translateX(-20px); opacity: 0; pointer-events: none; position: absolute; }
        .step-hidden-right { transform: translateX(20px); opacity: 0; pointer-events: none; position: absolute; }
        .step-active { transform: translateX(0); opacity: 1; position: relative; }
    </style>
</head>
<body class="safe-area-inset h-screen flex flex-col overflow-hidden text-sm">

    <header class="p-5 bg-white border-b border-gray-100 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-white shadow-md">
                <i class="fas fa-file-invoice-dollar text-sm"></i>
            </div>
            <div>
                <h1 class="text-[9px] font-black uppercase tracking-widest text-gray-400 leading-none mb-1">AI Proposal</h1>
                <p id="step-title" class="text-sm font-black tracking-tight">Selezione</p>
            </div>
        </div>
        <button onclick="tg.close()" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-300">
            <i class="fas fa-times"></i>
        </button>
    </header>

    <div class="h-1 w-full bg-gray-50 overflow-hidden">
        <div id="progress" class="h-full bg-black transition-all duration-500" style="width: 0%"></div>
    </div>

    <main id="wizard-container" class="flex-1 overflow-x-hidden overflow-y-auto p-5 relative no-scrollbar pb-32">
        <div id="step-0" class="wizard-step step-active space-y-5">
            <div class="text-center py-4">
                <h2 class="text-xl font-black tracking-tight uppercase">Cosa vuoi realizzare?</h2>
                <p class="text-gray-400 text-xs font-medium mt-1">Scegli un servizio per la proposta AI.</p>
            </div>
            <div id="service-grid" class="grid gap-3"></div>
        </div>

        <!-- GPCTBA STEPS -->
        <div id="step-1" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest">Goals</span><h2 class="text-xl font-black tracking-tight">Obiettivi</h2></div>
            <textarea id="input-goals" rows="5" class="w-full bg-white border border-gray-100 rounded-3xl p-5 text-sm outline-none focus:border-black shadow-sm" placeholder="Cosa vuoi ottenere?"></textarea>
        </div>
        <div id="step-2" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest">Plans</span><h2 class="text-xl font-black tracking-tight">Piani</h2></div>
            <textarea id="input-plans" rows="5" class="w-full bg-white border border-gray-100 rounded-3xl p-5 text-sm outline-none focus:border-black shadow-sm" placeholder="Qual è il tuo piano attuale?"></textarea>
        </div>
        <div id="step-3" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest">Challenges</span><h2 class="text-xl font-black tracking-tight">Sfide</h2></div>
            <textarea id="input-challenges" rows="5" class="w-full bg-white border border-gray-100 rounded-3xl p-5 text-sm outline-none focus:border-black shadow-sm" placeholder="Quali ostacoli incontri?"></textarea>
        </div>
        <div id="step-4" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest">Timeline</span><h2 class="text-xl font-black tracking-tight">Tempistiche</h2></div>
            <select id="input-timeline" class="w-full bg-white border border-gray-100 rounded-3xl p-5 text-sm font-bold outline-none appearance-none">
                <option value="IMMEDIATE">Subito (7 giorni)</option>
                <option value="1_MONTH">Un mese</option>
                <option value="3_MONTHS">3 mesi</option>
            </select>
        </div>
        <div id="step-5" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest">Budget</span><h2 class="text-xl font-black tracking-tight">Investimento</h2></div>
            <div class="grid gap-2">
                <label class="flex items-center gap-3 bg-white p-4 rounded-3xl border border-gray-100 active:scale-95 transition">
                    <input type="radio" name="budget" value="LOW" class="accent-black"><span class="font-bold text-xs uppercase tracking-tight">Base</span>
                </label>
                <label class="flex items-center gap-3 bg-white p-4 rounded-3xl border border-gray-100 active:scale-95 transition">
                    <input type="radio" name="budget" value="MEDIUM" class="accent-black"><span class="font-bold text-xs uppercase tracking-tight">Growth</span>
                </label>
            </div>
        </div>
        <div id="step-6" class="wizard-step step-hidden-right space-y-5">
            <div class="space-y-1"><span class="text-black font-black uppercase text-[9px] tracking-widest">Authority</span><h2 class="text-xl font-black tracking-tight">Decision Maker</h2></div>
            <input type="text" id="input-authority" class="w-full bg-white border border-gray-100 rounded-3xl p-5 text-sm font-bold outline-none focus:border-black shadow-sm" placeholder="Chi decide?">
        </div>
    </main>

    <footer id="footer-nav" class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-lg border-t border-gray-100 z-[100] hidden">
        <div class="flex gap-3 max-w-md mx-auto">
            <button onclick="prevStep()" class="w-10 h-10 bg-gray-50 text-black rounded-xl flex items-center justify-center active:scale-90 transition border border-gray-100">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button onclick="nextStep()" class="flex-1 bg-black text-white h-10 rounded-xl font-black text-[9px] uppercase tracking-widest shadow-lg active:scale-95 transition flex items-center justify-center gap-2">
                <span id="next-label">Continua</span><i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </footer>

    <div id="global-loader" class="fixed inset-0 bg-white z-[500] flex flex-col items-center justify-center p-10 text-center">
        <div class="w-10 h-10 border-2 border-gray-100 border-t-black rounded-full animate-spin mb-4"></div>
        <p class="text-[8px] font-black uppercase tracking-widest text-gray-300">SiteBoS AI Engine...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        const WH_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const params = new URLSearchParams(window.location.search);
        const ashToken = params.get('ash');
        let catalog = [], selectedService = null, currentStep = 0, totalSteps = 6;

        window.onload = async () => { if (!ashToken) return; await initApp(); };
        async function initApp() {
            try {
                const r = await fetch(WH_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_prev_get' }) });
                const d = await r.json(); if (d.success) { catalog = d.catalog || []; renderServices(); document.getElementById('global-loader').classList.add('hidden'); }
            } catch (e) {}
        }
        function renderServices() {
            const g = document.getElementById('service-grid');
            g.innerHTML = catalog.map(s => `<div class="bg-white p-4 rounded-3xl border border-gray-100 flex items-center justify-between active:scale-95 transition" onclick="selectService('${s.callback_data}', '${s.name}')"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-black"><i class="fas fa-concierge-bell text-sm"></i></div><h3 class="font-bold text-xs uppercase tracking-tight">${s.name}</h3></div><i class="fas fa-chevron-right text-gray-200 text-xs"></i></div>`).join('');
        }
        function selectService(sku, name) { selectedService = { sku, name }; document.getElementById('footer-nav').classList.remove('hidden'); nextStep(); }
        function nextStep() {
            if (currentStep === totalSteps) { submitProposal(); return; }
            document.getElementById(`step-${currentStep}`).className = "wizard-step step-hidden-left";
            currentStep++;
            document.getElementById(`step-${currentStep}`).className = "wizard-step step-active";
            updateUI();
        }
        function prevStep() {
            if (currentStep === 0) return;
            document.getElementById(`step-${currentStep}`).className = "wizard-step step-hidden-right";
            currentStep--;
            document.getElementById(`step-${currentStep}`).className = "wizard-step step-active";
            if (currentStep === 0) document.getElementById('footer-nav').classList.add('hidden');
            updateUI();
        }
        function updateUI() {
            document.getElementById('progress').style.width = `${(currentStep / totalSteps) * 100}%`;
            const titles = ["Selezione", "Obiettivi", "Piani", "Sfide", "Timeline", "Budget", "Autorità"];
            document.getElementById('step-title').innerText = titles[currentStep];
            document.getElementById('next-label').innerText = currentStep === totalSteps ? "Genera Proposta" : "Continua";
        }
        async function submitProposal() {
            const d = { service: selectedService, gpctba: { goals: document.getElementById('input-goals').value, plans: document.getElementById('input-plans').value, challenges: document.getElementById('input-challenges').value, timeline: document.getElementById('input-timeline').value, budget: document.querySelector('input[name="budget"]:checked')?.value, authority: document.getElementById('input-authority').value } };
            tg.showConfirm("Inviare la richiesta?", async ok => {
                if (ok) {
                    try { await fetch(WH_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_prev_save', proposal_data: d }) }); tg.showAlert("Inviato!", () => tg.close()); } catch (e) {}
                }
            });
        }
    </script>
</body>
</html>
