<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding - Soft Skill Analysis</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #fafafa;
            color: #000;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #eeeeee;
            border-radius: 1.5rem;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h2 {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 20px;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a3a3a3;
            margin-bottom: 8px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 0.75rem;
            border: 1px solid #eeeeee;
            font-size: 14px;
            background: #fafafa;
            color: #000;
            font-family: inherit;
            box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #000;
            background: #ffffff;
        }
        .btn-submit {
            width: 100%;
            height: 3rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>🚀 Mini Onboarding</h2>
        <form id="onboardingForm">
            <div class="input-group">
                <label for="name">Nome</label>
                <input type="text" id="name" required placeholder="Inserisci il tuo nome">
            </div>
            
            <div class="input-group">
                <label for="surname">Cognome</label>
                <input type="text" id="surname" required placeholder="Inserisci il tuo cognome">
            </div>

            <div class="input-group">
                <label for="role">Il tuo Ruolo Professionale</label>
                <input type="text" id="role" required placeholder="Es. Manager, Consulente, Developer">
            </div>

            <div class="input-group">
                <label for="team_size">Dimensione del Team</label>
                <select id="team_size">
                    <option value="Single Proprietor">Lavoro da Solo (Freelance)</option>
                    <option value="1-5">Piccolo Team (1-5 persone)</option>
                    <option value="5-20">Medio Team (5-20 persone)</option>
                    <option value="20+">Grande Team (20+ persone)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="company_context">Contesto Aziendale / Mission</label>
                <textarea id="company_context" rows="3" required placeholder="Cosa fa la tua azienda/attività? Descrivilo brevemente..."></textarea>
            </div>

            <div class="input-group">
                <label for="gemini_key">Chiave API Gemini (Opzionale)</label>
                <input type="password" id="gemini_key" placeholder="AI-Key personalizzata...">
                <p class="info-text">Se lasciata vuota, verrà utilizzata una chiave di sistema predefinita.</p>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                Completa e Inizia <i class="fas fa-arrow-right"></i>
            </button>
        </form>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');
        const msgId = urlParams.get('msg_id');
        
        // Pre-popola Nome e Cognome dai dati utente di Telegram se disponibili
        if (tg?.initDataUnsafe?.user) {
            document.getElementById('name').value = tg.initDataUnsafe.user.first_name || '';
            document.getElementById('surname').value = tg.initDataUnsafe.user.last_name || '';
        }

        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvataggio...';

            const payload = {
                action: "save_onboarding",
                ash: ash,
                msg_id: msgId,
                _auth: tg?.initData || '',
                onboarding_data: {
                    name: document.getElementById('name').value.trim(),
                    surname: document.getElementById('surname').value.trim(),
                    role: document.getElementById('role').value.trim(),
                    team_size: document.getElementById('team_size').value,
                    company_context: document.getElementById('company_context').value.trim(),
                    gemini_key: document.getElementById('gemini_key').value.trim()
                }
            };

            // Il webhook secondario corretto (lo stesso impostato nel webhook-handler)
            const webhookUrl = 'https://prod.workflow.trinai.it/webhook/e34e22de-0725-4410-a882-75e87e359376';

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Errore nel salvataggio dei dati');

                const result = await response.json();
                if (result.success) {
                    // Reindirizza alla dashboard principale propagando i parametri
                    window.location.href = `index.html?ash=${encodeURIComponent(ash)}&msg_id=${msgId}&alone=true`;
                } else {
                    alert('Errore: ' + (result.error || 'Impossibile completare l\'onboarding'));
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Completa e Inizia <i class="fas fa-arrow-right"></i>';
                }
            } catch (error) {
                console.error(error);
                alert('Si è verificato un errore di rete. Riprova.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Completa e Inizia <i class="fas fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
