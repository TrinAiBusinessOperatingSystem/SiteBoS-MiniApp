<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SiteBoS | Orders Manager</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function () {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-black uppercase tracking-widest">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #fafafa; color: #000; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Card ordine */
        .order-card { background: #fff; border: 1px solid #eee; border-radius: 1.5rem; padding: 1.25rem; transition: all .15s; }
        .order-card:active { transform: scale(0.98); }

        /* Status badges */
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: .12em; }
        .badge-pending  { background: #fef3c7; color: #92400e; }
        .badge-confirmed { background: #d1fae5; color: #065f46; }
        .badge-rejected { background: #fee2e2; color: #991b1b; }

        /* Bottom sheet */
        .sheet { position: fixed; inset: 0; z-index: 500; display: flex; flex-direction: column; justify-content: flex-end; }
        .sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.35); backdrop-filter: blur(4px); }
        .sheet-content { position: relative; background: #fff; border-radius: 1.5rem 1.5rem 0 0; padding: 1.5rem; max-height: 90vh; overflow-y: auto; }
        .sheet-handle { width: 2.5rem; height: 4px; background: #e5e7eb; border-radius: 999px; margin: 0 auto 1.25rem; }
        .sheet-hidden { display: none; }

        /* Loader */
        .spin { width: 2rem; height: 2rem; border: 2px solid #eee; border-top-color: #000; border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Tabs */
        .tab { flex: 1; padding: .6rem; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: .1em; border-radius: .75rem; transition: all .15s; }
        .tab.active { background: #000; color: #fff; }
        .tab:not(.active) { color: #94a3b8; }

        /* Buttons */
        .btn { height: 3rem; border-radius: .75rem; font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; display: flex; align-items: center; justify-content: center; gap: .5rem; transition: all .15s; cursor: pointer; border: none; padding: 0 1.25rem; flex: 1; }
        .btn-black { background: #000; color: #fff; }
        .btn-black:active { transform: scale(.96); opacity: .9; }
        .btn-black:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; transform: none; }
        .btn-outline { background: #fff; color: #000; border: 1.5px solid #000; }
        .btn-outline:active { transform: scale(.96); }
        .btn-danger { background: #fff; color: #ef4444; border: 1.5px solid #ef4444; }
        .btn-danger:active { transform: scale(.96); }

        @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
        .fade-in { animation: fadeIn .25s ease forwards; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- GLOBAL LOADER -->
<div id="global-loader" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center gap-4">
    <div class="spin"></div>
    <p class="text-[9px] font-black uppercase tracking-[.3em] text-gray-300">Caricamento Ordini...</p>
</div>

<!-- HEADER -->
<header class="bg-white border-b border-gray-100 px-5 py-4 flex items-center justify-between flex-shrink-0">
    <div>
        <p class="text-[8px] font-black uppercase tracking-widest text-gray-400">Owner Panel</p>
        <h1 class="text-[13px] font-black uppercase tracking-tight">📦 Orders Manager</h1>
    </div>
    <div class="flex items-center gap-2">
        <button onclick="loadOrders()" class="w-9 h-9 bg-gray-50 border border-gray-100 rounded-xl flex items-center justify-center active:scale-90 transition">
            <i class="fas fa-sync-alt text-xs text-gray-400"></i>
        </button>
        <button onclick="tg.close()" class="w-9 h-9 flex items-center justify-center text-gray-300">
            <i class="fas fa-times text-lg"></i>
        </button>
    </div>
</header>

<!-- TABS -->
<div class="flex gap-1 px-4 py-3 bg-white border-b border-gray-100 flex-shrink-0" id="tab-bar">
    <button class="tab active" id="tab-pending"  onclick="setTab('pending')">In Attesa <span id="count-pending" class="ml-1 opacity-50">0</span></button>
    <button class="tab"        id="tab-confirmed" onclick="setTab('confirmed')">Confermati <span id="count-confirmed" class="ml-1 opacity-50">0</span></button>
    <button class="tab"        id="tab-all"       onclick="setTab('all')">Tutti</button>
</div>

<!-- ORDERS LIST -->
<main id="orders-list" class="flex-1 overflow-y-scroll no-scrollbar p-4 space-y-3 pb-8">
    <!-- injected -->
</main>

<!-- EMPTY STATE -->
<div id="empty-state" class="hidden flex-1 flex flex-col items-center justify-center text-center p-10 gap-3">
    <div class="text-5xl">📭</div>
    <h2 class="text-sm font-black uppercase tracking-tight">Nessun Ordine</h2>
    <p class="text-[10px] text-gray-400">Non ci sono ordini in questa sezione.</p>
</div>

<!-- ORDER DETAIL BOTTOM SHEET -->
<div id="detail-sheet" class="sheet sheet-hidden">
    <div class="sheet-backdrop" onclick="closeSheet()"></div>
    <div class="sheet-content no-scrollbar">
        <div class="sheet-handle"></div>

        <!-- Header ordine -->
        <div class="flex items-start justify-between mb-4">
            <div>
                <p class="text-[8px] font-black uppercase tracking-widest text-gray-400" id="sheet-session-id">—</p>
                <h2 class="text-base font-black uppercase tracking-tight mt-0.5" id="sheet-date">—</h2>
            </div>
            <div id="sheet-badge"></div>
        </div>

        <!-- Cliente -->
        <div class="bg-gray-50 rounded-2xl p-4 mb-3 space-y-1">
            <p class="text-[8px] font-black uppercase tracking-widest text-gray-400">Cliente</p>
            <p class="text-sm font-black" id="sheet-customer-name">—</p>
            <p class="text-[10px] text-gray-500 font-bold" id="sheet-customer-id">—</p>
        </div>

        <!-- Consegna -->
        <div class="bg-gray-50 rounded-2xl p-4 mb-3 space-y-1">
            <p class="text-[8px] font-black uppercase tracking-widest text-gray-400">Consegna</p>
            <p class="text-[11px] font-bold leading-snug" id="sheet-address">—</p>
            <p class="text-[9px] text-gray-400 italic leading-snug" id="sheet-gps">—</p>
            <a id="sheet-maps-link" href="#" target="_blank" class="text-[9px] font-black text-black flex items-center gap-1 mt-1">
                <i class="fas fa-map-marker-alt"></i> Apri in Maps
            </a>
            <p class="text-[8px] font-black uppercase tracking-widest text-gray-400 mt-2">Pagamento</p>
            <p class="text-[11px] font-bold" id="sheet-payment">—</p>
        </div>

        <!-- Items -->
        <div class="mb-3">
            <p class="text-[8px] font-black uppercase tracking-widest text-gray-400 mb-2">Dettaglio Ordine</p>
            <div id="sheet-items" class="space-y-3"></div>
        </div>

        <!-- Totale -->
        <div class="flex justify-between items-center border-t-2 border-black pt-4 mb-4">
            <span class="text-[10px] font-black uppercase tracking-widest">Totale</span>
            <span class="text-2xl font-black tracking-tighter" id="sheet-total">—</span>
        </div>

        <!-- Evasione (solo se PENDING) -->
        <div id="evade-section" class="space-y-3">
            <div>
                <p class="text-[8px] font-black uppercase tracking-widest text-gray-400 mb-2">Tempo di Consegna</p>
                <div class="flex gap-2">
                    <select id="time-presets" onchange="syncTimeInput(this.value)"
                        class="flex-1 h-11 px-3 border border-gray-200 rounded-xl text-[10px] font-black outline-none focus:border-black bg-white">
                        <option value="">Rapidi...</option>
                        <option>Al più presto</option>
                        <option>15 minuti</option>
                        <option>30 minuti</option>
                        <option>45 minuti</option>
                        <option>60 minuti</option>
                        <option>Da definire</option>
                    </select>
                    <input type="text" id="delivery-time-input" placeholder="oppure specifica..."
                        oninput="onTimeInput(this.value)"
                        class="flex-[2] h-11 px-4 border border-gray-200 rounded-xl text-[10px] font-bold outline-none focus:border-black bg-white">
                </div>
            </div>
            <div class="flex gap-2">
                <button class="btn btn-danger" id="btn-reject" onclick="rejectOrder()">
                    <i class="fas fa-times"></i> Rifiuta
                </button>
                <button class="btn btn-black" id="btn-confirm" onclick="confirmOrder()" disabled>
                    <i class="fas fa-paper-plane"></i> Conferma ed Evadi
                </button>
            </div>
        </div>

        <!-- Già gestito -->
        <div id="already-handled" class="hidden text-center py-4">
            <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">Ordine già gestito</p>
        </div>
    </div>
</div>

<script>
'use strict';

const tg = window.Telegram.WebApp;
tg.expand(); tg.ready();

const WH_URL = "https://prod.workflow.trinai.it/webhook/5ea527d5-b0e7-44dc-b7ca-626f1c6176f0";
const params = new URLSearchParams(window.location.search);
const ashToken = params.get('ash');

let allOrders = [];
let currentTab = 'pending';
let activeOrder = null;
let selectedTime = null;

// ─── INIT ──────────────────────────────────────────────────
window.onload = async () => {
    if (!ashToken) { tg.showAlert("ASH Token mancante."); return; }
    await loadOrders();
};

async function loadOrders() {
    showGlobalLoader(true);
    try {
        const res = await fetch(WH_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_get_orders_list' })
        });
        const r = await res.json();
        const d = Array.isArray(r) ? r[0] : r;
        if (d && d.success) {
            allOrders = d.orders || [];
            renderOrders();
        } else {
            tg.showAlert("Errore durante il caricamento degli ordini.");
        }
    } catch (e) {
        tg.showAlert("Connessione fallita.");
    } finally {
        showGlobalLoader(false);
    }
}

// ─── TABS ──────────────────────────────────────────────────
function setTab(tab) {
    currentTab = tab;
    ['pending','confirmed','all'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    });
    renderOrders();
}

// ─── RENDER ────────────────────────────────────────────────
function renderOrders() {
    const pending   = allOrders.filter(o => getStatus(o) === 'PENDING');
    const confirmed = allOrders.filter(o => getStatus(o) === 'CONFIRMED');

    document.getElementById('count-pending').textContent   = pending.length;
    document.getElementById('count-confirmed').textContent = confirmed.length;

    let filtered = allOrders;
    if (currentTab === 'pending')   filtered = pending;
    if (currentTab === 'confirmed') filtered = confirmed;

    const list = document.getElementById('orders-list');
    const empty = document.getElementById('empty-state');

    if (filtered.length === 0) {
        list.innerHTML = '';
        list.classList.add('hidden');
        empty.classList.remove('hidden');
        empty.classList.add('flex');
        return;
    }

    list.classList.remove('hidden');
    empty.classList.add('hidden');
    empty.classList.remove('flex');

    list.innerHTML = filtered.map((o, i) => {
        const od = o.order_data || o;
        const status = getStatus(o);
        const badgeCls = status === 'PENDING' ? 'badge-pending' : status === 'CONFIRMED' ? 'badge-confirmed' : 'badge-rejected';
        const statusLabel = status === 'PENDING' ? '⏳ In Attesa' : status === 'CONFIRMED' ? '✅ Confermato' : '❌ Rifiutato';
        const total = parseFloat(od.total_amount || 0).toFixed(2);
        const ts = od.timestamp ? new Date(od.timestamp).toLocaleString('it-IT', { dateStyle: 'short', timeStyle: 'short' }) : '—';
        const itemsCount = (od.items || []).length;
        const firstItem = od.items?.[0]?.name || '—';

        return `
        <div class="order-card fade-in" style="animation-delay:${i * 40}ms" onclick="openOrder(${allOrders.indexOf(o)})">
            <div class="flex items-start justify-between mb-3">
                <div>
                    <p class="text-[8px] font-black uppercase tracking-widest text-gray-400">${ts}</p>
                    <h3 class="text-[11px] font-black uppercase tracking-tight mt-0.5">${firstItem}${itemsCount > 1 ? ` + altri ${itemsCount-1}` : ''}</h3>
                </div>
                <span class="badge ${badgeCls}">${statusLabel}</span>
            </div>
            <div class="flex items-center justify-between">
                <p class="text-[9px] font-bold text-gray-400 truncate max-w-[180px]">
                    <i class="fas fa-map-marker-alt mr-1"></i>${od.address || 'Indirizzo non specificato'}
                </p>
                <span class="text-base font-black tracking-tighter">€ ${total}</span>
            </div>
            ${status === 'PENDING' ? `
            <div class="mt-3 pt-3 border-t border-gray-50">
                <button class="btn btn-black w-full text-[9px]" onclick="event.stopPropagation(); quickOpen(${allOrders.indexOf(o)})">
                    <i class="fas fa-bolt"></i> Gestisci Ordine
                </button>
            </div>` : ''}
        </div>`;
    }).join('');
}

function getStatus(o) {
    const od = o.order_data || o;
    return (od.order_info?.status || od.status || 'PENDING').toUpperCase();
}

// ─── DETAIL SHEET ──────────────────────────────────────────
function openOrder(idx) {
    activeOrder = allOrders[idx];
    selectedTime = null;
    renderSheet(activeOrder);
    document.getElementById('detail-sheet').classList.remove('sheet-hidden');
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
}

function quickOpen(idx) {
    openOrder(idx);
}

function closeSheet() {
    document.getElementById('detail-sheet').classList.add('sheet-hidden');
    activeOrder = null;
}

function renderSheet(o) {
    const od = o.order_data || o;
    const status = getStatus(o);

    // Header
    document.getElementById('sheet-session-id').textContent = od.sessionId || od.ids?.timestamp || '—';
    document.getElementById('sheet-date').textContent = od.timestamp
        ? new Date(od.timestamp).toLocaleString('it-IT', { dateStyle: 'medium', timeStyle: 'short' })
        : '—';

    const badgeCls = status === 'PENDING' ? 'badge-pending' : status === 'CONFIRMED' ? 'badge-confirmed' : 'badge-rejected';
    const statusLabel = status === 'PENDING' ? '⏳ In Attesa' : status === 'CONFIRMED' ? '✅ Confermato' : '❌ Rifiutato';
    document.getElementById('sheet-badge').innerHTML = `<span class="badge ${badgeCls}">${statusLabel}</span>`;

    // Cliente
    const ids = od.ids || {};
    document.getElementById('sheet-customer-name').textContent = `Cliente #${ids.customer_id || '—'}`;
    document.getElementById('sheet-customer-id').textContent   = `ID: ${ids.customer_id || '—'} | Owner: ${ids.owner_id || '—'}`;

    // Consegna
    document.getElementById('sheet-address').textContent = od.address || 'Non specificato';
    document.getElementById('sheet-gps').textContent     = od.location?.display_name || '';
    const mapsLink = document.getElementById('sheet-maps-link');
    if (od.address) {
        mapsLink.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(od.address)}`;
        mapsLink.classList.remove('hidden');
    } else {
        mapsLink.classList.add('hidden');
    }
    document.getElementById('sheet-payment').textContent = od.payment_mode === 'CARD' ? '💳 Carta' : '🚚 Pagamento alla Consegna';

    // Items
    const items = od.items || [];
    document.getElementById('sheet-items').innerHTML = items.map(item => {
        const extras = item.selected_extras || [];
        const extrasHtml = extras.length > 0
            ? `<div class="mt-1 pl-3 border-l-2 border-gray-100 space-y-0.5">
                ${extras.map(e => `<p class="text-[9px] font-bold text-gray-500">+ ${e.name} <span class="text-gray-400">(€ ${parseFloat(e.price).toFixed(2)})</span></p>`).join('')}
               </div>`
            : '';
        const noteHtml = item.customer_note
            ? `<p class="text-[9px] italic text-amber-700 mt-1 bg-amber-50 px-2 py-1 rounded-lg">📝 ${item.customer_note}</p>`
            : '';
        return `
        <div class="bg-gray-50 rounded-2xl p-3 space-y-1">
            <div class="flex justify-between items-start">
                <div class="flex-1 pr-2">
                    <h4 class="text-[11px] font-black uppercase leading-tight">${item.quantity}× ${item.name}</h4>
                    <p class="text-[9px] text-gray-400">Base: € ${parseFloat(item.base_price || 0).toFixed(2)} · SKU: ${item.sku || '—'}</p>
                    ${extrasHtml}${noteHtml}
                </div>
                <span class="text-sm font-black tracking-tighter">€ ${parseFloat(item.final_price * (item.quantity||1)).toFixed(2)}</span>
            </div>
        </div>`;
    }).join('');

    // Totale
    document.getElementById('sheet-total').textContent = `€ ${parseFloat(od.total_amount || 0).toFixed(2)}`;

    // Evasione
    const evadeSection = document.getElementById('evade-section');
    const alreadyHandled = document.getElementById('already-handled');
    const btnConfirm = document.getElementById('btn-confirm');
    document.getElementById('time-presets').value = '';
    document.getElementById('delivery-time-input').value = '';
    btnConfirm.disabled = true;

    if (status === 'PENDING') {
        evadeSection.classList.remove('hidden');
        alreadyHandled.classList.add('hidden');
    } else {
        evadeSection.classList.add('hidden');
        alreadyHandled.classList.remove('hidden');
    }
}

// ─── TIME PICKER ───────────────────────────────────────────
function syncTimeInput(val) {
    document.getElementById('delivery-time-input').value = val;
    onTimeInput(val);
}

function onTimeInput(val) {
    selectedTime = val.trim() || null;
    document.getElementById('btn-confirm').disabled = !selectedTime;
}

// ─── ACTIONS ───────────────────────────────────────────────
async function confirmOrder() {
    if (!selectedTime || !activeOrder) return;
    const od = activeOrder.order_data || activeOrder;
    const sessionId = od.sessionId || od.ids?.timestamp;

    const btn = document.getElementById('btn-confirm');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Invio...';

    try {
        const res = await fetch(WH_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                _auth: tg.initData,
                ash: ashToken,
                action: 'u_calc_evade_order',
                session_id: sessionId,
                evasion_data: {
                    delivery_time: selectedTime,
                    status: 'CONFIRMED',
                    timestamp: new Date().toISOString()
                }
            })
        });
        const r = await res.json();
        if (r.success) {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert(`✅ Ordine confermato! Tempo: ${selectedTime}`);
            closeSheet();
            await loadOrders();
        } else {
            tg.showAlert("Errore durante la conferma.");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Conferma ed Evadi';
        }
    } catch (e) {
        tg.showAlert("Connessione fallita.");
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Conferma ed Evadi';
    }
}

async function rejectOrder() {
    if (!activeOrder) return;
    const od = activeOrder.order_data || activeOrder;
    const sessionId = od.sessionId || od.ids?.timestamp;

    tg.showConfirm("Rifiutare questo ordine? Il cliente verrà notificato.", async (ok) => {
        if (!ok) return;

        const btn = document.getElementById('btn-reject');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
            const res = await fetch(WH_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    _auth: tg.initData,
                    ash: ashToken,
                    action: 'u_calc_evade_order',
                    session_id: sessionId,
                    evasion_data: {
                        delivery_time: null,
                        status: 'REJECTED',
                        timestamp: new Date().toISOString()
                    }
                })
            });
            const r = await res.json();
            if (r.success) {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                tg.showAlert("❌ Ordine rifiutato.");
                closeSheet();
                await loadOrders();
            } else {
                tg.showAlert("Errore.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-times"></i> Rifiuta';
            }
        } catch (e) {
            tg.showAlert("Connessione fallita.");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-times"></i> Rifiuta';
        }
    });
}

// ─── UTILS ─────────────────────────────────────────────────
function showGlobalLoader(show) {
    const l = document.getElementById('global-loader');
    if (show) {
        l.classList.remove('hidden', 'opacity-0');
    } else {
        l.classList.add('opacity-0');
        setTimeout(() => l.classList.add('hidden'), 300);
    }
}
</script>
</body>
</html>
