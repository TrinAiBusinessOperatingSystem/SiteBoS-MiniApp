<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MiniSite Architect | SiteBoS Enterprise</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        bg: '#fafafa',
                        border: '#eeeeee'
                    }
                }
            }
        }

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Spinner Noir */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }

        /* Noir Enterprise Inputs */
        .noir-input { @apply w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black focus:bg-white outline-none transition-all shadow-sm; }
        .noir-textarea { @apply w-full bg-gray-50 p-5 rounded-[1.8rem] text-sm font-medium border border-transparent focus:border-black focus:bg-white outline-none resize-none leading-relaxed transition-all shadow-sm; }
        .noir-select { @apply w-full bg-gray-50 p-4 rounded-2xl text-sm font-black uppercase border border-transparent focus:border-black outline-none appearance-none cursor-pointer; }
        
        /* Label Tech */
        .label-tech { @apply block mb-2 text-[9px] font-black uppercase tracking-[0.2em] text-gray-400 ml-1; }

        /* Tab Navigation Noir */
        .tab-btn { @apply py-4 px-6 text-[10px] font-black uppercase tracking-widest text-gray-400 border-b-2 border-transparent transition-all whitespace-nowrap; }
        .tab-btn.active { @apply text-black border-black bg-white; }

        /* Chips SEO */
        .chip { @apply inline-flex items-center gap-2 bg-black text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mt-2 mr-2 shadow-md; }

        /* Card Enterprise */
        .noir-card { @apply bg-white rounded-[2.5rem] border border-border shadow-sm p-8; }

        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Preview Shell */
        .preview-shell { border-radius: 2.5rem; overflow: hidden; border: 1px solid #eeeeee; background: white; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    </style>

    <script>
        // ── 1. SICUREZZA: IL BUTTAFUORI ──
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div class="fade-in-up">
                            <h1 class="text-6xl mb-4 text-white">🚫</h1>
                            <h2 class="text-xl font-bold uppercase tracking-widest">Accesso Proibito</h2>
                            <p class="opacity-40 text-sm mt-4 leading-relaxed uppercase tracking-tighter">Questa risorsa è accessibile esclusivamente tramite l'App SiteBoS ufficiale su Telegram.</p>
                        </div>
                    </body>`;
                window.stop();
                throw new Error("Unauthorized Access");
            }
        })();
    </script>
</head>
<body class="bg-bg text-black min-h-screen flex flex-col no-scrollbar pb-40 overflow-x-hidden">

    <!-- CONTENT -->

        <!-- PANEL: CONTENT -->

        <!-- PANEL: STYLE -->

            <div class="bg-neutral-900 text-neutral-500 rounded-[2rem] p-8 text-[9px] font-bold uppercase tracking-widest leading-loose text-center shadow-inner">

    <!-- ACTION FOOTER -->
    <footer class="fixed bottom-8 left-0 w-full px-6 flex items-center justify-between z-[100] gap-4">

            <i class="fas fa-save text-sm"></i> <span>Salva Bozza</span>
        </button>
        <button id="publish-btn" disabled class="w-16 h-16 bg-black text-white rounded-full shadow-2xl flex items-center justify-center text-xl border border-black active:scale-95 transition disabled:opacity-20 shadow-xl">

    <!-- PREVIEW MODAL -->
    <div id="preview-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[2000] p-4 flex flex-col">

            <span class="text-white text-[10px] font-black uppercase tracking-[0.2em] italic opacity-50">Live Preview Environment</span>
            <button id="close-preview" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-all"><i class="fas fa-times"></i></button>
        </header>
        <div class="flex-1 preview-shell">
            <iframe id="preview-frame" class="w-full h-full border-none bg-white"></iframe>
        </div>

    <!-- ───────────────────────────────────────────────────────────────
         CORE LOGIC (V FINAL - NO COMPROMISE)
    ──────────────────────────────────────────────────────────────── -->
    <script>
        'use strict';

        const tg = window.Telegram.WebApp;
        const WEBHOOK_URL = 'https://prod.workflow.trinai.it/webhook/50891655-84c8-4213-90e8-26ebbc3d6c4c';

        // ── STATE ──
        const state = {
            template: 'dark-tech',
            root: { HoneyPot: {}, ownerdata: {}, MiniSiteJson: {}, ownerbot: {} },
            originalHash: '',
            dirty: false,
            previewHtml: ''
        };

        // ── HELPERS ──
        const haptic = (t = 'light') => { try { tg.HapticFeedback.impactOccurred(t); } catch (e) {} };
        const notify = (t = 'success') => { try { tg.HapticFeedback.notificationOccurred(t); } catch (e) {} };
        const deepClone = (o) => JSON.parse(JSON.stringify(o || {}));
        const stableStringify = (o) => JSON.stringify(o);
        const byId = (i) => document.getElementById(i);
        const escapeHtml = (t) => String(t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');

        // ── UI ENGINE ──
        function activateTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('hidden', p.dataset.panel !== name));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function mountTags(container, values, onRemove) {
            container.innerHTML = '';
            (values || []).forEach((v, i) => {
                const c = document.createElement('span');
                c.className = 'chip';
                c.innerHTML = `<span>${escapeHtml(v)}</span><button type="button" data-idx="${i}"><i class="fas fa-times ml-2 opacity-50"></i></button>`;
                c.querySelector('button').onclick = () => onRemove(i);
                container.appendChild(c);
            });
        }

        // ── DATA SHAPE ──
        function ensureShape() {
            const r = state.root;
            r.HoneyPot = r.HoneyPot || {};
            r.ownerdata = r.ownerdata || {};
            r.MiniSiteJson = r.MiniSiteJson || {};
            r.ownerbot = r.ownerbot || {};

            r.HoneyPot.assets = r.HoneyPot.assets || {};
            r.HoneyPot.assets.logo = r.HoneyPot.assets.logo || { url: '', meta: { colors: [] } };
            r.HoneyPot.assets.gallery1 = r.HoneyPot.assets.gallery1 || { url: '' };
            r.HoneyPot.assets.gallery2 = r.HoneyPot.assets.gallery2 || { url: '' };
            r.HoneyPot.assets.gallery3 = r.HoneyPot.assets.gallery3 || { url: '' };
            r.HoneyPot.assets.photo = r.HoneyPot.assets.photo || { url: '' };
            r.HoneyPot.active_services = Array.isArray(r.HoneyPot.active_services) ? r.HoneyPot.active_services : [];
            r.HoneyPot.knowledge_fragments = Array.isArray(r.HoneyPot.knowledge_fragments) ? r.HoneyPot.knowledge_fragments : [];

            r.MiniSiteJson.seo = r.MiniSiteJson.seo || { title: '', description: '', keywords: [], faq: [] };
            r.MiniSiteJson.hero = r.MiniSiteJson.hero || { h1: '', sub: '' };
            r.MiniSiteJson.design = r.MiniSiteJson.design || { font: 'Inter', radius: '24px' };
            r.MiniSiteJson.sections = r.MiniSiteJson.sections || {};
            r.MiniSiteJson.sections.about = r.MiniSiteJson.sections.about || { headline: '', body: '' };
            r.MiniSiteJson.sections.usp = Array.isArray(r.MiniSiteJson.sections.usp) ? r.MiniSiteJson.sections.usp : [];
            r.MiniSiteJson.sections.process = Array.isArray(r.MiniSiteJson.sections.process) ? r.MiniSiteJson.sections.process : [];
            r.MiniSiteJson.service_descriptions = Array.isArray(r.MiniSiteJson.service_descriptions) ? r.MiniSiteJson.service_descriptions : [];
        }

        function populateForm() {
            ensureShape();
            const r = state.root, hp = r.HoneyPot, od = r.ownerdata, ai = r.MiniSiteJson, bot = r.ownerbot;

            state.template = r.template || r.currentTemplate || state.template || 'dark-tech';
            byId('template').value = state.template;

            byId('ragione-sociale').value = od.ragione_sociale || od.ragionesociale || '';
            byId('bot-username').value = bot.username || '';
            byId('vat-number').value = od.vat_number || od.vatnumber || '';
            byId('company-context').value = hp.company_context_string || hp.companycontextstring || od.business_description || '';

            byId('asset-logo').value = hp.assets.logo?.url || '';
            byId('asset-gallery1').value = hp.assets.gallery1?.url || '';
            byId('asset-gallery2').value = hp.assets.gallery2?.url || '';
            byId('asset-gallery3').value = hp.assets.gallery3?.url || '';

            byId('seo-title').value = ai.seo.title || '';
            byId('seo-description').value = ai.seo.description || '';
            byId('hero-h1').value = ai.hero.h1 || '';
            byId('hero-sub').value = ai.hero.sub || '';
            byId('offer-text').value = hp.offer_text || hp.offertext || '';

            byId('design-font').value = ai.design.font || 'Inter';
            byId('design-radius').value = ai.design.radius || '24px';
            byId('theme-primary').value = hp.assets.logo?.meta?.colors?.[0] || '';
            byId('theme-accent').value = hp.assets.logo?.meta?.colors?.[1] || '';

            byId('about-headline').value = ai.sections.about?.headline || '';
            byId('about-body').value = ai.sections.about?.body || '';

            renderUSPList();
            renderProcessList();
            renderServicesList();
            renderFaqList();
            renderKeywords();
            refreshHeader();
            refreshRawPreview();
            syncDirtyState();
        }

        // ── RENDERING LISTE ──
        function renderUSPList() {
            const list = state.root.MiniSiteJson.sections.usp;
            const wrap = byId('usp-list'); wrap.innerHTML = '';
            if (!list.length) { wrap.innerHTML = `<div class="text-center py-10 opacity-20 font-black uppercase text-[8px] tracking-widest border-2 border-dashed border-gray-200 rounded-[2rem]">No USP defined</div>`; return; }
            list.forEach((it, i) => {
                const d = document.createElement('div');
                d.className = 'noir-card !p-6 space-y-3';
                d.innerHTML = `
                    <input class="noir-input !p-3 text-xs" type="text" placeholder="USP Title" value="${escapeHtml(it.title)}" oninput="state.root.MiniSiteJson.sections.usp[${i}].title=this.value;markDirty()">
                    <textarea class="noir-textarea !p-4 text-xs" rows="2" placeholder="USP Description" oninput="state.root.MiniSiteJson.sections.usp[${i}].text=this.value;markDirty()">${escapeHtml(it.text)}</textarea>
                    <div class="flex justify-end"><button onclick="state.root.MiniSiteJson.sections.usp.splice(${i},1);renderUSPList();markDirty();haptic('medium')" class="text-[8px] font-black uppercase text-red-500">Remove</button></div>`;
                wrap.appendChild(d);
            });
        }

        function renderProcessList() {
            const list = state.root.MiniSiteJson.sections.process;
            const wrap = byId('process-list'); wrap.innerHTML = '';
            if (!list.length) { wrap.innerHTML = `<div class="text-center py-10 opacity-20 font-black uppercase text-[8px] tracking-widest border-2 border-dashed border-gray-200 rounded-[2rem]">No steps defined</div>`; return; }
            list.forEach((it, i) => {
                const d = document.createElement('div');
                d.className = 'noir-card !p-6 space-y-3';
                d.innerHTML = `
                    <input class="noir-input !p-3 text-xs font-black" type="text" placeholder="Step Name" value="${escapeHtml(it.title)}" oninput="state.root.MiniSiteJson.sections.process[${i}].title=this.value;markDirty()">
                    <textarea class="noir-textarea !p-4 text-xs" rows="2" placeholder="Instructions" oninput="state.root.MiniSiteJson.sections.process[${i}].text=this.value;markDirty()">${escapeHtml(it.text)}</textarea>
                    <div class="flex justify-end"><button onclick="state.root.MiniSiteJson.sections.process.splice(${i},1);renderProcessList();markDirty();haptic('medium')" class="text-[8px] font-black uppercase text-red-500">Remove</button></div>`;
                wrap.appendChild(d);
            });
        }

        function renderServicesList() {
            const svcs = state.root.HoneyPot.active_services;
            const descs = state.root.MiniSiteJson.service_descriptions;
            const wrap = byId('services-list'); wrap.innerHTML = '';
            if (!svcs.length) { wrap.innerHTML = `<div class="text-center py-10 opacity-20 font-black uppercase text-[8px] tracking-widest border-2 border-dashed border-gray-200 rounded-[2rem]">Empty Portfolio</div>`; return; }
            svcs.forEach((s, i) => {
                const dObj = descs.find(x => x && x.name === s.name) || { name: s.name, refineddesc: s.category || '' };
                const d = document.createElement('div');
                d.className = 'noir-card !p-6 space-y-3';
                d.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center text-[10px] font-black">${i+1}</div>
                        <input class="noir-input !p-3 text-xs" type="text" placeholder="Service" value="${escapeHtml(s.name)}" oninput="const old='${s.name}'; state.root.HoneyPot.active_services[${i}].name=this.value; const f=state.root.MiniSiteJson.service_descriptions.find(x=>x.name===old); if(f)f.name=this.value; markDirty()">
                    </div>
                    <textarea class="noir-textarea !p-4 text-xs italic" rows="2" placeholder="Public Description" oninput="const f=state.root.MiniSiteJson.service_descriptions.find(x=>x.name==='${s.name}'); if(f) f.refineddesc=this.value; else state.root.MiniSiteJson.service_descriptions.push({name:'${s.name}', refineddesc:this.value}); markDirty()">${escapeHtml(dObj.refineddesc || dObj.refined_desc)}</textarea>
                    <div class="flex justify-end"><button onclick="const rem=state.root.HoneyPot.active_services.splice(${i},1)[0]; const dx=state.root.MiniSiteJson.service_descriptions.findIndex(x=>x.name===rem.name); if(dx>=0)state.root.MiniSiteJson.service_descriptions.splice(dx,1); renderServicesList();markDirty();haptic('medium')" class="text-[8px] font-black uppercase text-red-500">Remove</button></div>`;
                wrap.appendChild(d);
            });
        }

        function renderFaqList() {
            const list = state.root.MiniSiteJson.seo.faq;
            const wrap = byId('faq-list'); wrap.innerHTML = '';
            if (!list.length) { wrap.innerHTML = `<div class="text-center py-10 opacity-20 font-black uppercase text-[8px] tracking-widest border-2 border-dashed border-gray-200 rounded-[2rem]">No FAQs</div>`; return; }
            list.forEach((it, i) => {
                const d = document.createElement('div');
                d.className = 'noir-card !p-6 space-y-3';
                d.innerHTML = `
                    <input class="noir-input !p-3 text-xs font-black" type="text" placeholder="Question" value="${escapeHtml(it.q || it.question)}" oninput="state.root.MiniSiteJson.seo.faq[${i}].q=this.value;markDirty()">
                    <textarea class="noir-textarea !p-4 text-xs" rows="2" placeholder="Answer" oninput="state.root.MiniSiteJson.seo.faq[${i}].a=this.value;markDirty()">${escapeHtml(it.a || it.answer)}</textarea>
                    <div class="flex justify-end"><button onclick="state.root.MiniSiteJson.seo.faq.splice(${i},1);renderFaqList();markDirty();haptic('medium')" class="text-[8px] font-black uppercase text-red-500">Remove</button></div>`;
                wrap.appendChild(d);
            });
        }

        function renderKeywords() {
            const kw = state.root.MiniSiteJson.seo.keywords || [];
            mountTags(byId('seo-keywords-wrap'), kw, (i) => { kw.splice(i, 1); markDirty(); renderKeywords(); });
        }

        // ── LOGIC SYNC ──
        function applyInputsToState() {
            const r = state.root, hp = r.HoneyPot, od = r.ownerdata, ai = r.MiniSiteJson, bot = r.ownerbot;
            state.template = byId('template').value;
            od.ragione_sociale = byId('ragione-sociale').value;
            od.vat_number = byId('vat-number').value;
            bot.username = byId('bot-username').value;
            hp.company_context_string = byId('company-context').value;
            hp.offer_text = byId('offer-text').value;
            hp.assets.logo.url = byId('asset-logo').value;
            hp.assets.gallery1.url = byId('asset-gallery1').value;
            hp.assets.gallery2.url = byId('asset-gallery2').value;
            hp.assets.gallery3.url = byId('asset-gallery3').value;
            ai.seo.title = byId('seo-title').value;
            ai.seo.description = byId('seo-description').value;
            ai.hero.h1 = byId('hero-h1').value;
            ai.hero.sub = byId('hero-sub').value;
            ai.design.font = byId('design-font').value;
            ai.design.radius = byId('design-radius').value;
            ai.sections.about.headline = byId('about-headline').value;
            ai.sections.about.body = byId('about-body').value;
            hp.assets.logo.meta = { colors: [byId('theme-primary').value, byId('theme-accent').value, '#FFFFFF'] };
        }

        function buildRendererPayload() {
            applyInputsToState();
            return { HoneyPot: state.root.HoneyPot, ownerdata: state.root.ownerdata, MiniSiteJson: state.root.MiniSiteJson, ownerbot: state.root.ownerbot, template: state.template };
        }

        function refreshRawPreview() {
            byId('raw-preview').value = JSON.stringify(buildRendererPayload(), null, 2);
            refreshHeader();
        }

        function refreshHeader() {
            const od = state.root.ownerdata;
            byId('entity-name').textContent = od.ragione_sociale || 'MiniSite Architect';
            byId('entity-meta').textContent = `Template: ${state.template} · ${od.vat_number || 'Identity Protocol'}`;
        }

        function syncDirtyState() {
            state.dirty = stableStringify(buildRendererPayload()) !== state.originalHash;
            byId('save-btn').disabled = !state.dirty;
            byId('publish-btn').disabled = !state.dirty;
            tg.MainButton.setParams({ is_active: state.dirty, text: state.dirty ? 'DEPLOY MODIFICHE' : 'NESSUNA MODIFICA' });
        }

        function markDirty() { refreshRawPreview(); syncDirtyState(); }

        // ── ACTIONS ──
        async function callWebhook(body, isHtml = false) {
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': isHtml ? 'text/html' : 'application/json' },
                body: JSON.stringify(body)
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return isHtml ? response.text() : response.json();
        }

        async function initApp() {
            tg.ready(); tg.expand(); tg.enableClosingConfirmation();
            tg.MainButton.setParams({ color: '#000000', text_color: '#FFFFFF', is_visible: true, is_active: false });
            tg.MainButton.onClick(handlePublish);

            try {
                const res = await callWebhook({ _auth: tg.initData, action: 'GET_MINISITE_DATA' });
                state.root = {
                    HoneyPot: deepClone(res.HoneyPot || res.data?.HoneyPot || {}),
                    ownerdata: deepClone(res.ownerdata || res.data?.ownerdata || {}),
                    MiniSiteJson: deepClone(res.MiniSiteJson || res.data?.MiniSiteJson || {}),
                    ownerbot: deepClone(res.ownerbot || res.data?.ownerbot || {}),
                    template: res.template || 'dark-tech'
                };
                ensureShape();
                state.originalHash = stableStringify(buildRendererPayload());
                populateForm();
                byId('loading').classList.add('hidden');
                byId('app').classList.remove('hidden');
                notify('success');
            } catch (e) { alert("Load Error: " + e.message); }
        }

        async function handleSave() {
            haptic('medium');
            const btn = byId('save-btn'), txt = btn.querySelector('span');
            txt.innerText = "SAVING..."; btn.disabled = true;
            try {
                await callWebhook({ _auth: tg.initData, action: 'SAVE_DRAFT_MINISITE', ...buildRendererPayload() });
                state.originalHash = stableStringify(buildRendererPayload());
                syncDirtyState();
                notify('success');
                txt.innerText = "Salva Bozza";
            } catch (e) { alert(e.message); txt.innerText = "Retry"; btn.disabled = false; }
        }

        async function handlePublish() {
            tg.MainButton.showProgress(true);
            haptic('heavy');
            try {
                const res = await callWebhook({ _auth: tg.initData, action: 'PUBLISH_MINISITE', ...buildRendererPayload() });
                state.originalHash = stableStringify(buildRendererPayload());
                syncDirtyState();
                notify('success');
                tg.showAlert(res.deployUrl ? `Live @ ${res.deployUrl}` : 'Pubblicazione OK');
            } catch (e) { alert(e.message); }
            finally { tg.MainButton.showProgress(false); }
        }

        async function handlePreview() {
            haptic('medium');
            try {
                const html = await callWebhook({ _auth: tg.initData, action: 'PREVIEW_MINISITE', ...buildRendererPayload() }, true);
                byId('preview-frame').srcdoc = html;
                byId('preview-modal').classList.remove('hidden');
            } catch (e) { alert(e.message); }
        }

        // ── BINDINGS ──
        function bindAll() {
            document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => { activateTab(b.dataset.tab); haptic('light'); });
            [ 'template','ragione-sociale','bot-username','vat-number','company-context','asset-logo','asset-gallery1','asset-gallery2','asset-gallery3','seo-title','seo-description','hero-h1','hero-sub','offer-text','design-font','design-radius','theme-primary','theme-accent','about-headline','about-body'
            ].forEach(id => {
                byId(id).oninput = () => { markDirty(); haptic('light'); };
            });

            byId('seo-keyword-input').onkeydown = (e) => {
                if (e.key === 'Enter') {
                    const v = e.target.value.trim();
                    if(v) { state.root.MiniSiteJson.seo.keywords.push(v); e.target.value=''; renderKeywords(); markDirty(); haptic('light'); }
                }
            };

            byId('add-usp').onclick = () => { state.root.MiniSiteJson.sections.usp.push({title:'', text:''}); renderUSPList(); markDirty(); haptic('light'); };
            byId('add-process').onclick = () => { state.root.MiniSiteJson.sections.process.push({title:'', text:''}); renderProcessList(); markDirty(); haptic('light'); };
            byId('add-service').onclick = () => { state.root.HoneyPot.active_services.push({name:'', category:''}); renderServicesList(); markDirty(); haptic('light'); };
            byId('add-faq').onclick = () => { state.root.MiniSiteJson.seo.faq.push({q:'', a:''}); renderFaqList(); markDirty(); haptic('light'); };
            
            byId('preview-btn').onclick = handlePreview;
            byId('save-btn').onclick = handleSave;
            byId('publish-btn').onclick = handlePublish;
            byId('close-preview').onclick = () => byId('preview-modal').classList.add('hidden');
        }

        window.onload = () => {
            bindAll();
            initApp();
        };
    </script>
</body>
</html>
