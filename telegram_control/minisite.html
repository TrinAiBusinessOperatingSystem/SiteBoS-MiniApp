<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SiteBoS Editor Pro</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #fafafa; --surface: #ffffff; --text: #000000; --line: #eeeeee; --radius-card: 2.5rem; --radius-input: 1.4rem; --shadow-card: 0 18px 40px rgba(0,0,0,0.06); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; margin:0; padding-bottom: 120px; }
    
    .noir-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-card); box-shadow: var(--shadow-card); overflow: hidden; }
    .noir-input, .noir-textarea, .noir-select { width: 100%; border: 2px solid var(--line); border-radius: var(--radius-input); background: #f9fafb; padding: 1rem 1.1rem; transition: all .15s ease; outline:none; font-size: 14px; }
    .noir-input:focus, .noir-textarea:focus { background: #fff; border-color: #000; box-shadow: 0 0 0 4px rgba(0,0,0,0.06); }
    .noir-input[readonly] { opacity: 0.6; cursor: not-allowed; background: #f3f4f6; border-color: transparent; }
    
    .label-k { display: block; margin-bottom: .6rem; font-size: 9px; font-weight: 900; letter-spacing: 0.25em; text-transform: uppercase; color: #6b7280; }
    
    .noir-btn { min-height: 52px; border-radius: 999px; padding: 0 1.8rem; border: 2px solid #000; background: #000; color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: .15em; font-size: .75rem; cursor: pointer; transition: all .15s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .noir-btn.secondary { background: #fff; color: #000; }
    .noir-btn.ai { background: #000; border: none; color: #fff; box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
    
    .tab-btn { border: none; background: transparent; padding: 1.2rem; font-weight: 900; font-size: .7rem; text-transform: uppercase; letter-spacing: .15em; cursor: pointer; border-bottom: 4px solid transparent; opacity: 0.4; white-space: nowrap; }
    .tab-btn.active { opacity: 1; border-bottom-color: #000; }
    
    .hidden { display: none; }
    .loader-spin { width: 32px; height: 32px; border: 3px solid #f3f3f3; border-top: 3px solid #000; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .header-img { width: 70px; height: 70px; border-radius: 1.5rem; border: 1px solid var(--line); object-fit: cover; background: #f9fafb; flex-shrink: 0; }
    .asset-box { width: 100%; height: 160px; border-radius: 1.8rem; background: #f3f4f6; overflow: hidden; position: relative; border: 1px solid var(--line); }
    .asset-box img { width: 100%; height: 100%; object-fit: cover; }
    .asset-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .asset-box:hover .asset-overlay { opacity: 1; }
    
    .offer-render-box { background: #fff; border: 2px solid var(--line); border-radius: 1.5rem; padding: 1.5rem; font-size: 0.9rem; line-height: 1.6; color: #333; max-height: 400px; overflow-y: auto; }

    .fixed-footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(250,250,250,0.9); backdrop-filter: blur(10px); padding: 20px; border-top: 1px solid var(--line); z-index: 50; display: flex; justify-content: center; gap: 12px; }
  </style>
</head>
<body>

  <!-- FLASH INIT -->
  <script>
    const tg = window.Telegram.WebApp;
    const WEBHOOK_URL = 'https://prod.workflow.trinai.it/webhook/50891655-84c8-4213-90e8-26ebbc3d6c4c';
    if (!tg.initData) { document.body.innerHTML = `<div class="p-20 text-center font-black">ACCESS DENIED</div>`; window.stop(); }
    const dataFetch = fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ _auth: tg.initData, action: 'GET_MINISITE_DATA' })
    }).then(r => r.json());
  </script>

  <div id="loading" class="fixed inset-0 flex items-center justify-center bg-[#fafafa] z-50">
    <div class="text-center">
      <div class="loader-spin mb-4 mx-auto"></div>
      <div class="label-k">Sincronizzazione...</div>
    </div>
  </div>

  <main id="app" class="hidden max-w-[1200px] mx-auto p-4">
    <!-- HEADER -->
    <header class="noir-card p-8 mb-6">
        <div class="flex items-center gap-6">
            <div class="flex gap-3">
                <img id="h-logo" class="header-img">
                <img id="h-photo" class="header-img">
            </div>
            <div>
                <h1 id="ent-name" class="text-3xl font-black uppercase tracking-tighter leading-none mb-2">Editor</h1>
                <p id="ent-vat" class="text-[10px] opacity-40 font-black uppercase tracking-[0.2em]"></p>
            </div>
        </div>
    </header>

    <!-- TABS -->
    <nav class="noir-card px-4 mb-6 flex overflow-x-auto no-scrollbar">
      <button class="tab-btn active" data-tab="content">Testi</button>
      <button class="tab-btn" data-tab="offer">Offerta</button>
      <button class="tab-btn" data-tab="assets">Asset Visivi</button>
      <button class="tab-btn" data-tab="services">Servizi</button>
      <button class="tab-btn" data-tab="faq">FAQ</button>
      <button class="tab-btn" data-tab="info">Info</button>
    </nav>

    <!-- PANEL: TESTI -->
    <section data-panel="content" class="tab-panel space-y-6">
      <div class="noir-card p-8">
        <label class="label-k">Sezione Hero</label>
        <div class="space-y-4">
          <input id="hero-h1" class="noir-input font-bold" placeholder="Titolo H1">
          <textarea id="hero-sub" class="noir-textarea" rows="3" placeholder="Sottotitolo Hero"></textarea>
        </div>
      </div>
      <div class="noir-card p-8">
        <label class="label-k">Strategia SEO</label>
        <div class="space-y-4">
          <input id="seo-title" class="noir-input" placeholder="SEO Title">
          <textarea id="seo-description" class="noir-textarea" rows="3" placeholder="Meta Description"></textarea>
        </div>
      </div>
    </section>

    <!-- PANEL: OFFERTA (HTML RENDER) -->
    <section data-panel="offer" class="tab-panel hidden space-y-6">
      <div class="noir-card p-8">
        <label class="label-k">Anteprima Offerta (Sola Lettura)</label>
        <div id="offer-render" class="offer-render-box mb-6"></div>
        
        <label class="label-k">Prompt Rigenerazione AI (1 Credito)</label>
        <textarea id="offer-prompt" class="noir-textarea mb-4" rows="3" placeholder="Descrivi come vuoi cambiare l'offerta..."></textarea>
        <button id="btn-gen-offer" class="noir-btn ai w-full">✨ Generate_Offer</button>
      </div>
    </section>

    <!-- PANEL: ASSET VISIVI -->
    <section data-panel="assets" class="tab-panel hidden space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- GALLERY 1 (HERO) -->
        <div class="noir-card p-6 text-center">
            <label class="label-k">Hero Image (Gallery 1)</label>
            <div class="asset-box mb-4">
                <img id="v-g1" src="">
                <div class="asset-overlay">
                    <button onclick="triggerUp('gallery1')" class="noir-btn secondary scale-75">Upload</button>
                    <button onclick="regenAsset('gallery1')" class="noir-btn scale-75">AI</button>
                </div>
            </div>
            <input type="file" id="f-gallery1" class="hidden" accept="image/*" onchange="procMedia(this, 'gallery1')">
        </div>
        <!-- GALLERY 2 -->
        <div class="noir-card p-6 text-center">
            <label class="label-k">Gallery 2</label>
            <div class="asset-box mb-4">
                <img id="v-g2" src="">
                <div class="asset-overlay">
                    <button onclick="triggerUp('gallery2')" class="noir-btn secondary scale-75">Upload</button>
                    <button onclick="regenAsset('gallery2')" class="noir-btn scale-75">AI</button>
                </div>
            </div>
            <input type="file" id="f-gallery2" class="hidden" accept="image/*" onchange="procMedia(this, 'gallery2')">
        </div>
        <!-- GALLERY 3 -->
        <div class="noir-card p-6 text-center">
            <label class="label-k">Gallery 3</label>
            <div class="asset-box mb-4">
                <img id="v-g3" src="">
                <div class="asset-overlay">
                    <button onclick="triggerUp('gallery3')" class="noir-btn secondary scale-75">Upload</button>
                    <button onclick="regenAsset('gallery3')" class="noir-btn scale-75">AI</button>
                </div>
            </div>
            <input type="file" id="f-gallery3" class="hidden" accept="image/*" onchange="procMedia(this, 'gallery3')">
        </div>
      </div>
      <!-- LOGO E PHOTO (SOLO VISTA) -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="noir-card p-6 flex items-center gap-4">
              <img id="v-logo" class="header-img">
              <div><label class="label-k">Logo Brand</label><p class="text-[10px] opacity-40 uppercase">Sola visualizzazione</p></div>
          </div>
          <div class="noir-card p-6 flex items-center gap-4">
              <img id="v-photo" class="header-img">
              <div><label class="label-k">Foto Owner</label><p class="text-[10px] opacity-40 uppercase">Sola visualizzazione</p></div>
          </div>
      </div>
    </section>

    <!-- PANEL: SERVIZI -->
    <section data-panel="services" class="tab-panel hidden space-y-6">
      <div id="sync-warning" class="noir-card p-6 bg-amber-50 border-amber-200 hidden">
        <div class="flex items-center gap-5">
          <div class="text-3xl">⚠️</div>
          <div class="flex-1">
            <div class="font-black text-[10px] uppercase tracking-widest text-amber-900">Discrepanza Rilevata</div>
            <p class="text-xs text-amber-800">I servizi attivi non corrispondono alle descrizioni del sito.</p>
          </div>
          <button id="btn-sync-services" class="noir-btn scale-90 ai">Sincronizza Asset AI</button>
        </div>
      </div>
      <div class="noir-card p-6">
        <label class="label-k mb-4">Offerta Commerciale Attiva</label>
        <div id="services-list" class="grid gap-4"></div>
      </div>
    </section>

    <!-- PANEL: FAQ -->
    <section data-panel="faq" class="tab-panel hidden">
      <div class="noir-card p-6 text-center">
        <div class="flex justify-between items-center mb-6">
          <label class="label-k">FAQ SEO Strategiche</label>
          <button id="add-faq" class="noir-btn secondary scale-75">Aggiungi</button>
        </div>
        <div id="faq-list" class="space-y-4"></div>
      </div>
    </section>

    <!-- PANEL: INFO -->
    <section data-panel="info" class="tab-panel hidden space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="noir-card p-6 space-y-4">
          <label class="label-k">Anagrafica</label>
          <div><label class="label-k opacity-50">Ragione Sociale</label><input id="v-ragione" class="noir-input" readonly></div>
          <div><label class="label-k opacity-50">P.IVA</label><input id="v-vat" class="noir-input" readonly></div>
        </div>
        <div class="noir-card p-6 space-y-4">
          <label class="label-k">Social Connect</label>
          <div><label class="label-k opacity-50">LinkedIn</label><input id="v-li" class="noir-input" readonly></div>
          <div><label class="label-k opacity-50">Facebook</label><input id="v-fb" class="noir-input" readonly></div>
        </div>
      </div>
    </section>
  </main>

  <!-- FIXED FOOTER -->
  <footer class="fixed-footer">
      <button id="preview-btn" class="noir-btn secondary">Preview</button>
      <button id="save-btn" class="noir-btn">Salva Modifiche</button>
  </footer>

  <script>
    const state = { root: {}, originalHash: '', dirty: false };
    function byId(id) { return document.getElementById(id); }
    function haptic() { try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} }

    function ensureShape(d) {
      if(!d) return {};
      d.ownerdata = d.ownerdata || d.owner_data || {};
      d.ownerbot = d.ownerbot || d.owner_bot || {};
      d.HoneyPot = d.HoneyPot || { assets:{}, active_services:[] };
      d.MiniSiteJson = d.MiniSiteJson || { seo:{faq:[]}, hero:{}, service_descriptions:[] };
      return d;
    }

    function populateForm() {
      const r = state.root;
      byId('ent-name').textContent = r.ownerdata.ragione_sociale || 'Editor';
      byId('ent-vat').textContent = r.ownerdata.vat_number || '---';
      byId('h-logo').src = byId('v-logo').src = r.HoneyPot.assets.logo?.url || '';
      byId('h-photo').src = byId('v-photo').src = r.HoneyPot.assets.photo?.url || '';

      // Info Panels
      byId('v-ragione').value = r.ownerdata.ragione_sociale || '';
      byId('v-vat').value = r.ownerdata.vat_number || '';
      byId('v-li').value = r.ownerdata.linkedin || r.ownerdata.linkedin_page || '';
      byId('v-fb').value = r.ownerdata.facebook || r.ownerdata.facebook_page || '';

      // Editable
      byId('hero-h1').value = r.MiniSiteJson.hero.h1 || '';
      byId('hero-sub').value = r.MiniSiteJson.hero.sub || '';
      byId('seo-title').value = r.MiniSiteJson.seo.title || '';
      byId('seo-description').value = r.MiniSiteJson.seo.description || '';

      // Offer
      byId('offer-render').innerHTML = r.HoneyPot.offer_text || '<em>Nessuna offerta caricata.</em>';

      // Gallery
      byId('v-g1').src = r.HoneyPot.assets.gallery1?.url || '';
      byId('v-g2').src = r.HoneyPot.assets.gallery2?.url || '';
      byId('v-g3').src = r.HoneyPot.assets.gallery3?.url || '';

      checkSyncStatus();
      renderServices();
      renderFAQ();
      syncDirty();
    }

    function checkSyncStatus() {
      const hpLen = state.root.HoneyPot.active_services.length;
      const msjLen = state.root.MiniSiteJson.service_descriptions.length;
      if (hpLen !== msjLen) byId('sync-warning').classList.remove('hidden');
      else byId('sync-warning').classList.add('hidden');
    }

    function syncDirty() {
      const r = state.root;
      r.MiniSiteJson.hero.h1 = byId('hero-h1').value;
      r.MiniSiteJson.hero.sub = byId('hero-sub').value;
      r.MiniSiteJson.seo.title = byId('seo-title').value;
      r.MiniSiteJson.seo.description = byId('seo-description').value;

      const currentHash = JSON.stringify(r.MiniSiteJson);
      state.dirty = currentHash !== state.originalHash;
      byId('save-btn').disabled = !state.dirty;
      
      if (state.dirty) { tg.MainButton.setText("PUBBLICA SITO"); tg.MainButton.show(); tg.MainButton.enable(); }
      else { tg.MainButton.hide(); }
    }

    async function call(body) {
      const r = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      return r.json();
    }

    // ACTIONS
    byId('btn-gen-offer').onclick = async () => {
      haptic();
      const p = byId('offer-prompt').value;
      tg.MainButton.showProgress();
      try {
        const res = await call({ _auth: tg.initData, action: 'Generate_Offer', prompt: p, ...state.root });
        if(res.html_content) {
          state.root.HoneyPot.offer_text = res.html_content;
          byId('offer-render').innerHTML = res.html_content;
          tg.showAlert("Offerta generata!");
        }
      } catch(e) { tg.showAlert(e.message); }
      finally { tg.MainButton.hideProgress(); }
    };

    byId('btn-sync-services').onclick = async () => {
      haptic();
      tg.MainButton.showProgress();
      try {
        const res = await call({ _auth: tg.initData, action: 'REGENERATE_SERVICES', ...state.root });
        if(res.service_descriptions) {
          state.root.MiniSiteJson.service_descriptions = res.service_descriptions;
          populateForm();
          tg.showAlert("Servizi Sincronizzati!");
        }
      } catch(e) { tg.showAlert(e.message); }
      finally { tg.MainButton.hideProgress(); }
    };

    function triggerUp(k) { haptic(); byId('f-'+k).click(); }
    function procMedia(input, k) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
          byId('v-g' + k.slice(-1)).src = e.target.result;
          state.root.HoneyPot.assets[k].url = e.target.result; 
          syncDirty();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function regenAsset(k) {
        haptic();
        tg.showConfirm(`Generare nuova AI Image per ${k}?`, async ok => {
            if(!ok) return;
            tg.MainButton.showProgress();
            try {
                const res = await call({ _auth: tg.initData, action:'REGENERATE_ASSET', asset_type: k, ...state.root });
                if(res.new_url) {
                    state.root.HoneyPot.assets[k].url = res.new_url;
                    populateForm();
                }
            } catch(e){ tg.showAlert(e.message); }
            finally { tg.MainButton.hideProgress(); }
        });
    }

    function renderServices() {
      const list = byId('services-list');
      list.innerHTML = '';
      state.root.HoneyPot.active_services.forEach(s => {
        const div = document.createElement('div');
        div.className = 'noir-card p-4 flex justify-between items-center';
        div.innerHTML = `<div><div class="font-black text-xs uppercase tracking-tight">${s.name}</div><div class="text-[9px] opacity-40 uppercase tracking-widest font-bold">${s.macro} | ${s.category_short}</div></div>`;
        list.appendChild(div);
      });
    }

    function renderFAQ() {
      const list = byId('faq-list');
      list.innerHTML = '';
      (state.root.MiniSiteJson.seo.faq || []).forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'noir-card p-4 space-y-2';
        div.innerHTML = `<input class="noir-input text-xs font-bold" value="${f.q || f.question || ''}" oninput="state.root.MiniSiteJson.seo.faq[${i}].q=this.value;syncDirty()"><textarea class="noir-textarea text-xs" oninput="state.root.MiniSiteJson.seo.faq[${i}].a=this.value;syncDirty()">${f.a || f.answer || ''}</textarea>`;
        list.appendChild(div);
      });
    }

    document.querySelectorAll('.tab-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(x => x.classList.add('hidden'));
        b.classList.add('active');
        document.querySelector(`[data-panel="${b.dataset.tab}"]`).classList.remove('hidden');
      });
    });

    document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', () => { syncDirty(); haptic(); }));

    async function handlePublish() {
      tg.MainButton.showProgress();
      try {
        await call({ _auth: tg.initData, action: 'PUBLISH_MINISITE', ...state.root });
        state.originalHash = JSON.stringify(state.root.MiniSiteJson);
        syncDirty();
        tg.showAlert("MiniSite Pubblicato con successo!");
      } catch (e) { tg.showAlert(e.message); }
      finally { tg.MainButton.hideProgress(); }
    }

    tg.MainButton.onClick(handlePublish);
    byId('save-btn').onclick = handlePublish;

    // START
    (async () => {
      try {
        const res = await dataFetch;
        state.root = ensureShape(res);
        state.originalHash = JSON.stringify(state.root.MiniSiteJson);
        populateForm();
        byId('loading').classList.add('hidden');
        byId('app').classList.remove('hidden');
        tg.expand();
      } catch (e) { tg.showAlert("Errore: " + e.message); }
    })();
  </script>
</body>
</html>
