<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SiteBoS Editor Pro</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #fafafa; --surface: #ffffff; --text: #000000; --line: #eeeeee; --radius-card: 2.5rem; --radius-input: 1.4rem; --shadow-card: 0 18px 40px rgba(0,0,0,0.06); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; margin:0; }
    .noir-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-card); box-shadow: var(--shadow-card); overflow: hidden; }
    .noir-input, .noir-textarea, .noir-select { width: 100%; border: 2px solid var(--line); border-radius: var(--radius-input); background: #f9fafb; padding: 1rem 1.1rem; transition: all .15s ease; outline:none; }
    .noir-input:focus, .noir-textarea:focus { background: #fff; border-color: #000; box-shadow: 0 0 0 4px rgba(0,0,0,0.06); }
    .noir-input[readonly] { opacity: 0.6; cursor: not-allowed; background: #f3f4f6; border-color: transparent; }
    .label-k { display: block; margin-bottom: .6rem; font-size: 9px; font-weight: 900; letter-spacing: 0.25em; text-transform: uppercase; color: #6b7280; }
    .noir-btn { min-height: 48px; border-radius: 999px; padding: 0 1.5rem; border: 2px solid #000; background: #000; color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: .15em; font-size: .7rem; cursor: pointer; transition: all .15s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .noir-btn.secondary { background: #fff; color: #000; }
    .noir-btn.ai { background: linear-gradient(135deg, #000 0%, #444 100%); border: none; }
    .tab-btn { border: none; background: transparent; padding: 1.2rem; font-weight: 900; font-size: .7rem; text-transform: uppercase; letter-spacing: .15em; cursor: pointer; border-bottom: 4px solid transparent; opacity: 0.4; white-space: nowrap; }
    .tab-btn.active { opacity: 1; border-bottom-color: #000; }
    .hidden { display: none; }
    .loader-spin { width: 32px; height: 32px; border: 3px solid #f3f3f3; border-top: 3px solid #000; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .header-img { width: 70px; height: 70px; border-radius: 1.5rem; border: 1px solid var(--line); object-fit: cover; background: #f9fafb; }
    .offer-render-box { background: #f9fafb; border: 1px solid var(--line); border-radius: 1.5rem; padding: 1.5rem; font-size: 0.9rem; line-height: 1.6; color: #374151; max-height: 350px; overflow-y: auto; }
  </style>
</head>
<body>

  <!-- FLASH INIT -->
  <script>
    const tg = window.Telegram.WebApp;
    const WEBHOOK_URL = 'https://prod.workflow.trinai.it/webhook/50891655-84c8-4213-90e8-26ebbc3d6c4c';
    if (!tg.initData) { document.body.innerHTML = `<div class="p-20 text-center font-black">ACCESS DENIED</div>`; window.stop(); }
    const dataFetch = fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ _auth: tg.initData, action: 'GET_MINISITE_DATA' })
    }).then(r => r.json());
  </script>

  <div id="loading" class="fixed inset-0 flex items-center justify-center bg-[#fafafa] z-50">
    <div class="text-center">
      <div class="loader-spin mb-4 mx-auto"></div>
      <div class="label-k">Flash Syncing...</div>
    </div>
  </div>

  <main id="app" class="hidden max-w-[1200px] mx-auto p-4 pb-32">
    <!-- HEADER -->
    <header class="noir-card p-8 mb-6 flex flex-col md:flex-row justify-between items-center gap-6">
      <div class="flex items-center gap-4">
        <div class="flex gap-2">
          <img id="h-logo" class="header-img">
          <img id="h-photo" class="header-img">
        </div>
        <div>
          <div class="label-k">Noir Enterprise v4</div>
          <h1 id="ent-name" class="text-3xl font-black uppercase tracking-tighter leading-tight">Editor</h1>
          <p id="ent-vat" class="text-xs opacity-50 font-bold tracking-widest"></p>
        </div>
      </div>
      <div class="flex gap-3">
        <button id="preview-btn" class="noir-btn secondary">Preview</button>
        <button id="save-btn" class="noir-btn">Salva</button>
      </div>
    </header>

    <nav class="noir-card px-4 mb-6 flex overflow-x-auto no-scrollbar">
      <button class="tab-btn active" data-tab="content">Testi</button>
      <button class="tab-btn" data-tab="offer">Offerta AI</button>
      <button class="tab-btn" data-tab="services">Servizi</button>
      <button class="tab-btn" data-tab="faq">FAQ</button>
      <button class="tab-btn" data-tab="info">Info</button>
    </nav>

    <!-- PANEL: TESTI (MINISITEJSON) -->
    <section data-panel="content" class="tab-panel space-y-6">
      <div class="noir-card p-8">
        <label class="label-k">Sezione Hero</label>
        <div class="space-y-4">
          <input id="hero-h1" class="noir-input font-bold" placeholder="Titolo H1">
          <textarea id="hero-sub" class="noir-textarea" rows="3" placeholder="Sottotitolo Hero"></textarea>
        </div>
      </div>
      <div class="noir-card p-8">
        <label class="label-k">Strategia SEO</label>
        <div class="space-y-4">
          <input id="seo-title" class="noir-input" placeholder="SEO Title">
          <textarea id="seo-description" class="noir-textarea" rows="3" placeholder="Meta Description"></textarea>
        </div>
      </div>
    </section>

    <!-- PANEL: OFFERTA (READ ONLY HTML + GENERATE) -->
    <section data-panel="offer" class="tab-panel hidden space-y-6">
      <div class="noir-card p-8">
        <label class="label-k">Offerta Irresistibile (Renderizzata)</label>
        <div id="offer-render" class="offer-render-box mb-6"></div>
        
        <label class="label-k">Prompt di Rigenerazione AI (1 Credito)</label>
        <textarea id="offer-prompt" class="noir-textarea mb-4" rows="3" placeholder="Es: Crea un'offerta focalizzata sulla trasformazione digitale per studi legali..."></textarea>
        <button id="btn-gen-offer" class="noir-btn ai w-full text-white">✨ Generate_Offer</button>
        <p class="text-[10px] text-center opacity-40 mt-3 font-bold uppercase tracking-tighter italic">L'offerta verrà riscritta interamente basandosi sulla memoria aziendale.</p>
      </div>
    </section>

    <!-- PANEL: SERVIZI (SYNC LOGIC) -->
    <section data-panel="services" class="tab-panel hidden space-y-6">
      <div id="sync-warning" class="noir-card p-6 bg-amber-50 border-amber-200 hidden">
        <div class="flex items-center gap-5">
          <div class="text-3xl">⚠️</div>
          <div class="flex-1">
            <div class="font-black text-[10px] uppercase tracking-widest text-amber-900">Discrepanza Rilevata</div>
            <p class="text-xs text-amber-800">I servizi commerciali attivi non corrispondono alle descrizioni caricate sul sito.</p>
          </div>
          <button id="btn-sync-services" class="noir-btn scale-90 ai">Sincronizza Asset AI</button>
        </div>
      </div>
      <div class="noir-card p-6">
        <label class="label-k mb-4">Servizi Commerciali (SER/PRO)</label>
        <div id="services-list" class="grid gap-4"></div>
      </div>
    </section>

    <!-- PANEL: FAQ -->
    <section data-panel="faq" class="tab-panel hidden">
      <div class="noir-card p-6">
        <div class="flex justify-between items-center mb-6">
          <label class="label-k">FAQ SEO Strategiche</label>
          <button id="add-faq" class="noir-btn secondary scale-75">Aggiungi</button>
        </div>
        <div id="faq-list" class="space-y-4"></div>
      </div>
    </section>

    <!-- PANEL: INFO (READ ONLY) -->
    <section data-panel="info" class="tab-panel hidden space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="noir-card p-6">
          <label class="label-k">Dati Anagrafici (Read Only)</label>
          <div class="space-y-4">
            <div><label class="label-k opacity-50 font-normal">Ragione Sociale</label><input id="v-ragione" class="noir-input" readonly></div>
            <div><label class="label-k opacity-50 font-normal">P.IVA</label><input id="v-vat" class="noir-input" readonly></div>
            <div><label class="label-k opacity-50 font-normal">Bot Username</label><input id="v-bot" class="noir-input" readonly></div>
          </div>
        </div>
        <div class="noir-card p-6">
          <label class="label-k">Social Connect</label>
          <div class="space-y-4">
            <div><label class="label-k opacity-50 font-normal">LinkedIn</label><input id="v-li" class="noir-input" readonly></div>
            <div><label class="label-k opacity-50 font-normal">Facebook</label><input id="v-fb" class="noir-input" readonly></div>
            <div><label class="label-k opacity-50 font-normal">Instagram</label><input id="v-ig" class="noir-input" readonly></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const state = { root: {}, originalHash: '', dirty: false };
    function byId(id) { return document.getElementById(id); }
    function haptic() { try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} }

    function ensureShape(d) {
      if(!d) return {};
      d.ownerdata = d.ownerdata || d.owner_data || {};
      d.ownerbot = d.ownerbot || d.owner_bot || {};
      d.HoneyPot = d.HoneyPot || { assets:{}, active_services:[] };
      d.MiniSiteJson = d.MiniSiteJson || { seo:{faq:[]}, hero:{}, service_descriptions:[] };
      return d;
    }

    function populateForm() {
      const r = state.root;
      // Header & Info
      byId('ent-name').textContent = r.ownerdata.ragione_sociale || 'Editor';
      byId('ent-vat').textContent = `P.IVA: ${r.ownerdata.vat_number || '---'}`;
      byId('h-logo').src = r.HoneyPot.assets.logo?.url || '';
      byId('h-photo').src = r.HoneyPot.assets.photo?.url || '';

      byId('v-ragione').value = r.ownerdata.ragione_sociale || '';
      byId('v-vat').value = r.ownerdata.vat_number || '';
      byId('v-bot').value = r.ownerbot.username || '';
      byId('v-li').value = r.ownerdata.linkedin || r.ownerdata.linkedin_page || '';
      byId('v-fb').value = r.ownerdata.facebook || r.ownerdata.facebook_page || '';
      byId('v-ig').value = r.ownerdata.instagram || r.ownerdata.instagram_page || '';

      // Editable
      byId('hero-h1').value = r.MiniSiteJson.hero.h1 || '';
      byId('hero-sub').value = r.MiniSiteJson.hero.sub || '';
      byId('seo-title').value = r.MiniSiteJson.seo.title || '';
      byId('seo-description').value = r.MiniSiteJson.seo.description || '';

      // Offer HTML
      byId('offer-render').innerHTML = r.HoneyPot.offer_text || '<em>Nessuna offerta caricata.</em>';

      checkSyncStatus();
      renderServices();
      renderFAQ();
      syncDirty();
    }

    function checkSyncStatus() {
      const hpLen = state.root.HoneyPot.active_services.length;
      const msjLen = state.root.MiniSiteJson.service_descriptions.length;
      if (hpLen !== msjLen) byId('sync-warning').classList.remove('hidden');
      else byId('sync-warning').classList.add('hidden');
    }

    function syncDirty() {
      const r = state.root;
      // Solo le modifiche a MiniSiteJson influenzano il dirty state
      r.MiniSiteJson.hero.h1 = byId('hero-h1').value;
      r.MiniSiteJson.hero.sub = byId('hero-sub').value;
      r.MiniSiteJson.seo.title = byId('seo-title').value;
      r.MiniSiteJson.seo.description = byId('seo-description').value;

      const currentHash = JSON.stringify(r.MiniSiteJson);
      state.dirty = currentHash !== state.originalHash;
      byId('save-btn').disabled = !state.dirty;
      
      if (state.dirty) { tg.MainButton.setText("PUBBLICA MODIFICHE"); tg.MainButton.show(); tg.MainButton.enable(); }
      else { tg.MainButton.hide(); }
    }

    async function call(body) {
      const r = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      return r.json();
    }

    // AI ACTIONS
    byId('btn-gen-offer').onclick = async () => {
      const p = byId('offer-prompt').value;
      haptic();
      tg.MainButton.showProgress();
      try {
        const res = await call({ _auth: tg.initData, action: 'Generate_Offer', prompt: p, ...state.root });
        if(res.html_content) {
          state.root.HoneyPot.offer_text = res.html_content;
          byId('offer-render').innerHTML = res.html_content;
          tg.showAlert("Offerta rigenerata!");
        }
      } catch(e) { tg.showAlert(e.message); }
      finally { tg.MainButton.hideProgress(); }
    };

    byId('btn-sync-services').onclick = async () => {
      haptic();
      tg.MainButton.showProgress();
      try {
        const res = await call({ _auth: tg.initData, action: 'REGENERATE_SERVICES', ...state.root });
        if(res.service_descriptions) {
          state.root.MiniSiteJson.service_descriptions = res.service_descriptions;
          populateForm();
          tg.showAlert("Asset Sincronizzati!");
        }
      } catch(e) { tg.showAlert(e.message); }
      finally { tg.MainButton.hideProgress(); }
    };

    function renderServices() {
      const list = byId('services-list');
      list.innerHTML = '';
      state.root.HoneyPot.active_services.forEach(s => {
        const div = document.createElement('div');
        div.className = 'noir-card p-4 flex justify-between items-center';
        div.innerHTML = `<div><div class="font-black text-xs uppercase tracking-tight">${s.name}</div><div class="text-[9px] opacity-40 uppercase tracking-widest font-bold">${s.macro} | ${s.category_short}</div></div>`;
        list.appendChild(div);
      });
    }

    function renderFAQ() {
      const list = byId('faq-list');
      list.innerHTML = '';
      (state.root.MiniSiteJson.seo.faq || []).forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'noir-card p-4 space-y-2';
        div.innerHTML = `<input class="noir-input text-xs font-bold" value="${f.q || f.question || ''}" oninput="state.root.MiniSiteJson.seo.faq[${i}].q=this.value;syncDirty()"><textarea class="noir-textarea text-xs" oninput="state.root.MiniSiteJson.seo.faq[${i}].a=this.value;syncDirty()">${f.a || f.answer || ''}</textarea>`;
        list.appendChild(div);
      });
    }

    // TABS LOGIC
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(x => x.classList.add('hidden'));
        b.classList.add('active');
        document.querySelector(`[data-panel="${b.dataset.tab}"]`).classList.remove('hidden');
      });
    });

    document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', () => { syncDirty(); haptic(); }));

    async function handlePublish() {
      tg.MainButton.showProgress();
      try {
        await call({ _auth: tg.initData, action: 'PUBLISH_MINISITE', ...state.root });
        state.originalHash = JSON.stringify(state.root.MiniSiteJson);
        syncDirty();
        tg.showAlert("Sito aggiornato!");
      } catch (e) { tg.showAlert(e.message); }
      finally { tg.MainButton.hideProgress(); }
    }

    tg.MainButton.onClick(handlePublish);

    // START FLASH
    (async () => {
      try {
        const res = await dataFetch;
        state.root = ensureShape(res);
        state.originalHash = JSON.stringify(state.root.MiniSiteJson);
        populateForm();
        byId('loading').classList.add('hidden');
        byId('app').classList.remove('hidden');
        tg.expand();
      } catch (e) { tg.showAlert("Errore Init: " + e.message); }
    })();
  </script>
</body>
</html>
