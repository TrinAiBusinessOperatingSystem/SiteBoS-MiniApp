<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteBoS MiniSite Editor</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #000000;
      --line: #eeeeee;
      --radius-card: 2.5rem;
      --radius-input: 1.4rem;
      --shadow-card: 0 18px 40px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; margin:0; padding:0; }

    .noir-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-card); box-shadow: var(--shadow-card); }
    
    .noir-input, .noir-textarea, .noir-select {
      width: 100%; border: 2px solid var(--line); border-radius: var(--radius-input);
      background: #f9fafb; padding: 1rem 1.1rem; transition: all .2s ease;
    }
    .noir-input:focus, .noir-textarea:focus {
      outline: none; background: #fff; border-color: #000; box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
    }

    .label-k { display: block; margin-bottom: .6rem; font-size: 9px; font-weight: 900; letter-spacing: 0.25em; text-transform: uppercase; color: #6b7280; }
    
    .noir-btn {
      min-height: 48px; border-radius: 999px; padding: 0 1.5rem; border: 2px solid #000;
      background: #000; color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: .15em; font-size: .7rem; cursor: pointer;
    }
    .noir-btn.secondary { background: #fff; color: #000; }
    .noir-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .tab-btn { border: none; background: transparent; padding: 1rem 1.2rem; font-weight: 900; font-size: .7rem; text-transform: uppercase; letter-spacing: .15em; cursor: pointer; border-bottom: 4px solid transparent; opacity: 0.5; }
    .tab-btn.active { opacity: 1; border-bottom-color: #000; }
    
    .hidden { display: none; }
    .loader { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; animation: spin 1s linear infinite; margin: auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- SICUREZZA BLOCCANTE -->
  <script>
    if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.initData) {
      document.body.innerHTML = `<div style="display:flex;height:100vh;align-items:center;justify-content:center;background:#000;color:#fff;font-weight:900;text-transform:uppercase;letter-spacing:0.2em;text-align:center;padding:20px;">Accesso negato.<br>Apri questa app dentro Telegram.</div>`;
      window.stop();
    }
  </script>

  <div id="loading" class="fixed inset-0 flex items-center justify-center bg-[#fafafa] z-50">
    <div class="text-center">
      <div class="loader mb-4"></div>
      <div class="label-k">Sincronizzazione SiteBoS...</div>
    </div>
  </div>

  <main id="app" class="hidden max-w-[1200px] mx-auto p-4 pb-32">
    <!-- HEADER -->
    <header class="noir-card p-8 mb-6 flex mobile-stack justify-between items-center gap-6">
      <div>
        <div class="label-k">SiteBoS Noir Enterprise</div>
        <h1 id="header-name" class="text-3xl font-black uppercase tracking-tighter">Editor</h1>
        <p id="header-meta" class="text-xs opacity-50 font-medium"></p>
      </div>
      <div class="flex gap-3">
        <button id="preview-btn" class="noir-btn secondary">Preview</button>
        <button id="save-btn" class="noir-btn">Salva</button>
      </div>
    </header>

    <!-- TABS -->
    <nav class="noir-card px-4 mb-6 flex overflow-x-auto no-scrollbar">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="content">Contenuti</button>
      <button class="tab-btn" data-tab="services">Servizi</button>
      <button class="tab-btn" data-tab="faq">FAQ</button>
      <button class="tab-btn" data-tab="raw">Debug</button>
    </nav>

    <!-- PANEL: OVERVIEW -->
    <section data-panel="overview" class="tab-panel">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="noir-card p-6">
          <label class="label-k">Dati Core</label>
          <div class="space-y-4">
            <div><label class="label-k opacity-50">Ragione Sociale</label><input id="ragione-sociale" class="noir-input"></div>
            <div><label class="label-k opacity-50">Partita IVA</label><input id="vat-number" class="noir-input"></div>
            <div><label class="label-k opacity-50">Template Style</label><input id="template-style" class="noir-input"></div>
          </div>
        </div>
        <div class="noir-card p-6">
          <label class="label-k">Social Connect</label>
          <div class="space-y-4">
            <div><label class="label-k opacity-50">LinkedIn</label><input id="social-linkedin" class="noir-input" placeholder="https://..."></div>
            <div><label class="label-k opacity-50">Facebook</label><input id="social-facebook" class="noir-input"></div>
            <div><label class="label-k opacity-50">Instagram</label><input id="social-instagram" class="noir-input"></div>
            <div><label class="label-k opacity-50">Twitter / X</label><input id="social-twitter" class="noir-input"></div>
          </div>
        </div>
      </div>
      <div class="noir-card p-6 mt-6">
        <label class="label-k">Business Context (AI Memory)</label>
        <textarea id="company-context" class="noir-textarea" rows="4"></textarea>
      </div>
    </section>

    <!-- PANEL: CONTENT -->
    <section data-panel="content" class="tab-panel hidden space-y-6">
      <div class="noir-card p-6">
        <label class="label-k">Sezione Hero</label>
        <div class="space-y-4">
          <input id="hero-h1" class="noir-input font-bold" placeholder="Titolo H1">
          <textarea id="hero-sub" class="noir-textarea" rows="3" placeholder="Sottotitolo"></textarea>
        </div>
      </div>
      <div class="noir-card p-6">
        <label class="label-k">Offerta Irresistibile</label>
        <textarea id="offer-text" class="noir-textarea" rows="6"></textarea>
      </div>
    </section>

    <!-- PANEL: SERVICES -->
    <section data-panel="services" class="tab-panel hidden">
      <div class="noir-card p-6">
        <label class="label-k mb-4">Servizi Commerciali (SER/PRO)</label>
        <div id="services-list" class="grid gap-4"></div>
      </div>
    </section>

    <!-- PANEL: FAQ -->
    <section data-panel="faq" class="tab-panel hidden">
      <div class="noir-card p-6">
        <div class="flex justify-between items-center mb-6">
          <label class="label-k">FAQ SEO</label>
          <button id="add-faq" class="noir-btn secondary scale-75">Aggiungi</button>
        </div>
        <div id="faq-list" class="space-y-4"></div>
      </div>
    </section>

    <!-- PANEL: DEBUG -->
    <section data-panel="raw" class="tab-panel hidden">
      <div class="noir-card p-6">
        <label class="label-k">JSON Outbound</label>
        <textarea id="raw-preview" class="noir-textarea font-mono text-[10px]" rows="25" readonly></textarea>
      </div>
    </section>
  </main>

  <script>
    const tg = window.Telegram.WebApp;
    const WEBHOOK_URL = 'https://prod.workflow.trinai.it/webhook/50891655-84c8-4213-90e8-26ebbc3d6c4c';

    const state = {
      root: {},
      originalHash: '',
      dirty: false
    };

    function byId(id) { return document.getElementById(id); }
    function haptic() { try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} }

    // NORMALIZZAZIONE DATI
    function ensureShape(data) {
      if (!data) return {};
      const r = data;
      r.ownerdata = r.ownerdata || r.owner_data || {};
      r.ownerbot = r.ownerbot || r.owner_bot || {};
      r.HoneyPot = r.HoneyPot || {};
      r.MiniSiteJson = r.MiniSiteJson || {};
      
      // Social Link Mapping
      r.ownerdata.linkedin = r.ownerdata.linkedin || "";
      r.ownerdata.facebook = r.ownerdata.facebook || "";
      r.ownerdata.instagram = r.ownerdata.instagram || "";
      r.ownerdata.twitter = r.ownerdata.twitter || "";

      r.MiniSiteJson.seo = r.MiniSiteJson.seo || { faq: [] };
      r.MiniSiteJson.hero = r.MiniSiteJson.hero || {};
      r.HoneyPot.active_services = r.HoneyPot.active_services || [];
      return r;
    }

    function populateForm() {
      const r = state.root;
      byId('header-name').textContent = r.ownerdata.ragione_sociale || 'MiniSite Editor';
      byId('header-meta').textContent = `VAT: ${r.ownerdata.vat_number || '---'} | Template: ${r.template || 'classic'}`;
      
      byId('ragione-sociale').value = r.ownerdata.ragione_sociale || '';
      byId('vat-number').value = r.ownerdata.vat_number || '';
      byId('template-style').value = r.template || '';
      
      byId('social-linkedin').value = r.ownerdata.linkedin || '';
      byId('social-facebook').value = r.ownerdata.facebook || '';
      byId('social-instagram').value = r.ownerdata.instagram || '';
      byId('social-twitter').value = r.ownerdata.twitter || '';

      byId('company-context').value = r.HoneyPot.company_context_string || '';
      byId('hero-h1').value = r.MiniSiteJson.hero.h1 || '';
      byId('hero-sub').value = r.MiniSiteJson.hero.sub || '';
      byId('offer-text').value = r.HoneyPot.offer_text || '';

      renderServices();
      renderFAQ();
      syncDirty();
    }

    function syncDirty() {
      const r = state.root;
      r.ownerdata.ragione_sociale = byId('ragione-sociale').value;
      r.ownerdata.vat_number = byId('vat-number').value;
      r.template = byId('template-style').value;
      
      r.ownerdata.linkedin = byId('social-linkedin').value;
      r.ownerdata.facebook = byId('social-facebook').value;
      r.ownerdata.instagram = byId('social-instagram').value;
      r.ownerdata.twitter = byId('social-twitter').value;

      r.HoneyPot.company_context_string = byId('company-context').value;
      r.MiniSiteJson.hero.h1 = byId('hero-h1').value;
      r.MiniSiteJson.hero.sub = byId('hero-sub').value;
      r.HoneyPot.offer_text = byId('offer-text').value;

      const currentHash = JSON.stringify(r);
      state.dirty = currentHash !== state.originalHash;
      
      byId('save-btn').disabled = !state.dirty;
      byId('raw-preview').value = JSON.stringify(r, null, 2);

      if (state.dirty) {
        tg.MainButton.setText("PUBBLICA MODIFICHE");
        tg.MainButton.show();
        tg.MainButton.enable();
      } else {
        tg.MainButton.hide();
      }
    }

    function renderServices() {
      const list = byId('services-list');
      list.innerHTML = '';
      if (state.root.HoneyPot.active_services.length === 0) {
        list.innerHTML = '<div class="text-xs opacity-40">Nessun servizio commerciale attivo (SER/PRO + blueprint_ready).</div>';
        return;
      }
      state.root.HoneyPot.active_services.forEach(s => {
        const div = document.createElement('div');
        div.className = 'noir-card p-4 flex justify-between items-center';
        div.innerHTML = `
          <div><div class="font-bold text-[11px] uppercase">${s.short_name || s.name}</div><div class="text-[9px] opacity-40 uppercase tracking-widest">${s.macro} | ${s.category_short}</div></div>
          <div class="bg-green-50 text-green-600 text-[8px] px-2 py-1 rounded-full font-black uppercase">Active</div>
        `;
        list.appendChild(div);
      });
    }

    function renderFAQ() {
      const list = byId('faq-list');
      list.innerHTML = '';
      (state.root.MiniSiteJson.seo.faq || []).forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'noir-card p-4 space-y-2';
        div.innerHTML = `
          <input class="noir-input text-xs font-bold" value="${f.q || f.question || ''}" oninput="state.root.MiniSiteJson.seo.faq[${i}].q=this.value;syncDirty()">
          <textarea class="noir-textarea text-xs" oninput="state.root.MiniSiteJson.seo.faq[${i}].a=this.value;syncDirty()">${f.a || f.answer || ''}</textarea>
        `;
        list.appendChild(div);
      });
    }

    async function init() {
      tg.ready();
      tg.expand();
      tg.MainButton.onClick(handlePublish);

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ _auth: tg.initData, action: 'GET_MINISITE_DATA' })
        });
        
        if (!res.ok) throw new Error("n8n ha risposto con errore " + res.status);
        
        const data = await res.json();
        state.root = ensureShape(data);
        state.originalHash = JSON.stringify(state.root);
        
        populateForm();
        byId('loading').classList.add('hidden');
        byId('app').classList.remove('hidden');
        haptic();
      } catch (e) {
        byId('loading').innerHTML = `<div class="p-8 text-center"><div class="text-red-600 font-black mb-2">ERRORE DI CARICAMENTO</div><div class="text-xs opacity-50">${e.message}</div></div>`;
        tg.showAlert("Errore critico: " + e.message);
      }
    }

    async function handlePublish() {
      tg.MainButton.showProgress();
      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ _auth: tg.initData, action: 'PUBLISH_MINISITE', ...state.root })
        });
        if (!res.ok) throw new Error("Errore durante la pubblicazione");
        state.originalHash = JSON.stringify(state.root);
        syncDirty();
        tg.showAlert("MiniSite pubblicato con successo!");
      } catch (e) {
        tg.showAlert("Errore: " + e.message);
      } finally {
        tg.MainButton.hideProgress();
      }
    }

    // TABS LOGIC
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(x => x.classList.add('hidden'));
        b.classList.add('active');
        document.querySelector(`[data-panel="${b.dataset.tab}"]`).classList.remove('hidden');
        haptic();
      });
    });

    document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', () => { syncDirty(); haptic(); }));

    window.onload = init;
  </script>
</body>
</html>
