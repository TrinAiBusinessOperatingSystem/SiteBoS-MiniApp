<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blog Editor | SiteBoS Enterprise</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        bg: '#fafafa',
                        border: '#eeeeee'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Spinner Noir */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Input Styles */
        input, textarea { outline: none !important; }
        .editable-field:focus { border-color: #000 !important; background-color: #fff !important; }
    </style>

    <script>
        // ── SICUREZZA: IL BUTTAFUORI ──
        (function() {
            const isTelegram = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "";
            if (!isTelegram) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div>
                            <h1 class="text-6xl mb-4 text-white">🚫</h1>
                            <h2 class="text-xl font-bold uppercase tracking-widest text-white">Accesso Negato</h2>
                            <p class="opacity-40 text-sm mt-4 leading-relaxed">Questo modulo è accessibile solo tramite link certificato SiteBoS.</p>
                        </div>
                    </body>`;
                window.stop();
                throw new Error("Unauthorized Access");
            }
        })();
    </script>
</head>
<body class="bg-bg text-black min-h-screen flex flex-col items-center p-6 pb-32">

    <div class="w-full max-w-xl flex flex-col space-y-8 fade-in">
        
        <!-- HEADER -->
        <header class="flex justify-between items-end border-b-2 border-black pb-4">
            <div class="space-y-1">
                <div id="typeBadge" class="inline-block px-2 py-1 bg-black text-white text-[7px] font-black uppercase tracking-[0.2em] rounded">BLOG EDITOR</div>
                <h1 class="text-3xl font-black tracking-tighter uppercase leading-none">Modifica Post</h1>
            </div>
            <div id="loader" class="spinner hidden"></div>
        </header>

        <!-- SEZIONE: COPERTINA -->
        <section class="space-y-4">
            <div class="flex items-center space-x-2 text-[10px] font-black uppercase tracking-widest text-neutral-400">
                <i class="fas fa-image"></i> <span>Immagine di Copertina</span>
            </div>
            <div class="relative group w-full aspect-video bg-white rounded-[2rem] overflow-hidden border border-gray-100 shadow-sm flex items-center justify-center cursor-pointer active:scale-[0.98] transition-transform" onclick="document.getElementById('fileInput').click()">
                <img id="featuredImage" src="" class="hidden w-full h-full object-cover">
                <div id="imagePlaceholder" class="flex flex-col items-center space-y-2 text-neutral-300">
                    <i class="fas fa-arrow-up-from-bracket text-2xl"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">Carica Foto Custom</span>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewFile(event)">
        </section>

        <!-- SEZIONE: SEO & HERO -->
        <section class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-widest text-neutral-400">Titolo Principale (H1)</label>
                <input type="text" id="editTitle" class="w-full bg-white border border-gray-100 rounded-2xl p-5 font-bold text-lg editable-field transition-all shadow-sm" placeholder="Inserisci titolo...">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-widest text-neutral-400">Meta Description (SEO)</label>
                <textarea id="editMeta" class="w-full bg-white border border-gray-100 rounded-2xl p-5 text-xs text-neutral-500 min-h-[100px] editable-field transition-all shadow-sm leading-relaxed" placeholder="Descrizione per Google..."></textarea>
            </div>
        </section>

        <!-- SEZIONI DINAMICHE DELL'ARTICOLO -->
        <div id="dynamicSections" class="space-y-10 pt-4">
            <!-- Popolato via JavaScript -->
        </div>

    </div>

    <!-- ACTION BAR FISSA -->
    <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-bg via-bg to-transparent z-50">
        <div class="max-w-md mx-auto flex gap-4">
            <button onclick="saveBlog()" class="flex-1 bg-white border border-gray-200 text-black py-6 rounded-[2rem] font-black text-[10px] uppercase tracking-widest active:scale-95 transition shadow-sm">
                <i class="fas fa-save mr-2"></i> Salva
            </button>
            <button onclick="publishBlog()" class="flex-[1.5] bg-black text-white py-6 rounded-[2rem] font-black text-[10px] uppercase tracking-widest shadow-2xl active:scale-95 transition">
                <i class="fas fa-rocket mr-2"></i> Pubblica Live
            </button>
        </div>
    </div>

    <script>
        'use strict';

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/914bd78e-8a41-46d7-8935-7eb73cbbae66";
        const urlParams = new URLSearchParams(window.location.search);
        
        const blogId = urlParams.get('blog_id');
        const vatNumber = urlParams.get('vat');
        const ownerId = urlParams.get('owner');

        let currentData = null;
        let base64Image = null;

        // ── CARICAMENTO DATI ──
        async function loadData() {
            if (!blogId) {
                tg.showAlert("ID blog mancante.");
                return;
            }

            toggleLoader(true);
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'get_blog',
                        blog_id: blogId,
                        vat_number: vatNumber,
                        chat_id: ownerId
                    })
                });

                const res = await response.json();
                if (res.status === 'success') {
                    currentData = res.blog_content_structure;
                    renderEditor();
                } else {
                    throw new Error(res.message);
                }
            } catch (err) {
                tg.showAlert("Errore durante il recupero dei dati.");
            } finally {
                toggleLoader(false);
            }
        }

        // ── RENDERING UI ──
        function renderEditor() {
            // Immagine Copertina
            const imgUrl = `https://cdn.jsdelivr.net/gh/TrinAiBusinessOperatingSystem/SiteBoS-MiniApp/images/${vatNumber}/${blogId}.jpg`;
            const imgElement = document.getElementById('featuredImage');
            const placeholder = document.getElementById('imagePlaceholder');
            
            imgElement.src = imgUrl + "?t=" + Date.now();
            imgElement.onload = () => {
                imgElement.classList.remove('hidden');
                placeholder.classList.add('hidden');
            };

            // Titoli & Meta
            document.getElementById('editTitle').value = currentData.seo.meta_title || "";
            document.getElementById('editMeta').value = currentData.seo.meta_description || "";

            // Sezioni Contenuto
            const container = document.getElementById('dynamicSections');
            container.innerHTML = '';

            const sections = [
                { key: 'problem', label: '01. Analisi del Problema', icon: 'fa-triangle-exclamation' },
                { key: 'solution', label: '02. La Nostra Soluzione', icon: 'fa-lightbulb' },
                { key: 'authority', label: '03. Perché Noi (Autorità)', icon: 'fa-shield-halved' },
                { key: 'cta_final', label: '04. Chiamata all\'Azione', icon: 'fa-bullseye' }
            ];

            sections.forEach(s => {
                if (!currentData[s.key]) return;
                
                const sectionHtml = `
                    <div class="space-y-4 fade-in">
                        <div class="flex items-center space-x-2 text-[10px] font-black uppercase tracking-widest text-neutral-400">
                            <i class="fas ${s.icon}"></i> <span>${s.label}</span>
                        </div>
                        <div class="space-y-3">
                            <input type="text" class="w-full bg-transparent border-b-2 border-neutral-100 py-2 font-black text-sm editable-field transition-all" 
                                   data-sec="${s.key}" data-field="title" value="${currentData[s.key].title || ''}">
                            <textarea class="w-full bg-white border border-gray-100 rounded-[1.5rem] p-6 text-xs font-medium leading-relaxed min-h-[150px] editable-field shadow-sm" 
                                      data-sec="${s.key}" data-field="paragraphs">${(currentData[s.key].paragraphs || []).join('\n\n')}</textarea>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', sectionHtml);
            });
        }

        // ── GESTIONE IMMAGINE ──
        function previewFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                tg.showAlert("Immagine troppo pesante (Max 5MB)");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result.split(',')[1];
                const img = document.getElementById('featuredImage');
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById('imagePlaceholder').classList.add('hidden');
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            };
            reader.readAsDataURL(file);
        }

        // ── SINCRONIZZAZIONE DATI ──
        function syncData() {
            currentData.seo.meta_title = document.getElementById('editTitle').value;
            currentData.seo.meta_description = document.getElementById('editMeta').value;

            document.querySelectorAll('[data-sec]').forEach(el => {
                const sec = el.dataset.sec;
                const field = el.dataset.field;
                if (field === 'paragraphs') {
                    currentData[sec][field] = el.value.split('\n\n').filter(p => p.trim() !== "");
                } else {
                    currentData[sec][field] = el.value;
                }
            });
        }

        // ── INVIO WEBHOOK ──
        async function sendUpdate(action) {
            syncData();
            toggleLoader(true);

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        _auth: tg.initData,
                        action: action,
                        blog_id: blogId,
                        vat_number: vatNumber,
                        chat_id: ownerId,
                        updated_content: currentData,
                        new_image_base64: base64Image
                    })
                });

                if (response.ok) {
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert(action === 'publish_blog' ? "Articolo pubblicato con successo!" : "Bozza salvata.");
                    if (action === 'publish_blog') setTimeout(() => tg.close(), 1000);
                } else {
                    throw new Error();
                }
            } catch (err) {
                tg.showAlert("Errore durante l'operazione.");
            } finally {
                toggleLoader(false);
            }
        }

        function saveBlog() { sendUpdate('save_blog'); }
        function publishBlog() { 
            tg.showConfirm("Confermi la pubblicazione live dell'articolo?", (ok) => {
                if(ok) sendUpdate('publish_blog');
            });
        }

        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }

        window.onload = loadData;
    </script>
</body>
</html>
