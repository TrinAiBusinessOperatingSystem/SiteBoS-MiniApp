<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Enterprise Architect Editor | SiteBoS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee', danger: '#ef4444' } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #fafafa; color: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spinner { border: 2px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, textarea { outline: none !important; }
        .editable-field:focus { border-color: #000 !important; background-color: #fff !important; }
        .section-card { background: white; border: 1px solid #eeeeee; border-radius: 2rem; padding: 1.5rem; }
        .label-micro { font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #a3a3a3; margin-left: 0.5rem; margin-bottom: 0.2rem; display: block; }
        .table-input { font-size: 10px; padding: 8px; border-radius: 10px; border: 1px solid #f0f0f0; background: #fafafa; width: 100%; font-weight: 600; }
        .btn-action { font-size: 9px; font-weight: 900; letter-spacing: 0.05em; padding: 1rem 0.5rem; border-radius: 1.5rem; transition: all 0.2s; }
    </style>
    <script>
        (function() {
            const isTelegram = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "";
            if (!isTelegram) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase tracking-widest">Accesso Negato</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="p-4 pb-40">

    <div class="w-full max-w-xl mx-auto space-y-8 fade-in">
        
        <!-- HEADER -->
        <header class="flex justify-between items-center py-4 border-b border-black">
            <h1 class="text-xl font-black tracking-tighter uppercase">Content Architect</h1>
            <div id="loader" class="spinner hidden"></div>
        </header>

        <!-- IMAGE -->
        <section class="space-y-2">
            <span class="label-micro">Copertina</span>
            <div id="imageBtn" class="relative group w-full aspect-video bg-white rounded-[2rem] overflow-hidden border border-neutral-100 flex items-center justify-center cursor-pointer" onclick="document.getElementById('fileInput').click()">
                <img id="featuredImage" src="" class="hidden w-full h-full object-cover">
                <div id="imagePlaceholder" class="flex flex-col items-center space-y-1 text-neutral-300">
                    <i class="fas fa-camera text-2xl"></i>
                    <span class="text-[8px] font-black uppercase">Cambia</span>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewFile(event)">
        </section>

        <!-- SEO -->
        <section class="section-card bg-neutral-50 !border-dashed !p-4 space-y-3">
            <span class="label-micro">SEO Configuration</span>
            <input type="text" id="seo_meta_title" class="w-full bg-white border border-neutral-100 rounded-xl p-3 text-xs font-bold" placeholder="Meta Title">
            <textarea id="seo_meta_description" class="w-full bg-white border border-neutral-100 rounded-xl p-3 text-[10px]" rows="2" placeholder="Meta Description"></textarea>
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="seo_keywords" class="w-full bg-white border border-neutral-100 rounded-xl p-3 text-[9px]" placeholder="Keywords">
                <input type="text" id="seo_slug" class="w-full bg-white border border-neutral-100 rounded-xl p-3 text-[9px]" placeholder="URL Slug">
            </div>
        </section>

        <!-- HERO -->
        <section class="section-card space-y-3">
            <span class="label-micro">Hero Area</span>
            <input type="text" id="hero_title" class="w-full text-lg font-black border-b border-neutral-50 py-1" placeholder="Titolo H1">
            <textarea id="hero_subtitle" class="w-full text-xs font-medium text-neutral-500" rows="2" placeholder="Sottotitolo"></textarea>
            <input type="text" id="hero_risk_reversal" class="w-full bg-neutral-50 rounded-xl p-3 text-[9px]" placeholder="Risk Reversal">
        </section>

        <!-- DYNAMIC CONTENT -->
        <div id="mainContent" class="space-y-8"></div>

    </div>

    <!-- ACTION BAR -->
    <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-bg via-bg to-transparent z-50">
        <div class="max-w-md mx-auto grid grid-cols-3 gap-2">
            <button onclick="deleteBlog()" class="btn-action bg-white border border-danger text-danger active:bg-danger active:text-white uppercase">Elimina</button>
            <button onclick="sendUpdate('save_blog')" class="btn-action bg-white border border-black text-black active:bg-neutral-100 uppercase">Salva</button>
            <button onclick="confirmPublish()" class="btn-action bg-black text-white active:scale-95 shadow-xl uppercase">Pubblica</button>
        </div>
    </div>

    <script>
        'use strict';
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/914bd78e-8a41-46d7-8935-7eb73cbbae66";
        const blogId = window.location.search.substring(1); 
        
        let currentData = null;
        let base64Image = null;

        async function loadData() {
            if (!blogId) return;
            toggleLoader(true);
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'get_blog', blog_id: blogId })
                });
                const res = await response.json();
                if (res.status === 'success') {
                    currentData = res.blog_content_structure;
                    renderEditor(res.image_url);
                }
            } catch (err) { tg.showAlert("Errore caricamento."); }
            finally { toggleLoader(false); }
        }

        function renderEditor(imageUrl) {
            if (imageUrl) {
                const img = document.getElementById('featuredImage');
                img.src = imageUrl + "?t=" + Date.now();
                img.classList.remove('hidden');
                document.getElementById('imagePlaceholder').classList.add('hidden');
            }

            document.getElementById('seo_meta_title').value = currentData.seo.meta_title;
            document.getElementById('seo_meta_description').value = currentData.seo.meta_description;
            document.getElementById('seo_keywords').value = currentData.seo.keywords;
            document.getElementById('seo_slug').value = currentData.seo.slug;
            document.getElementById('hero_title').value = currentData.hero.title;
            document.getElementById('hero_subtitle').value = currentData.hero.subtitle;
            document.getElementById('hero_risk_reversal').value = currentData.hero.risk_reversal;

            const container = document.getElementById('mainContent');
            container.innerHTML = '';

            // Sezioni standard
            container.insertAdjacentHTML('beforeend', renderTextSection('problem', '01. Problema', 'fa-triangle-exclamation', true));
            container.insertAdjacentHTML('beforeend', renderSolutionSection());
            container.insertAdjacentHTML('beforeend', renderTextSection('authority', '03. Autorità', 'fa-award'));
            container.insertAdjacentHTML('beforeend', renderComparisonSection());
            container.insertAdjacentHTML('beforeend', renderCTASection());
            container.insertAdjacentHTML('beforeend', renderFAQSection());
        }

        function renderTextSection(key, label, icon, hasQuote = false) {
            const data = currentData[key];
            return `<div class="section-card space-y-3">
                <span class="label-micro"><i class="fas ${icon}"></i> ${label}</span>
                <input type="text" class="w-full font-black text-sm border-b border-neutral-50 py-1" data-sec="${key}" data-field="title" value="${data.title}">
                ${hasQuote && data.quote ? `<input type="text" class="w-full italic text-[10px] bg-neutral-50 p-2 rounded-lg" data-sec="${key}" data-field="quote" value="${data.quote}">` : ''}
                <textarea class="w-full text-xs bg-neutral-50 rounded-2xl p-4 min-h-[120px]" data-sec="${key}" data-field="paragraphs">${data.paragraphs.join('\n\n')}</textarea>
            </div>`;
        }

        function renderSolutionSection() {
            const sol = currentData.solution;
            return `<div class="section-card space-y-3 border-l-4 border-black">
                <span class="label-micro text-black"><i class="fas fa-lightbulb"></i> 02. Soluzione</span>
                <input type="text" class="w-full font-black text-sm border-b border-neutral-50 py-1" data-sec="solution" data-field="title" value="${sol.title}">
                <textarea class="w-full text-xs bg-neutral-50 rounded-2xl p-4 min-h-[100px]" data-sec="solution" data-field="paragraphs">${sol.paragraphs.join('\n\n')}</textarea>
                <div class="p-3 bg-neutral-900 rounded-2xl text-white space-y-2">
                    <span class="label-micro !text-neutral-500">Stack Tecnologico</span>
                    <input type="text" class="w-full bg-transparent border-b border-neutral-800 text-[11px] font-bold" id="sol_sub_title" value="${sol.subsection.title}">
                    <textarea class="w-full bg-transparent text-[9px] text-neutral-400" id="sol_sub_paragraphs" rows="3">${sol.subsection.paragraphs.join('\n\n')}</textarea>
                </div>
            </div>`;
        }

        function renderComparisonSection() {
            const comp = currentData.comparison;
            return `<div class="section-card space-y-3">
                <span class="label-micro"><i class="fas fa-balance-scale"></i> 04. Confronto</span>
                <input type="text" class="w-full font-black text-sm border-b border-neutral-50 py-1" data-sec="comparison" data-field="title" value="${comp.title}">
                <div id="tableGrid" class="space-y-1">${parseTable(comp.table_html)}</div>
            </div>`;
        }

        function renderCTASection() {
            const cta = currentData.cta_final;
            return `<div class="section-card bg-black text-white space-y-3">
                <span class="label-micro !text-neutral-500">05. Chiusura</span>
                <input type="text" class="w-full bg-transparent border-b border-neutral-800 text-sm font-black" data-sec="cta_final" data-field="title" value="${cta.title}">
                <textarea class="w-full bg-transparent text-[10px] text-neutral-300" data-sec="cta_final" data-field="paragraphs" rows="2">${cta.paragraphs.join('\n\n')}</textarea>
                <input type="text" class="w-full bg-neutral-900 rounded-lg p-2 text-[9px]" data-sec="cta_final" data-field="button_text" value="${cta.button_text}">
            </div>`;
        }

        function renderFAQSection() {
            let html = `<div class="section-card space-y-3"><span class="label-micro">FAQ</span>`;
            currentData.faq.forEach((f, i) => {
                html += `<div class="pb-2 border-b border-neutral-50">
                    <input type="text" class="w-full font-bold text-[10px] mb-1" id="faq_q_${i}" value="${f.question}">
                    <textarea class="w-full text-[9px] text-neutral-500" id="faq_a_${i}" rows="1">${f.answer}</textarea>
                </div>`;
            });
            return html + `</div>`;
        }

        function parseTable(html) {
            const div = document.createElement('div'); div.innerHTML = html;
            const rows = div.querySelectorAll('tbody tr');
            let out = '';
            for (let i = 0; i < 5; i++) {
                const tds = rows[i] ? rows[i].querySelectorAll('td') : [];
                out += `<div class="grid grid-cols-3 gap-1 table-row">
                    <input type="text" class="table-input" value="${tds[0]?.innerText || ''}">
                    <input type="text" class="table-input" value="${tds[1]?.innerText || ''}">
                    <input type="text" class="table-input border-black" value="${tds[2]?.innerText || ''}">
                </div>`;
            }
            return out;
        }

        function syncData() {
            currentData.seo = {
                ...currentData.seo,
                meta_title: document.getElementById('seo_meta_title').value,
                meta_description: document.getElementById('seo_meta_description').value,
                keywords: document.getElementById('seo_keywords').value,
                slug: document.getElementById('seo_slug').value
            };
            currentData.hero.title = document.getElementById('hero_title').value;
            currentData.hero.subtitle = document.getElementById('hero_subtitle').value;
            currentData.hero.risk_reversal = document.getElementById('hero_risk_reversal').value;

            document.querySelectorAll('[data-sec]').forEach(el => {
                const { sec, field } = el.dataset;
                if (field === 'paragraphs') currentData[sec][field] = el.value.split('\n\n').filter(p => p.trim());
                else currentData[sec][field] = el.value;
            });

            currentData.solution.subsection.title = document.getElementById('sol_sub_title').value;
            currentData.solution.subsection.paragraphs = document.getElementById('sol_sub_paragraphs').value.split('\n\n').filter(p => p.trim());

            let tbody = '';
            document.querySelectorAll('.table-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0].value.trim()) tbody += `<tr><td>${inputs[0].value}</td><td>${inputs[1].value}</td><td>${inputs[2].value}</td></tr>`;
            });
            currentData.comparison.table_html = `<table><thead><tr><th>Funzionalità</th><th>Tradizionale</th><th>SiteBoS</th></tr></thead><tbody>${tbody}</tbody></table>`;

            currentData.faq = currentData.faq.map((f, i) => ({
                question: document.getElementById(`faq_q_${i}`).value,
                answer: document.getElementById(`faq_a_${i}`).value
            }));
        }

        async function sendUpdate(action) {
            if (action !== 'delete_blog') syncData();
            toggleLoader(true);
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        _auth: tg.initData,
                        action: action,
                        blog_id: blogId,
                        updated_content: currentData,
                        new_image_base64: base64Image
                    })
                });
                if (response.ok) {
                    tg.showAlert(action === 'delete_blog' ? "ARCHITETTURA ELIMINATA." : "SISTEMA AGGIORNATO.");
                    if (action === 'publish_blog' || action === 'delete_blog') setTimeout(() => tg.close(), 1000);
                }
            } catch (err) { tg.showAlert("Errore server."); }
            finally { toggleLoader(false); }
        }

        // DOPPIA CONFERMA ELIMINAZIONE
        function deleteBlog() {
            tg.showConfirm("Sei sicuro di voler ELIMINARE questa pagina? L'azione è irreversibile.", (ok1) => {
                if (ok1) {
                    setTimeout(() => {
                        tg.showConfirm("ULTIMA CONFERMA: Cancellare definitivamente tutti i dati dell'architettura?", (ok2) => {
                            if (ok2) sendUpdate('delete_blog');
                        });
                    }, 500);
                }
            });
        }

        function confirmPublish() {
            tg.showConfirm("Pubblicare live sui server CDN?", (ok) => { if(ok) sendUpdate('publish_blog'); });
        }

        function previewFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                base64Image = ev.target.result.split(',')[1];
                document.getElementById('featuredImage').src = ev.target.result;
                document.getElementById('featuredImage').classList.remove('hidden');
                document.getElementById('imagePlaceholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function toggleLoader(show) { document.getElementById('loader').classList.toggle('hidden', !show); }
        window.onload = loadData;
    </script>
</body>
</html>
