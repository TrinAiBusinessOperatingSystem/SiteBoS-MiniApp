<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Enterprise Architect Editor | SiteBoS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #fafafa; color: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, textarea { outline: none !important; }
        .editable-field:focus { border-color: #000 !important; background-color: #fff !important; }
        .section-card { background: white; border: 1px solid #eeeeee; border-radius: 2.5rem; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .label-micro { font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #a3a3a3; margin-left: 0.5rem; margin-bottom: 0.2rem; display: block; }
        .table-input { font-size: 11px; padding: 10px; border-radius: 12px; border: 1px solid #f0f0f0; background: #fafafa; width: 100%; font-weight: 600; }
    </style>
    <script>
        (function() {
            const isTelegram = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "";
            if (!isTelegram) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase tracking-widest">Accesso Negato</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="p-4 pb-40">

    <div class="w-full max-w-2xl mx-auto space-y-10 fade-in">
        
        <!-- HEADER -->
        <header class="flex justify-between items-center py-6 px-2 border-b-2 border-black">
            <div class="space-y-1">
                <div class="inline-block px-2 py-1 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded">Enterprise Editor v2.0</div>
                <h1 class="text-3xl font-black tracking-tighter uppercase leading-none">Content Architect</h1>
            </div>
            <div id="loader" class="spinner hidden"></div>
        </header>

        <!-- IMAGINE -->
        <section class="space-y-3">
            <span class="label-micro"><i class="fas fa-image"></i> Media Asset</span>
            <div id="imageBtn" class="relative group w-full aspect-video bg-white rounded-[3rem] overflow-hidden border-2 border-dashed border-neutral-200 flex items-center justify-center cursor-pointer active:scale-[0.98] transition-all" onclick="document.getElementById('fileInput').click()">
                <img id="featuredImage" src="" class="hidden w-full h-full object-cover">
                <div id="imagePlaceholder" class="flex flex-col items-center space-y-2 text-neutral-300">
                    <i class="fas fa-camera text-4xl"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Sostituisci Immagine</span>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewFile(event)">
        </section>

        <!-- SEO SETTINGS (Collapsible) -->
        <section class="section-card bg-neutral-50 !border-dashed">
            <div class="flex items-center justify-between mb-4">
                <span class="label-micro !text-black"><i class="fas fa-globe"></i> SEO & Meta Config</span>
            </div>
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <span class="label-micro">Meta Title</span>
                    <input type="text" id="seo_meta_title" class="w-full bg-white border border-neutral-200 rounded-xl p-3 text-xs font-bold editable-field">
                </div>
                <div>
                    <span class="label-micro">Meta Description</span>
                    <textarea id="seo_meta_description" class="w-full bg-white border border-neutral-200 rounded-xl p-3 text-xs editable-field" rows="2"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <span class="label-micro">Keywords</span>
                        <input type="text" id="seo_keywords" class="w-full bg-white border border-neutral-200 rounded-xl p-3 text-[10px] editable-field">
                    </div>
                    <div>
                        <span class="label-micro">Slug URL</span>
                        <input type="text" id="seo_slug" class="w-full bg-white border border-neutral-200 rounded-xl p-3 text-[10px] editable-field">
                    </div>
                </div>
            </div>
        </section>

        <!-- HERO -->
        <section class="section-card space-y-4">
            <span class="label-micro"><i class="fas fa-star"></i> Hero Section</span>
            <input type="text" id="hero_title" class="w-full text-2xl font-black tracking-tighter border-b-2 border-neutral-100 py-2 editable-field" placeholder="H1 Title">
            <textarea id="hero_subtitle" class="w-full text-sm font-medium text-neutral-500 leading-relaxed editable-field" rows="3" placeholder="Hero Subtitle"></textarea>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <span class="label-micro">CTA Text</span>
                    <input type="text" id="hero_cta_text" class="w-full bg-neutral-50 rounded-xl p-3 text-xs font-bold">
                </div>
                <div>
                    <span class="label-micro">Risk Reversal</span>
                    <input type="text" id="hero_risk_reversal" class="w-full bg-neutral-50 rounded-xl p-3 text-xs">
                </div>
            </div>
        </section>

        <!-- DINAMIC CONTENT AREA -->
        <div id="mainContent" class="space-y-10">
            <!-- Problem, Solution, Authority, Comparison, CTA Final, FAQ, Related -->
        </div>

    </div>

    <!-- ACTION BAR -->
    <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-bg via-bg to-transparent z-50">
        <div class="max-w-md mx-auto flex gap-4">
            <button onclick="sendUpdate('save_blog')" class="flex-1 bg-white border-2 border-black text-black py-6 rounded-[2.5rem] font-black text-[11px] uppercase tracking-widest active:scale-95 transition">Salva Bozza</button>
            <button onclick="confirmPublish()" class="flex-[1.5] bg-black text-white py-6 rounded-[2.5rem] font-black text-[11px] uppercase tracking-widest shadow-2xl active:scale-95 transition">Pubblica Live</button>
        </div>
    </div>

    <script>
        'use strict';
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/914bd78e-8a41-46d7-8935-7eb73cbbae66";
        const blogId = window.location.search.substring(1); 
        
        let currentData = null;
        let base64Image = null;

        async function loadData() {
            if (!blogId) { tg.showAlert("ID mancante."); return; }
            toggleLoader(true);
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'get_blog', blog_id: blogId })
                });
                const res = await response.json();
                if (res.status === 'success') {
                    currentData = res.blog_content_structure;
                    renderEditor(res.image_url);
                }
            } catch (err) { tg.showAlert("Errore server."); }
            finally { toggleLoader(false); }
        }

        function renderEditor(imageUrl) {
            if (imageUrl) {
                const img = document.getElementById('featuredImage');
                img.src = imageUrl + "?t=" + Date.now();
                img.classList.remove('hidden');
                document.getElementById('imagePlaceholder').classList.add('hidden');
            }

            // SEO MAPPING
            const seo = currentData.seo;
            document.getElementById('seo_meta_title').value = seo.meta_title;
            document.getElementById('seo_meta_description').value = seo.meta_description;
            document.getElementById('seo_keywords').value = seo.keywords;
            document.getElementById('seo_slug').value = seo.slug;

            // HERO MAPPING
            document.getElementById('hero_title').value = currentData.hero.title;
            document.getElementById('hero_subtitle').value = currentData.hero.subtitle;
            document.getElementById('hero_cta_text').value = currentData.hero.cta_text;
            document.getElementById('hero_risk_reversal').value = currentData.hero.risk_reversal;

            const container = document.getElementById('mainContent');
            container.innerHTML = '';

            // 1. PROBLEM
            container.insertAdjacentHTML('beforeend', renderTextSection('problem', '01. Analisi del Problema', 'fa-exclamation-triangle', true));
            
            // 2. SOLUTION (With Subsection)
            container.insertAdjacentHTML('beforeend', renderSolutionSection());

            // 3. AUTHORITY
            container.insertAdjacentHTML('beforeend', renderTextSection('authority', '03. Proof & Authority', 'fa-shield-check'));

            // 4. COMPARISON (With Table Editor)
            container.insertAdjacentHTML('beforeend', renderComparisonSection());

            // 5. CTA FINAL
            container.insertAdjacentHTML('beforeend', renderCTASection());

            // 6. FAQ
            container.insertAdjacentHTML('beforeend', renderFAQSection());
        }

        function renderTextSection(key, label, icon, hasQuote = false) {
            const data = currentData[key];
            return `
            <div class="section-card space-y-4">
                <span class="label-micro"><i class="fas ${icon}"></i> ${label}</span>
                <input type="text" class="w-full font-black text-lg border-b border-neutral-100 py-2" data-sec="${key}" data-field="title" value="${data.title}">
                ${hasQuote && data.quote ? `<span class="label-micro">Citazione</span><input type="text" class="w-full italic text-xs bg-neutral-50 p-3 rounded-xl" data-sec="${key}" data-field="quote" value="${data.quote}">` : ''}
                <span class="label-micro">Corpo del testo</span>
                <textarea class="w-full text-xs font-medium leading-relaxed min-h-[150px] bg-neutral-50 rounded-[1.5rem] p-5" data-sec="${key}" data-field="paragraphs">${data.paragraphs.join('\n\n')}</textarea>
            </div>`;
        }

        function renderSolutionSection() {
            const sol = currentData.solution;
            return `
            <div class="section-card space-y-4 border-l-4 border-black">
                <span class="label-micro text-black"><i class="fas fa-lightbulb"></i> 02. Meccanismo Unico</span>
                <input type="text" class="w-full font-black text-lg border-b border-neutral-100 py-2" data-sec="solution" data-field="title" value="${sol.title}">
                <textarea class="w-full text-xs font-medium min-h-[100px] bg-neutral-50 rounded-2xl p-5" data-sec="solution" data-field="paragraphs">${sol.paragraphs.join('\n\n')}</textarea>
                
                <div class="p-4 bg-black rounded-[1.5rem] text-white space-y-3">
                    <span class="label-micro !text-neutral-500">Subsection (Stack Tecnologico)</span>
                    <input type="text" class="w-full bg-transparent border-b border-neutral-800 font-bold text-sm" id="sol_sub_title" value="${sol.subsection.title}">
                    <textarea class="w-full bg-transparent text-[10px] text-neutral-400 leading-relaxed" id="sol_sub_paragraphs" rows="4">${sol.subsection.paragraphs.join('\n\n')}</textarea>
                </div>
            </div>`;
        }

        function renderComparisonSection() {
            const comp = currentData.comparison;
            return `
            <div class="section-card space-y-4">
                <span class="label-micro"><i class="fas fa-balance-scale"></i> 04. Confronto Tecnico</span>
                <input type="text" class="w-full font-black text-lg border-b border-neutral-100 py-2" data-sec="comparison" data-field="title" value="${comp.title}">
                <input type="text" class="w-full text-xs text-neutral-400" data-sec="comparison" data-field="intro" value="${comp.intro}">
                <div class="grid grid-cols-3 gap-1 mb-2 px-1">
                    <span class="text-[7px] font-black uppercase text-neutral-400">Funzione</span>
                    <span class="text-[7px] font-black uppercase text-neutral-400 text-center">Tradizionale</span>
                    <span class="text-[7px] font-black uppercase text-neutral-400 text-right">SiteBoS</span>
                </div>
                <div id="tableGrid" class="space-y-2">
                    ${parseTable(comp.table_html)}
                </div>
            </div>`;
        }

        function renderCTASection() {
            const cta = currentData.cta_final;
            return `
            <div class="section-card bg-black text-white space-y-4">
                <span class="label-micro !text-neutral-500">05. Chiusura & Urgenza</span>
                <input type="text" class="w-full bg-transparent border-b border-neutral-800 text-xl font-black" data-sec="cta_final" data-field="title" value="${cta.title}">
                <textarea class="w-full bg-transparent text-xs text-neutral-300" data-sec="cta_final" data-field="paragraphs" rows="3">${cta.paragraphs.join('\n\n')}</textarea>
                <div class="grid grid-cols-2 gap-4">
                    <div><span class="label-micro">Urgency</span><input type="text" class="w-full bg-neutral-900 rounded-xl p-3 text-[10px]" data-sec="cta_final" data-field="urgency" value="${cta.urgency}"></div>
                    <div><span class="label-micro">Button</span><input type="text" class="w-full bg-neutral-900 rounded-xl p-3 text-[10px]" data-sec="cta_final" data-field="button_text" value="${cta.button_text}"></div>
                </div>
            </div>`;
        }

        function renderFAQSection() {
            let html = `<div class="section-card space-y-4"><span class="label-micro">FAQ (Domande Frequenti)</span><div class="space-y-4">`;
            currentData.faq.forEach((f, i) => {
                html += `
                <div class="faq-item space-y-2 border-b border-neutral-100 pb-4">
                    <input type="text" class="w-full font-bold text-xs" id="faq_q_${i}" value="${f.question}">
                    <textarea class="w-full text-[11px] text-neutral-500" id="faq_a_${i}" rows="2">${f.answer}</textarea>
                </div>`;
            });
            html += `</div></div>`;
            return html;
        }

        function parseTable(html) {
            const div = document.createElement('div'); div.innerHTML = html;
            const rows = div.querySelectorAll('tbody tr');
            let out = '';
            for (let i = 0; i < 5; i++) {
                const tds = rows[i] ? rows[i].querySelectorAll('td') : [];
                out += `<div class="grid grid-cols-3 gap-2 table-row">
                    <input type="text" class="table-input" value="${tds[0]?.innerText || ''}">
                    <input type="text" class="table-input" value="${tds[1]?.innerText || ''}">
                    <input type="text" class="table-input border-black" value="${tds[2]?.innerText || ''}">
                </div>`;
            }
            return out;
        }

        function syncData() {
            // SEO
            currentData.seo.meta_title = document.getElementById('seo_meta_title').value;
            currentData.seo.meta_description = document.getElementById('seo_meta_description').value;
            currentData.seo.keywords = document.getElementById('seo_keywords').value;
            currentData.seo.slug = document.getElementById('seo_slug').value;

            // HERO
            currentData.hero.title = document.getElementById('hero_title').value;
            currentData.hero.subtitle = document.getElementById('hero_subtitle').value;
            currentData.hero.cta_text = document.getElementById('hero_cta_text').value;
            currentData.hero.risk_reversal = document.getElementById('hero_risk_reversal').value;

            // SECTIONS
            document.querySelectorAll('[data-sec]').forEach(el => {
                const { sec, field } = el.dataset;
                if (field === 'paragraphs') currentData[sec][field] = el.value.split('\n\n').filter(p => p.trim());
                else currentData[sec][field] = el.value;
            });

            // SOLUTION SUBSECTION
            currentData.solution.subsection.title = document.getElementById('sol_sub_title').value;
            currentData.solution.subsection.paragraphs = document.getElementById('sol_sub_paragraphs').value.split('\n\n').filter(p => p.trim());

            // TABLE
            let tbody = '';
            document.querySelectorAll('.table-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0].value.trim()) tbody += `<tr><td>${inputs[0].value}</td><td>${inputs[1].value}</td><td>${inputs[2].value}</td></tr>`;
            });
            currentData.comparison.table_html = `<table><thead><tr><th>Funzionalità</th><th>Approccio Tradizionale</th><th>Infrastruttura Garofalo Consulting</th></tr></thead><tbody>${tbody}</tbody></table>`;

            // FAQ
            currentData.faq = currentData.faq.map((f, i) => ({
                question: document.getElementById(`faq_q_${i}`).value,
                answer: document.getElementById(`faq_a_${i}`).value
            }));
        }

        async function sendUpdate(action) {
            syncData();
            toggleLoader(true);
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        _auth: tg.initData,
                        action: action,
                        blog_id: blogId,
                        updated_content: currentData,
                        new_image_base64: base64Image
                    })
                });
                if (response.ok) {
                    tg.showAlert(action === 'publish_blog' ? "ARCHITETTURA PUBBLICATA!" : "CONFIGURAZIONE SALVATA!");
                    if (action === 'publish_blog') setTimeout(() => tg.close(), 1000);
                }
            } catch (err) { tg.showAlert("Errore critico invio."); }
            finally { toggleLoader(false); }
        }

        function confirmPublish() {
            tg.showConfirm("Lancerai l'articolo sui server live. Confermi?", (ok) => { if(ok) sendUpdate('publish_blog'); });
        }

        function previewFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                base64Image = ev.target.result.split(',')[1];
                document.getElementById('featuredImage').src = ev.target.result;
                document.getElementById('featuredImage').classList.remove('hidden');
                document.getElementById('imagePlaceholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function toggleLoader(show) { document.getElementById('loader').classList.toggle('hidden', !show); }
        window.onload = loadData;
    </script>
</body>
</html>
