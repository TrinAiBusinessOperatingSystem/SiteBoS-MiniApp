<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Agenda Intelligente | SiteBoS</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
          borderRadius: { '3xl': '1.5rem' }
        }
      }
    }
  </script>

  <style>
    body { background-color: #fafafa !important; color: #000000 !important; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .card-noir { background: white !important; border: 1px solid #eeeeee !important; border-radius: 1.5rem; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .day-pill.active { background-color: #000 !important; color: #fff !important; }
  </style>
</head>
<body class="bg-bg text-black pb-10 overflow-x-hidden">

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
    <div class="spinner"></div>
    <p class="text-[8px] font-black uppercase tracking-widest text-gray-400">Syncing Agenda...</p>
  </div>

  <div id="app-content" class="max-w-md mx-auto p-5 space-y-6 hidden">
    
    <!-- HEADER -->
    <header class="flex justify-between items-start pt-2 fade-in-up">
        <div>
            <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded-full mb-1 italic">Logistica & Tempo</div>
            <h1 class="text-xl font-black tracking-tighter uppercase leading-none">Agenda Intelligente</h1>
        </div>
        <button class="w-10 h-10 bg-white border border-border rounded-xl flex items-center justify-center text-black shadow-sm active:scale-90 transition" onclick="loadAgenda()">
            <i class="fas fa-sync-alt text-xs"></i>
        </button>
    </header>

    <!-- DATE SELECTOR (HORIZ SCROLL) -->
    <div class="flex gap-2 overflow-x-auto no-scrollbar py-2 fade-in-up" id="day-selector">
        <!-- Generato via JS -->
    </div>

    <!-- AGENDA LIST -->
    <div id="agenda-list" class="space-y-4 fade-in-up">
        <!-- Impegni qui -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-10">
        <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-calendar-day text-2xl text-gray-200"></i>
        </div>
        <p class="text-[10px] font-black uppercase text-gray-300 tracking-widest">Nessun impegno per oggi</p>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-5 flex gap-3 fade-in-up">
        <button class="flex-1 bg-white border border-border text-black font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3 text-[10px] uppercase tracking-widest" onclick="openManualAdd()">
            <i class="fas fa-pen"></i> Manuale
        </button>
        <button class="flex-1 bg-black text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3 text-[10px] uppercase tracking-widest" onclick="triggerDigitalize()">
            <i class="fas fa-camera"></i> Digitalizza
        </button>
    </div>

    <!-- HIDDEN INPUT FOR CAMERA/FILE -->
    <input type="file" id="agenda-upload" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
  </div>

  <!-- MODAL: ANTEPRIMA AI -->
  <div id="ai-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-end justify-center z-[1000] hidden">
    <div class="bg-white w-full rounded-t-[2.5rem] p-8 space-y-6 shadow-2xl transition-transform transform translate-y-full" id="ai-modal-content">
        <div class="flex justify-between items-center">
            <h3 class="text-lg font-black uppercase tracking-tighter">Eventi Rilevati</h3>
            <button onclick="closeAiModal()" class="text-gray-400"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <div id="ai-results" class="max-h-[50vh] overflow-y-auto space-y-4 no-scrollbar">
            <!-- Eventi estratti dall'AI -->
        </div>

        <button class="w-full bg-black text-white font-black py-4 rounded-2xl shadow-md active:scale-95 transition-all flex items-center justify-center gap-3 text-[10px] uppercase tracking-widest" onclick="confirmEvents()">
            Conferma e Salva
        </button>
    </div>
  </div>

  <script>
    'use strict';
    const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/8f148592-cbb9-4c72-96e8-73c08fccee43";
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    
    const urlParams = new URLSearchParams(window.location.search);
    const ash = urlParams.get('ash');

    let events = [];
    let selectedDate = new Date().toISOString().split('T')[0];

    // --- INIZIALIZZAZIONE ---
    function init() {
        if (!ash) {
            document.getElementById('loader').innerHTML = `<div class="font-black text-red-500">ASH MISSING</div>`;
            return;
        }
        renderDaySelector();
        loadAgenda();
    }

    function renderDaySelector() {
        const container = document.getElementById('day-selector');
        container.innerHTML = '';
        const days = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
        const today = new Date();

        for (let i = -2; i < 12; i++) {
            const d = new Date();
            d.setDate(today.getDate() + i);
            const dateStr = d.toISOString().split('T')[0];
            const isSelected = dateStr === selectedDate;

            const btn = document.createElement('button');
            btn.className = `day-pill min-w-[60px] py-3 rounded-2xl flex flex-col items-center justify-center transition-all ${isSelected ? 'active' : 'bg-white border border-border text-gray-400'}`;
            btn.onclick = () => selectDate(dateStr);
            btn.innerHTML = `
                <span class="text-[7px] font-black uppercase tracking-widest">${days[d.getDay()]}</span>
                <span class="text-sm font-black">${d.getDate()}</span>
            `;
            container.appendChild(btn);
        }
    }

    function selectDate(date) {
        selectedDate = date;
        renderDaySelector();
        renderEvents();
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    // --- CARICAMENTO DATI ---
    async function loadAgenda() {
        const loader = document.getElementById('loader');
        const content = document.getElementById('app-content');
        loader.classList.remove('hidden');
        
        try {
            const res = await fetch(WEBHOOK_URL, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ action: "get_agenda", _auth: tg.initData, ash: ash }) 
            });
            const data = await res.json();
            events = data.events || [];
            renderEvents();
        } catch (e) { 
            console.error("Load Error:", e);
            tg.HapticFeedback.notificationOccurred("error"); 
        } finally { 
            loader.classList.add('hidden'); 
            content.classList.remove('hidden');
        }
    }

    function renderEvents() {
        const container = document.getElementById('agenda-list');
        const empty = document.getElementById('empty-state');
        container.innerHTML = '';

        const filtered = events.filter(e => e.date === selectedDate).sort((a,b) => a.time.localeCompare(b.time));

        if (filtered.length === 0) {
            empty.classList.remove('hidden');
            return;
        }
        empty.classList.add('hidden');

        filtered.forEach(ev => {
            const el = document.createElement('div');
            el.className = "card-noir p-4 flex gap-4 items-center fade-in-up";
            el.innerHTML = `
                <div class="text-center pr-4 border-r border-gray-50 min-w-[60px]">
                    <p class="text-xs font-black">${ev.time}</p>
                    <p class="text-[7px] font-black text-gray-300 uppercase tracking-widest">ORA</p>
                </div>
                <div class="flex-1">
                    <h4 class="text-[11px] font-black uppercase tracking-tight leading-tight">${ev.title}</h4>
                    <p class="text-[8px] font-medium text-gray-400 mt-0.5"><i class="fas fa-map-marker-alt mr-1"></i>${ev.location || 'Nessuna posizione'}</p>
                </div>
                <button class="text-gray-200 hover:text-red-500 transition" onclick="deleteEvent('${ev.id}')">
                    <i class="fas fa-trash-alt text-xs"></i>
                </button>
            `;
            container.appendChild(el);
        });
    }

    // --- DIGITALIZZAZIONE ---
    function triggerDigitalize() {
        document.getElementById('agenda-upload').click();
    }

    async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        tg.MainButton.setText("ELABORAZIONE AI...");
        tg.MainButton.show();
        tg.MainButton.disable();

        // Trasformazione in Base64 per invio al webhook
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        action: "digitalize_agenda", 
                        image: base64,
                        _auth: tg.initData, 
                        ash: ash 
                    })
                });
                const data = await res.json();
                showAiPreview(data.extracted_events);
            } catch (err) {
                tg.showAlert("Errore durante l'elaborazione dell'immagine.");
            } finally {
                tg.MainButton.hide();
                event.target.value = '';
            }
        };
        reader.readAsDataURL(file);
    }

    function showAiPreview(extracted) {
        const container = document.getElementById('ai-results');
        container.innerHTML = '';
        
        extracted.forEach((ev, idx) => {
            const div = document.createElement('div');
            div.className = "bg-gray-50 p-4 rounded-2xl space-y-2 border border-gray-100";
            div.innerHTML = `
                <div class="flex gap-2">
                    <input type="date" value="${ev.date}" class="flex-1 bg-white border border-border p-2 rounded-lg text-[10px] font-bold outline-none">
                    <input type="time" value="${ev.time}" class="w-24 bg-white border border-border p-2 rounded-lg text-[10px] font-bold outline-none">
                </div>
                <input type="text" value="${ev.title}" class="w-full bg-white border border-border p-2 rounded-lg text-[10px] font-bold outline-none" placeholder="Titolo">
                <input type="text" value="${ev.location || ''}" class="w-full bg-white border border-border p-2 rounded-lg text-[10px] font-medium outline-none text-gray-500" placeholder="Località">
            `;
            container.appendChild(div);
        });

        const modal = document.getElementById('ai-modal');
        const content = document.getElementById('ai-modal-content');
        modal.classList.remove('hidden');
        setTimeout(() => content.classList.remove('translate-y-full'), 10);
    }

    function closeAiModal() {
        const content = document.getElementById('ai-modal-content');
        content.classList.add('translate-y-full');
        setTimeout(() => document.getElementById('ai-modal').classList.add('hidden'), 300);
    }

    async function confirmEvents() {
        // Logica per raccogliere i dati dai campi input e inviarli per il salvataggio
        const items = document.querySelectorAll('#ai-results > div');
        const confirmedEvents = Array.from(items).map(item => {
            const inputs = item.querySelectorAll('input');
            return {
                date: inputs[0].value,
                time: inputs[1].value,
                title: inputs[2].value,
                location: inputs[3].value
            };
        });

        try {
            await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    action: "save_agenda_events", 
                    events: confirmedEvents,
                    _auth: tg.initData, 
                    ash: ash 
                })
            });
            closeAiModal();
            loadAgenda();
            tg.HapticFeedback.notificationOccurred("success");
        } catch (e) {
            tg.showAlert("Errore durante il salvataggio.");
        }
    }

    // --- AZIONI MANUALI ---
    function openManualAdd() {
        tg.showAlert("Funzionalità manuale in arrivo...");
    }

    async function deleteEvent(id) {
        tg.showConfirm("Eliminare questo impegno?", async (ok) => {
            if(ok) {
                try {
                    await fetch(WEBHOOK_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ action: "delete_event", event_id: id, _auth: tg.initData, ash: ash })
                    });
                    loadAgenda();
                } catch(e) {}
            }
        });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
