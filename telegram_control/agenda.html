<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Agenda Manager | SiteBoS</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
          borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
        }
      }
    }
  </script>

  <style>
    body { background-color: #fafafa !important; color: #000000 !important; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; height: 100vh; }
    .card-noir { background: white !important; border: 1px solid #eeeeee !important; border-radius: 1.5rem; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    .view-overlay { position: fixed; inset: 0; background: #fafafa; z-index: 50; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
    .view-overlay.active { transform: translateX(0); }
    
    .btn-action { transition: all 0.2s; }
    .btn-action:active { transform: scale(0.95); opacity: 0.8; }
    
    .spinner { border: 2px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .event-pill { border-left: 4px solid #eeeeee; transition: all 0.2s; }
    .event-pill.active { border-left-color: #000; background: #fcfcfc; }
    
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
    .dot.active { width: 20px; background: #000; border-radius: 10px; }
  </style>
</head>
<body class="bg-bg text-black">

  <!-- MAIN APP (SCREEN A: HOME) -->
  <div id="screen-home" class="h-full flex flex-col p-5 space-y-6 overflow-y-auto no-scrollbar">
    
    <!-- HEADER -->
    <header class="flex justify-between items-center pt-2">
        <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">⏳ Agenda</h1>
        <div class="flex gap-2">
            <button onclick="loadInitialData()" class="w-10 h-10 bg-white border border-border rounded-xl flex items-center justify-center text-black shadow-sm active:scale-90 transition">
                <i class="fas fa-sync-alt text-xs"></i>
            </button>
            <button onclick="tg.close()" class="w-10 h-10 bg-white border border-border rounded-xl flex items-center justify-center text-black shadow-sm active:scale-90 transition">
                <i class="fas fa-times text-xs"></i>
            </button>
        </div>
    </header>

    <!-- TODAY VIEW -->
    <section class="space-y-4">
        <div class="flex justify-between items-end">
            <div>
                <p id="today-date-label" class="text-[10px] font-black uppercase tracking-widest text-gray-400">Oggi · ---</p>
                <h2 class="text-xl font-black tracking-tight">I tuoi impegni</h2>
            </div>
            <button onclick="openView('week')" class="text-[9px] font-black uppercase tracking-widest text-black border-b-2 border-black pb-0.5">Ved. Settimana</button>
        </div>

        <div id="today-events-list" class="space-y-3">
            <!-- Eventi caricati via JS -->
            <div class="py-10 text-center opacity-20"><i class="fas fa-calendar-day text-4xl"></i></div>
        </div>
    </section>

    <!-- QUICK INPUTS -->
    <section class="pt-4 space-y-4">
        <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">Acquisizione Rapida</p>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="openView('photo')" class="btn-action bg-black text-white p-6 rounded-3xl flex flex-col items-center justify-center gap-3 shadow-xl">
                <i class="fas fa-camera text-2xl"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Scansiona</span>
            </button>
            <button onclick="openView('text')" class="btn-action bg-white border-2 border-black text-black p-6 rounded-3xl flex flex-col items-center justify-center gap-3 shadow-sm">
                <i class="fas fa-keyboard text-2xl"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Testo Libero</span>
            </button>
        </div>
        <button onclick="openManualAdd()" class="w-full py-4 bg-gray-100 rounded-2xl text-[9px] font-black uppercase tracking-widest text-gray-500 flex items-center justify-center gap-2">
            <i class="fas fa-plus"></i> Aggiungi Manuale
        </button>
    </section>
  </div>

  <!-- SCREEN B: PHOTO ACQUISITION -->
  <div id="screen-photo" class="view-overlay flex flex-col p-6">
    <header class="flex justify-between items-center mb-8">
        <button onclick="closeView()" class="w-10 h-10 flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
        <h2 class="text-sm font-black uppercase tracking-widest">Scansiona Agenda</h2>
        <div class="w-10"></div>
    </header>

    <div class="flex-1 flex flex-col items-center justify-center space-y-8">
        <div id="photo-preview-container" class="w-full aspect-[3/4] bg-gray-100 rounded-[2rem] border-2 border-dashed border-gray-200 flex flex-col items-center justify-center overflow-hidden relative">
            <img id="photo-preview-img" class="absolute inset-0 w-full h-full object-cover hidden">
            <div id="photo-placeholder" class="flex flex-col items-center gap-4 text-gray-300">
                <i class="fas fa-image text-5xl"></i>
                <p class="text-[10px] font-black uppercase tracking-widest">Nessuna foto selezionata</p>
            </div>
        </div>

        <div class="w-full space-y-3">
            <button onclick="triggerFileSelect('camera')" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] flex items-center justify-center gap-3">
                <i class="fas fa-camera"></i> Apri Camera
            </button>
            <button onclick="triggerFileSelect('gallery')" class="w-full bg-white border border-border py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] flex items-center justify-center gap-3">
                <i class="fas fa-images"></i> Scegli da Galleria
            </button>
        </div>

        <!-- Progress Bar AI -->
        <div id="ai-progress" class="w-full space-y-2 hidden">
            <div class="flex justify-between items-end">
                <p class="text-[9px] font-black uppercase tracking-widest text-black">Analisi AI in corso...</p>
                <p id="ai-progress-val" class="text-[9px] font-black text-gray-400">0%</p>
            </div>
            <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div id="ai-progress-bar" class="h-full bg-black transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>
    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFileChange(event)">
  </div>

  <!-- SCREEN C: FREE TEXT -->
  <div id="screen-text" class="view-overlay flex flex-col p-6">
    <header class="flex justify-between items-center mb-8">
        <button onclick="closeView()" class="w-10 h-10 flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
        <h2 class="text-sm font-black uppercase tracking-widest">Testo Libero</h2>
        <div class="w-10"></div>
    </header>

    <div class="flex-1 space-y-6">
        <div class="space-y-2">
            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Scrivi come parli</label>
            <textarea id="free-text-input" class="w-full h-48 bg-white border border-border rounded-2xl p-4 text-sm font-medium outline-none focus:border-black transition-colors resize-none" placeholder='Es: "Domani alle 10 call con Luca per discutere il preventivo di Milano"'></textarea>
        </div>

        <div class="space-y-3">
            <p class="text-[9px] font-black uppercase tracking-widest text-gray-300">Suggerimenti rapidi</p>
            <div class="flex flex-wrap gap-2">
                <button onclick="appendTxt('Oggi')" class="px-4 py-2 bg-gray-100 rounded-full text-[9px] font-bold">Oggi</button>
                <button onclick="appendTxt('Domani')" class="px-4 py-2 bg-gray-100 rounded-full text-[9px] font-bold">Domani</button>
                <button onclick="appendTxt('Lunedì prossimo')" class="px-4 py-2 bg-gray-100 rounded-full text-[9px] font-bold">Lunedì prossimo</button>
                <button onclick="appendTxt('alle 10:00')" class="px-4 py-2 bg-gray-100 rounded-full text-[9px] font-bold">alle 10:00</button>
            </div>
        </div>
    </div>

    <button id="btn-analyze-text" onclick="analyzeText()" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] flex items-center justify-center gap-3 mb-6">
        <i class="fas fa-search"></i> Analizza con AI
    </button>
  </div>

  <!-- SCREEN D: AI REVISION -->
  <div id="screen-revision" class="view-overlay flex flex-col p-6 bg-white">
    <header class="flex justify-between items-center mb-6">
        <button onclick="closeView()" class="w-10 h-10 flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
        <h2 class="text-sm font-black uppercase tracking-widest">Revisione AI</h2>
        <div class="w-10"></div>
    </header>

    <p id="revision-count" class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-6 text-center">AI ha rilevato 0 eventi</p>

    <div class="flex-1 relative overflow-hidden">
        <div id="revision-carousel" class="h-full flex transition-transform duration-300 ease-out">
            <!-- Card eventi rilevati -->
        </div>
    </div>

    <div class="py-6 flex flex-col items-center gap-6">
        <div id="revision-dots" class="flex gap-2">
            <!-- Punti navigazione -->
        </div>
        <button onclick="saveDrafts()" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] flex items-center justify-center gap-3 shadow-xl">
            <i class="fas fa-check-circle"></i> Salva Tutto
        </button>
    </div>
  </div>

  <!-- SCREEN E: WEEK VIEW -->
  <div id="screen-week" class="view-overlay flex flex-col">
    <header class="p-6 pb-2 flex justify-between items-center">
        <button onclick="closeView()" class="w-10 h-10 flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
        <div class="flex items-center gap-4">
            <button onclick="changeWeek(-1)"><i class="fas fa-chevron-left text-xs"></i></button>
            <span id="week-range-label" class="text-xs font-black uppercase tracking-tighter">Apr 21-27</span>
            <button onclick="changeWeek(1)"><i class="fas fa-chevron-right text-xs"></i></button>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- STRIP GIORNI -->
    <div id="week-days-strip" class="grid grid-cols-5 px-4 py-4 border-b border-gray-50">
        <!-- Generato via JS -->
    </div>

    <div id="week-events-list" class="flex-1 overflow-y-auto p-6 space-y-8 no-scrollbar">
        <!-- Eventi raggruppati per giorno -->
    </div>
  </div>

  <!-- TEMPLATE CARD REVISIONE -->
  <template id="tpl-revision-card">
    <div class="min-w-full h-full px-2">
        <div class="card-noir h-full p-6 flex flex-col space-y-4 border-2 !border-black/5">
            <div class="flex justify-between items-start">
                <div class="w-10 h-10 bg-black text-white rounded-xl flex items-center justify-center text-xs">
                    <i class="fas fa-thumbtack"></i>
                </div>
                <button class="scarta-btn text-red-500 text-[10px] font-black uppercase tracking-widest">🗑️ Scarta</button>
            </div>
            
            <div class="space-y-1">
                <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Titolo</label>
                <input type="text" class="field-title w-full bg-gray-50 p-3 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-black">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Data</label>
                    <input type="date" class="field-date w-full bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none border border-transparent focus:border-black">
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Ora</label>
                    <input type="time" class="field-time w-full bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none border border-transparent focus:border-black">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Durata (min)</label>
                    <select class="field-duration w-full bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none border border-transparent focus:border-black">
                        <option value="15">15 min</option>
                        <option value="30">30 min</option>
                        <option value="60">1 ora</option>
                        <option value="90">1.5 ore</option>
                        <option value="120">2 ore</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Tipo</label>
                    <select class="field-type w-full bg-gray-50 p-3 rounded-xl text-[10px] font-bold outline-none border border-transparent focus:border-black">
                        <option value="MEETING">Riunione</option>
                        <option value="CALL">Chiamata</option>
                        <option value="DELIVERY">Consegna</option>
                        <option value="REMINDER">Promemoria</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Luogo</label>
                <input type="text" class="field-location w-full bg-gray-50 p-3 rounded-xl text-xs font-medium outline-none border border-transparent focus:border-black" placeholder="Indirizzo o Link">
            </div>

            <div class="space-y-1 flex-1">
                <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Note</label>
                <textarea class="field-notes w-full h-20 bg-gray-50 p-3 rounded-xl text-xs font-medium outline-none border border-transparent focus:border-black resize-none" placeholder="Aggiungi dettagli..."></textarea>
            </div>
        </div>
    </div>
  </template>

  <script>
    'use strict';
    const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/8f148592-cbb9-4c72-96e8-73c08fccee43";
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    
    const urlParams = new URLSearchParams(window.location.search);
    const ash = urlParams.get('ash');

    // STATE
    let allEvents = [];
    let draftEvents = [];
    let currentViewStack = [];
    let currentWeekOffset = 0;
    let carouselIndex = 0;

    // --- INITIALIZATION ---
    function init() {
        if (!ash) {
            document.body.innerHTML = `<div class="h-full flex items-center justify-center font-black text-red-500">ASH MISSING</div>`;
            return;
        }
        
        tg.BackButton.onClick(() => closeView());
        updateTodayLabel();
        loadInitialData();
    }

    function updateTodayLabel() {
        const now = new Date();
        const options = { weekday: 'short', day: 'numeric', month: 'short' };
        document.getElementById('today-date-label').innerText = `Oggi · ${now.toLocaleDateString('it-IT', options)}`;
    }

    // --- NAVIGATION ---
    function openView(viewId) {
        const el = document.getElementById('screen-' + viewId);
        if (!el) return;
        el.classList.add('active');
        currentViewStack.push(viewId);
        tg.BackButton.show();
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        
        if (viewId === 'week') renderWeekView();
    }

    function closeView() {
        const viewId = currentViewStack.pop();
        if (!viewId) return;
        const el = document.getElementById('screen-' + viewId);
        el.classList.remove('active');
        if (currentViewStack.length === 0) tg.BackButton.hide();
    }

    // --- API CALLS ---
    async function apiCall(action, payload = {}) {
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    action, 
                    ash, 
                    _auth: tg.initData,
                    ...payload 
                })
            });
            if (!res.ok) throw new Error("Network error");
            return await res.json();
        } catch (e) {
            console.error("API Error:", e);
            tg.showAlert("Errore di connessione al server.");
            return null;
        }
    }

    async function loadInitialData() {
        const data = await apiCall('agenda_get', { date_range: 'today_tomorrow' });
        if (data && data.events) {
            allEvents = data.events;
            renderTodayEvents();
        }
    }

    // --- RENDERING ---
    function renderTodayEvents() {
        const container = document.getElementById('today-events-list');
        container.innerHTML = '';
        
        const today = new Date().toISOString().split('T')[0];
        const todayEvents = allEvents.filter(e => e.date === today)
                                    .sort((a,b) => a.time_start.localeCompare(b.time_start));

        if (todayEvents.length === 0) {
            container.innerHTML = `<div class="py-10 text-center text-[10px] font-black uppercase tracking-widest text-gray-300">Nessun impegno per oggi</div>`;
            return;
        }

        todayEvents.forEach(ev => {
            const div = document.createElement('div');
            div.className = `event-pill p-4 rounded-2xl flex items-center gap-4 ${isEventActive(ev) ? 'active' : 'bg-white border border-border opacity-60'}`;
            div.innerHTML = `
                <div class="text-[10px] font-black text-gray-400 w-10">${ev.time_start}</div>
                <div class="flex-1">
                    <h4 class="text-[11px] font-black uppercase tracking-tight">${ev.title}</h4>
                    ${ev.location ? `<p class="text-[7px] text-gray-400 uppercase tracking-widest mt-0.5"><i class="fas fa-map-marker-alt mr-1"></i>${ev.location}</p>` : ''}
                </div>
                ${isEventActive(ev) ? `<div class="w-2 h-2 bg-black rounded-full animate-pulse"></div>` : ''}
            `;
            container.appendChild(div);
        });
    }

    function isEventActive(ev) {
        const now = new Date();
        const [h, m] = ev.time_start.split(':').map(Number);
        const start = new Date(); start.setHours(h, m, 0);
        const end = new Date(start.getTime() + (ev.duration_min || 30) * 60000);
        return now >= start && now <= end;
    }

    // --- FILE HANDLING (SCREEN B) ---
    function triggerFileSelect(source) {
        const input = document.getElementById('file-input');
        input.removeAttribute('capture');
        if (source === 'camera') input.setAttribute('capture', 'environment');
        input.click();
    }

    async function handleFileChange(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Preview
        const previewImg = document.getElementById('photo-preview-img');
        const placeholder = document.getElementById('photo-placeholder');
        previewImg.src = URL.createObjectURL(file);
        previewImg.classList.remove('hidden');
        placeholder.classList.add('hidden');

        // Start AI Analysis
        analyzeImage(file);
    }

    async function analyzeImage(file) {
        const progress = document.getElementById('ai-progress');
        const bar = document.getElementById('ai-progress-bar');
        const val = document.getElementById('ai-progress-val');
        
        progress.classList.remove('hidden');
        bar.style.width = '20%'; val.innerText = '20%';

        // Client side resize
        const base64 = await resizeImage(file, 1024, 0.7);
        bar.style.width = '50%'; val.innerText = '50%';

        const result = await apiCall('agenda_analyze_image', { 
            image_base64: base64, 
            mime_type: file.type 
        });

        bar.style.width = '100%'; val.innerText = '100%';

        if (result && result.events_draft) {
            draftEvents = result.events_draft;
            setTimeout(() => {
                progress.classList.add('hidden');
                openRevision();
            }, 500);
        } else {
            tg.showAlert("L'AI non ha rilevato eventi strutturati in questa immagine.");
            progress.classList.add('hidden');
        }
    }

    function resizeImage(file, maxSide, quality) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > maxSide) { h *= maxSide / w; w = maxSide; } }
                    else { if (h > maxSide) { w *= maxSide / h; h = maxSide; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // --- TEXT ANALYSIS (SCREEN C) ---
    function appendTxt(txt) {
        const input = document.getElementById('free-text-input');
        input.value += (input.value ? ' ' : '') + txt;
        input.focus();
    }

    async function analyzeText() {
        const text = document.getElementById('free-text-input').value;
        if (!text.trim()) return;

        const btn = document.getElementById('btn-analyze-text');
        const originalContent = btn.innerHTML;
        btn.innerHTML = `<div class="spinner"></div>`;
        btn.disabled = true;

        const result = await apiCall('agenda_analyze_text', { text });

        btn.innerHTML = originalContent;
        btn.disabled = false;

        if (result && result.events_draft) {
            draftEvents = result.events_draft;
            openRevision();
        } else {
            tg.showAlert("L'AI non ha trovato impegni nel testo fornito.");
        }
    }

    // --- REVISION (SCREEN D) ---
    function openRevision() {
        openView('revision');
        renderRevisionCarousel();
    }

    function renderRevisionCarousel() {
        const container = document.getElementById('revision-carousel');
        const dotsContainer = document.getElementById('revision-dots');
        const label = document.getElementById('revision-count');
        const tpl = document.getElementById('tpl-revision-card');

        container.innerHTML = '';
        dotsContainer.innerHTML = '';
        label.innerText = `AI ha rilevato ${draftEvents.length} eventi`;
        carouselIndex = 0;
        updateCarousel();

        draftEvents.forEach((ev, idx) => {
            const clone = tpl.content.cloneNode(true);
            const card = clone.querySelector('.card-noir');
            
            card.querySelector('.field-title').value = ev.title || '';
            card.querySelector('.field-date').value = ev.date || '';
            card.querySelector('.field-time').value = ev.time_start || '';
            card.querySelector('.field-duration').value = ev.duration_min || '30';
            card.querySelector('.field-type').value = ev.type || 'MEETING';
            card.querySelector('.field-location').value = ev.location || '';
            card.querySelector('.field-notes').value = ev.notes || '';

            card.querySelector('.scarta-btn').onclick = () => scartaDraft(idx);

            // Sync state on change
            card.querySelectorAll('input, select, textarea').forEach(input => {
                input.onchange = (e) => {
                    const field = e.target.className.split('-').pop(); // rough way to get field name
                    draftEvents[idx][field] = e.target.value;
                };
            });

            container.appendChild(clone);

            const dot = document.createElement('div');
            dot.className = `dot ${idx === 0 ? 'active' : ''}`;
            dotsContainer.appendChild(dot);
        });

        // Touch handling for carousel
        let startX = 0;
        container.ontouchstart = (e) => startX = e.touches[0].clientX;
        container.ontouchend = (e) => {
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) moveCarousel(1);
            if (startX - endX < -50) moveCarousel(-1);
        };
    }

    function moveCarousel(dir) {
        carouselIndex = Math.max(0, Math.min(draftEvents.length - 1, carouselIndex + dir));
        updateCarousel();
    }

    function updateCarousel() {
        const container = document.getElementById('revision-carousel');
        container.style.transform = `translateX(-${carouselIndex * 100}%)`;
        
        document.querySelectorAll('.dot').forEach((dot, idx) => {
            dot.classList.toggle('active', idx === carouselIndex);
        });
    }

    function scartaDraft(idx) {
        draftEvents.splice(idx, 1);
        if (draftEvents.length === 0) {
            closeView();
        } else {
            renderRevisionCarousel();
        }
    }

    async function saveDrafts() {
        const result = await apiCall('agenda_save', { events: draftEvents });
        if (result && result.success) {
            tg.HapticFeedback.notificationOccurred('success');
            closeView(); // Close revision
            closeView(); // Close ingestion (photo/text)
            loadInitialData(); // Reload home
        }
    }

    // --- WEEK VIEW (SCREEN E) ---
    function renderWeekView() {
        const strip = document.getElementById('week-days-strip');
        const rangeLabel = document.getElementById('week-range-label');
        strip.innerHTML = '';

        const startOfWeek = getStartOfWeek(currentWeekOffset);
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 4);

        rangeLabel.innerText = `${formatDate(startOfWeek)} - ${formatDate(endOfWeek)}`;

        for (let i = 0; i < 5; i++) {
            const d = new Date(startOfWeek);
            d.setDate(startOfWeek.getDate() + i);
            const dateStr = d.toISOString().split('T')[0];
            const count = allEvents.filter(e => e.date === dateStr).length;

            const div = document.createElement('div');
            div.className = "flex flex-col items-center gap-1";
            div.innerHTML = `
                <span class="text-[7px] font-black text-gray-400 uppercase tracking-widest">${['LUN', 'MAR', 'MER', 'GIO', 'VEN'][i]}</span>
                <span class="text-sm font-black">${d.getDate()}</span>
                <div class="h-4">
                    ${count > 0 ? `<div class="bg-black text-white text-[7px] font-black px-1.5 py-0.5 rounded-md">${count}</div>` : ''}
                </div>
            `;
            strip.appendChild(div);
        }

        renderWeekEventsList(startOfWeek);
    }

    function renderWeekEventsList(start) {
        const container = document.getElementById('week-events-list');
        container.innerHTML = '';

        for (let i = 0; i < 5; i++) {
            const d = new Date(start);
            d.setDate(start.getDate() + i);
            const dateStr = d.toISOString().split('T')[0];
            const dayEvents = allEvents.filter(e => e.date === dateStr).sort((a,b) => a.time_start.localeCompare(b.time_start));

            const section = document.createElement('div');
            section.className = "space-y-4";
            section.innerHTML = `
                <div class="flex items-center gap-4">
                    <h3 class="text-xs font-black uppercase tracking-widest">${d.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric' })}</h3>
                    <div class="flex-1 h-px bg-gray-50"></div>
                </div>
            `;

            const list = document.createElement('div');
            list.className = "space-y-3";

            if (dayEvents.length === 0) {
                list.innerHTML = `<p class="text-[9px] text-gray-300 italic">Nessun impegno</p>`;
            } else {
                dayEvents.forEach(ev => {
                    const el = document.createElement('div');
                    el.className = "card-noir p-4 flex flex-col gap-1";
                    el.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="text-[10px] font-black">${ev.time_start} — ${ev.title}</span>
                            <span class="text-[7px] font-black text-gray-300 uppercase tracking-widest">${ev.type}</span>
                        </div>
                        ${ev.location ? `<p class="text-[8px] text-gray-400"><i class="fas fa-map-marker-alt mr-1"></i>${ev.location} · ${ev.duration_min}min</p>` : ''}
                    `;
                    list.appendChild(el);
                });
            }
            section.appendChild(list);
            container.appendChild(section);
        }
    }

    function getStartOfWeek(offset) {
        const d = new Date();
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1) + (offset * 7);
        return new Date(d.setDate(diff));
    }

    function formatDate(d) {
        return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
    }

    function changeWeek(dir) {
        currentWeekOffset += dir;
        renderWeekView();
    }

    // --- OTHER ---
    function openManualAdd() {
        draftEvents = [{
            title: '',
            date: new Date().toISOString().split('T')[0],
            time_start: '10:00',
            duration_min: 30,
            type: 'MEETING',
            location: '',
            notes: '',
            source: 'MANUAL'
        }];
        openRevision();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
