<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Supervisor Hub | SiteBoS</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #fafafa !important; color: #000000 !important; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card, .section-card, .dark-card, .upload-box { 
            background: white !important; 
            border: 1px solid #eeeeee !important; 
            box-shadow: none !important; 
        }
        input:focus, textarea:focus, select:focus { 
            border-color: #000000 !important; 
            box-shadow: none !important; 
            outline: none !important;
        }
        .text-primary, .text-black, .text-blue-600, .text-black { color: #000000 !important; }
        .bg-primary, .bg-black, .bg-black, .bg-black { background-color: #000000 !important; color: #ffffff !important; }
        .border-primary, .border-black, .border-blue-600, .border-black { border-color: #000000 !important; }
        .spinner { border-top-color: #000 !important; }
        input[type="checkbox"]:checked { background-color: #000 !important; border-color: #000 !important; }
        .fas, .far, .fal { font-weight: 900 !important; font-family: "Font Awesome 6 Free" !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { border: 2px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        // Blocco di Sicurezza: controlla tg.initData
        (function() {
            console.log("[Security] Checking WebApp initData...");
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                console.warn("[Security] Telegram WebApp initData missing!");
                // Se siamo in un browser normale, mostriamo un avviso ma non blocchiamo tutto se vogliamo debuggare
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    console.info("[Security] Localhost detected, bypassing hard stop for debugging.");
                } else {
                    document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase tracking-widest">Accesso Proibito</h2><p class="text-[10px] mt-4 opacity-50">Questa applicazione è accessibile solo tramite Telegram</p></div></body>`;
                    window.stop();
                }
            } else {
                console.log("[Security] WebApp initData found.");
            }
        })();
    </script>
</head>
<body class="p-5 pb-24">

    <!-- LOADER (Globale) -->
    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <div id="loader-text" class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-500">Inizializzazione...</div>
    </div>

    <div class="max-w-md mx-auto space-y-6 animate-fade-in hidden" id="app-content">
        
        <!-- HEADER -->
        <header class="space-y-1 py-2 text-center">
            <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded-full mb-1">Supervisor Hub</div>
            <h1 class="text-xl font-black tracking-tighter uppercase leading-none">Certificazione</h1>
            <p id="header-status" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mt-1 italic">Recupero sessione...</p>
        </header>

        <!-- DASHBOARD CONTAINER (List of Sessions) -->
        <div id="dashboard-container" class="space-y-4 hidden">
            <h2 class="text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Sessioni Aperte</h2>
            <div id="sessions-list" class="space-y-3">
                <!-- JS populated -->
            </div>
            
            <button onclick="startNewSession()" class="w-full mt-4 py-4 bg-gray-100 text-black border border-border rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition flex items-center justify-center gap-2">
                <i class="fas fa-plus"></i> Nuova Certificazione
            </button>
        </div>

        <!-- WIZARD CONTAINER -->
        <div id="wizard-container" class="space-y-6 hidden">
            <!-- Progress Bar -->
            <div class="space-y-2">
                <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest">
                    <span id="step-label">Step 1 di N</span>
                    <span id="step-percentage">0%</span>
                </div>
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-black transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- Current Step Content -->
            <div id="step-content" class="card rounded-3xl p-6 space-y-4">
                <h2 id="step-title" class="text-sm font-black uppercase tracking-tight">Titolo Step</h2>
                <p id="step-description" class="text-xs text-gray-500 font-medium">Descrizione di cosa fare...</p>
                
                <div class="pt-4 space-y-3">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Tipo Evidenza Richiesta</label>
                    <div id="required-evidence-badge" class="inline-block px-3 py-1.5 bg-black text-white rounded-xl text-[9px] font-black uppercase tracking-widest">
                        TESTO
                    </div>
                </div>

                <div id="evidence-container" class="pt-2">
                    <!-- TEXT -->
                    <div id="ev-TEXT" class="evidence-panel">
                        <textarea id="evidence-input-text" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-xs outline-none focus:border-black transition-colors resize-none h-24 shadow-inner" placeholder="Inserisci nota o testo evidenza..."></textarea>
                    </div>

                    <!-- VISION -->
                    <div id="ev-VISION" class="evidence-panel hidden space-y-2">
                        <div class="relative w-full shadow-sm rounded-xl overflow-hidden bg-black aspect-[4/3]">
                            <video id="camera-feed" class="hidden h-full w-full object-cover" autoplay playsinline muted></video>
                            <canvas id="camera-canvas" class="hidden w-full h-full object-cover"></canvas>
                            <div id="camera-placeholder" class="absolute inset-0 flex items-center justify-center text-neutral-800">
                                <i class="fas fa-camera text-2xl"></i>
                            </div>
                        </div>
                        <button id="startCamBtn" onclick="startCamera()" class="w-full h-10 bg-black text-white rounded-xl font-black uppercase tracking-widest text-[10px] active:scale-95 transition">
                            <i class="fas fa-video mr-1"></i> Attiva Fotocamera
                        </button>
                        <button id="snapBtn" onclick="takePhoto()" class="hidden w-full h-10 bg-red-600 text-black rounded-xl font-black uppercase tracking-widest text-[10px] active:scale-95 transition">
                            🔴 Scatta Foto
                        </button>
                    </div>

                    <!-- SIGNATURE -->
                    <div id="ev-SIGNATURE" class="evidence-panel hidden space-y-2">
                        <div class="bg-white border border-gray-200 rounded-xl p-1 shadow-sm overflow-hidden touch-none">
                            <canvas id="signature-pad" class="w-full h-32 rounded-lg bg-gray-50 cursor-crosshair touch-none"></canvas>
                        </div>
                        <button onclick="clearSignature()" class="w-full h-8 bg-gray-100 text-black border border-border rounded-lg font-black text-[9px] uppercase tracking-widest active:scale-95 transition">Cancella Firma</button>
                    </div>

                    <!-- FILE -->
                    <div id="ev-FILE" class="evidence-panel hidden space-y-2">
                        <div class="border-2 border-dashed border-gray-200 bg-gray-50 rounded-xl p-6 flex flex-col items-center justify-center cursor-pointer hover:border-black transition active:scale-95" onclick="document.getElementById('fileInput').click()">
                            <i class="fas fa-cloud-upload text-2xl text-gray-300 mb-2"></i>
                            <span class="text-[8px] font-black uppercase tracking-widest text-gray-500">Seleziona File</span>
                        </div>
                        <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(event)">
                        <div id="fileNameDisplay" class="text-center text-[8px] font-black uppercase tracking-widest text-neutral-400 truncate">Nessun file</div>
                    </div>
                </div>
                
                <div class="pt-2">
                    <button onclick="submitStep()" class="w-full py-4 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition">
                        Conferma Step <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- COMPLETION SCREEN -->
        <div id="completion-screen" class="hidden flex-col items-center justify-center py-10 space-y-4 text-center">
            <div class="w-20 h-20 bg-black text-white rounded-full flex items-center justify-center text-3xl mb-4">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-xl font-black uppercase tracking-tight">Completato</h2>
            <p class="text-xs text-gray-500 font-medium">Tutte le evidenze sono state salvate in evidence_docs.</p>
            <button onclick="tg.close()" class="mt-4 px-8 py-3 bg-gray-100 text-black border border-border rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition">
                Chiudi MiniApp
            </button>
        </div>

    </div>

    <script>
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/6f0037a3-3f47-49af-bfa2-0e40a05e49bf";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        
        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');
        const sopId = urlParams.get('sop_id');
        const sessionId = urlParams.get('session_id');
        
        let currentSession = null;
        let activeEvidenceType = 'TEXT';
        let videoStream = null;
        let isDrawing = false, canvas, ctx;
        let capturedPhotoB64 = null;
        let selectedFileB64 = null;
        let selectedFileMime = null;
        
        async function apiCall(action, payload = {}) {
            // Categorico: Tutte le chiamate al Webhook devono essere POST
            const method = 'POST';
            const bodyData = { 
                action, 
                ash, 
                _auth: tg.initData,
                ...payload 
            };

            console.log(`[API] Request: ${method} ${action}`, bodyData);

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bodyData)
                });

                if (!res.ok) throw new Error(`Network error: ${res.status}`);
                const data = await res.json();
                console.log(`[API] Success:`, data);
                return data;
            } catch (e) {
                console.error("API Error:", e);
                return null;
            }
        }

        async function initApp() {
            if (!ash) {
                document.body.innerHTML = `<div class="h-full flex items-center justify-center font-black text-red-500">ASH MISSING</div>`;
                return;
            }

            showLoader('Caricamento dati...');
            const data = await apiCall('get');
            
            if (sessionId) {
                loadSession(sessionId);
            } else {
                renderDashboard(data);
            }
        }

        function renderDashboard(data) {
            const sessions = (data && data.sessions) ? data.sessions : [];
            const procedures = (data && data.procedures) ? data.procedures : [];

            const list = document.getElementById('sessions-list');
            list.innerHTML = '';
            
            if(sessions.length === 0) {
                list.innerHTML = `<div class="text-center py-6 text-gray-300 font-bold text-xs uppercase tracking-widest">Nessuna sessione aperta</div>`;
            } else {
                sessions.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'card rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:border-black transition active:scale-95 mb-3';
                    card.onclick = () => loadSession(s.id);
                    card.innerHTML = `
                        <div>
                            <h3 class="text-xs font-black uppercase tracking-tight">${s.type}</h3>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1"><i class="fas fa-calendar-alt"></i> ${s.date}</p>
                        </div>
                        <i class="fas fa-chevron-right text-gray-300 text-sm"></i>
                    `;
                    list.appendChild(card);
                });
            }
            
            let procSection = document.getElementById('procedures-section');
            if (!procSection) {
                procSection = document.createElement('div');
                procSection.id = 'procedures-section';
                procSection.className = 'mt-8 space-y-4';
                procSection.innerHTML = `<h2 class="text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Avvia Nuova Procedura</h2><div id="procedures-list" class="space-y-3"></div>`;
                list.parentElement.appendChild(procSection);
            }
            
            const pList = document.getElementById('procedures-list');
            pList.innerHTML = '';
            procedures.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card rounded-2xl p-4 flex justify-between items-center cursor-pointer border-dashed hover:border-black transition active:scale-95';
                card.onclick = () => startNewSession(p.id);
                card.innerHTML = `
                    <div>
                        <h3 class="text-xs font-black uppercase tracking-tight">${p.title}</h3>
                        <p class="text-[8px] font-bold text-blue-500 uppercase tracking-widest mt-1">SOP ID: ${p.id}</p>
                    </div>
                    <i class="fas fa-plus text-gray-300 text-sm"></i>
                `;
                pList.appendChild(card);
            });
            
            document.getElementById('header-status').innerText = 'Dashboard Hub';
            document.getElementById('wizard-container').classList.add('hidden');
            document.getElementById('dashboard-container').classList.remove('hidden');
            hideLoader();
        }

        async function loadSession(id) {
            showLoader('Recupero Sessione...');
            document.getElementById('dashboard-container').classList.add('hidden');
            
            if(tg.BackButton) {
                tg.BackButton.show();
                tg.BackButton.onClick(() => {
                    document.getElementById('wizard-container').classList.add('hidden');
                    initApp();
                    tg.BackButton.hide();
                });
            }
            
            let data = await apiCall('GET', { type: 'CERT_STATE', session_id: id });
            
            if (data && data.session) {
                currentSession = data.session;
                if (currentSession.status === 'COMPLETED') {
                    showCompletion();
                } else {
                    renderCurrentStep();
                }
            } else {
                // Fallback mock session for debug
                currentSession = {
                    id: id, status: 'IN_PROGRESS', current_step_index: 0,
                    steps: [{ id: 's1', title: 'Step Mock', description: 'Descrizione mock', quality_check: { evidence_type: 'TEXT' } }]
                };
                renderCurrentStep();
            }
            hideLoader();
        }

        async function startNewSession(targetSopId) {
            const sid = targetSopId || sopId;
            if (!sid) {
                tg.showAlert("Seleziona una procedura da avviare.");
                return;
            }
            showLoader('Avvio certificazione...');
            const data = await apiCall('SAVE', { type: 'CERT_INIT', sop_id: sid });
            
            if (data && data.session_id) {
                loadSession(data.session_id);
            } else {
                tg.showAlert("Impossibile avviare la sessione. Verifica il backend n8n.");
                hideLoader();
            }
        }

        function renderCurrentStep() {
            document.getElementById('wizard-container').classList.remove('hidden');
            
            const stepIndex = currentSession.current_step_index;
            const step = currentSession.steps[stepIndex];
            const total = currentSession.steps.length;
            
            document.getElementById('header-status').innerText = `Sessione Attiva`;
            document.getElementById('step-label').innerText = `Step ${stepIndex + 1} di ${total}`;
            const pct = Math.round((stepIndex / total) * 100);
            document.getElementById('step-percentage').innerText = `${pct}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            
            document.getElementById('step-title').innerText = step.title;
            document.getElementById('step-description').innerText = step.description;
            
            // Read blueprint logic
            const requiredType = (step.quality_check && step.quality_check.evidence_type) ? step.quality_check.evidence_type : 'TEXT';
            const typeNames = { 'TEXT': 'Nota di Testo', 'VISION': 'Fotografia Visiva', 'SIGNATURE': 'Firma Digitale', 'FILE': 'Documento / File' };
            document.getElementById('required-evidence-badge').innerText = typeNames[requiredType] || requiredType;
            
            // Reset evidences
            document.getElementById('evidence-input-text').value = '';
            clearSignature();
            capturedPhotoB64 = null;
            selectedFileB64 = null;
            selectedFileMime = null;
            document.getElementById('fileNameDisplay').innerText = 'Nessun file';
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            document.getElementById('camera-feed').classList.add('hidden');
            document.getElementById('camera-canvas').classList.add('hidden');
            document.getElementById('camera-placeholder').classList.remove('hidden');
            document.getElementById('startCamBtn').classList.remove('hidden');
            document.getElementById('snapBtn').classList.add('hidden');
            document.getElementById('snapBtn').innerText = "🔴 Scatta Foto";
            if (document.getElementById('snapBtn').classList.contains('bg-green-600')) {
                document.getElementById('snapBtn').classList.replace('bg-green-600', 'bg-red-600');
            }
            document.getElementById('snapBtn').disabled = false;
            
            setEvidenceType(requiredType);
        }

        async function submitStep() {
            let evidenceData = null;
            let mimeType = null;

            if (activeEvidenceType === 'TEXT') {
                evidenceData = document.getElementById('evidence-input-text').value.trim();
                mimeType = "text/plain";
                if (!evidenceData) { tg.showAlert("Inserisci un testo prima di proseguire."); return; }
            } else if (activeEvidenceType === 'VISION') {
                if (!capturedPhotoB64) { tg.showAlert("Scatta una foto prima di proseguire."); return; }
                evidenceData = capturedPhotoB64;
                mimeType = "image/jpeg";
            } else if (activeEvidenceType === 'SIGNATURE') {
                if(!canvas) { tg.showAlert("Errore Canvas"); return; }
                const b = document.createElement('canvas'); b.width = canvas.width; b.height = canvas.height;
                if (canvas.toDataURL() === b.toDataURL()) { tg.showAlert("Inserisci una firma prima di proseguire."); return; }
                evidenceData = canvas.toDataURL('image/png').split(',')[1];
                mimeType = "image/png";
            } else if (activeEvidenceType === 'FILE') {
                if (!selectedFileB64) { tg.showAlert("Seleziona un file prima di proseguire."); return; }
                evidenceData = selectedFileB64;
                mimeType = selectedFileMime;
            }
            
            const stepIndex = currentSession.current_step_index;
            const step = currentSession.steps[stepIndex];
            
            showLoader('Salvataggio...');
            
            // API CALL: aggiorna step
            const res = await apiCall('SAVE', { 
                type: 'CERT_UPDATE',
                session_id: currentSession.id, 
                step_id: step.id, 
                evidence_type: activeEvidenceType,
                evidence: evidenceData,
                mime_type: mimeType
            });
            
            // Procedi anche se mock, ma idealmente basato sul db reale
            setTimeout(async () => {
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                
                currentSession.current_step_index++;
                if (currentSession.current_step_index >= currentSession.steps.length) {
                    await finishSession();
                } else {
                    renderCurrentStep();
                    hideLoader();
                }
            }, 600);
        }

        async function finishSession() {
            await apiCall('SAVE', { type: 'CERT_FINISH', session_id: currentSession.id });
            currentSession.status = 'COMPLETED';
            showCompletion();
            hideLoader();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function showCompletion() {
            document.getElementById('header-status').innerText = `Certificazione Chiusa`;
            document.getElementById('wizard-container').classList.add('hidden');
            document.getElementById('completion-screen').classList.remove('hidden');
            document.getElementById('completion-screen').classList.add('flex');
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
