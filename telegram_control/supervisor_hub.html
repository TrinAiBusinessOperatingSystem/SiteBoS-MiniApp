<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Supervisor Hub | SiteBoS</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #fafafa !important; color: #000000 !important; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card, .section-card, .dark-card, .upload-box { 
            background: white !important; 
            border: 1px solid #eeeeee !important; 
            box-shadow: none !important; 
        }
        input:focus, textarea:focus, select:focus { 
            border-color: #000000 !important; 
            box-shadow: none !important; 
            outline: none !important;
        }
        .text-primary, .text-black, .text-blue-600, .text-black { color: #000000 !important; }
        .bg-primary, .bg-black, .bg-black, .bg-black { background-color: #000000 !important; color: #ffffff !important; }
        .border-primary, .border-black, .border-blue-600, .border-black { border-color: #000000 !important; }
        .spinner { border-top-color: #000 !important; }
        input[type="checkbox"]:checked { background-color: #000 !important; border-color: #000 !important; }
        .fas, .far, .fal { font-weight: 900 !important; font-family: "Font Awesome 6 Free" !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { border: 2px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        // Blocco di Sicurezza: controlla tg.initData
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase tracking-widest">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="p-5 pb-24">

    <!-- LOADER (Globale) -->
    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <div id="loader-text" class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-500">Inizializzazione...</div>
    </div>

    <div class="max-w-md mx-auto space-y-6 animate-fade-in hidden" id="app-content">
        
        <!-- HEADER -->
        <header class="space-y-1 py-2 text-center">
            <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded-full mb-1">Supervisor Hub</div>
            <h1 class="text-xl font-black tracking-tighter uppercase leading-none">Certificazione</h1>
            <p id="header-status" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mt-1 italic">Recupero sessione...</p>
        </header>

        <!-- WIZARD CONTAINER -->
        <div id="wizard-container" class="space-y-6 hidden">
            <!-- Progress Bar -->
            <div class="space-y-2">
                <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest">
                    <span id="step-label">Step 1 di N</span>
                    <span id="step-percentage">0%</span>
                </div>
                <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-black transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- Current Step Content -->
            <div id="step-content" class="card rounded-3xl p-6 space-y-4">
                <h2 id="step-title" class="text-sm font-black uppercase tracking-tight">Titolo Step</h2>
                <p id="step-description" class="text-xs text-gray-500 font-medium">Descrizione di cosa fare...</p>
                
                <div class="pt-4 space-y-3">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Evidenza Richiesta</label>
                    <textarea id="evidence-input" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-xs outline-none focus:border-black transition-colors resize-none h-24" placeholder="Inserisci nota o URL evidenza..."></textarea>
                </div>
                
                <div class="pt-2">
                    <button onclick="submitStep()" class="w-full py-4 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition">
                        Conferma Step <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- COMPLETION SCREEN -->
        <div id="completion-screen" class="hidden flex-col items-center justify-center py-10 space-y-4 text-center">
            <div class="w-20 h-20 bg-black text-white rounded-full flex items-center justify-center text-3xl mb-4">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-xl font-black uppercase tracking-tight">Completato</h2>
            <p class="text-xs text-gray-500 font-medium">Tutte le evidenze sono state salvate in evidence_docs.</p>
            <button onclick="tg.close()" class="mt-4 px-8 py-3 bg-gray-100 text-black border border-border rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition">
                Chiudi MiniApp
            </button>
        </div>

    </div>

    <script>
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/supervisor-hub"; // Da aggiornare
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        
        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');
        
        let currentSession = null;
        
        async function apiCall(action, payload = {}) {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        action, 
                        ash, 
                        _auth: tg.initData,
                        ...payload 
                    })
                });
                if (!res.ok) throw new Error("Network error");
                return await res.json();
            } catch (e) {
                console.error("API Error:", e);
                tg.showAlert("Errore di connessione al server.");
                return null;
            }
        }

        function showLoader(text) {
            document.getElementById('loader').classList.remove('hidden');
            if (text) document.getElementById('loader-text').innerText = text;
        }

        function hideLoader() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
        }

        async function initApp() {
            if (!ash) {
                document.body.innerHTML = `<div class="h-full flex items-center justify-center font-black text-red-500">ASH MISSING</div>`;
                return;
            }
            
            showLoader('Recupero Sessione...');
            
            // Mock Data for frontend display
            const data = {
                session: {
                    status: 'IN_PROGRESS',
                    current_step_index: 0,
                    steps: [
                        { id: 's1', title: 'Verifica Sicurezza', description: 'Assicurati che i protocolli SSH siano attivi e documentati.' },
                        { id: 's2', title: 'Backup Dati', description: 'Inserisci l\\'URL del log di backup mensile.' },
                        { id: 's3', title: 'Review Utenti', description: 'Conferma rimozione accessi obsoleti.' }
                    ]
                }
            };
            
            setTimeout(() => {
                if (data && data.session) {
                    currentSession = data.session;
                    if (currentSession.status === 'COMPLETED') {
                        showCompletion();
                    } else {
                        renderCurrentStep();
                    }
                } else {
                    startNewSession();
                }
                hideLoader();
            }, 800);
        }

        async function startNewSession() {
            showLoader('Avvio nuova certificazione...');
            // API CALL: cert_init
            hideLoader();
        }

        function renderCurrentStep() {
            document.getElementById('wizard-container').classList.remove('hidden');
            
            const stepIndex = currentSession.current_step_index;
            const step = currentSession.steps[stepIndex];
            const total = currentSession.steps.length;
            
            document.getElementById('header-status').innerText = `Sessione Attiva`;
            document.getElementById('step-label').innerText = `Step ${stepIndex + 1} di ${total}`;
            const pct = Math.round((stepIndex / total) * 100);
            document.getElementById('step-percentage').innerText = `${pct}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            
            document.getElementById('step-title').innerText = step.title;
            document.getElementById('step-description').innerText = step.description;
            document.getElementById('evidence-input').value = '';
        }

        async function submitStep() {
            const evidence = document.getElementById('evidence-input').value.trim();
            if (!evidence) {
                tg.showAlert("Inserisci un'evidenza prima di proseguire.");
                return;
            }
            
            const stepIndex = currentSession.current_step_index;
            const step = currentSession.steps[stepIndex];
            
            showLoader('Salvataggio...');
            
            // API CALL: cert_update_step with { step_id: step.id, evidence }
            
            setTimeout(() => {
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                
                currentSession.current_step_index++;
                if (currentSession.current_step_index >= currentSession.steps.length) {
                    finishSession();
                } else {
                    renderCurrentStep();
                    hideLoader();
                }
            }, 600);
        }

        async function finishSession() {
            // API CALL: cert_finish
            currentSession.status = 'COMPLETED';
            showCompletion();
            hideLoader();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function showCompletion() {
            document.getElementById('header-status').innerText = `Certificazione Chiusa`;
            document.getElementById('wizard-container').classList.add('hidden');
            document.getElementById('completion-screen').classList.remove('hidden');
            document.getElementById('completion-screen').classList.add('flex');
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
