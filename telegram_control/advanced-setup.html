<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Setup Avanzato | SiteBoS</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function () {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-black uppercase tracking-widest">Accesso Proibito</h2></div>
                    </body>`;
                window.stop();
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', surface: '#ffffff', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #fafafa !important; color: #000000 !important; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-noir { background: white !important; border: 1px solid #eeeeee !important; box-shadow: none !important; border-radius: 1.5rem; padding: 1.5rem; }
        .label-micro { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #a3a3a3; }
        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="safe-area-inset min-h-screen flex flex-col p-6">

    <div class="max-w-md mx-auto w-full my-auto space-y-8 fade-in-up text-center">
        
        <!-- ICON WRAPPER -->
        <div class="inline-flex w-16 h-16 bg-black rounded-2xl items-center justify-center text-white mx-auto shadow-md">
            <i class="fas fa-tools text-xl"></i>
        </div>

        <!-- CONTENT CARD -->
        <div class="card-noir space-y-4">
            <span class="label-micro">Configurazione Avanzata</span>
            <h2 class="text-lg font-black uppercase tracking-tight">Modulo in Rilascio</h2>
            <p class="text-xs text-gray-500 font-medium leading-relaxed">
                Il modulo di configurazione avanzata specifico per la tua verticale aziendale è attualmente in fase di sviluppo e sarà disponibile con i prossimi aggiornamenti.
            </p>
        </div>

        <!-- BACK BUTTON IN-PAGE -->
        <button onclick="goBack()" class="w-full py-4 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition shadow-sm">
            Torna all'Hub
        </button>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        let ash = urlParams.get('ash');
        let msg = urlParams.get('msg');

        // Robust parsing for dirty ash: TOKEN?msg=ID
        if (ash && ash.includes('?msg=')) {
            const parts = ash.split('?msg=');
            ash = parts[0];
            if (!msg) msg = parts[1];
        }

        // Initialize back button navigation in Telegram WebApp
        if (tg.BackButton) {
            tg.BackButton.show();
            tg.BackButton.onClick(goBack);
        }

        function goBack() {
            location.href = `identity_hub.html?ash=${ash}&msg=${msg || ''}`;
        }
    </script>
</body>
</html>
