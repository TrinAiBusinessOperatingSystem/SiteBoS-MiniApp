<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Handover Protocol | SiteBoS</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        bg: '#fafafa',
                        border: '#eeeeee'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Spinner Noir */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }

        /* Custom Checkbox Black */
        input[type="checkbox"] {
            appearance: none; width: 22px; height: 22px; border: 2px solid #000; border-radius: 6px;
            position: relative; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after {
            content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            color: white; font-size: 11px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        // ── 1. SICUREZZA ──
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase tracking-widest text-white">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="bg-bg text-black min-h-screen flex flex-col overflow-x-hidden no-scrollbar pb-24">

    <!-- HEADER ENTERPRISE -->
    <header class="bg-white border-b border-border p-6 sticky top-0 z-50 shadow-sm flex items-center gap-4 fade-in-up">
        <div class="w-12 h-12 bg-black text-white rounded-2xl flex items-center justify-center text-xl shadow-lg">
            <i class="fas fa-headset"></i>
        </div>
        <div>
            <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-[0.2em] rounded-full mb-1">Communication Hub</div>
            <h1 class="text-xl font-black tracking-tighter uppercase leading-none">Handover Chat</h1>
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">Owner Response Protocol</p>
        </div>
    </header>

    <!-- MAIN FORM -->
    <main class="flex-1 p-6 space-y-8 fade-in-up" style="animation-delay: 0.1s">
        
        <!-- TEXT AREA BOX -->
        <div class="bg-white rounded-[2rem] p-6 border border-border shadow-sm space-y-4">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-[9px] font-black uppercase tracking-widest text-gray-300">Message Content</span>
                <span id="charCount" class="text-[9px] font-bold text-gray-200 uppercase">Rich Text Support</span>
            </div>
            <textarea id="messageInput" rows="10" 
                class="w-full bg-gray-50 p-6 rounded-[1.5rem] text-sm font-medium border border-transparent focus:border-black outline-none transition-all resize-none leading-relaxed"
                placeholder="Scrivi qui la risposta per lo stakeholder..."></textarea>
        </div>

        <!-- ATTACHMENT BOX -->
        <div class="space-y-3">
            <span class="text-[9px] font-black uppercase tracking-widest text-gray-400 ml-2 italic">Attachment (Optional)</span>
            <div id="uploadBox" onclick="document.getElementById('fileInput').click()" 
                class="w-full border-2 border-dashed border-gray-200 bg-white rounded-[2rem] py-10 flex flex-col items-center justify-center cursor-pointer hover:border-black transition-all group">
                
                <div id="uploadUI" class="text-center">
                    <i class="fas fa-paperclip text-2xl text-gray-200 group-hover:text-black transition-colors mb-2"></i>
                    <p class="text-[9px] font-black uppercase tracking-widest text-gray-400 group-hover:text-black leading-none">PDF, JPG, PNG</p>
                </div>

                <div id="filePreviewUI" class="hidden text-center">
                    <i class="fas fa-file-circle-check text-2xl text-black mb-2"></i>
                    <p id="fileName" class="text-[10px] font-black text-black truncate max-w-[200px] uppercase"></p>
                    <button onclick="removeFile(event)" class="text-[8px] font-black uppercase text-red-500 mt-2 tracking-tighter">Rimuovi Allegato</button>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" accept=".pdf,image/jpeg,image/png" onchange="handleFileSelect(event)">
        </div>

        <!-- LOGISTICS FLAGS -->
        <div class="bg-black text-white p-6 rounded-[2rem] flex items-center gap-4 shadow-xl">
            <input type="checkbox" id="closeTicket" class="border-white/20">
            <div class="flex-1">
                <p class="text-[10px] font-black uppercase tracking-widest text-white leading-none">Close Handover</p>
                <p class="text-[8px] text-neutral-500 font-bold uppercase tracking-tight mt-1">Segna la pratica come risolta nel database</p>
            </div>
        </div>

    </main>

    <!-- ACTION FOOTER -->
    <footer class="fixed bottom-8 left-0 w-full px-6 flex items-center justify-between z-[100] gap-4">
        <button onclick="tg.close()" class="w-16 h-16 bg-white text-black rounded-full shadow-2xl flex items-center justify-center text-xl border border-gray-100 active:scale-90 transition">
            <i class="fas fa-times"></i>
        </button>
        <button id="sendBtn" class="flex-1 h-16 bg-black text-white rounded-full shadow-2xl font-black uppercase tracking-[0.2em] text-[11px] active:scale-95 transition-all flex items-center justify-center gap-3">
            <i class="fas fa-paper-plane text-sm"></i> <span id="btnText">Transmit Response</span>
        </button>
    </footer>

    <!-- GLOBAL LOADER -->
    <div id="loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[999] hidden flex items-center justify-center">
        <div class="spinner"></div>
    </div>

    <script>
        'use strict';

        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');

        const dom = {
            message: document.getElementById('messageInput'),
            close: document.getElementById('closeTicket'),
            fileInput: document.getElementById('fileInput'),
            uploadBox: document.getElementById('uploadBox'),
            uploadUI: document.getElementById('uploadUI'),
            previewUI: document.getElementById('filePreviewUI'),
            fileName: document.getElementById('fileName'),
            btn: document.getElementById('sendBtn'),
            txt: document.getElementById('btnText'),
            loader: document.getElementById('loader')
        };

        let selectedFile = null;

        // ── FILE HANDLING ──
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 10 * 1024 * 1024) {
                tg.showAlert("File eccede il limite di 10MB");
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                selectedFile = {
                    base64_content: event.target.result.split(',')[1],
                    mime_type: file.type,
                    file_name: file.name
                };
                dom.uploadUI.classList.add('hidden');
                dom.previewUI.classList.remove('hidden');
                dom.fileName.innerText = file.name;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            };
            reader.readAsDataURL(file);
        }

        function removeFile(e) {
            e.stopPropagation();
            selectedFile = null;
            dom.fileInput.value = '';
            dom.previewUI.classList.add('hidden');
            dom.uploadUI.classList.remove('hidden');
        }

        // ── TRANSMISSION ──
        dom.btn.onclick = async () => {
            const text = dom.message.value.trim();
            if (!text && !selectedFile) {
                tg.showAlert("Il protocollo richiede un messaggio o un allegato.");
                return;
            }

            if (!ash) {
                tg.showAlert("SECURITY ERROR: Identity Ash missing.");
                return;
            }

            dom.btn.disabled = true;
            dom.loader.classList.remove('hidden');
            dom.txt.innerText = "TRANSMITTING...";

            const payload = {
                _auth: tg.initData,
                user_id: tg.initDataUnsafe?.user?.id,
                action: "handover",
                ash: ash,
                message_text: text,
                close_ticket: dom.close.checked,
                file_data: selectedFile
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    dom.btn.className = "flex-1 h-16 bg-green-600 text-white rounded-full shadow-2xl font-black uppercase text-[11px] flex items-center justify-center gap-3";
                    dom.txt.innerText = "DEPLOYED SUCCESSFUL";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1500);
                } else throw new Error();

            } catch (err) {
                dom.loader.classList.add('hidden');
                dom.btn.disabled = false;
                dom.txt.innerText = "RETRY DEPLOY";
                tg.showAlert("Errore di rete durante l'Handover.");
            }
        };

        // UI Ready
        window.onload = () => {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };
    </script>
</body>
</html>
