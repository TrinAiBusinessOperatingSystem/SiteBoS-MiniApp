<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Handover Chat | SiteBoS</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#212D67', bg: '#f4f7f9', border: '#e5e7eb' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        textarea:focus { border-color: #212D67; box-shadow: 0 0 0 4px rgba(33, 45, 103, 0.05); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out; }
    </style>

    <script>
        // ── 1. SICUREZZA: IL BUTTAFUORI ──
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-black uppercase tracking-widest">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="bg-bg text-black min-h-screen flex flex-col no-scrollbar">

    <!-- HEADER -->
    <header class="bg-white border-b border-border p-6 sticky top-0 z-50 shadow-sm flex items-center gap-4">
        <div class="w-12 h-12 bg-brand text-white rounded-2xl flex items-center justify-center text-xl">
            <i class="fas fa-reply-all"></i>
        </div>
        <div>
            <h1 class="text-xl font-black tracking-tighter uppercase leading-none text-brand">Handover Chat</h1>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Risposta diretta al cliente</p>
        </div>
    </header>

    <!-- FORM DI RISPOSTA -->
    <main class="flex-1 p-6 space-y-6">
        
        <!-- MESSAGGIO TEXT -->
        <div class="space-y-2">
            <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Messaggio di testo</label>
            <textarea id="messageInput" rows="8" 
                class="w-full bg-white p-6 rounded-[2rem] text-sm font-medium border border-border outline-none transition-all resize-none leading-relaxed shadow-sm"
                placeholder="Scrivi qui la tua risposta..."></textarea>
        </div>

        <!-- AREA ALLEGATO -->
        <div class="space-y-2">
            <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Allegato (Opzionale)</label>
            <div id="uploadBox" onclick="document.getElementById('fileInput').click()" 
                class="w-full border-2 border-dashed border-gray-200 bg-white rounded-[2rem] p-8 flex flex-col items-center justify-center cursor-pointer hover:border-brand transition-all group">
                
                <div id="uploadUI" class="text-center">
                    <i class="fas fa-paperclip text-2xl text-gray-300 group-hover:text-brand transition-colors mb-2"></i>
                    <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 group-hover:text-brand">PDF o Immagine</p>
                </div>

                <div id="filePreviewUI" class="hidden text-center animate-in">
                    <i class="fas fa-file-circle-check text-2xl text-green-600 mb-2"></i>
                    <p id="fileName" class="text-[11px] font-bold text-black truncate max-w-[200px]"></p>
                    <button onclick="removeFile(event)" class="text-[9px] font-black uppercase text-red-500 mt-2 hover:underline">Rimuovi</button>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" accept=".pdf,image/jpeg,image/png" onchange="handleFileSelect(event)">
        </div>

        <!-- CHIUSURA TICKET -->
        <div class="flex items-center gap-3 p-5 bg-white rounded-3xl border border-border shadow-sm">
            <input type="checkbox" id="closeTicket" class="w-6 h-6 accent-brand cursor-pointer">
            <label for="closeTicket" class="text-xs font-black text-gray-600 cursor-pointer flex-1 uppercase tracking-tight">
                Chiudi Pratica (Stakeholder Risolto)
            </label>
        </div>
    </main>

    <!-- FOOTER AZIONI -->
    <footer class="p-6 bg-white border-t border-border flex items-center gap-4 pb-10">
        <button onclick="tg.close()" class="w-16 h-16 bg-white text-black rounded-full shadow-md flex items-center justify-center text-xl border border-border active:scale-90 transition">
            <i class="fas fa-times"></i>
        </button>
        <button id="sendBtn" class="flex-1 h-16 bg-brand text-white rounded-[2rem] shadow-2xl font-black uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-3">
            <i class="fas fa-paper-plane"></i> <span id="btnText">Invia Risposta</span>
        </button>
    </footer>

    <script>
        'use strict';

        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');

        const dom = {
            message: document.getElementById('messageInput'),
            close: document.getElementById('closeTicket'),
            fileInput: document.getElementById('fileInput'),
            uploadBox: document.getElementById('uploadBox'),
            uploadUI: document.getElementById('uploadUI'),
            previewUI: document.getElementById('filePreviewUI'),
            fileName: document.getElementById('fileName'),
            btn: document.getElementById('sendBtn'),
            txt: document.getElementById('btnText')
        };

        let selectedFile = null;

        // ── GESTIONE FILE ──
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 10 * 1024 * 1024) {
                tg.showAlert("Il file è troppo grande (Max 10MB)");
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                selectedFile = {
                    base64_content: event.target.result.split(',')[1],
                    mime_type: file.type,
                    file_name: file.name
                };
                
                // Aggiorna UI
                dom.uploadUI.classList.add('hidden');
                dom.previewUI.classList.remove('hidden');
                dom.fileName.innerText = file.name;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            };
            reader.readAsDataURL(file);
        }

        function removeFile(e) {
            e.stopPropagation();
            selectedFile = null;
            dom.fileInput.value = '';
            dom.previewUI.classList.add('hidden');
            dom.uploadUI.classList.remove('hidden');
        }

        // ── INVIO ──
        dom.btn.onclick = async () => {
            const text = dom.message.value.trim();
            
            if (!text && !selectedFile) {
                tg.showAlert("Inserisci un messaggio o allega un file.");
                return;
            }

            if (!ash) {
                tg.showAlert("Errore: Identificativo ASH mancante.");
                return;
            }

            // Lock UI
            dom.btn.disabled = true;
            dom.btn.classList.replace('bg-brand', 'bg-gray-400');
            dom.txt.innerText = "TRASMISSIONE...";

            const payload = {
                _auth: tg.initData,
                user_id: tg.initDataUnsafe?.user?.id,
                action: "handover",
                ash: ash,
                message_text: text,
                close_ticket: dom.close.checked,
                file_data: selectedFile // Sarà null se non caricato
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    dom.btn.classList.replace('bg-gray-400', 'bg-green-600');
                    dom.txt.innerText = "INVIATO!";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1200);
                } else {
                    throw new Error();
                }
            } catch (err) {
                dom.btn.disabled = false;
                dom.btn.classList.replace('bg-gray-400', 'bg-brand');
                dom.txt.innerText = "RIPROVA INVIO";
                tg.showAlert("Errore durante l'invio a n8n.");
            }
        };

        window.onload = () => dom.message.focus();
    </script>
</body>
</html>
