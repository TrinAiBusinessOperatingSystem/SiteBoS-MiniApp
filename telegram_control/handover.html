<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="color-scheme" content="light">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Handover Protocol | SiteBoS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
(function() {
    // Riferimento locale e temporaneo all'SDK per il controllo iniziale
    const tempTg = window.Telegram?.WebApp;
    const isTelegramSession = tempTg && tempTg.initData && tempTg.initData !== "" && tempTg.platform !== "unknown";

    if (!isTelegramSession) {
        const currentPath = window.location.pathname;
        let redirectPath = "index.html";

        if (//telegram_control/[^/]+//.test(currentPath)) {
            redirectPath = "../../index.html";
        } else if (currentPath.includes("/telegram_control/")) {
            redirectPath = "../index.html";
        }

        window.location.replace(redirectPath);
    }
})();

        tailwind.config = {
            theme: { extend: { colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' }, borderRadius: { '3xl': '1.5rem' } } }
        }
    </script>
    <style>

/* SiteBoS Architect Alignment */
body { background-color: #fafafa !important; color: #000000 !important; }
.card, .section-card, .dark-card, .upload-box { 
    background: white !important; 
    border: 1px solid #eeeeee !important; 
    box-shadow: none !important; 
}
input:focus, textarea:focus, select:focus { 
    border-color: #000000 !important; 
    box-shadow: none !important; 
    outline: none !important;
}
.text-primary, .text-black, .text-blue-600, .text-black { color: #000000 !important; }
.bg-primary, .bg-black, .bg-black, .bg-black { background-color: #000000 !important; color: #ffffff !important; }
.border-primary, .border-black, .border-blue-600, .border-black { border-color: #000000 !important; }
.spinner { border-top-color: #000 !important; }
input[type="checkbox"]:checked { background-color: #000 !important; border-color: #000 !important; }
/* Forza icone pesanti */
.fas, .far, .fal { font-weight: 900 !important; font-family: "Font Awesome 6 Free" !important; }


        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #fafafa; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spinner { border: 2px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        input[type="checkbox"] { appearance: none; width: 18px; height: 18px; border: 2px solid #000; border-radius: 4px; position: relative; cursor: pointer; }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after { content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; color: white; font-size: 9px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-bg text-black min-h-screen flex flex-col pb-24 overflow-x-hidden no-scrollbar">

    <!-- HEADER -->
    <header class="bg-white border-b border-border p-5 sticky top-0 z-50 shadow-sm flex items-center gap-4 fade-in-up">
        <div class="w-10 h-10 bg-black text-white rounded-xl flex items-center justify-center text-lg shadow-md">
            <i class="fas fa-headset"></i>
        </div>
        <div>
            <div class="inline-block px-2 py-0.5 bg-black text-white text-[6px] font-black uppercase tracking-widest rounded-full mb-1">Owner Hub</div>
            <h1 class="text-base font-black tracking-tighter uppercase leading-none">Handover Chat</h1>
            <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mt-0.5 italic">Protocollo Risposta</p>
        </div>
    </header>

    <main class="flex-1 p-5 space-y-6 fade-in-up">
        
        <!-- MESSAGE CARD -->
        <div class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-3">
            <div class="flex justify-between items-center px-1">
                <span class="text-[8px] font-black uppercase tracking-widest text-gray-300">Messaggio</span>
                <span class="text-[8px] font-bold text-gray-200 uppercase italic">Encrypted</span>
            </div>
            <textarea id="messageInput" rows="6" 
                class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-medium border border-transparent focus:border-black outline-none transition-all resize-none leading-relaxed"
                placeholder="Scrivi qui la risposta..."></textarea>
        </div>

        <!-- ATTACHMENT -->
        <div class="space-y-2">
            <span class="text-[8px] font-black uppercase tracking-widest text-gray-500 ml-2 italic">Allegato (Opzionale)</span>
            <div id="uploadBox" onclick="document.getElementById('fileInput').click()" 
                class="w-full border-2 border-dashed border-gray-100 bg-white rounded-3xl py-8 flex flex-col items-center justify-center cursor-pointer hover:border-black transition-all">
                <div id="uploadUI" class="text-center">
                    <i class="fas fa-paperclip text-xl text-gray-200 mb-1"></i>
                    <p class="text-[8px] font-black uppercase tracking-widest text-gray-500">PDF, JPG, PNG (Max 10MB)</p>
                </div>
                <div id="filePreviewUI" class="hidden text-center">
                    <i class="fas fa-file-circle-check text-xl text-black mb-1"></i>
                    <p id="fileName" class="text-[9px] font-black text-black truncate max-w-[150px] uppercase"></p>
                    <button onclick="removeFile(event)" class="text-[7px] font-black uppercase text-red-500 mt-1">Rimuovi</button>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" accept=".pdf,image/jpeg,image/png" onchange="handleFileSelect(event)">
        </div>

        <!-- CLOSE TICKET -->
        <div class="bg-white rounded-2xl p-4 border border-border shadow-sm flex items-center gap-3 transition-all active:scale-[0.98]">
            <input type="checkbox" id="closeTicket">
            <label for="closeTicket" class="flex-1 cursor-pointer">
                <p class="text-[9px] font-black uppercase tracking-widest text-black">Chiudi Pratica</p>
                <p class="text-[7px] text-gray-500 font-bold uppercase tracking-tight">Risolvi e archivia nel database</p>
            </label>
        </div>

    </main>

    <footer class="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-lg border-t border-gray-100 z-[100]">
        <div class="flex items-center gap-3 max-w-md mx-auto">
            <button onclick="tg.close()" class="w-10 h-10 bg-white text-black rounded-xl shadow-md flex items-center justify-center text-lg border border-gray-100 active:scale-90 transition">
                <i class="fas fa-times"></i>
            </button>
            <button id="sendBtn" class="flex-1 h-10 bg-black text-white rounded-xl shadow-sm font-black uppercase tracking-widest text-[9px] active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-paper-plane text-xs"></i> <span id="btnText">Invia Risposta</span>
            </button>
        </div>
    </footer>

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[999] hidden flex items-center justify-center">
        <div class="spinner"></div>
    </div>

    <script>
        'use strict';
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const tg = window.Telegram.WebApp;
        if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#ffffff');
        tg.ready(); tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');
        const dom = {
            message: document.getElementById('messageInput'), close: document.getElementById('closeTicket'),
            fileInput: document.getElementById('fileInput'), uploadBox: document.getElementById('uploadBox'),
            uploadUI: document.getElementById('uploadUI'), previewUI: document.getElementById('filePreviewUI'),
            fileName: document.getElementById('fileName'), btn: document.getElementById('sendBtn'),
            txt: document.getElementById('btnText'), loader: document.getElementById('loader')
        };
        let selectedFile = null;

        function handleFileSelect(e) {
            const f = e.target.files[0]; if (!f) return;
            if (f.size > 10 * 1024 * 1024) { tg.showAlert("File troppo grande"); return; }
            const r = new FileReader(); r.onload = (ev) => {
                selectedFile = { base64_content: ev.target.result.split(',')[1], mime_type: f.type, file_name: f.name };
                dom.uploadUI.classList.add('hidden'); dom.previewUI.classList.remove('hidden');
                dom.fileName.innerText = f.name; if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            };
            r.readAsDataURL(f);
        }

        function removeFile(e) { e.stopPropagation(); selectedFile = null; dom.fileInput.value = ''; dom.previewUI.classList.add('hidden'); dom.uploadUI.classList.remove('hidden'); }

        dom.btn.onclick = async () => {
            const text = dom.message.value.trim();
            if (!text && !selectedFile) { tg.showAlert("Inserisci un messaggio."); return; }
            if (!ash) { tg.showAlert("Parametri mancanti."); return; }
            dom.btn.disabled = true; dom.loader.classList.remove('hidden'); dom.txt.innerText = "INVIO...";
            try {
                const r = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ _auth: tg.initData, user_id: tg.initDataUnsafe?.user?.id, action: "handover", ash: ash, message_text: text, close_ticket: dom.close.checked, file_data: selectedFile }) });
                if (r.ok) { dom.btn.className = "flex-1 h-12 bg-green-600 text-black rounded-xl shadow-sm font-black uppercase text-[10px] flex items-center justify-center gap-2"; dom.txt.innerText = "INVIATO!"; if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); setTimeout(() => tg.close(), 1200); }
                else throw 0;
            } catch (err) { dom.loader.classList.add('hidden'); dom.btn.disabled = false; dom.txt.innerText = "RIPROVA"; }
        };
    </script>
</body>
</html>
