<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Handover Response | SiteBoS</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#212D67',
                        success: '#27ae60',
                        bg: '#f4f7f9',
                        border: '#e5e7eb'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .spinner { border: 3px solid rgba(33, 45, 103, 0.1); border-top-color: #212D67; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Effetto focus sulla textarea */
        textarea:focus { border-color: #212D67; box-shadow: 0 0 0 4px rgba(33, 45, 103, 0.05); }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        // ── 1. SICUREZZA: IL BUTTAFUORI ──
        (function() {
            const isTelegram = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "";
            if (!isTelegram) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div>
                            <h1 class="text-6xl mb-4">🚫</h1>
                            <h2 class="text-xl font-black uppercase tracking-widest">Accesso Negato</h2>
                            <p class="opacity-40 text-sm mt-4 leading-relaxed">Interfaccia ad uso esclusivo dei Titolari SiteBoS.</p>
                        </div>
                    </body>`;
                window.stop();
                throw new Error("Unauthorized Access");
            }
        })();
    </script>
</head>
<body class="bg-bg text-black min-h-screen flex flex-col">

    <!-- OVERLAY DI CARICAMENTO -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-brand">Caricamento Contesto...</p>
    </div>

    <!-- HEADER FISSO -->
    <header class="bg-white border-b border-border p-5 sticky top-0 z-50 shadow-sm flex items-center gap-4">
        <div class="w-12 h-12 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-lg">
            <i class="fas fa-headset"></i>
        </div>
        <div class="flex-1 overflow-hidden">
            <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Risposta a Stakeholder</p>
            <h1 id="clientName" class="text-lg font-black tracking-tighter truncate leading-tight italic text-brand">...</h1>
            <p id="productName" class="text-[10px] font-bold text-gray-500 truncate uppercase tracking-tighter">Oggetto: ...</p>
        </div>
    </header>

    <!-- AREA DI COMPOSIZIONE -->
    <main class="flex-1 p-6 space-y-6 fade-in">
        <div class="space-y-2">
            <div class="flex justify-between items-center px-1">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Il tuo messaggio</label>
                <span class="text-[9px] font-bold text-gray-300">Markdown supportato</span>
            </div>
            <textarea id="messageInput" rows="10" 
                class="w-full bg-white p-6 rounded-[2rem] text-sm font-medium border border-border outline-none transition-all resize-none leading-relaxed shadow-sm"
                placeholder="Scrivi qui la risposta per il cliente..."></textarea>
        </div>

        <!-- TASTO CHIUSURA TICKET (LOGICA MongoDB STATE) -->
        <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-2xl border border-border">
            <input type="checkbox" id="closeTicketCheck" class="w-5 h-5 accent-brand cursor-pointer">
            <label for="closeTicketCheck" class="text-xs font-bold text-gray-600 cursor-pointer flex-1">
                Segna come Pratica Risolta (Close Ticket)
            </label>
        </div>
    </main>

    <!-- FOOTER AZIONI -->
    <footer class="p-6 bg-white border-t border-border flex items-center gap-4 pb-10 shadow-[0_-10px_30px_rgba(0,0,0,0.02)]">
        <button onclick="tg.close()" class="w-16 h-16 bg-white text-black rounded-full shadow-md flex items-center justify-center text-xl border border-border active:scale-90 transition">
            <i class="fas fa-times"></i>
        </button>
        <button id="sendBtn" class="flex-1 h-16 bg-brand text-white rounded-[2rem] shadow-2xl font-black uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-3">
            <i class="fas fa-paper-plane"></i> <span id="sendBtnText">Invia Risposta</span>
        </button>
    </footer>

    <script>
        'use strict';

        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');

        const dom = {
            overlay: document.getElementById('loadingOverlay'),
            clientName: document.getElementById('clientName'),
            productName: document.getElementById('productName'),
            message: document.getElementById('messageInput'),
            closeCheck: document.getElementById('closeTicketCheck'),
            sendBtn: document.getElementById('sendBtn'),
            sendBtnText: document.getElementById('sendBtnText')
        };

        // ── 1. INIZIALIZZAZIONE (GET CONTEXT) ──
        async function initHandover() {
            if (!ash) {
                tg.showAlert("Errore: Identificativo 'ash' mancante. Impossibile procedere.");
                return;
            }

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        _auth: tg.initData,
                        action: "get_handover_context",
                        ash: ash
                    })
                });

                const data = await response.json();

                if (data.status === "success") {
                    dom.clientName.innerText = data.client_name || "Cliente Sconosciuto";
                    dom.productName.innerText = "Oggetto: " + (data.product_name || "Assistenza Generale");
                    
                    // Rimuovi loader
                    dom.overlay.classList.add('opacity-0');
                    setTimeout(() => dom.overlay.classList.add('hidden'), 500);
                } else {
                    throw new Error(data.message || "Errore nel caricamento dati");
                }

            } catch (err) {
                console.error(err);
                tg.showAlert("Impossibile recuperare i dati del cliente. Riprova più tardi.");
            }
        }

        // ── 2. INVIO RISPOSTA ──
        dom.sendBtn.onclick = async () => {
            const text = dom.message.value.trim();
            if (!text) {
                tg.showAlert("Per favore, scrivi un messaggio prima di inviare.");
                return;
            }

            // Lock UI
            dom.sendBtn.disabled = true;
            dom.sendBtn.classList.replace('bg-brand', 'bg-gray-400');
            dom.sendBtnText.innerText = "TRASMISSIONE...";

            const payload = {
                _auth: tg.initData,
                user_id: tg.initDataUnsafe?.user?.id,
                action: "handover_send",
                ash: ash,
                message_text: text,
                close_ticket: dom.closeCheck.checked
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    // Success Feedback
                    dom.sendBtn.classList.replace('bg-gray-400', 'bg-success');
                    dom.sendBtnText.innerText = "INVIATO!";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

                    // Chiusura automatica
                    setTimeout(() => tg.close(), 1500);
                } else {
                    throw new Error("Errore Server");
                }

            } catch (err) {
                dom.sendBtn.disabled = false;
                dom.sendBtn.classList.replace('bg-gray-400', 'bg-brand');
                dom.sendBtnText.innerText = "INVIA RISPOSTA";
                tg.showAlert("Errore durante l'invio. Verifica la connessione.");
            }
        };

        // Avvio
        initHandover();
    </script>
</body>
</html>
