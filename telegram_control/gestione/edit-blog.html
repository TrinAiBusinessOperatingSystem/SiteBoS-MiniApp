<!DOCTYPE html>
<html lang="it">

<head>
    <meta name="color-scheme" content="light">
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Content Architect | SiteBoS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
(function() {
    // Riferimento locale e temporaneo all'SDK per il controllo iniziale
    const tempTg = window.Telegram?.WebApp;
    const isTelegramSession = tempTg && tempTg.initData && tempTg.initData !== "" && tempTg.platform !== "unknown";

    if (!isTelegramSession) {
        const currentPath = window.location.pathname;
        let redirectPath = "index.html";

        if (currentPath.includes('/telegram_control/')) {
            const parts = currentPath.split('/telegram_control/');
            const subPath = parts[1] || '';
            if (subPath.includes('/')) {
                redirectPath = "../../index.html";
            } else {
                redirectPath = "../index.html";
            }
        }

        window.location.replace(redirectPath);
    }
})();

        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee', danger: '#ef4444' },
                    borderRadius: { '3xl': '1.5rem' }
                }
            }
        }
    </script>
    <style>
        /* SiteBoS Architect Alignment */
        body {
            background-color: #fafafa !important;
            color: #000000 !important;
        }

        .card,
        .section-card,
        .dark-card,
        .upload-box {
            background: white !important;
            border: 1px solid #eeeeee !important;
            box-shadow: none !important;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #000000 !important;
            box-shadow: none !important;
            outline: none !important;
        }

        .text-primary,
        .text-black,
        .text-blue-600,
        .text-black {
            color: #000000 !important;
        }

        .bg-primary,
        .bg-black,
        .bg-black,
        .bg-black {
            background-color: #000000 !important;
            color: #ffffff !important;
        }

        .border-primary,
        .border-black,
        .border-blue-600,
        .border-black {
            border-color: #000000 !important;
        }

        .spinner {
            border-top-color: #000 !important;
        }

        input[type="checkbox"]:checked {
            background-color: #000 !important;
            border-color: #000 !important;
        }

        /* Forza icone pesanti */
        .fas,
        .far,
        .fal {
            font-weight: 900 !important;
            font-family: "Font Awesome 6 Free" !important;
        }


        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #fafafa;
            color: #000;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .spinner {
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: #000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input,
        textarea {
            outline: none !important;
        }

        .section-card {
            background: white;
            border: 1px solid #eeeeee;
            border-radius: 1.5rem;
            padding: 1.25rem;
        }

        .label-micro {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #a3a3a3;
            margin-left: 0.5rem;
            margin-bottom: 0.2rem;
            display: block;
        }
    </style>
</head>

<body class="p-4 pb-24">

    <div class="max-w-md mx-auto space-y-6 fade-in">

        <!-- HEADER -->
        <header class="flex justify-between items-center py-4 border-b border-black">
            <h1 class="text-lg font-black tracking-tighter uppercase">Content Architect</h1>
            <div id="loader" class="spinner hidden"></div>
        </header>

        <!-- IMAGE -->
        <section class="space-y-1">
            <span class="label-micro">Cover Image</span>
            <div id="imageBtn"
                class="relative w-full aspect-video bg-white rounded-3xl overflow-hidden border border-neutral-100 flex items-center justify-center cursor-pointer bg-gray-50"
                onclick="document.getElementById('fileInput').click()">
                <img id="featuredImage" src="" class="hidden w-full h-full object-cover">
                <div id="imagePlaceholder" class="flex flex-col items-center text-neutral-300">
                    <i class="fas fa-camera text-xl mb-1"></i>
                    <span class="text-[7px] font-black uppercase">Change Image</span>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewFile(event)">
        </section>

        <!-- SEO -->
        <section class="section-card bg-neutral-50 !border-dashed space-y-3">
            <span class="label-micro">SEO Configuration</span>
            <input type="text" id="seo_meta_title"
                class="w-full bg-white border border-neutral-100 rounded-xl p-3 text-xs font-bold"
                placeholder="Meta Title">
            <textarea id="seo_meta_description"
                class="w-full bg-white border border-neutral-100 rounded-xl p-3 text-[10px]" rows="2"
                placeholder="Meta Description"></textarea>
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="seo_keywords"
                    class="w-full bg-white border border-neutral-100 rounded-xl p-3 text-[9px]" placeholder="Keywords">
                <input type="text" id="seo_slug"
                    class="w-full bg-white border border-neutral-100 rounded-xl p-3 text-[9px]" placeholder="Slug">
            </div>
        </section>

        <!-- HERO -->
        <section class="section-card space-y-2">
            <span class="label-micro">Hero Area</span>
            <input type="text" id="hero_title" class="w-full text-base font-black border-b border-neutral-50 py-1"
                placeholder="Titolo H1">
            <textarea id="hero_subtitle" class="w-full text-xs font-medium text-neutral-500" rows="2"
                placeholder="Sottotitolo"></textarea>
            <input type="text" id="hero_risk_reversal" class="w-full bg-neutral-50 rounded-xl p-3 text-[9px]"
                placeholder="Risk Reversal">
        </section>

        <!-- DYNAMIC CONTENT -->
        <div id="mainContent" class="space-y-6"></div>

    </div>

    <!-- ACTION BAR (MOBILE ONLY) -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-lg border-t border-gray-100 z-50">
        <div class="max-w-md mx-auto grid grid-cols-3 gap-2">
            <button onclick="deleteBlog()"
                class="h-12 bg-white border border-red-500 text-red-500 rounded-xl font-black text-[9px] uppercase active:bg-red-50">Elimina</button>
            <button onclick="sendUpdate('save_blog')"
                class="h-12 bg-white border border-black text-black rounded-xl font-black text-[9px] uppercase active:bg-gray-50">Salva</button>
            <button onclick="confirmPublish()"
                class="h-12 bg-black text-white rounded-xl font-black text-[9px] uppercase shadow-sm active:scale-95">Pubblica</button>
        </div>
    </div>

    <script>
        'use strict';
        const tg = window.Telegram.WebApp;
        if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#ffffff');
        tg.expand(); tg.ready();
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/914bd78e-8a41-46d7-8935-7eb73cbbae66";

        const urlParams = new URLSearchParams(window.location.search);
        let ash = urlParams.get('ash');
        let msg = urlParams.get('msg') || urlParams.get('message_id');
        const blogId = urlParams.get('sop_id') || urlParams.get('blog_id');

        // Robust parsing for dirty ash: TOKEN?msg=ID
        if (ash && ash.includes('?msg=')) {
            const parts = ash.split('?msg=');
            ash = parts[0];
            if (!msg) msg = parts[1];
        }

        let currentData = null, base64Image = null;

        async function loadData() {
            if (!blogId) { console.error("ID mancante"); return; }
            toggleLoader(true);
            try {
                const r = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'get_blog', blog_id: blogId, ash: ash, msg: msg })
                });
                const res = await r.json();
                if (res.status === 'success') { currentData = res.blog_content_structure; renderEditor(res.image_url); }
            } catch (e) { tg.showAlert("Errore caricamento."); }
            finally { toggleLoader(false); }
        }

        function renderEditor(imageUrl) {
            if (imageUrl) {
                const img = document.getElementById('featuredImage');
                img.src = imageUrl + "?t=" + Date.now();
                img.classList.remove('hidden');
                document.getElementById('imagePlaceholder').classList.add('hidden');
            }
            document.getElementById('seo_meta_title').value = currentData.seo.meta_title;
            document.getElementById('seo_meta_description').value = currentData.seo.meta_description;
            document.getElementById('seo_keywords').value = currentData.seo.keywords;
            document.getElementById('seo_slug').value = currentData.seo.slug;
            document.getElementById('hero_title').value = currentData.hero.title;
            document.getElementById('hero_subtitle').value = currentData.hero.subtitle;
            document.getElementById('hero_risk_reversal').value = currentData.hero.risk_reversal;

            const container = document.getElementById('mainContent'); container.innerHTML = '';
            container.insertAdjacentHTML('beforeend', renderTextSection('problem', '01. Problema', 'fa-triangle-exclamation', true));
            container.insertAdjacentHTML('beforeend', renderSolutionSection());
            container.insertAdjacentHTML('beforeend', renderTextSection('authority', '03. Autorità', 'fa-award'));
            container.insertAdjacentHTML('beforeend', renderComparisonSection());
            container.insertAdjacentHTML('beforeend', renderCTASection());
            container.insertAdjacentHTML('beforeend', renderFAQSection());
        }

        function renderTextSection(key, label, icon, hasQuote = false) {
            const data = currentData[key];
            return `<div class="section-card space-y-2">
                <span class="label-micro"><i class="fas ${icon} mr-1"></i> ${label}</span>
                <input type="text" class="w-full font-black text-sm border-b border-neutral-50 py-1" data-sec="${key}" data-field="title" value="${data.title}">
                ${hasQuote && data.quote ? `<input type="text" class="w-full italic text-[9px] bg-neutral-50 p-2 rounded-lg" data-sec="${key}" data-field="quote" value="${data.quote}">` : ''}
                <textarea class="w-full text-xs bg-neutral-50 rounded-xl p-3 min-h-[100px]" data-sec="${key}" data-field="paragraphs">${data.paragraphs.join('\n\n')}</textarea>
            </div>`;
        }

        function renderSolutionSection() {
            const sol = currentData.solution;
            return `<div class="section-card space-y-2 border-l-2 border-black">
                <span class="label-micro text-black"><i class="fas fa-lightbulb mr-1"></i> 02. Soluzione</span>
                <input type="text" class="w-full font-black text-sm border-b border-neutral-50 py-1" data-sec="solution" data-field="title" value="${sol.title}">
                <textarea class="w-full text-xs bg-neutral-50 rounded-xl p-3 min-h-[80px]" data-sec="solution" data-field="paragraphs">${sol.paragraphs.join('\n\n')}</textarea>
                <div class="p-3 bg-neutral-900 rounded-xl text-black space-y-2">
                    <span class="label-micro !text-neutral-500">Stack</span>
                    <input type="text" class="w-full bg-transparent border-b border-neutral-800 text-[10px] font-bold" id="sol_sub_title" value="${sol.subsection.title}">
                    <textarea class="w-full bg-transparent text-[8px] text-neutral-400" id="sol_sub_paragraphs" rows="2">${sol.subsection.paragraphs.join('\n\n')}</textarea>
                </div>
            </div>`;
        }

        function renderComparisonSection() {
            const comp = currentData.comparison;
            return `<div class="section-card space-y-2">
                <span class="label-micro"><i class="fas fa-balance-scale mr-1"></i> 04. Confronto</span>
                <input type="text" class="w-full font-black text-sm border-b border-neutral-50 py-1" data-sec="comparison" data-field="title" value="${comp.title}">
                <div id="tableGrid" class="space-y-1">${parseTable(comp.table_html)}</div>
            </div>`;
        }

        function renderCTASection() {
            const cta = currentData.cta_final;
            return `<div class="section-card bg-black text-white space-y-2">
                <span class="label-micro !text-neutral-500">05. Chiusura</span>
                <input type="text" class="w-full bg-transparent border-b border-neutral-800 text-sm font-black" data-sec="cta_final" data-field="title" value="${cta.title}">
                <textarea class="w-full bg-transparent text-[9px] text-neutral-300" data-sec="cta_final" data-field="paragraphs" rows="2">${cta.paragraphs.join('\n\n')}</textarea>
                <input type="text" class="w-full bg-neutral-900 rounded-lg p-2 text-[8px]" data-sec="cta_final" data-field="button_text" value="${cta.button_text}">
            </div>`;
        }

        function renderFAQSection() {
            let html = `<div class="section-card space-y-3"><span class="label-micro">FAQ</span>`;
            currentData.faq.forEach((f, i) => {
                html += `<div class="pb-1 border-b border-neutral-50">
                    <input type="text" class="w-full font-bold text-[9px] mb-1" id="faq_q_${i}" value="${f.question}">
                    <textarea class="w-full text-[8px] text-neutral-500" id="faq_a_${i}" rows="1">${f.answer}</textarea>
                </div>`;
            });
            return html + `</div>`;
        }

        function parseTable(html) {
            const div = document.createElement('div'); div.innerHTML = html;
            const rows = div.querySelectorAll('tbody tr'); let out = '';
            for (let i = 0; i < 5; i++) {
                const tds = rows[i] ? rows[i].querySelectorAll('td') : [];
                out += `<div class="grid grid-cols-3 gap-1 table-row">
                    <input type="text" class="w-full text-[8px] p-2 bg-gray-50 rounded" value="${tds[0]?.innerText || ''}">
                    <input type="text" class="w-full text-[8px] p-2 bg-gray-50 rounded" value="${tds[1]?.innerText || ''}">
                    <input type="text" class="w-full text-[8px] p-2 bg-white border border-black rounded" value="${tds[2]?.innerText || ''}">
                </div>`;
            }
            return out;
        }

        function syncData() {
            currentData.seo = { ...currentData.seo, meta_title: document.getElementById('seo_meta_title').value, meta_description: document.getElementById('seo_meta_description').value, keywords: document.getElementById('seo_keywords').value, slug: document.getElementById('seo_slug').value };
            currentData.hero.title = document.getElementById('hero_title').value; currentData.hero.subtitle = document.getElementById('hero_subtitle').value; currentData.hero.risk_reversal = document.getElementById('hero_risk_reversal').value;
            document.querySelectorAll('[data-sec]').forEach(el => { const { sec, field } = el.dataset; if (field === 'paragraphs') currentData[sec][field] = el.value.split('\n\n').filter(p => p.trim()); else currentData[sec][field] = el.value; });
            currentData.solution.subsection.title = document.getElementById('sol_sub_title').value; currentData.solution.subsection.paragraphs = document.getElementById('sol_sub_paragraphs').value.split('\n\n').filter(p => p.trim());
            let tbody = ''; document.querySelectorAll('.table-row').forEach(row => { const inputs = row.querySelectorAll('input'); if (inputs[0].value.trim()) tbody += `<tr><td>${inputs[0].value}</td><td>${inputs[1].value}</td><td>${inputs[2].value}</td></tr>`; });
            currentData.comparison.table_html = `<table><thead><tr><th>F</th><th>T</th><th>S</th></tr></thead><tbody>${tbody}</tbody></table>`;
            currentData.faq = currentData.faq.map((f, i) => ({ question: document.getElementById(`faq_q_${i}`).value, answer: document.getElementById(`faq_a_${i}`).value }));
        }

        async function sendUpdate(action) {
            if (action !== 'delete_blog') syncData();
            toggleLoader(true);
            try {
                const r = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: action, blog_id: blogId, ash: ash, msg: msg, updated_content: currentData, new_image_base64: base64Image })
                });
                if (r.ok) { tg.showAlert("SISTEMA AGGIORNATO."); if (action === 'publish_blog' || action === 'delete_blog') setTimeout(() => tg.close(), 1000); }
            } catch (err) { tg.showAlert("Errore."); }
            finally { toggleLoader(false); }
        }

        function deleteBlog() { tg.showConfirm("Eliminare definitivamente?", (ok) => { if (ok) sendUpdate('delete_blog'); }); }
        function confirmPublish() { tg.showConfirm("Pubblicare live?", (ok) => { if (ok) sendUpdate('publish_blog'); }); }
        function previewFile(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = (ev) => { base64Image = ev.target.result.split(',')[1]; document.getElementById('featuredImage').src = ev.target.result; document.getElementById('featuredImage').classList.remove('hidden'); document.getElementById('imagePlaceholder').classList.add('hidden'); };
            reader.readAsDataURL(file);
        }
        function toggleLoader(show) { document.getElementById('loader').classList.toggle('hidden', !show); }
        window.onload = loadData;
    </script>

    <!-- User Guide and Audio Guide Integration Engine -->
    <script>
    (function() {
        if (document.getElementById('userguide-drawer-overlay')) return;

        // 1. Determine HTML filename to play the correct WAV file
        const pathParts = window.location.pathname.split('/');
        const pageName = pathParts[pathParts.length - 1] || 'index.html';
        const baseName = pageName.replace('.html', '');
        
        let audioSrc = baseName + '.wav';
        if (baseName === 'add-product') audioSrc = 'catalog_add-product.wav';
        if (baseName === 'edit-product') audioSrc = 'catalog_edit-product.wav';

        // 2. Determine corresponding userguide page
        let guidePage = 'userguide/index.html';
        if (window.location.pathname.includes('/gestione/')) {
            guidePage = 'userguide/03_catalog.html';
        } else if (window.location.pathname.includes('/identity/')) {
            guidePage = 'userguide/02_onboarding.html';
        } else if (window.location.pathname.includes('/agents/')) {
            if (baseName.includes('controllo')) guidePage = 'userguide/09_controllo_gestione.html';
            else if (baseName.includes('sicurezza')) guidePage = 'userguide/11_agente_sicurezza.html';
            else guidePage = 'userguide/01_intro.html';
        } else {
            if (baseName === 'agenda') guidePage = 'userguide/10_agenda_radar.html';
            else if (baseName === 'certificator') guidePage = 'userguide/07_certificator.html';
            else if (baseName === 'ecommerce') guidePage = 'userguide/04_online.html';
            else if (baseName === 'preventivi') guidePage = 'userguide/09_controllo_gestione.html';
        }

        // Calculate relative path depth
        const tcIndex = window.location.pathname.indexOf('/telegram_control/');
        let rootPath = '';
        if (tcIndex !== -1) {
            const subPath = window.location.pathname.substring(tcIndex + '/telegram_control/'.length);
            const slashCount = (subPath.match(/\//g) || []).length;
            rootPath = '../'.repeat(slashCount);
        }
        
        const finalGuideUrl = rootPath + guidePage;
        const finalAudioUrl = audioSrc;

        // 3. Inject Font Awesome stylesheet if missing
        if (!document.querySelector('link[href*="font-awesome"]') && !document.querySelector('link[href*="all.min.css"]')) {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
            document.head.appendChild(link);
        }

        // 4. Inject Drawer HTML structure into Body
        const drawerHtml = `
        <div id="userguide-drawer-overlay" class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-[99] hidden opacity-0 transition-opacity duration-300" onclick="closeUserGuide()">
            <div id="userguide-drawer" class="fixed inset-0 max-w-md mx-auto h-screen bg-white shadow-2xl flex flex-col translate-y-full transition-transform duration-300" onclick="event.stopPropagation()">
                <div class="w-full flex items-center justify-between p-4 border-b border-slate-100 shrink-0 select-none">
                    <div class="flex items-center gap-2">
                        <div class="w-2.5 h-2.5 rounded-full bg-blue-600 animate-pulse"></div>
                        <span class="text-xs font-black uppercase tracking-widest text-slate-800">Guida Utente</span>
                    </div>
                    <button onclick="closeUserGuide()" class="w-8 h-8 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-100 active:scale-90 transition">
                        <i class="fas fa-times text-xs"></i>
                    </button>
                </div>
                <div class="flex-1 w-full overflow-hidden bg-slate-50 relative">
                    <iframe id="userguide-iframe" class="w-full h-full border-none" src=""></iframe>
                </div>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', drawerHtml);

        // 5. Inject Globe and Volume Buttons
        const header = document.querySelector('header');
        let buttonContainer = null;
        if (header) {
            buttonContainer = header.querySelector('.flex.gap-2') || header.querySelector('.flex.items-center.gap-2') || header.querySelector('.flex.gap-3');
        }

        const btnHtml = `
        <!-- User Guide Button -->
        <button id="btn-nav-guide" onclick="openUserGuide('${finalGuideUrl}')" class="w-10 h-10 bg-white border border-gray-200 rounded-2xl flex items-center justify-center text-slate-500 shadow-sm active:scale-90 transition shrink-0" title="Manuale Utente">
            <i class="fas fa-globe text-xs"></i>
        </button>
        <!-- Speech Audio Button -->
        <button id="btn-nav-audio" onclick="toggleAudio()" class="w-10 h-10 bg-white border border-gray-200 rounded-2xl flex items-center justify-center text-slate-500 shadow-sm active:scale-90 transition shrink-0" title="Guida Vocale">
            <i class="fas fa-volume-high text-xs"></i>
        </button>`;

        if (buttonContainer) {
            buttonContainer.insertAdjacentHTML('afterbegin', btnHtml);
        } else if (header) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex gap-2 items-center';
            wrapper.innerHTML = btnHtml;
            header.appendChild(wrapper);
        } else {
            const floatingDiv = document.createElement('div');
            floatingDiv.className = 'fixed top-4 right-4 flex gap-2 z-50';
            floatingDiv.innerHTML = btnHtml;
            document.body.appendChild(floatingDiv);
        }

        // 6. Action Functions (Drawer & Audio)
        let voiceAudio = null;
        let isAudioPlaying = false;

        window.openUserGuide = function(url) {
            const overlay = document.getElementById('userguide-drawer-overlay');
            const drawer = document.getElementById('userguide-drawer');
            const iframe = document.getElementById('userguide-iframe');
            if (!overlay || !drawer || !iframe) return;

            window.stopAudio();
            
            iframe.src = url;
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                drawer.classList.remove('translate-y-full');
            }, 10);
        };

        window.closeUserGuide = function() {
            const overlay = document.getElementById('userguide-drawer-overlay');
            const drawer = document.getElementById('userguide-drawer');
            if (!overlay || !drawer) return;

            overlay.classList.add('opacity-0');
            drawer.classList.add('translate-y-full');
            setTimeout(() => {
                overlay.classList.add('hidden');
                document.getElementById('userguide-iframe').src = "";
            }, 300);
        };

        window.stopAudio = function() {
            if (isAudioPlaying && voiceAudio) {
                voiceAudio.pause();
                voiceAudio.currentTime = 0;
            }
            isAudioPlaying = false;
            voiceAudio = null;
            const btn = document.getElementById('btn-nav-audio');
            const icon = btn ? btn.querySelector('i') : null;
            if (icon) {
                icon.className = 'fas fa-volume-high text-xs';
            }
            if (btn) {
                btn.classList.remove('bg-black', 'text-white', 'border-black');
                btn.classList.add('bg-white', 'text-slate-500', 'border-gray-200');
            }
        };

        window.toggleAudio = function() {
            const btn = document.getElementById('btn-nav-audio');
            const icon = btn ? btn.querySelector('i') : null;

            if (!voiceAudio) {
                voiceAudio = new Audio(finalAudioUrl);
                voiceAudio.addEventListener('ended', () => {
                    isAudioPlaying = false;
                    voiceAudio.currentTime = 0;
                    if (icon) {
                        icon.className = 'fas fa-volume-high text-xs';
                        btn.classList.remove('bg-black', 'text-white', 'border-black');
                        btn.classList.add('bg-white', 'text-slate-500', 'border-gray-200');
                    }
                });
            }

            if (isAudioPlaying) {
                window.stopAudio();
            } else {
                voiceAudio.play().then(() => {
                    isAudioPlaying = true;
                    if (icon) {
                        icon.className = 'fas fa-stop text-xs';
                        btn.classList.remove('bg-white', 'text-slate-500', 'border-gray-200');
                        btn.classList.add('bg-black', 'text-white', 'border-black');
                    }
                }).catch(err => {
                    console.error("Errore riproduzione audio:", err);
                });
            }
        };
    })();
    </script>
</body>

</html>
