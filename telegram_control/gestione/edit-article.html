<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="color-scheme" content="light">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Article Editor | SiteBoS</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
(function() {
    // Riferimento locale e temporaneo all'SDK per il controllo iniziale
    const tempTg = window.Telegram?.WebApp;
    const isTelegramSession = tempTg && tempTg.initData && tempTg.initData !== "" && tempTg.platform !== "unknown";

    if (!isTelegramSession) {
        const currentPath = window.location.pathname;
        let redirectPath = "index.html";

        if (currentPath.includes('/telegram_control/')) {
            const parts = currentPath.split('/telegram_control/');
            const subPath = parts[1] || '';
            if (subPath.includes('/')) {
                redirectPath = "../../index.html";
            } else {
                redirectPath = "../index.html";
            }
        }

        window.location.replace(redirectPath);
    }
})();

        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `
                <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                    <div>
                        <h1 class="text-6xl mb-4">🚫</h1>
                        <h2 class="text-xl font-bold uppercase tracking-widest">Accesso Proibito</h2>
                    </div>
                </body>`;
                window.stop();
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem' }
                }
            }
        }
    </script>

    <style>
/* SiteBoS Architect Alignment */
body { background-color: #fafafa !important; color: #000000 !important; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
.card, .section-card, .dark-card, .upload-box { 
    background: white !important; 
    border: 1px solid #eeeeee !important; 
    box-shadow: none !important; 
}
input:focus, textarea:focus, select:focus { 
    border-color: #000000 !important; 
    box-shadow: none !important; 
    outline: none !important;
}
.text-primary, .text-black, .text-blue-600, .text-black { color: #000000 !important; }
.bg-primary, .bg-black, .bg-black, .bg-black { background-color: #000000 !important; color: #ffffff !important; }
.border-primary, .border-black, .border-blue-600, .border-black { border-color: #000000 !important; }
.spinner { border: 2px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
/* Forza icone pesanti */
.fas, .far, .fal { font-weight: 900 !important; font-family: "Font Awesome 6 Free" !important; }
    </style>
</head>
<body class="p-5">

    <div id="loader" class="fixed inset-0 bg-white/80 z-50 hidden flex items-center justify-center">
        <div class="spinner"></div>
    </div>

    <div class="max-w-md mx-auto space-y-6">
        <header class="flex justify-between items-center py-2">
            <div>
                <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded-full mb-1">Procurement</div>
                <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">Nuovo Articolo</h1>
            </div>
            <button onclick="triggerVision()" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition">
                <i class="fas fa-magic text-sm"></i>
            </button>
        </header>

        <!-- 1. SCAN AI (VISION) -->
        <div class="upload-box rounded-2xl p-6 text-center cursor-pointer" onclick="triggerVision()">
            <i class="fas fa-camera text-2xl text-gray-300 mb-2"></i>
            <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Scan Etichetta / Prodotto</p>
            <input type="file" id="visionInput" class="hidden" accept="image/*" multiple onchange="handleVisionFiles(this.files)">
        </div>

        <div class="space-y-4">
            <!-- 2. IDENTITÀ ARTICOLO -->
            <div class="card rounded-3xl p-5 space-y-4 shadow-sm">
                <p class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-300">📋 Dettagli Articolo</p>
                
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Nome Articolo *</label>
                    <input type="text" id="artName" required class="w-full bg-gray-50 border border-border rounded-xl p-4 text-xs font-bold transition-colors" placeholder="Es. Farina Tipo 0 Sacco 25kg">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Marca / Brand</label>
                        <input type="text" id="artBrand" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-[10px] font-bold" placeholder="Es. Molino Rossi">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">SKU Fornitore</label>
                        <input type="text" id="artSku" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-[10px] font-black uppercase" placeholder="Es. FR-001">
                    </div>
                </div>
            </div>

            <!-- 3. ECONOMICA & LOGISTICA -->
            <div class="card rounded-3xl p-5 space-y-4 shadow-sm">
                <p class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-300">💰 Costi & Formato</p>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Prezzo d'Acquisto</label>
                        <input type="number" id="artPrice" step="0.01" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-xs font-black" placeholder="0.00">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Unità di Misura</label>
                        <select id="artUom" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-[10px] font-bold appearance-none">
                            <option value="KG">Chilogrammi (kg)</option>
                            <option value="LT">Litri (lt)</option>
                            <option value="PZ">Pezzi (pz)</option>
                            <option value="BOX">Cartone (box)</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Categoria Merceologica</label>
                    <select id="artCat" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-[10px] font-bold appearance-none">
                        <option value="RAW">Materia Prima</option>
                        <option value="PKG">Packaging</option>
                        <option value="CLN">Pulizia / Consumabili</option>
                        <option value="DRK">Beverage</option>
                    </select>
                </div>
            </div>

            <button onclick="saveArticle()" class="w-full py-5 bg-black text-white rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 shadow-xl active:scale-95 transition">
                <i class="fas fa-save"></i> Salva in Anagrafica
            </button>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/2c6416b1-32c6-4661-bd8f-b175d24fd035";
        const tg = window.Telegram.WebApp;
        if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#ffffff');
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const sopId = urlParams.get('sop_id');
        const supplierId = urlParams.get('supplier_id');

        function triggerVision() { document.getElementById('visionInput').click(); }

        async function handleVisionFiles(files) {
            if (files.length === 0) return;
            showLoader();
            
            const fileData = [];
            for (let file of files) {
                const base64 = await toBase64(file);
                fileData.push({ name: file.name, type: file.type, data: base64.split(',')[1] });
            }

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        _auth: tg.initData,
                        action: 'VISION_ARTICLE_ANALYSIS',
                        files: fileData,
                        sop_id: sopId
                    })
                });
                const data = await res.json();
                if(data.suggested_data) {
                    document.getElementById('artName').value = data.suggested_data.name || '';
                    document.getElementById('artBrand').value = data.suggested_data.brand || '';
                    document.getElementById('artUom').value = data.suggested_data.uom || 'KG';
                }
                tg.showAlert("Analisi completata con successo!");
            } catch (e) {
                tg.showAlert("Errore durante l'analisi Vision.");
            } finally {
                hideLoader();
            }
        }

        async function saveArticle() {
            const name = document.getElementById('artName').value.trim();
            if(!name) { tg.showAlert("Nome obbligatorio"); return; }
            
            showLoader();
            const tempId = 'art_' + Date.now();
            const priceVal = parseFloat(document.getElementById('artPrice').value) || 0;

            const payload = {
                _auth: tg.initData,
                action: 'SAVE_ARTICLE',
                sop_id: sopId,
                payload: {
                    name,
                    brand: document.getElementById('artBrand').value,
                    sku: document.getElementById('artSku').value,
                    price: priceVal,
                    uom: document.getElementById('artUom').value,
                    category: document.getElementById('artCat').value,
                    supplier_id: supplierId
                }
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Articolo aggiunto all'anagrafica!");
                
                // Sincronizzazione ed emissione evento verso finestra madre
                if (window.parent) {
                    window.parent.postMessage({
                        action: 'ENTITY_CREATED',
                        type: 'ARTICLE',
                        entity: {
                            id: tempId,
                            name: name,
                            cost: priceVal
                        }
                    }, '*');
                }
            } catch (e) {
                tg.showAlert("Errore durante il salvataggio.");
            } finally {
                hideLoader();
            }
        }

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function showLoader() { document.getElementById('loader').classList.remove('hidden'); }
        function hideLoader() { document.getElementById('loader').classList.add('hidden'); }
    </script>

    <!-- User Guide and Audio Guide Integration Engine -->
    <script>
    (function() {
        if (document.getElementById('userguide-drawer-overlay')) return;

        // 1. Determine HTML filename to play the correct WAV file
        const pathParts = window.location.pathname.split('/');
        const pageName = pathParts[pathParts.length - 1] || 'index.html';
        const baseName = pageName.replace('.html', '');
        
        let audioSrc = baseName + '.wav';
        if (baseName === 'add-product') audioSrc = 'catalog_add-product.wav';
        if (baseName === 'edit-product') audioSrc = 'catalog_edit-product.wav';

        // 2. Determine corresponding userguide page
        let guidePage = 'userguide/index.html';
        if (window.location.pathname.includes('/gestione/')) {
            guidePage = 'userguide/03_catalog.html';
        } else if (window.location.pathname.includes('/identity/')) {
            guidePage = 'userguide/02_onboarding.html';
        } else if (window.location.pathname.includes('/agents/')) {
            if (baseName.includes('controllo')) guidePage = 'userguide/09_controllo_gestione.html';
            else if (baseName.includes('sicurezza')) guidePage = 'userguide/11_agente_sicurezza.html';
            else guidePage = 'userguide/01_intro.html';
        } else {
            if (baseName === 'agenda') guidePage = 'userguide/10_agenda_radar.html';
            else if (baseName === 'certificator') guidePage = 'userguide/07_certificator.html';
            else if (baseName === 'ecommerce') guidePage = 'userguide/04_online.html';
            else if (baseName === 'preventivi') guidePage = 'userguide/09_controllo_gestione.html';
        }

        // Calculate relative path depth
        const tcIndex = window.location.pathname.indexOf('/telegram_control/');
        let rootPath = '';
        if (tcIndex !== -1) {
            const subPath = window.location.pathname.substring(tcIndex + '/telegram_control/'.length);
            const slashCount = (subPath.match(/\//g) || []).length;
            rootPath = '../'.repeat(slashCount);
        }
        
        const finalGuideUrl = rootPath + guidePage;
        const finalAudioUrl = audioSrc;

        // 3. Inject Font Awesome stylesheet if missing
        if (!document.querySelector('link[href*="font-awesome"]') && !document.querySelector('link[href*="all.min.css"]')) {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
            document.head.appendChild(link);
        }

        // 4. Inject Drawer HTML structure into Body
        const drawerHtml = `
        <div id="userguide-drawer-overlay" class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-[99] hidden opacity-0 transition-opacity duration-300" onclick="closeUserGuide()">
            <div id="userguide-drawer" class="fixed inset-0 max-w-md mx-auto h-screen bg-white shadow-2xl flex flex-col translate-y-full transition-transform duration-300" onclick="event.stopPropagation()">
                <div class="w-full flex items-center justify-between p-4 border-b border-slate-100 shrink-0 select-none">
                    <div class="flex items-center gap-2">
                        <div class="w-2.5 h-2.5 rounded-full bg-blue-600 animate-pulse"></div>
                        <span class="text-xs font-black uppercase tracking-widest text-slate-800">Guida Utente</span>
                    </div>
                    <button onclick="closeUserGuide()" class="w-8 h-8 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-100 active:scale-90 transition">
                        <i class="fas fa-times text-xs"></i>
                    </button>
                </div>
                <div class="flex-1 w-full overflow-hidden bg-slate-50 relative">
                    <iframe id="userguide-iframe" class="w-full h-full border-none" src=""></iframe>
                </div>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', drawerHtml);

        // 5. Inject Globe and Volume Buttons
        const header = document.querySelector('header');
        let buttonContainer = null;
        if (header) {
            buttonContainer = header.querySelector('.flex.gap-2') || header.querySelector('.flex.items-center.gap-2') || header.querySelector('.flex.gap-3');
        }

        const btnHtml = `
        <!-- User Guide Button -->
        <button id="btn-nav-guide" onclick="openUserGuide('${finalGuideUrl}')" class="w-10 h-10 bg-white border border-gray-200 rounded-2xl flex items-center justify-center text-slate-500 shadow-sm active:scale-90 transition shrink-0" title="Manuale Utente">
            <i class="fas fa-globe text-xs"></i>
        </button>
        <!-- Speech Audio Button -->
        <button id="btn-nav-audio" onclick="toggleAudio()" class="w-10 h-10 bg-white border border-gray-200 rounded-2xl flex items-center justify-center text-slate-500 shadow-sm active:scale-90 transition shrink-0" title="Guida Vocale">
            <i class="fas fa-volume-high text-xs"></i>
        </button>`;

        if (buttonContainer) {
            buttonContainer.insertAdjacentHTML('afterbegin', btnHtml);
        } else if (header) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex gap-2 items-center';
            wrapper.innerHTML = btnHtml;
            header.appendChild(wrapper);
        } else {
            const floatingDiv = document.createElement('div');
            floatingDiv.className = 'fixed top-4 right-4 flex gap-2 z-50';
            floatingDiv.innerHTML = btnHtml;
            document.body.appendChild(floatingDiv);
        }

        // 6. Action Functions (Drawer & Audio)
        let voiceAudio = null;
        let isAudioPlaying = false;

        window.openUserGuide = function(url) {
            const overlay = document.getElementById('userguide-drawer-overlay');
            const drawer = document.getElementById('userguide-drawer');
            const iframe = document.getElementById('userguide-iframe');
            if (!overlay || !drawer || !iframe) return;

            window.stopAudio();
            
            iframe.src = url;
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                drawer.classList.remove('translate-y-full');
            }, 10);
        };

        window.closeUserGuide = function() {
            const overlay = document.getElementById('userguide-drawer-overlay');
            const drawer = document.getElementById('userguide-drawer');
            if (!overlay || !drawer) return;

            overlay.classList.add('opacity-0');
            drawer.classList.add('translate-y-full');
            setTimeout(() => {
                overlay.classList.add('hidden');
                document.getElementById('userguide-iframe').src = "";
            }, 300);
        };

        window.stopAudio = function() {
            if (isAudioPlaying && voiceAudio) {
                voiceAudio.pause();
                voiceAudio.currentTime = 0;
            }
            isAudioPlaying = false;
            voiceAudio = null;
            const btn = document.getElementById('btn-nav-audio');
            const icon = btn ? btn.querySelector('i') : null;
            if (icon) {
                icon.className = 'fas fa-volume-high text-xs';
            }
            if (btn) {
                btn.classList.remove('bg-black', 'text-white', 'border-black');
                btn.classList.add('bg-white', 'text-slate-500', 'border-gray-200');
            }
        };

        window.toggleAudio = function() {
            const btn = document.getElementById('btn-nav-audio');
            const icon = btn ? btn.querySelector('i') : null;

            if (!voiceAudio) {
                voiceAudio = new Audio(finalAudioUrl);
                voiceAudio.addEventListener('ended', () => {
                    isAudioPlaying = false;
                    voiceAudio.currentTime = 0;
                    if (icon) {
                        icon.className = 'fas fa-volume-high text-xs';
                        btn.classList.remove('bg-black', 'text-white', 'border-black');
                        btn.classList.add('bg-white', 'text-slate-500', 'border-gray-200');
                    }
                });
            }

            if (isAudioPlaying) {
                window.stopAudio();
            } else {
                voiceAudio.play().then(() => {
                    isAudioPlaying = true;
                    if (icon) {
                        icon.className = 'fas fa-stop text-xs';
                        btn.classList.remove('bg-white', 'text-slate-500', 'border-gray-200');
                        btn.classList.add('bg-black', 'text-white', 'border-black');
                    }
                }).catch(err => {
                    console.error("Errore riproduzione audio:", err);
                });
            }
        };
    })();
    </script>
</body>
</html>
