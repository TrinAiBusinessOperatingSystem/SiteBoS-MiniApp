<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asset Manager | SiteBoS</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #fafafa !important; color: #000000 !important; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card, .section-card, .dark-card, .upload-box { 
            background: white !important; 
            border: 1px solid #eeeeee !important; 
            box-shadow: none !important; 
        }
        input:focus, textarea:focus, select:focus { 
            border-color: #000000 !important; 
            box-shadow: none !important; 
            outline: none !important;
        }
        .text-primary, .text-black, .text-blue-600, .text-black { color: #000000 !important; }
        .bg-primary, .bg-black, .bg-black, .bg-black { background-color: #000000 !important; color: #ffffff !important; }
        .border-primary, .border-black, .border-blue-600, .border-black { border-color: #000000 !important; }
        .spinner { border-top-color: #000 !important; }
        input[type="checkbox"]:checked { background-color: #000 !important; border-color: #000 !important; }
        .fas, .far, .fal { font-weight: 900 !important; font-family: "Font Awesome 6 Free" !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { border: 2px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .view-overlay { position: fixed; inset: 0; background: #fafafa; z-index: 50; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); overflow-y: auto; }
        .view-overlay.active { transform: translateX(0); }
    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase tracking-widest">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="p-5 pb-24">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <div id="loader-text" class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-500">Sincronizzazione...</div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="max-w-md mx-auto space-y-6 animate-fade-in hidden" id="app-content">
        
        <header class="flex justify-between items-center py-2">
            <div>
                <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded-full mb-1">Infrastruttura</div>
                <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">Asset & Strumenti</h1>
            </div>
            <button onclick="openCreateView()" class="w-10 h-10 bg-black text-white rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition">
                <i class="fas fa-plus text-sm"></i>
            </button>
        </header>

        <section>
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1 mb-4">Attrezzature Registrate</p>
            <div id="asset-list" class="space-y-3">
                <!-- Popolato da JS -->
            </div>
        </section>
        
        <button type="button" onclick="goBack()" class="w-full h-12 mt-6 bg-white border border-border text-black rounded-xl font-black uppercase tracking-widest text-[10px] active:scale-95 transition shadow-sm flex items-center justify-center gap-2">
            <i class="fas fa-arrow-left"></i> Torna al Prodotto
        </button>
    </div>

    <!-- CREATE/EDIT VIEW OVERLAY -->
    <div id="view-create" class="view-overlay flex flex-col p-5 pb-24">
        <header class="flex justify-between items-center py-2 mb-6">
            <button onclick="closeCreateView()" class="w-10 h-10 bg-white border border-border rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition">
                <i class="fas fa-arrow-left text-sm"></i>
            </button>
            <h2 id="view-title" class="text-sm font-black uppercase tracking-widest">Nuovo Asset</h2>
            <div class="w-10"></div>
        </header>

        <div class="space-y-4 flex-1">
            <div class="card rounded-3xl p-5 space-y-4">
                
                <input type="hidden" id="asset-id-hidden">

                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Nome Attrezzatura / Veicolo *</label>
                    <input type="text" id="input-name" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-xs font-bold outline-none focus:border-black transition-colors" placeholder="Es. Impastatrice a spirale">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Categoria</label>
                        <select id="input-type" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-xs font-bold outline-none focus:border-black transition-colors">
                            <option value="Machinery">Macchinario</option>
                            <option value="Tool">Strumento / Attrezzo</option>
                            <option value="Vehicle">Veicolo</option>
                            <option value="Digital">Licenza / Digitale</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Stato Operativo</label>
                        <select id="input-status" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-xs font-bold outline-none focus:border-black transition-colors">
                            <option value="AVAILABLE">🟢 Disponibile</option>
                            <option value="IN_USE">🔵 In Uso</option>
                            <option value="MAINTENANCE">🟠 In Manutenzione</option>
                            <option value="BROKEN">🔴 Fuori Uso</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Modello / Specifiche</label>
                    <input type="text" id="input-model" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-xs font-bold outline-none focus:border-black transition-colors" placeholder="Es. Trifase 380V - 50kg">
                </div>
                
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase tracking-widest text-gray-400">Posizione / Sede</label>
                    <input type="text" id="input-location" class="w-full bg-gray-50 border border-border rounded-xl p-4 text-xs font-bold outline-none focus:border-black transition-colors" placeholder="Es. Laboratorio Principale">
                </div>

            </div>

            <button onclick="saveAsset()" class="w-full py-5 bg-black text-white rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 shadow-xl active:scale-95 transition">
                <i class="fas fa-save"></i> Salva Asset
            </button>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/asset_handler";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        
        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');
        const returnUrl = document.referrer; // URL a cui tornare (edit-product)
        
        let assetList = [];

        async function apiCall(action, payload = {}) {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        action, 
                        ash, 
                        _auth: tg.initData,
                        ...payload 
                    })
                });
                if (!res.ok) throw new Error("Network error");
                return await res.json();
            } catch (e) {
                console.error("API Error:", e);
                return null;
            }
        }

        function showLoader(text) {
            document.getElementById('loader').classList.remove('hidden');
            if (text) document.getElementById('loader-text').innerText = text;
        }

        function hideLoader() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
        }

        async function initApp() {
            showLoader('Recupero Asset...');
            
            // Mock Data - in prod verrà da DB
            const data = {
                assets: [
                    { _id: 'ast_1', identity: { name: 'Sonda Termica', asset_type: 'Tool', brand_model: 'Testo 104' }, status_info: { current_status: 'AVAILABLE', current_location: 'Magazzino A' } },
                    { _id: 'ast_2', identity: { name: 'Trapano a Colonna', asset_type: 'Machinery', brand_model: 'Bosch PBD 40' }, status_info: { current_status: 'MAINTENANCE', current_location: 'Officina' } },
                    { _id: 'ast_3', identity: { name: 'Furgone Frigo', asset_type: 'Vehicle', brand_model: 'Fiat Ducato' }, status_info: { current_status: 'IN_USE', current_location: 'In Consegna' } }
                ]
            };
            
            setTimeout(() => {
                if (data && data.assets) {
                    assetList = data.assets;
                    renderList();
                    
                    // Se c'è un asset_id in querystring e vogliamo auto-aprirlo in mod:
                    const editId = urlParams.get('asset_id');
                    if(editId && editId !== 'NEW') {
                        const match = assetList.find(a => a._id === editId);
                        if(match) openCreateView(match);
                    } else if (editId === 'NEW') {
                        openCreateView();
                    }
                }
                hideLoader();
            }, 600);
        }

        function getStatusBadge(status) {
            const map = {
                'AVAILABLE': '<span class="bg-green-100 text-green-700 text-[8px] px-2 py-0.5 rounded-full font-black uppercase">Disponibile</span>',
                'IN_USE': '<span class="bg-blue-100 text-blue-700 text-[8px] px-2 py-0.5 rounded-full font-black uppercase">In Uso</span>',
                'MAINTENANCE': '<span class="bg-orange-100 text-orange-700 text-[8px] px-2 py-0.5 rounded-full font-black uppercase">Manutenzione</span>',
                'BROKEN': '<span class="bg-red-100 text-red-700 text-[8px] px-2 py-0.5 rounded-full font-black uppercase">Guasto</span>'
            };
            return map[status] || map['AVAILABLE'];
        }

        function getTypeIcon(type) {
            const map = {
                'Machinery': '<i class="fas fa-cogs"></i>',
                'Vehicle': '<i class="fas fa-truck"></i>',
                'Tool': '<i class="fas fa-wrench"></i>',
                'Digital': '<i class="fas fa-laptop-code"></i>'
            };
            return map[type] || '<i class="fas fa-box"></i>';
        }

        function renderList() {
            const container = document.getElementById('asset-list');
            container.innerHTML = '';
            
            if (assetList.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 text-gray-300">
                        <i class="fas fa-tools text-4xl mb-2"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">Nessun asset registrato</p>
                    </div>`;
                return;
            }

            assetList.forEach(item => {
                const card = document.createElement('div');
                card.className = "card rounded-2xl p-4 flex flex-col gap-2 relative overflow-hidden";
                
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center text-gray-400">
                                ${getTypeIcon(item.identity.asset_type)}
                            </div>
                            <div>
                                <h3 class="text-xs font-black uppercase tracking-tight">${item.identity.name}</h3>
                                <p class="text-[8px] font-bold uppercase tracking-widest text-gray-400">${item.identity.brand_model || item.identity.asset_type}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            ${getStatusBadge(item.status_info.current_status)}
                        </div>
                    </div>
                    <div class="flex justify-between items-end mt-2 pt-2 border-t border-gray-50">
                        <p class="text-[8px] font-black uppercase tracking-widest text-gray-400">
                            <i class="fas fa-map-marker-alt mr-1"></i> ${item.status_info.current_location || 'N/A'}
                        </p>
                        <div class="flex gap-2">
                            <button onclick='openCreateView(${JSON.stringify(item)})' class="text-[8px] font-black uppercase tracking-widest text-blue-500 active:scale-95 transition">Modifica</button>
                            <button onclick="deleteAsset('${item._id}')" class="text-[8px] font-black uppercase tracking-widest text-red-500 active:scale-95 transition">Elimina</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openCreateView(asset = null) {
            if (asset) {
                document.getElementById('view-title').innerText = "Modifica Asset";
                document.getElementById('asset-id-hidden').value = asset._id;
                document.getElementById('input-name').value = asset.identity.name;
                document.getElementById('input-type').value = asset.identity.asset_type;
                document.getElementById('input-status').value = asset.status_info.current_status;
                document.getElementById('input-model').value = asset.identity.brand_model || '';
                document.getElementById('input-location').value = asset.status_info.current_location || '';
            } else {
                document.getElementById('view-title').innerText = "Nuovo Asset";
                document.getElementById('asset-id-hidden').value = '';
                document.getElementById('input-name').value = '';
                document.getElementById('input-type').value = 'Machinery';
                document.getElementById('input-status').value = 'AVAILABLE';
                document.getElementById('input-model').value = '';
                document.getElementById('input-location').value = '';
            }
            
            document.getElementById('view-create').classList.add('active');
            tg.BackButton.show();
            tg.BackButton.onClick(closeCreateView);
        }

        function closeCreateView() {
            document.getElementById('view-create').classList.remove('active');
            // If opened directly from product page (via qs), going back should redirect to product page
            if (urlParams.get('asset_id')) {
                goBack();
            } else {
                tg.BackButton.hide();
            }
        }

        function goBack() {
            if (returnUrl) {
                window.location.href = returnUrl;
            } else {
                history.back();
            }
        }

        async function saveAsset() {
            const id = document.getElementById('asset-id-hidden').value;
            const name = document.getElementById('input-name').value.trim();
            const type = document.getElementById('input-type').value;
            const status = document.getElementById('input-status').value;
            const model = document.getElementById('input-model').value.trim();
            const location = document.getElementById('input-location').value.trim();

            if (!name) {
                tg.showAlert("Il nome dell'asset è obbligatorio.");
                return;
            }

            const payload = {
                _id: id || 'ast_' + Date.now(),
                identity: { name, asset_type: type, brand_model: model },
                status_info: { current_status: status, current_location: location }
            };

            showLoader('Salvataggio...');

            // Mock success
            setTimeout(() => {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                if (id) {
                    const idx = assetList.findIndex(a => a._id === id);
                    if (idx > -1) assetList[idx] = payload;
                } else {
                    assetList.push(payload);
                }
                
                closeCreateView();
                renderList();
                hideLoader();
            }, 600);
        }

        async function deleteAsset(id) {
            tg.showConfirm("Eliminare definitivamente questo asset?", async (conf) => {
                if(conf) {
                    showLoader('Eliminazione...');
                    setTimeout(() => {
                        assetList = assetList.filter(s => s._id !== id);
                        renderList();
                        hideLoader();
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                    }, 500);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
