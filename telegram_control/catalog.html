<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SiteBoS - Catalogo</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .dark-card { background: #1a1a1a; border: 1px solid #333; color: #f1f1f1; }
    .dark-hover:hover { background: #2a2a2a; }
    .text-primary { color: #ffffff; } /* Modificato per icona cartella */
    .text-success { color: #28a745; }
    .text-danger { color: #dc3545; }
    .text-muted { color: #888; }
    .header-text { font-size: 22px; font-weight: 900; }
    .subheader-text { font-size: 13px; color: #888; font-style: italic; }
    .fab-btn { 
      background: #ffffff; color: #000; width: 56px; height: 56px; border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; font-size: 24px; 
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.4); transition: all 0.2s; 
    }
    .fab-btn:active { transform: scale(0.95); }
    .cat-card-header { transition: all 0.2s; }
    .cat-card-header:active { background: #2a2a2a; }
    .prod-status-ghost { border-left: 3px solid #888; }
    .prod-status-active { border-left: 3px solid #28a745; background: rgba(40, 167, 69, 0.1); }
    .btn-action-create { background: #fff; color: #000; box-shadow: 0 2px 5px rgba(255,255,255,0.2); }
    .btn-action-edit { background: rgba(40, 167, 69, 0.15); color: #28a745; border: 1px solid rgba(40, 167, 69, 0.3); }
    .btn-prod-delete { background: transparent; border: 1px solid #dc3545; color: #dc3545; }
    .btn-prod-delete:hover { background: #dc3545; color: white; }

  </style>
</head>
<body class="bg-[#111111] text-white p-6 pb-24">

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center bg-black z-50 transition-opacity duration-300">
    <div class="spinner-border animate-spin inline-block w-8 h-8 border-4 rounded-full text-blue-500" role="status">
      <span class="visually-hidden"></span>
    </div>
    <div class="mt-4 text-sm opacity-70">Caricamento Catalogo...</div>
  </div>

  <div id="app-content" class="max-w-md mx-auto hidden opacity-0 transition-opacity duration-500">
    
    <!-- HEADER -->
    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 class="header-text">Catalogo</h1>
            <p class="subheader-text">Gestione Protocolli & Procedure AI</p>
        </div>
        <button class="btn-icon-sm text-white hover:text-primary" onclick="loadCatalog(true)" title="Ricarica">
            <i class="fas fa-sync-alt text-lg"></i>
        </button>
    </div>

    <!-- STATS & ACTIONS -->
    <div class="flex justify-between gap-4 mb-6">
        <!-- Stats Suggeriti -->
        <div class="flex-1 dark-card rounded-xl p-3 flex items-center gap-3">
            <i class="fas fa-lightbulb text-muted text-xl"></i>
            <div>
                <div id="count-ghost" class="font-bold text-lg">0</div>
                <div class="text-xs text-muted">Suggeriti</div>
            </div>
        </div>
        <!-- Stats Attivi -->
        <div class="flex-1 dark-card rounded-xl p-3 flex items-center gap-3 border-green-500">
            <i class="fas fa-check-circle text-success text-xl"></i>
            <div>
                <div id="count-active" class="font-bold text-lg">0</div>
                <div class="text-xs text-success">Attivi</div>
            </div>
        </div>
    </div>
    
    <!-- Main Action: Nuova Categoria -->
    <button class="w-full bg-white text-black font-bold py-4 px-4 rounded-xl mb-6 shadow-lg hover:bg-gray-200 transition-colors flex items-center justify-center gap-3 active:scale-[0.98]" onclick="goToAddCategory()">
        <i class="fas fa-plus text-lg"></i>
        <span class="text-sm uppercase tracking-wider">Nuova Categoria</span>
    </button>

    <!-- CATALOG LIST -->
    <div id="catalog-list"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center p-10 opacity-50">
        <i class="fas fa-box-open text-4xl mb-4"></i>
        <p class="text-sm mb-4">Nessun catalogo trovato. Inizia creando la tua prima categoria.</p>
        <button class="bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-700 transition-colors" onclick="goToAddCategory()">Crea Prima Categoria</button>
    </div>
  </div>

  <!-- MODAL EDIT CATEGORIA -->
  <div id="edit-cat-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="dark-card rounded-2xl p-6 w-full max-w-sm fade-in-modal transform transition-all duration-300 scale-95 opacity-0">
        <h3 class="text-xl font-bold mb-5">Modifica Categoria</h3>
        <div class="mb-4">
            <label for="edit-cat-short" class="block text-sm font-medium text-gray-400 mb-2">Nome Breve (per Bottoni)</label>
            <input type="text" id="edit-cat-short" class="w-full p-3 rounded-lg bg-[#333] border border-[#555] focus:ring-blue-500 focus:border-blue-500" placeholder="Es. 🚀 Startup">
        </div>
        <div class="mb-6">
            <label for="edit-cat-long" class="block text-sm font-medium text-gray-400 mb-2">Nome Completo (Descrittivo)</label>
            <textarea id="edit-cat-long" rows="2" class="w-full p-3 rounded-lg bg-[#333] border border-[#555] focus:ring-blue-500 focus:border-blue-500" placeholder="Es. Servizi per Startupper e Innovatori"></textarea>
        </div>
        <div class="flex gap-3">
            <button class="flex-1 bg-gray-700 text-white font-bold py-3 rounded-lg hover:bg-gray-600 transition-colors" onclick="closeEditModal()">Annulla</button>
            <button class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors" onclick="saveEditCategory()">Salva</button>
        </div>
    </div>
  </div>

  <!-- FAB CONTAINER -->
  <div class="fixed bottom-6 right-6 z-40">
    <button class="fab-btn" onclick="goBack()" title="Torna a Dashboard">
      <i class="fas fa-arrow-left"></i>
    </button>
  </div>

  <script>
    const CATALOG_WEBHOOK = "https://prod.workflow.trinai.it/webhook/0fff7fa2-bcb2-4b50-a26b-589b7054952e";
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    const authData = tg.initData;
    if (!authData) { document.body.innerHTML = "<h1>Errore: Accesso non autorizzato.</h1>"; throw new Error("Auth Data mancante."); }
    const ash = authData;
    let currentEditingCatId = ""; let catalogData = null;
    const i18n = { it: { title: "Catalogo Servizi", subtitle: "Gestione Protocolli & Procedure AI", btn_new_cat: "Nuova Categoria", btn_add_here: "Aggiungi Prodotto qui", btn_manage: "Gestisci", btn_activate: "Attiva", alert_loading_error: "Errore caricamento", alert_name_required: "Il nome completo è obbligatorio", error_id_missing: "Errore: ID Categoria non trovato.", confirm_delete_cat: "Sei sicuro di voler eliminare la categoria \'{name}\' e tutti i suoi prodotti?", confirm_delete_prod: "Eliminare definitivamente il prodotto \'{name}\'?" } };
    function t(key) { return i18n.it[key] || key; }
    function escapeHtml(str) { return (str || "").replace(/"/g, '"'); }
    function parseN8nResponse(json) { const data = Array.isArray(json) ? json[0] : json; return data.catalog || data.data || data; }

    async function loadCatalog() {
        try {
            const res = await fetch(CATALOG_WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "get_catalog", _auth: ash }) });
            catalogData = parseN8nResponse(await res.json()); renderCatalog();
        } catch (e) { tg.HapticFeedback.notificationOccurred("error"); } finally { document.getElementById("loader").classList.add("hidden"); document.getElementById("app-content").classList.remove("hidden", "opacity-0"); document.getElementById("app-content").classList.add("opacity-100"); }
    }

    function renderCatalog() {
        const container = document.getElementById("catalog-list"); container.innerHTML = "";
        (catalogData.categories || []).forEach((cat) => {
            const subcats = cat.subcategories || [];
            const catEl = document.createElement("div"); catEl.className = "cat-card dark-card rounded-xl mb-3 overflow-hidden";
            catEl.innerHTML = `
                <div class="cat-card-header p-4 flex justify-between items-center cursor-pointer dark-hover" onclick="this.parentElement.classList.toggle('open')">
                    <div class="flex items-center gap-3 flex-1"><i class="fas fa-folder text-lg text-white"></i><span class="font-bold text-base">${cat.short_name || cat.name}</span><span class="px-2 py-1 bg-gray-700 text-gray-300 rounded-lg text-xs font-semibold">${subcats.length}</span></div>
                    <div class="flex items-center gap-2">
                        <button class="btn-icon-sm text-gray-400 hover:text-blue-500" onclick="event.stopPropagation(); openEditModal('${cat.name}', '${cat.short_name || ''}', '${cat.callback_data}')"><i class="fas fa-pen"></i></button>
                        <button class="btn-icon-sm text-danger hover:text-red-600" onclick="event.stopPropagation(); deleteCategory('${cat.name}', '${cat.callback_data}')"><i class="fas fa-trash"></i></button>
                        <i class="fas fa-chevron-down chevron text-gray-500 text-sm"></i>
                    </div>
                </div>
                <div class="cat-body border-t border-[#333] hidden"><div class="p-3 text-center border-b border-[#333]"><button class="bg-blue-600/20 text-blue-400 font-bold py-2 px-4 rounded-lg text-xs" onclick="event.stopPropagation(); goToAddProduct('${cat.callback_data}')"><i class="fas fa-plus"></i> ${t("btn_add_here")}</button></div><div class="products-container"></div></div>`;
            const prodContainer = catEl.querySelector(".products-container");
            subcats.forEach(prod => {
                const prodEl = document.createElement("div"); prodEl.className = `flex justify-between items-center gap-3 p-3 border-b border-[#333] ${prod.blueprint_ready ? 'prod-status-active' : 'prod-status-ghost'}`;
                prodEl.innerHTML = `<div><div class="font-bold text-sm">${prod.short_name || prod.name}</div></div><div class="flex flex-col gap-2"><button class="bg-blue-600 py-2 px-3 rounded-lg text-xs" onclick="openProduct('edit-blueprint.html', '${prod.callback_data}')">Gestisci</button></div>`;
                prodContainer.appendChild(prodEl);
            });
            container.appendChild(catEl);
        });
    }

    window.goToAddCategory = () => { location.href = `add-category.html?ash=${encodeURIComponent(ash)}`; };
    window.goToAddProduct = (catId) => { location.href = `add-product.html?ash=${encodeURIComponent(ash)}&catId=${catId}`; };
    window.openProduct = (page, pId) => { location.href = `${page}?ash=${encodeURIComponent(ash)}&productId=${pId}`; };
    window.openEditModal = (n, s, id) => { currentEditingCatId = id; document.getElementById('edit-cat-long').value = n; document.getElementById('edit-cat-short').value = s; document.getElementById('edit-cat-modal').classList.remove('hidden'); };
    window.closeEditModal = () => { document.getElementById('edit-cat-modal').classList.add('hidden'); };
    window.deleteCategory = (n, id) => { /* logica delete */ };
    window.saveEditCategory = () => { closeEditModal(); loadCatalog(); };
    
    document.addEventListener("DOMContentLoaded", loadCatalog);
  </script>
</body>
</html>
