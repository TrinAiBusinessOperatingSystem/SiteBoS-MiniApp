<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Service Master | SiteBoS</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
          borderRadius: { '3xl': '1.5rem' }
        }
      }
    }
  </script>

  <style>
    /* SiteBoS Architect Alignment */
    body { background-color: #fafafa !important; color: #000000 !important; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .card-noir { background: white !important; border: 1px solid #eeeeee !important; border-radius: 1.5rem; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .prod-status-ghost { border-left: 3px solid #f3f4f6; background: #ffffff; }
    .prod-status-active { border-left: 3px solid #000000; background: #fcfcfc; }
    
    .macro-btn.active { background-color: #000 !important; color: #fff !important; }
    .macro-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

    .fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Touch target enhancement */
    .btn-touch { min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body class="bg-bg text-black pb-10 overflow-x-hidden">

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
    <div class="spinner"></div>
    <p class="text-[8px] font-black uppercase tracking-widest text-gray-400">Architect Engine...</p>
  </div>

  <div id="app-content" class="max-w-md mx-auto p-5 space-y-6 hidden">
    
    <!-- HEADER -->
    <header class="flex justify-between items-start pt-2 fade-in-up">
        <div>
            <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded-full mb-1 italic">Service Master</div>
            <h1 class="text-xl font-black tracking-tighter uppercase leading-none">Catalogo</h1>
        </div>
        <button class="w-10 h-10 bg-white border border-border rounded-xl flex items-center justify-center text-black shadow-sm active:scale-90 transition" onclick="loadCatalog(true)">
            <i class="fas fa-sync-alt text-xs"></i>
        </button>
    </header>

    <!-- MACRO SELECTOR -->
    <nav class="flex bg-gray-100 p-1 rounded-2xl gap-1 fade-in-up">
        <button onclick="setMacro('SOP')" id="btn-SOP" class="macro-btn flex-1 py-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest active">Procedure</button>
        <button onclick="setMacro('SER')" id="btn-SER" class="macro-btn flex-1 py-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest text-gray-400">Servizi</button>
        <button onclick="setMacro('PRO')" id="btn-PRO" class="macro-btn flex-1 py-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest text-gray-400">Prodotti</button>
    </nav>

    <!-- STATS -->
    <div class="grid grid-cols-2 gap-3 fade-in-up">
        <div class="card-noir p-4 flex items-center gap-3">
            <div id="count-ghost" class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center font-black text-xs text-gray-400">0</div>
            <div class="text-[7px] font-black text-gray-400 uppercase tracking-widest">In Bozza</div>
        </div>
        <div class="card-noir p-4 flex items-center gap-3">
            <div id="count-active" class="w-8 h-8 bg-black rounded-lg flex items-center justify-center font-black text-xs text-white">0</div>
            <div class="text-[7px] font-black text-gray-400 uppercase tracking-widest">Attivi</div>
        </div>
    </div>
    
    <button class="w-full bg-black text-white font-black py-4 rounded-2xl shadow-md hover:bg-neutral-800 transition-all flex items-center justify-center gap-3 active:scale-[0.98] text-[10px] uppercase tracking-widest fade-in-up" onclick="goToAddCategory()">
        <i class="fas fa-plus"></i> Nuova Categoria
    </button>

    <!-- LISTA CATEGORIE -->
    <div id="catalog-list" class="space-y-4 fade-in-up"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-20">
        <i class="fas fa-box-open text-4xl text-gray-100 mb-4"></i>
        <p class="text-[10px] font-black uppercase text-gray-300 tracking-widest">Nessun protocollo trovato</p>
    </div>
  </div>

  <!-- MODAL EDIT -->
  <div id="edit-cat-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center p-6 z-[1000] hidden">
    <div class="card-noir p-6 w-full max-w-sm space-y-5">
        <h3 class="text-lg font-black uppercase tracking-tighter">Modifica Categoria</h3>
        <div class="space-y-4">
            <input type="text" id="edit-cat-short" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none" placeholder="Nome Breve">
            <textarea id="edit-cat-long" rows="2" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-medium border border-transparent focus:border-black outline-none resize-none" placeholder="Descrizione"></textarea>
        </div>
        <div class="flex gap-3 pt-2">
            <button class="flex-1 py-3 rounded-xl border border-border text-[9px] font-black uppercase tracking-widest" onclick="closeEditModal()">Annulla</button>
            <button class="flex-1 py-3 bg-black text-white rounded-xl text-[9px] font-black uppercase tracking-widest" onclick="saveEditCategory()">Salva</button>
        </div>
    </div>
  </div>

  <script>
    'use strict';
    const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/0fff7fa2-bcb2-4b50-a26b-589b7054952e";
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    
    const urlParams = new URLSearchParams(window.location.search);
    const ash = urlParams.get('ash');

    let fullCatalog = [], currentMacro = 'SOP', currentEditingCatId = null;

    async function loadCatalog(force = false) {
        const loader = document.getElementById('loader');
        const content = document.getElementById('app-content');
        if(force) loader.classList.remove('hidden');
        
        try {
            const res = await fetch(WEBHOOK_URL, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ action: "get_catalog", _auth: tg.initData, ash: ash }) 
            });
            const raw = await res.json();
            const data = Array.isArray(raw) ? raw[0] : (raw.catalog || raw);
            fullCatalog = data.categories || data.catalog?.categories || [];
            renderCatalog();
        } catch (e) { 
            console.error("Load Error:", e);
            tg.HapticFeedback.notificationOccurred("error"); 
        } finally { 
            loader.classList.add('hidden'); 
            content.classList.remove('hidden');
        }
    }

    function setMacro(macro) {
        currentMacro = macro;
        document.querySelectorAll('.macro-btn').forEach(b => {
            b.classList.remove('active', 'text-white');
            b.classList.add('text-gray-400');
        });
        const activeBtn = document.getElementById('btn-' + macro);
        activeBtn.classList.add('active', 'text-white');
        activeBtn.classList.remove('text-gray-400');
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        renderCatalog();
    }

    function renderCatalog() {
        const container = document.getElementById("catalog-list");
        container.innerHTML = "";
        const filtered = fullCatalog.filter(c => c.macrocategories === currentMacro);
        
        if (filtered.length === 0) {
            document.getElementById("empty-state").classList.remove('hidden');
            document.getElementById('count-active').innerText = "0";
            document.getElementById('count-ghost').innerText = "0";
            return;
        }
        document.getElementById("empty-state").classList.add('hidden');

        let activeTotal = 0, ghostTotal = 0;

        filtered.forEach(cat => {
            const subcats = cat.subcategories || [];
            const catEl = document.createElement("div");
            catEl.className = "card-noir overflow-hidden transition-all fade-in-up";
            
            catEl.innerHTML = `
                <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50 transition" onclick="toggleCat(this)">
                    <div class="flex items-center gap-3">
                        <div class="w-7 h-7 bg-black text-white rounded-lg flex items-center justify-center font-black text-[10px]">${subcats.length}</div>
                        <span class="font-black text-xs uppercase tracking-tight">${cat.short_name || cat.name}</span>
                    </div>
                    <div class="flex items-center gap-2"> 
                        <button class="btn-touch text-gray-300 hover:text-black transition" onclick="event.stopPropagation(); openEditModal('${cat.name}', '${cat.short_name || ''}', '${cat.callback_data}')">
                            <i class="fas fa-pen text-base"></i> 
                        </button>
                        <button class="btn-touch text-gray-300 hover:text-red-500 transition" onclick="event.stopPropagation(); deleteCategory('${cat.callback_data}', '${cat.name}')">
                            <i class="fas fa-trash text-base"></i>
                        </button>
                        <i class="fas fa-chevron-down text-[10px] text-gray-200 transition-transform ml-1 mr-2"></i>
                    </div>
                </div>
                <div class="cat-body border-t border-gray-50 hidden">
                    <div class="p-3 bg-gray-50/50 flex justify-center border-b border-gray-50">
                        <button class="text-[8px] font-black uppercase tracking-widest text-black/40 hover:text-black transition" onclick="goToAddProduct('${cat.callback_data}')">+ Aggiungi Voce</button>
                    </div>
                    <div class="prod-list"></div>
                </div>`;

            const prodList = catEl.querySelector(".prod-list");
            subcats.forEach(prod => {
                if(prod.blueprint_ready) activeTotal++; else ghostTotal++;
                const pEl = document.createElement("div");
                pEl.className = `flex justify-between items-center p-4 border-b border-gray-50 last:border-b-0 ${prod.blueprint_ready ? 'prod-status-active' : 'prod-status-ghost'}`;
                pEl.innerHTML = `
                    <div class="flex-1 pr-4">
                        <p class="font-bold text-[11px] uppercase tracking-tight leading-tight">${prod.short_name || prod.name}</p>
                        <p class="text-[7px] font-medium text-gray-400 uppercase tracking-widest mt-0.5">${prod.blueprint_ready ? 'Attivo' : 'Suggerito'}</p>
                    </div>
                    <div class="flex gap-3 items-center">
                        <button class="w-10 h-10 bg-white border border-border text-red-400 rounded-lg flex items-center justify-center active:scale-90 transition shadow-sm" onclick="deleteProduct('${prod.callback_data}', '${prod.name}')">
                            <i class="fas fa-trash text-sm"></i>
                        </button>
                        <button class="px-5 h-10 ${prod.blueprint_ready ? 'bg-black text-white' : 'bg-gray-100 text-black'} rounded-xl text-[8px] font-black uppercase tracking-widest active:scale-90 transition shadow-sm" onclick="openProduct('${prod.blueprint_ready ? 'edit-blueprint.html' : 'add-product.html'}', '${prod.callback_data}', '${cat.callback_data}')">
                            ${prod.blueprint_ready ? 'Gestisci' : 'Attiva'}
                        </button>
                    </div>`;
                prodList.appendChild(pEl);
            });
            container.appendChild(catEl);
        });

        document.getElementById('count-active').innerText = activeTotal;
        document.getElementById('count-ghost').innerText = ghostTotal;
    }

    function toggleCat(el) {
        const body = el.nextElementSibling;
        const icon = el.querySelector('.fa-chevron-down');
        const isOpen = !body.classList.contains('hidden');
        document.querySelectorAll('.cat-body').forEach(b => b.classList.add('hidden'));
        document.querySelectorAll('.fa-chevron-down').forEach(i => i.classList.remove('rotate-180'));
        if(!isOpen) { body.classList.remove('hidden'); icon.classList.add('rotate-180'); }
    }

    window.goToAddCategory = () => { location.href = `add-category.html?ash=${ash}&macro=${currentMacro}`; };
    window.goToAddProduct = (catId) => { location.href = `add-product.html?ash=${ash}&catId=${catId}`; };
    window.openProduct = (page, pId, catId) => { 
        let url = `${page}?ash=${ash}&productId=${pId}`;
        if(page.includes('add-product')) url += `&catId=${catId}&ghostId=${pId}`;
        location.href = url;
    };
    window.openEditModal = (n, s, id) => { currentEditingCatId = id; document.getElementById('edit-cat-long').value = n; document.getElementById('edit-cat-short').value = s; document.getElementById('edit-cat-modal').classList.remove('hidden'); };
    window.closeEditModal = () => { document.getElementById('edit-cat-modal').classList.add('hidden'); };
    window.saveEditCategory = async () => {
        const id = currentEditingCatId;
        const name = document.getElementById('edit-cat-long').value;
        const short_name = document.getElementById('edit-cat-short').value;
        
        if (!name) { alert("Nome richiesto"); return; }
        
        try {
            const res = await fetch(WEBHOOK_URL, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ action: "update_category", _auth: tg.initData, ash: ash, category_id: id, name, short_name }) 
            });
            if (res.ok) {
                closeEditModal();
                loadCatalog(true);
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
            } else {
                throw new Error("Failed to save");
            }
        } catch (e) {
            console.error("Save Error:", e);
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
        }
    };
    
    window.deleteCategory = (id, name) => { tg.showConfirm(`Eliminare categoria ${name}?`, ok => { if(ok) loadCatalog(true); }); };
    window.deleteProduct = (id, name) => { tg.showConfirm(`Eliminare prodotto ${name}?`, ok => { if(ok) loadCatalog(true); }); };
    window.goBack = () => { tg.close(); };

    if (!ash) {
        document.getElementById('loader').innerHTML = `<div class="font-black text-red-500">ASH MISSING</div>`;
    } else {
        document.addEventListener("DOMContentLoaded", () => loadCatalog());
    }
  </script>
</body>
</html>
