  <style>

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .card { background: white; border: 1px solid #eeeeee; color: #000; }
    .card-hover:hover { background: #f9f9f9; }
    .text-primary { color: #007bff; } /* Blu SiteBoS */
    .text-success { color: #28a745; }
    .text-danger { color: #dc3545; }

      display: flex; align-items: center; justify-content: center; font-size: 24px;

<body class="bg-[#fafafa] text-black p-6 pb-24">

    </div>

  </div>

    <!-- HEADER -->

        <div>

    </div>

    <!-- STATS & ACTIONS -->

        <!-- Stats Suggeriti -->

                <div class="text-xs text-muted">Suggeriti</div>

        </div>
        <!-- Stats Attivi -->

            <i class="fas fa-check-circle text-success text-xl"></i>
            <div>
                <div id="count-active" class="font-bold text-lg">0</div>

            </div>
        </div>
    </div>

    <button class="w-full bg-white text-black font-bold py-4 px-4 rounded-xl mb-6 shadow-lg hover:bg-gray-200 transition-colors flex items-center justify-center gap-3 active:scale-[0.98]" onclick="goToAddCategory()">

    </button>

    <!-- CATALOG LIST -->

    <!-- Empty State -->

    </div>

  <!-- MODAL EDIT CATEGORIA -->
  <div id="edit-cat-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="card rounded-2xl p-6 w-full max-w-sm fade-in-modal transform transition-all duration-300 scale-95 opacity-0">
        <h3 class="text-xl font-bold mb-5">Modifica Categoria</h3>
        
        <div class="mb-4">
            <label for="edit-cat-short" class="block text-sm font-medium text-gray-400 mb-2">Nome Breve (per Bottoni)</label>

const ash = authData; // Manteniamo la variabile ash per compatibilità col resto del codice

// ==========================================
// 3. HELPER FUNCTIONS
// ==========================================

function getLang() {
    const l = urlParams.get("lang") || "it";
    const norm = l.toLowerCase().slice(0, 2);
    return i18n[norm] ? norm : "en";
}

function t(key) {
    const lang = getLang();
    return (i18n[lang] && i18n[lang][key]) || (i18n["en"] && i18n["en"][key]) || key;
}

function getAllUrlParams() {
    const params = {};
    for (const [key, value] of urlParams.entries()) {
        if (key !== "token") { // Esclude 'token' dai parametri passati
            params[key] = value;
        }
    }
    return params;
}

function applyTranslations() {
    document.querySelector(".header-text").innerText = t("title");
    document.querySelector(".subheader-text").innerText = t("subtitle");
    document.getElementById("count-ghost").nextElementSibling.innerText = t("ghost_label");
    document.getElementById("count-active").nextElementSibling.innerText = t("active_label");
    document.querySelector("#app-content > button.w-full > span").innerText = t("btn_new_cat");
    document.querySelector("#empty-state p").innerText = t("empty_title");
    document.querySelector("#empty-state button").innerText = t("empty_btn");
    document.querySelector("#edit-cat-modal h3").innerText = t("modal_edit_title");
    document.querySelector("#edit-cat-modal label[for=\'edit-cat-short\']").innerText = t("lbl_cat_short");
    document.querySelector("#edit-cat-modal label[for=\'edit-cat-long\']").innerText = t("lbl_cat_long");
    document.querySelector("#edit-cat-modal button:nth-child(1)").innerText = t("btn_cancel");
    document.querySelector("#edit-cat-modal button:nth-child(2)").innerText = t("btn_save");
}

function escapeHtml(str) {
    return (str || "").replace(/"/g, '&quot;');
}

function parseN8nResponse(json) {
    const data = Array.isArray(json) ? json[0] : json;
    return data.catalog || data.data || data;
}

// ==========================================
// 4. LOAD CATALOG (CON GESTIONE ASH)
// ==========================================

async function loadCatalog(forceRefresh = false) {
    if (!ash) return; // Modificato: controlla 'ash' invece di 'token'
    const loader = document.getElementById("loader");
    const content = document.getElementById("app-content");
    
    if (forceRefresh) {
        document.getElementById("catalog-list").innerHTML = "";
        loader.classList.remove("hidden");
        content.classList.add("hidden", "opacity-0");
    }
    
    try {
        const payload = { 
            action: "get_catalog", 
            _auth: ash, // Modificato: usa 'ash' invece di 'token'
            ...getAllUrlParams() // Passa tutto
        };

        // GESTIONE BONUS (Silenziosa)
        const bonus = urlParams.get("bonus_credits");
        if (bonus && parseInt(bonus) > 0) {
            payload.bonus_credits = parseInt(bonus); 
            const currentUrl = new URL(window.location.href);
            currentUrl.searchParams.delete("bonus_credits");
            window.history.replaceState({}, document.title, currentUrl.toString());
        }

        const res = await fetch(CATALOG_WEBHOOK, { 
            method: "POST", 
            headers: { "Content-Type": "application/json" }, 
            body: JSON.stringify(payload) 
        });
        
        if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
        
        catalogData = parseN8nResponse(await res.json());
        renderCatalog();
        if(forceRefresh) {
            tg.HapticFeedback.notificationOccurred("success");
        }

    } catch (e) {
        const emptyState = document.getElementById("empty-state");
        if(emptyState) {
            emptyState.innerHTML = `<i class="fas fa-exclamation-triangle text-4xl mb-4"></i><p class="text-sm mb-4">${t("alert_loading_error")}: ${e.message}</p>`;
            emptyState.classList.remove("hidden");
        }
        tg.HapticFeedback.notificationOccurred("error");
    } finally {
        loader.classList.add("hidden");
        content.classList.remove("hidden", "opacity-0");
        content.classList.add("opacity-100");
    }
}

// ==========================================
// 5. RENDER CATALOG (LOGICA FINALE)
// ==========================================

function renderCatalog() {
    const container = document.getElementById("catalog-list");
    container.innerHTML = "";
    const categories = catalogData.categories || [];
    
    if (categories.length === 0) {
        document.getElementById("empty-state").classList.remove("hidden");
        return;
    }
    
    let ghostCount = 0, activeCount = 0;
    
    categories.forEach((cat) => {
        const subcats = cat.subcategories || [];
        const catActive = subcats.filter(p => p.blueprint_ready).length;
        activeCount += catActive;
        ghostCount += (subcats.length - catActive);

        const displayTitle = cat.short_name || cat.name;
        const catId = cat.callback_data || ""; 

        const catEl = document.createElement("div");
        catEl.className = "cat-card dark-card rounded-xl mb-3 overflow-hidden"; // Tailwind classes
        
        catEl.innerHTML = `
            <div class="cat-card-header p-4 flex justify-between items-center cursor-pointer card-hover" onclick="this.parentElement.classList.toggle(\'open\')">
                <div class="flex items-center gap-3 flex-1" title="${escapeHtml(cat.name)}">
                    <i class="fas fa-folder text-lg text-black"></i>
                    <span class="font-bold text-base">${displayTitle}</span>
                    <span class="px-2 py-1 bg-[#333] text-white rounded-lg text-xs font-semibold">${subcats.length}</span>
                </div>
                <div class="flex items-center gap-2">
                    <button class="btn-icon-sm text-gray-400 hover:text-white" data-id="${catId}" data-name="${escapeHtml(cat.name)}" data-short="${escapeHtml(cat.short_name)}" onclick="event.stopPropagation(); handleEditClick(this)"><i class="fas fa-pen"></i></button>
                    <button class="btn-icon-sm text-gray-400 hover:text-red-500" data-id="${catId}" data-name="${escapeHtml(cat.name)}" onclick="event.stopPropagation(); handleDeleteClick(this)"><i class="fas fa-trash"></i></button>
                    <i class="fas fa-chevron-down chevron text-gray-500 text-sm"></i>
                </div>
            </div>
            <div class="cat-body border-t border-[#333]">
                <div class="p-3 text-center border-b border-[#eee]">
                    <button class="bg-black/10 text-black font-bold py-2 px-4 rounded-lg text-xs hover:bg-black/20 transition-colors active:scale-95" onclick="event.stopPropagation(); goToAddProduct(\'${catId}\', null)">
                        <i class="fas fa-plus"></i> ${t("btn_add_here")}
                    </button>
                </div>
                <div class="products-container"></div>
            </div>
        `;

        const prodContainer = catEl.querySelector(".products-container");
        
        subcats.forEach((prod) => {
            const isRealProduct = prod.blueprint_ready === true;
            const prodId = prod.callback_data; 
            
            let actionFunction, btnIcon, btnLabel, btnClass;
            let infoAreaOnClick = "", infoAreaClass = "", infoAreaTitle = "";

            if (isRealProduct) {
                btnIcon = "<i class=\"fas fa-sliders-h\"></i>";
                btnLabel = t("btn_manage") || "Gestisci";
                btnClass = "btn-action-edit";
                actionFunction = `openProduct(\'edit-blueprint.html\', \'${prodId}\')`; 
                
                infoAreaOnClick = `onclick=\"openProduct(\'edit-product.html\', \'${prodId}\')\"`;
                infoAreaClass = "cursor-pointer hover:bg-[#2a2a2a] transition-colors rounded-lg";
                infoAreaTitle = `title="${t("btn_manage")} Scheda Prodotto"`; // Updated title
            } else {
                btnIcon = "<i class=\"fas fa-plus\"></i>";
                btnLabel = t("btn_activate") || "Aggiungi";
                btnClass = "btn-action-create";
                actionFunction = `goToAddProduct(\'${catId}\', \'${prodId}\')`;
            }

            const statusClass = isRealProduct ? "prod-status-active" : "prod-status-ghost";
            const prodDisplay = prod.short_name || prod.name;
            const prodSub = (prod.short_name && prod.name !== prod.short_name) ? prod.name : "";
            const shortDesc = prod.description ? (prod.description.substring(0, 50) + (prod.description.length > 50 ? "..." : "")) : ""; // Fixed truncation
            const safeProdName = escapeHtml(prod.name);

            const prodEl = document.createElement("div");
            prodEl.className = `flex justify-between items-center gap-3 p-3 border-b border-[#333] last:border-b-0 ${statusClass}`;
            
            prodEl.innerHTML = `
                <div class="flex-1 ${infoAreaClass}" ${infoAreaOnClick} ${infoAreaTitle}>
                    <div class="font-bold text-sm flex items-center gap-2">${prodDisplay} ${isRealProduct ? `<i class="fas fa-check-circle text-success text-xs"></i>` : ""}</div>
                    ${prodSub ? `<div class="text-xs text-gray-500 italic">${prodSub}</div>` : ""}
                    <div class="text-xs text-gray-400 mt-1">${shortDesc}</div>
                </div>
                
                <div class="flex flex-col gap-2 min-w-[70px]">
                    <button class="btn-action ${btnClass} py-2 px-3 rounded-lg text-xs font-semibold flex flex-col items-center justify-center gap-1 active:scale-95" onclick="${actionFunction}">
                        ${btnIcon} <span>${btnLabel}</span>
                    </button>
                    
                    <button class="btn-prod-delete py-1 px-2 rounded-md text-xs flex items-center justify-center gap-1 active:scale-95" onclick="deleteProduct(\'${safeProdName}\', \'${prodId}\')">
                        <i class="fas fa-trash-alt"></i> <span>Elimina</span>
                    </button>
                </div>
            `;
            prodContainer.appendChild(prodEl);
        });
        container.appendChild(catEl);
    });
    
    document.getElementById("count-ghost").innerText = ghostCount;
    document.getElementById("count-active").innerText = activeCount;
}

// ==========================================
// 6. NAVIGATION (BLINDATA CON ASH)
// ==========================================

window.goBack = () => {
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
    // Torna alla dashboard passando l'ASH per mantenere la sessione
    const params = new URLSearchParams();
    if (ash) params.set("ash", ash);
    window.location.href = `../dashboard.html?${params.toString()}`;
};

window.deleteProduct = async function(prodName, prodId) {
    if (!prodId) return alert("Error: Product ID missing");
    if (tg.showConfirm) {
        tg.showConfirm(t("confirm_delete_prod").replace("{name}", prodName), async (confirmed) => {
            if (confirmed) {
                document.getElementById("loader").classList.remove("hidden");
                try {
                    const payload = { 
                        action: "delete_product", 
                        _auth: ash, // Usa ASH
                        product_id: prodId,
                        ...getAllUrlParams() 
                    };
            
                    const res = await fetch(CATALOG_WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    if (!res.ok) throw new Error("Server Error");
                    
                    const json = await res.json();
                    catalogData = parseN8nResponse(json);
                    renderCatalog();
                    document.getElementById("loader").classList.add("hidden");
                    tg.HapticFeedback.notificationOccurred("success");
                } catch (e) {
                    tg.showAlert(t("alert_loading_error") + ": " + e.message);
                    document.getElementById("loader").classList.add("hidden");
                    tg.HapticFeedback.notificationOccurred("error");
                }
            } else {
                tg.HapticFeedback.impactOccurred("light");
            }
        });
    } else if (!confirm(t("confirm_delete_prod").replace("{name}", prodName))) return;

    // Fallback per browser che non supportano tg.showConfirm (se il codice sopra non viene eseguito)
    if(!tg.showConfirm && !confirm(t("confirm_delete_prod").replace("{name}", prodName))) return;

    document.getElementById("loader").classList.remove("hidden");
    try {
        const payload = { 
            action: "delete_product", 
            _auth: ash, 
            product_id: prodId,
            ...getAllUrlParams() 
        };

        const res = await fetch(CATALOG_WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        if (!res.ok) throw new Error("Server Error");
        
        const json = await res.json();
        catalogData = parseN8nResponse(json);
        renderCatalog();
        document.getElementById("loader").classList.add("hidden");
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");

    } catch (e) {
        alert("Error: " + e.message);
        document.getElementById("loader").classList.add("hidden");
        tg.HapticFeedback.notificationOccurred("error");
    }
};

window.handleEditClick = function(btn) {
    if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
    const id = btn.dataset.id;
    const name = btn.dataset.name;
    const short = btn.dataset.short;
    openEditModal(name, short, id);
}

window.handleDeleteClick = function(btn) {
    if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
    const id = btn.dataset.id;
    const name = btn.dataset.name;
    deleteCategory(name, id);
}

window.openEditModal = function(name, short, id) {
    if (!id) return tg.showAlert(t("error_id_missing"));
    currentEditingCatId = id; 
    document.getElementById("edit-cat-long").value = name;
    document.getElementById("edit-cat-short").value = short || ""; 
    document.getElementById("edit-cat-modal").classList.remove("hidden");
    document.querySelector(".fade-in-modal").classList.add("scale-100", "opacity-100");
};

window.closeEditModal = () => {
    document.querySelector(".fade-in-modal").classList.remove("scale-100", "opacity-100");
    document.querySelector(".fade-in-modal").classList.add("scale-95", "opacity-0");
    setTimeout(() => {
        document.getElementById("edit-cat-modal").classList.add("hidden");
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
    }, 300); // Durata della transizione CSS
};

window.saveEditCategory = async function() {
    const newLong = document.getElementById("edit-cat-long").value.trim();
    const newShort = document.getElementById("edit-cat-short").value.trim();

    if (!newLong) return tg.showAlert(t("alert_name_required"));
    if (!currentEditingCatId) return tg.showAlert(t("error_id_missing"));

    closeEditModal(); // Chiude la modale con animazione
    document.getElementById("loader").classList.remove("hidden");

    try {
        const payload = { 
            action: "modify_category", 
            _auth: ash, // Usa ASH
            category_id: currentEditingCatId, 
            new_category_name: newLong,
            new_category_short_name: newShort,
            ...getAllUrlParams() 
        };
        const res = await fetch(CATALOG_WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        if (!res.ok) throw new Error("Server Error");
        
        const json = await res.json();
        catalogData = parseN8nResponse(json); 
        renderCatalog();
        document.getElementById("loader").classList.add("hidden");
        tg.HapticFeedback.notificationOccurred("success");
    } catch (e) {
        tg.showAlert(t("alert_loading_error") + ": " + e.message);
        document.getElementById("loader").classList.add("hidden");
        tg.HapticFeedback.notificationOccurred("error");
    }
};
