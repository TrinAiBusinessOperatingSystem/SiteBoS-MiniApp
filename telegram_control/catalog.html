<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SiteBoS - Catalogo</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #fafafa; color: #000; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .card { background: white; border: 1px solid #eeeeee; color: #000; }
    .card-hover:hover { background: #f9f9f9; }
    .text-primary { color: #000; } 
    .text-success { color: #28a745; }
    .text-danger { color: #dc3545; }
    .text-muted { color: #888; }
    .header-text { font-size: 22px; font-weight: 900; }
    .subheader-text { font-size: 13px; color: #888; font-style: italic; }
    
    .cat-card-header { transition: all 0.2s; }
    .cat-card-header:active { background: #f0f0f0; }
    .cat-body { display: none !important; }
    .cat-card.open .cat-body { display: block !important; }
    
    .prod-status-ghost { border-left: 3px solid #888; }
    .prod-status-active { border-left: 3px solid #000; background: rgba(0, 0, 0, 0.05); }
    .btn-action-create { background: #000; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .btn-action-edit { background: rgba(0, 0, 0, 0.05); color: #000; border: 1px solid rgba(0, 0, 0, 0.1); }
    .btn-prod-delete { background: transparent; border: 1px solid #dc3545; color: #dc3545; }
    .btn-prod-delete:hover { background: #dc3545; color: white; }
  </style>
</head>
<body class="p-6 pb-24">

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center bg-black z-50 transition-opacity duration-300">
    <div class="spinner-border animate-spin inline-block w-8 h-8 border-4 rounded-full text-black" role="status">
      <span class="visually-hidden"></span>
    </div>
    <div class="mt-4 text-sm opacity-70">Caricamento Catalogo...</div>
  </div>

  <div id="app-content" class="max-w-md mx-auto hidden opacity-0 transition-opacity duration-500">
    
    <!-- HEADER -->
    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 class="header-text">Catalogo</h1>
            <p class="subheader-text">Gestione Protocolli & Procedure AI</p>
        </div>
        <button class="btn-icon-sm text-black hover:text-primary" onclick="loadCatalog(true)" title="Ricarica">
            <i class="fas fa-sync-alt text-lg"></i>
        </button>
    </div>
    
    <!-- Main Action: Nuova Categoria -->
    <button class="w-full bg-white text-black font-bold py-4 px-4 rounded-xl mb-6 shadow-sm hover:bg-gray-200 transition-colors flex items-center justify-center gap-3 active:scale-[0.98]" onclick="goToAddCategory()">
        <i class="fas fa-plus text-lg"></i>
        <span class="text-sm uppercase tracking-wider">Nuova Categoria</span>
    </button>

    <!-- CATALOG LIST -->
    <div id="catalog-list"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center p-10 opacity-50">
        <i class="fas fa-box-open text-4xl mb-4"></i>
        <p class="text-sm mb-4">Nessun catalogo trovato. Inizia creando la tua prima categoria.</p>
        <button class="bg-white text-black font-bold py-3 px-6 rounded-lg hover:bg-gray-200 transition-colors" onclick="goToAddCategory()">Crea Prima Categoria</button>
    </div>

  </div>

  <!-- MODAL EDIT CATEGORIA -->
  <div id="edit-cat-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="card rounded-2xl p-6 w-full max-w-sm fade-in-modal transform transition-all duration-300 scale-95 opacity-0">
        <h3 class="text-xl font-bold mb-5">Modifica Categoria</h3>
        
        <div class="mb-4">
            <label for="edit-cat-short" class="block text-sm font-medium text-gray-400 mb-2">Nome Breve (per Bottoni)</label>
            <input type="text" id="edit-cat-short" class="w-full p-3 rounded-lg bg-gray-100 border border-gray-300 focus:ring-0 focus:border-black" placeholder="Es. 🚀 Startup">
        </div>

        <div class="mb-6">
            <label for="edit-cat-long" class="block text-sm font-medium text-gray-400 mb-2">Nome Completo (Descrittivo)</label>
            <textarea id="edit-cat-long" rows="2" class="w-full p-3 rounded-lg bg-gray-100 border border-gray-300 focus:ring-0 focus:border-black" placeholder="Es. Servizi per Startupper e Innovatori"></textarea>
        </div>

        <div class="flex gap-3">
            <button class="flex-1 bg-gray-200 text-black font-bold py-3 rounded-lg hover:bg-gray-300 transition-colors" onclick="closeEditModal()">Annulla</button>
            <button class="flex-1 bg-black text-white font-bold py-3 rounded-lg hover:bg-gray-800 transition-colors" onclick="saveEditCategory()">Salva</button>
        </div>
    </div>
  </div>

  <script>
    const CATALOG_WEBHOOK = "https://prod.workflow.trinai.it/webhook/0fff7fa2-bcb2-4b50-a26b-589b7054952e";
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    const urlParams = new URLSearchParams(window.location.search);
    const authData = tg.initData;
    if (!authData) {
        console.error("Auth Data non trovato.");
        document.body.innerHTML = "<h1>Errore: Accesso non autorizzato.</h1>";
        throw new Error("Auth Data mancante.");
    }
    const ash = authData; 
    let currentEditingCatId = ""; 
    let catalogData = null;

    // I18N DICTIONARY
    const i18n = {
        it: { title: "Catalogo Servizi", subtitle: "Gestione Protocolli & Procedure AI", btn_new_cat: "Nuova Categoria", btn_add_here: "Aggiungi Prodotto qui", btn_manage: "Gestisci", btn_activate: "Attiva", alert_loading_error: "Errore caricamento", alert_name_required: "Il nome completo è obbligatorio", error_id_missing: "Errore: ID Categoria non trovato.", confirm_delete_cat: "Sei sicuro di voler eliminare la categoria \'{name}\' e tutti i suoi prodotti?", confirm_delete_prod: "Eliminare definitivamente il prodotto \'{name}\'?" },
        en: { title: "Service Catalog", subtitle: "AI Protocols & Procedures Management", btn_new_cat: "New Category", btn_add_here: "Add Product here", btn_manage: "Manage", btn_activate: "Activate", alert_loading_error: "Loading Error", alert_name_required: "Full name is required", error_id_missing: "Error: Category ID not found.", confirm_delete_cat: "Are you sure you want to delete category \'{name}\' and all its products?", confirm_delete_prod: "Permanently delete product \'{name}\'?" }
    };
    function getLang() { const l = urlParams.get("lang") || "it"; return i18n[l.slice(0, 2)] ? l.slice(0, 2) : "en"; }
    function t(key) { const lang = getLang(); return (i18n[lang] && i18n[lang][key]) || (i18n["en"] && i18n["en"][key]) || key; }
    function getAllUrlParams() { const params = {}; for (const [k, v] of urlParams.entries()) { if (k !== "token") params[k] = v; } return params; }
    function escapeHtml(str) { return (str || "").replace(/"/g, '"'); }
    function parseN8nResponse(json) { const data = Array.isArray(json) ? json[0] : json; return data.catalog || data.data || data; }

    async function loadCatalog(forceRefresh = false) {
        if (!ash) return;
        const loader = document.getElementById("loader");
        const content = document.getElementById("app-content");
        if (forceRefresh) { document.getElementById("catalog-list").innerHTML = ""; loader.classList.remove("hidden"); content.classList.add("hidden", "opacity-0"); }
        try {
            const res = await fetch(CATALOG_WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "get_catalog", _auth: ash, ...getAllUrlParams() }) });
            if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
            catalogData = parseN8nResponse(await res.json());
            renderCatalog();
        } catch (e) { console.error(e); tg.HapticFeedback.notificationOccurred("error"); } finally { loader.classList.add("hidden"); content.classList.remove("hidden", "opacity-0"); content.classList.add("opacity-100"); }
    }

    function renderCatalog() {
        const container = document.getElementById("catalog-list"); container.innerHTML = "";
        const categories = catalogData.categories || [];
        if (categories.length === 0) { document.getElementById("empty-state").classList.remove("hidden"); return; }
        
        const grouped = categories.reduce((acc, cat) => {
            const m = cat.macrocategories || 'Altro';
            if (!acc[m]) acc[m] = [];
            acc[m].push(cat);
            return acc;
        }, {});
        
        Object.keys(grouped).sort().forEach(m => {
            container.innerHTML += `<div class="text-[9px] font-black uppercase text-gray-500 mt-6 mb-3 tracking-widest">${m}</div>`;
            grouped[m].forEach((cat) => {
                const subcats = cat.subcategories || [];
                const catEl = document.createElement("div"); catEl.className = "cat-card card rounded-xl mb-3 overflow-hidden";
                catEl.innerHTML = `
                    <div class="cat-card-header p-4 flex justify-between items-center cursor-pointer card-hover" onclick="this.parentElement.classList.toggle('open')">
                        <div class="flex items-center gap-3 flex-1"><span class="font-bold text-base">${subcats.length}</span><span class="font-bold text-base">${cat.short_name || cat.name}</span></div>
                        <div class="flex items-center gap-4"><button class="btn-icon-sm text-gray-400 hover:text-black" onclick="event.stopPropagation(); openEditModal('${cat.name}', '${cat.short_name}', '${cat.callback_data}')"><i class="fas fa-pen"></i></button></div>
                    </div>
                    <div class="cat-body border-t border-[#eee] p-3 text-center"><button class="bg-black/10 text-black font-bold py-2 px-4 rounded-lg text-xs hover:bg-black/20" onclick="goToAddProduct('${cat.callback_data}', null)"><i class="fas fa-plus"></i> ${t("btn_add_here")}</button></div>
                `;
                container.appendChild(catEl);
            });
        });
    }

    window.goToAddCategory = () => { location.href = `add-category.html?ash=${encodeURIComponent(ash)}`; };
    window.goToAddProduct = (catId, prodId) => { location.href = `add-product.html?ash=${encodeURIComponent(ash)}&catId=${catId}`; };
    window.openEditModal = (name, short, id) => { currentEditingCatId = id; document.getElementById('edit-cat-long').value = name; document.getElementById('edit-cat-short').value = short; document.getElementById('edit-cat-modal').classList.remove('hidden'); document.querySelector('.fade-in-modal').classList.add('scale-100', 'opacity-100'); };
    window.closeEditModal = () => { document.getElementById('edit-cat-modal').classList.add('hidden'); };
    window.saveEditCategory = async () => { /* ... logica salvataggio ... */ closeEditModal(); loadCatalog(true); };
    
    document.addEventListener("DOMContentLoaded", () => { loadCatalog(); });
  </script>
</body>
</html>
