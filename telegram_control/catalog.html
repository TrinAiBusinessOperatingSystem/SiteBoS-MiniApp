<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Service Catalog | SiteBoS</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
          borderRadius: { '3xl': '1.5rem' }
        }
      }
    }
  </script>

  <style>
    /* SiteBoS Architect Alignment */
    body { background-color: #fafafa !important; color: #000000 !important; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .card-noir { background: white !important; border: 1px solid #eeeeee !important; box-shadow: 0 2px 8px rgba(0,0,0,0.02) !important; border-radius: 1.5rem; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .prod-status-ghost { border-left: 3px solid #e5e7eb; background: #ffffff; }
    .prod-status-active { border-left: 3px solid #000000; background: #fcfcfc; }
    .cat-card-header:active { background: #f9f9f9; }
    .fas { font-weight: 900 !important; }
    .fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-bg text-black pb-24 overflow-x-hidden">

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 bg-white/90 z-[9999] flex flex-col items-center justify-center space-y-4">
    <div class="spinner"></div>
    <p class="text-[8px] font-black uppercase tracking-widest text-gray-400">Syncing Catalog...</p>
  </div>

  <div id="app-content" class="max-w-md mx-auto p-5 space-y-6 hidden opacity-0 transition-opacity duration-500">
    
    <!-- HEADER -->
    <header class="flex justify-between items-start pt-2 fade-in-up">
        <div>
            <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded-full mb-1 italic">Architect Catalog</div>
            <h1 class="text-xl font-black tracking-tighter uppercase leading-none">Catalogo</h1>
            <p class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mt-0.5 italic">Protocolli & Procedure AI</p>
        </div>
        <button class="w-10 h-10 bg-white border border-border rounded-xl flex items-center justify-center text-black shadow-sm active:scale-90 transition" onclick="loadCatalog(true)">
            <i class="fas fa-sync-alt text-xs"></i>
        </button>
    </header>

    <!-- STATS -->
    <div class="grid grid-cols-2 gap-3 fade-in-up" style="animation-delay: 0.1s">
        <div class="card-noir p-4 flex items-center gap-3">
            <div class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center"><i class="fas fa-lightbulb text-gray-300 text-xs"></i></div>
            <div>
                <div id="count-ghost" class="font-black text-sm leading-none">0</div>
                <div class="text-[7px] font-black text-gray-400 uppercase tracking-widest mt-1">Suggeriti</div>
            </div>
        </div>
        <div class="card-noir p-4 flex items-center gap-3">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center"><i class="fas fa-check-circle text-white text-xs"></i></div>
            <div>
                <div id="count-active" class="font-black text-sm leading-none">0</div>
                <div class="text-[7px] font-black text-gray-400 uppercase tracking-widest mt-1">Attivi</div>
            </div>
        </div>
    </div>
    
    <button class="w-full bg-black text-white font-black py-4 px-4 rounded-2xl shadow-md hover:bg-neutral-800 transition-all flex items-center justify-center gap-3 active:scale-[0.98] text-[10px] uppercase tracking-widest fade-in-up" style="animation-delay: 0.15s" onclick="goToAddCategory()">
        <i class="fas fa-plus"></i> Nuova Categoria
    </button>

    <div id="catalog-list" class="space-y-4 fade-in-up" style="animation-delay: 0.2s"></div>

    <div id="empty-state" class="hidden text-center py-20 space-y-4">
        <i class="fas fa-box-open text-4xl text-gray-100"></i>
        <p class="text-[10px] font-black uppercase text-gray-300 tracking-widest">Nessuna categoria trovata</p>
        <button class="bg-black text-white px-6 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest" onclick="goToAddCategory()">Crea la prima</button>
    </div>
  </div>

  <!-- MODAL EDIT CATEGORIA -->
  <div id="edit-cat-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center p-6 z-[1000] hidden">
    <div class="card-noir p-6 w-full max-w-sm space-y-5">
        <h3 class="text-lg font-black uppercase tracking-tighter">Modifica Categoria</h3>
        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[8px] font-black uppercase text-gray-400 ml-1">Nome Menu</label>
                <input type="text" id="edit-cat-short" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none">
            </div>
            <div class="space-y-1">
                <label class="text-[8px] font-black uppercase text-gray-400 ml-1">Descrizione Lunga</label>
                <textarea id="edit-cat-long" rows="2" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-medium border border-transparent focus:border-black outline-none resize-none"></textarea>
            </div>
        </div>
        <div class="flex gap-3 pt-2">
            <button class="flex-1 py-3 rounded-xl border border-border text-[9px] font-black uppercase tracking-widest" onclick="closeEditModal()">Annulla</button>
            <button class="flex-1 py-3 bg-black text-white rounded-xl text-[9px] font-black uppercase tracking-widest" onclick="saveEditCategory()">Salva</button>
        </div>
    </div>
  </div>

  <div class="fixed bottom-6 right-6 z-40">
    <button class="w-14 h-14 bg-white border border-border text-black rounded-full shadow-lg flex items-center justify-center active:scale-90 transition" onclick="goBack()">
      <i class="fas fa-arrow-left"></i>
    </button>
  </div>

  <script>
    'use strict';
    const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/0fff7fa2-bcb2-4b50-a26b-589b7054952e";
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    
    // RECUPERO ASH DALL'URL
    const urlParams = new URLSearchParams(window.location.search);
    const ash = urlParams.get('ash');

    if (!ash) {
        document.body.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase">ASH Token Missing</h2></div></body>`;
        throw new Error("ASH Missing");
    }

    let catalogData = null, currentEditingCatId = null;

    async function loadCatalog(force = false) {
        if(force) document.getElementById('loader').classList.remove('hidden');
        try {
            // PASSAGGIO ASH E _AUTH AL BACKEND
            const res = await fetch(WEBHOOK_URL, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ action: "get_catalog", _auth: tg.initData, ash: ash }) 
            });
            const raw = await res.json();
            catalogData = Array.isArray(raw) ? raw[0] : (raw.catalog || raw);
            renderCatalog();
        } catch (e) { tg.HapticFeedback.notificationOccurred("error"); }
        finally { 
            document.getElementById("loader").classList.add('hidden'); 
            const content = document.getElementById("app-content");
            content.classList.remove("hidden", "opacity-0");
            content.classList.add("opacity-100");
        }
    }

    function renderCatalog() {
        const container = document.getElementById("catalog-list");
        container.innerHTML = "";
        const categories = catalogData.categories || [];
        if (categories.length === 0) { document.getElementById("empty-state").classList.remove("hidden"); return; }
        document.getElementById("empty-state").classList.add("hidden");

        let activeCount = 0, ghostCount = 0;
        categories.forEach(cat => {
            const subcats = cat.subcategories || [];
            const catEl = document.createElement("div");
            catEl.className = "card-noir overflow-hidden transition-all";
            catEl.innerHTML = `
                <div class="p-4 flex justify-between items-center cursor-pointer cat-card-header" onclick="toggleCat(this)">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-folder text-black text-sm"></i>
                        <span class="font-black text-xs uppercase tracking-tight">${cat.short_name || cat.name}</span>
                        <span class="px-2 py-0.5 bg-gray-100 text-[8px] font-black rounded-full">${subcats.length}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <button class="text-gray-300 hover:text-black transition" onclick="event.stopPropagation(); openEditModal('${cat.name}', '${cat.short_name || ''}', '${cat.callback_data}')"><i class="fas fa-pen text-[10px]"></i></button>
                        <i class="fas fa-chevron-down text-[8px] text-gray-200 transition-transform"></i>
                    </div>
                </div>
                <div class="cat-body border-t border-gray-50 hidden">
                    <div class="p-3 bg-gray-50/50 flex justify-center border-b border-gray-50">
                        <button class="text-[8px] font-black uppercase tracking-widest text-black/40 hover:text-black transition" onclick="goToAddProduct('${cat.callback_data}')">+ Aggiungi Prodotto</button>
                    </div>
                    <div class="prod-list"></div>
                </div>`;

            const prodList = catEl.querySelector(".prod-list");
            subcats.forEach(prod => {
                if(prod.blueprint_ready) activeCount++; else ghostCount++;
                const pEl = document.createElement("div");
                pEl.className = `flex justify-between items-center p-4 border-b border-gray-50 last:border-b-0 ${prod.blueprint_ready ? 'prod-status-active' : 'prod-status-ghost'}`;
                pEl.innerHTML = `
                    <div class="flex-1 pr-4">
                        <p class="font-bold text-[11px] uppercase tracking-tight leading-tight">${prod.short_name || prod.name}</p>
                        <p class="text-[8px] font-medium text-gray-400 uppercase tracking-widest mt-0.5">${prod.blueprint_ready ? 'Attivo' : 'Suggerito'}</p>
                    </div>
                    <button class="px-4 py-2 ${prod.blueprint_ready ? 'bg-black text-white' : 'bg-gray-100 text-black'} rounded-xl text-[8px] font-black uppercase tracking-widest active:scale-90 transition" onclick="openProduct('${prod.blueprint_ready ? 'edit-blueprint.html' : 'add-product.html'}', '${prod.callback_data}', '${cat.callback_data}')">
                        ${prod.blueprint_ready ? 'Gestisci' : 'Attiva'}
                    </button>`;
                prodList.appendChild(pEl);
            });
            container.appendChild(catEl);
        });
        document.getElementById('count-active').innerText = activeCount;
        document.getElementById('count-ghost').innerText = ghostCount;
    }

    function toggleCat(el) {
        const body = el.nextElementSibling;
        const icon = el.querySelector('.fa-chevron-down');
        const isOpen = !body.classList.contains('hidden');
        document.querySelectorAll('.cat-body').forEach(b => b.classList.add('hidden'));
        document.querySelectorAll('.fa-chevron-down').forEach(i => i.classList.remove('rotate-180'));
        if(!isOpen) { body.classList.remove('hidden'); icon.classList.add('rotate-180'); }
    }

    // PERSISTENZA ASH NEI REDIRECT
    window.goToAddCategory = () => { location.href = `add-category.html?ash=${encodeURIComponent(ash)}`; };
    window.goToAddProduct = (catId) => { location.href = `add-product.html?ash=${encodeURIComponent(ash)}&catId=${catId}`; };
    window.openProduct = (page, pId, catId) => { 
        let url = `${page}?ash=${encodeURIComponent(ash)}&productId=${pId}`;
        if(page.includes('add-product')) url += `&catId=${catId}&ghostId=${pId}`;
        location.href = url;
    };
    window.openEditModal = (n, s, id) => { currentEditingCatId = id; document.getElementById('edit-cat-long').value = n; document.getElementById('edit-cat-short').value = s; document.getElementById('edit-cat-modal').classList.remove('hidden'); };
    window.closeEditModal = () => { document.getElementById('edit-cat-modal').classList.add('hidden'); };
    window.saveEditCategory = async () => { /* Logica fetch SAVE qui passando ash */ closeEditModal(); loadCatalog(true); };
    window.goBack = () => { tg.close(); };

    document.addEventListener("DOMContentLoaded", () => loadCatalog());
  </script>
</body>
</html>
