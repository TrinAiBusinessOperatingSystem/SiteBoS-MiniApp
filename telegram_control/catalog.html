<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Service Master | SiteBoS</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
          borderRadius: { '3xl': '1.5rem' }
        }
      }
    }
  </script>

  <style>
    /* SiteBoS Architect Alignment */
    body { background-color: #fafafa !important; color: #000000 !important; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .card-noir { background: white !important; border: 1px solid #eeeeee !important; border-radius: 1.5rem; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .prod-status-ghost { border-left: 3px solid #f3f4f6; background: #ffffff; }
    .prod-status-active { border-left: 3px solid #000000; background: #fcfcfc; }
    
    .macro-btn.active { background-color: #000 !important; color: #fff !important; }
    .macro-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

    .fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Touch target enhancement */
    .btn-touch { min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body class="bg-bg text-black pb-10 overflow-x-hidden">

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
    <div class="spinner"></div>
    <p class="text-[8px] font-black uppercase tracking-widest text-gray-400">Architect Engine...</p>
  </div>

  <div id="app-content" class="max-w-md mx-auto p-5 space-y-6 hidden">
    
    <!-- HEADER -->
    <header class="flex justify-between items-start pt-2 fade-in-up">
        <div>
            <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded-full mb-1 italic">Service Master</div>
            <h1 class="text-xl font-black tracking-tighter uppercase leading-none">Gestione Aziendale</h1>
        </div>
        <button class="w-10 h-10 bg-white border border-border rounded-xl flex items-center justify-center text-black shadow-sm active:scale-90 transition" onclick="loadCatalog(true)">
            <i class="fas fa-sync-alt text-xs"></i>
        </button>
    </header>

    <!-- MACRO SELECTOR -->
    <nav class="flex bg-gray-100 p-1 rounded-2xl gap-1 fade-in-up">
        <button onclick="setMacro('SOP')" id="btn-SOP" class="macro-btn flex-1 py-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest active">Procedure</button>
        <button onclick="setMacro('SER')" id="btn-SER" class="macro-btn flex-1 py-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest text-gray-400">Servizi</button>
        <button onclick="setMacro('PRO')" id="btn-PRO" class="macro-btn flex-1 py-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest text-gray-400">Prodotti</button>
    </nav>

    <!-- STATS -->
    <div class="grid grid-cols-2 gap-3 fade-in-up">
        <div class="card-noir p-4 flex items-center gap-3">
            <div id="count-ghost" class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center font-black text-xs text-gray-400">0</div>
            <div class="text-[7px] font-black text-gray-400 uppercase tracking-widest">In Bozza</div>
        </div>
        <div class="card-noir p-4 flex items-center gap-3">
            <div id="count-active" class="w-8 h-8 bg-black rounded-lg flex items-center justify-center font-black text-xs text-white">0</div>
            <div class="text-[7px] font-black text-gray-400 uppercase tracking-widest">Attivi</div>
        </div>
    </div>
    
    <button class="w-full bg-black text-white font-black py-4 rounded-2xl shadow-md hover:bg-neutral-800 transition-all flex items-center justify-center gap-3 active:scale-[0.98] text-[10px] uppercase tracking-widest fade-in-up" onclick="goToAddCategory()">
        <i class="fas fa-plus"></i> Nuova Categoria
    </button>

    <!-- LISTA CATEGORIE -->
    <div id="catalog-list" class="space-y-4 fade-in-up"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-20">
        <i class="fas fa-box-open text-4xl text-gray-100 mb-4"></i>
        <p class="text-[10px] font-black uppercase text-gray-300 tracking-widest">Nessun protocollo trovato</p>
    </div>
  </div>

  <!-- MODAL EDIT -->
    </div>
  </div>

  <!-- PRODUCT HUB (DASHBOARD) -->
  <div id="hub-drawer" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[2000] hidden transition-all duration-300 translate-y-full">
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[3rem] p-8 space-y-6 shadow-2xl overflow-y-auto max-h-[85vh]">
        <div class="flex justify-between items-start">
            <div>
                <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-widest rounded-full mb-1 italic">Product Hub</div>
                <h3 id="hub-product-name" class="text-2xl font-black tracking-tighter uppercase leading-none">Nome Prodotto</h3>
                <p id="hub-product-sku" class="text-[8px] font-black text-gray-400 uppercase mt-1 tracking-widest">SKU: ---</p>
            </div>
            <button onclick="closeHub()" class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center active:scale-90 transition"><i class="fas fa-times text-xs"></i></button>
        </div>

        <!-- GRID DASHBOARD -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="launchSubEditor('edit-product.html')" class="card-noir p-6 flex flex-col items-center justify-center gap-3 active:scale-95 transition group hover:border-black">
                <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center group-hover:bg-black group-hover:text-white transition-colors">
                    <i class="fas fa-edit text-lg"></i>
                </div>
                <span class="text-[9px] font-black uppercase tracking-widest">Dettagli & Prezzi</span>
            </button>

            <button onclick="launchSubEditor('edit-knowledge.html')" class="card-noir p-6 flex flex-col items-center justify-center gap-3 active:scale-95 transition group hover:border-black">
                <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center group-hover:bg-black group-hover:text-white transition-colors">
                    <i class="fas fa-book-open text-lg"></i>
                </div>
                <span class="text-[9px] font-black uppercase tracking-widest">User Guide</span>
            </button>

            <button onclick="launchSubEditor('edit-blueprint.html')" class="card-noir p-6 flex flex-col items-center justify-center gap-3 active:scale-95 transition group hover:border-black">
                <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center group-hover:bg-black group-hover:text-white transition-colors">
                    <i class="fas fa-project-diagram text-lg"></i>
                </div>
                <span class="text-[9px] font-black uppercase tracking-widest">Logica Operativa</span>
            </button>

            <button id="hub-blog-btn" onclick="launchSubEditor('edit-blog.html')" class="card-noir p-6 flex flex-col items-center justify-center gap-3 active:scale-95 transition group hover:border-black hidden">
                <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center group-hover:bg-black group-hover:text-white transition-colors">
                    <i class="fas fa-pen-nib text-lg"></i>
                </div>
                <span class="text-[9px] font-black uppercase tracking-widest">Blog & Story</span>
            </button>

            <button id="hub-social-btn" onclick="openSocialViewer()" class="card-noir p-6 flex flex-col items-center justify-center gap-3 active:scale-95 transition group hover:border-black hidden">
                <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center group-hover:bg-black group-hover:text-white transition-colors">
                    <i class="fas fa-share-nodes text-lg"></i>
                </div>
                <span class="text-[9px] font-black uppercase tracking-widest">Social Posts</span>
            </button>

            <button onclick="launchSubEditor('supervisor_hub.html')" class="card-noir p-6 flex flex-col items-center justify-center gap-3 active:scale-95 transition group hover:border-black">
                <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center group-hover:bg-black group-hover:text-white transition-colors">
                    <i class="fas fa-user-tie text-lg"></i>
                </div>
                <span class="text-[9px] font-black uppercase tracking-widest">Supervisor Hub</span>
            </button>
        </div>

        <div class="pt-4 border-t border-gray-50">
            <button onclick="tg.close()" class="w-full py-4 bg-gray-50 text-gray-400 rounded-2xl text-[9px] font-black uppercase tracking-widest active:scale-95 transition">Chiudi Pannello</button>
        </div>
    </div>
  </div>

  <!-- QUICK EDITOR DRAWER (MATRIOSKA FRAME) -->
  <div id="quick-editor-drawer" class="fixed inset-0 bg-white z-[3000] hidden transition-all duration-300 translate-y-full flex flex-col">
    <iframe id="quickEditorFrame" class="w-full h-full border-none" src="about:blank"></iframe>
  </div>

  <!-- SOCIAL VIEWER DRAWER -->
  <div id="social-viewer-drawer" class="fixed inset-0 bg-gray-50 z-[4000] hidden transition-all duration-300 translate-y-full overflow-y-auto">
    <div class="max-w-md mx-auto p-6 space-y-6">
        <header class="flex justify-between items-center">
            <h3 class="text-xl font-black uppercase tracking-tighter italic">Social Hub</h3>
            <button onclick="closeSocialViewer()" class="w-10 h-10 bg-white border border-border rounded-xl flex items-center justify-center active:scale-90 transition shadow-sm"><i class="fas fa-times"></i></button>
        </header>

        <div id="social-content-container" class="space-y-6 pb-20">
            <!-- Populated by JS -->
        </div>
    </div>
  </div>

  <script>
    'use strict';
    const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/0fff7fa2-bcb2-4b50-a26b-589b7054952e";
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    
    const urlParams = new URLSearchParams(window.location.search);
    let ash = urlParams.get('ash');
    let msg = urlParams.get('msg');

    // Support for malformed URLs like ?ash=TOKEN?msg=ID
    if (!msg && ash && ash.includes('?msg=')) {
        const parts = ash.split('?msg=');
        ash = parts[0];
        msg = parts[1];
    }

    let fullCatalog = [], currentMacro = 'SOP', currentEditingCatId = null;

    async function loadCatalog(force = false) {
        const loader = document.getElementById('loader');
        const content = document.getElementById('app-content');
        if(force) loader.classList.remove('hidden');
        
        try {
            const res = await fetch(WEBHOOK_URL, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ action: "get_catalog", _auth: tg.initData, ash: ash, msg: msg }) 
            });
            const raw = await res.json();
            const data = Array.isArray(raw) ? raw[0] : (raw.catalog || raw);
            fullCatalog = data.categories || data.catalog?.categories || [];
            renderCatalog();
        } catch (e) { 
            console.error("Load Error:", e);
            tg.HapticFeedback.notificationOccurred("error"); 
        } finally { 
            loader.classList.add('hidden'); 
            content.classList.remove('hidden');
        }
    }

    function setMacro(macro) {
        currentMacro = macro;
        document.querySelectorAll('.macro-btn').forEach(b => {
            b.classList.remove('active', 'text-white');
            b.classList.add('text-gray-400');
        });
        const activeBtn = document.getElementById('btn-' + macro);
        activeBtn.classList.add('active', 'text-white');
        activeBtn.classList.remove('text-gray-400');
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        renderCatalog();
    }

    function renderCatalog() {
        const container = document.getElementById("catalog-list");
        container.innerHTML = "";
        const filtered = fullCatalog.filter(c => c.macrocategories === currentMacro);
        
        if (filtered.length === 0) {
            document.getElementById("empty-state").classList.remove('hidden');
            document.getElementById('count-active').innerText = "0";
            document.getElementById('count-ghost').innerText = "0";
            return;
        }
        document.getElementById("empty-state").classList.add('hidden');

        let activeTotal = 0, ghostTotal = 0;

        filtered.forEach(cat => {
            const subcats = cat.subcategories || [];
            const catEl = document.createElement("div");
            catEl.className = "card-noir overflow-hidden transition-all fade-in-up";
            
            catEl.innerHTML = `
                <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50 transition" onclick="toggleCat(this)">
                    <div class="flex items-center gap-3">
                        <div class="w-7 h-7 bg-black text-white rounded-lg flex items-center justify-center font-black text-[10px]">${subcats.length}</div>
                        <span class="font-black text-xs uppercase tracking-tight">${cat.short_name || cat.name}</span>
                    </div>
                    <div class="flex items-center gap-2"> 
                        <button class="btn-touch text-gray-300 hover:text-black transition" onclick="event.stopPropagation(); openEditModal('${cat.name}', '${cat.short_name || ''}', '${cat.callback_data}')">
                            <i class="fas fa-pen text-base"></i> 
                        </button>
                        <button class="btn-touch text-gray-300 hover:text-red-500 transition" onclick="event.stopPropagation(); deleteCategory('${cat.callback_data}', '${cat.name}')">
                            <i class="fas fa-trash text-base"></i>
                        </button>
                        <i class="fas fa-chevron-down text-[10px] text-gray-200 transition-transform ml-1 mr-2"></i>
                    </div>
                </div>
                <div class="cat-body border-t border-gray-50 hidden">
                    <div class="p-3 bg-gray-50/50 flex justify-center border-b border-gray-50">
                        <button class="text-[8px] font-black uppercase tracking-widest text-black/40 hover:text-black transition" onclick="goToAddProduct('${cat.callback_data}')">+ Aggiungi Voce</button>
                    </div>
                    <div class="prod-list"></div>
                </div>`;

            const prodList = catEl.querySelector(".prod-list");
            subcats.forEach(prod => {
                if(prod.blueprint_ready) activeTotal++; else ghostTotal++;
                const pEl = document.createElement("div");
                pEl.className = `flex justify-between items-center p-4 border-b border-gray-50 last:border-b-0 ${prod.blueprint_ready ? 'prod-status-active' : 'prod-status-ghost'}`;
                pEl.innerHTML = `
                    <div class="flex-1 pr-4">
                        <p class="font-bold text-[11px] uppercase tracking-tight leading-tight">${prod.short_name || prod.name}</p>
                        <p class="text-[7px] font-medium text-gray-400 uppercase tracking-widest mt-0.5">${prod.blueprint_ready ? 'Attivo' : 'Suggerito'}</p>
                    </div>
                    <div class="flex gap-3 items-center">
                        <button class="w-10 h-10 bg-white border border-border text-red-400 rounded-lg flex items-center justify-center active:scale-90 transition shadow-sm" onclick="deleteProduct('${prod.callback_data}', '${prod.name}')">
                            <i class="fas fa-trash text-sm"></i>
                        </button>
                        <button class="px-5 h-10 ${prod.blueprint_ready ? 'bg-black text-white' : 'bg-gray-100 text-black'} rounded-xl text-[8px] font-black uppercase tracking-widest active:scale-90 transition shadow-sm" onclick="openProduct('${prod.blueprint_ready ? 'edit-blueprint.html' : 'add-product.html'}', '${prod.callback_data}', '${cat.callback_data}')">
                            ${prod.blueprint_ready ? 'Gestisci' : 'Attiva'}
                        </button>
                    </div>`;
                prodList.appendChild(pEl);
            });
            container.appendChild(catEl);
        });

        document.getElementById('count-active').innerText = activeTotal;
        document.getElementById('count-ghost').innerText = ghostTotal;
    }

    function toggleCat(el) {
        const body = el.nextElementSibling;
        const icon = el.querySelector('.fa-chevron-down');
        const isOpen = !body.classList.contains('hidden');
        document.querySelectorAll('.cat-body').forEach(b => b.classList.add('hidden'));
        document.querySelectorAll('.fa-chevron-down').forEach(i => i.classList.remove('rotate-180'));
        if(!isOpen) { body.classList.remove('hidden'); icon.classList.add('rotate-180'); }
    }

    window.goToAddCategory = () => { location.href = `add-category.html?ash=${ash}&msg=${msg || ''}&macro=${currentMacro}`; };
    window.goToAddProduct = (catId) => { location.href = `add-product.html?ash=${ash}&msg=${msg || ''}&catId=${catId}`; };
    
    let currentSopId = null;
    let currentSocialData = null;

    window.openProduct = async (page, pId, catId) => { 
        if (page === 'edit-blueprint.html') {
            currentSopId = pId;
            currentSocialData = null; // Reset
            
            const match = fullCatalog.flatMap(c => c.subcategories).find(p => p.callback_data === pId);
            document.getElementById('hub-product-name').innerText = match ? (match.short_name || match.name) : 'Dettagli Prodotto';
            document.getElementById('hub-product-sku').innerText = `ID: ${pId}`;

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get_ghost_info', sop_id: pId, ash: ash, msg: msg, _auth: tg.initData })
                });
                const info = await res.json();
                const rawInfo = Array.isArray(info) ? info[0] : info;
                
                // Gestione Blog
                const blogBtn = document.getElementById('hub-blog-btn');
                blogBtn.classList.remove('hidden');
                if (rawInfo.blog_active) {
                    blogBtn.onclick = () => launchSubEditor('edit-blog.html');
                    blogBtn.innerHTML = `
                        <div class="w-12 h-12 bg-black text-white rounded-2xl flex items-center justify-center">
                            <i class="fas fa-pen-nib text-lg"></i>
                        </div>
                        <span class="text-[9px] font-black uppercase tracking-widest">Blog & Story</span>`;
                } else {
                    blogBtn.onclick = () => activateService('blog');
                    blogBtn.innerHTML = `
                        <div class="w-12 h-12 bg-gray-50 text-gray-300 rounded-2xl flex items-center justify-center border-2 border-dashed border-gray-200">
                            <i class="fas fa-plus text-lg"></i>
                        </div>
                        <span class="text-[9px] font-black uppercase tracking-widest text-gray-400 italic">Crea Blog</span>
                        <div class="absolute top-2 right-2 bg-blue-600 text-white text-[5px] font-black px-1.5 py-0.5 rounded-full uppercase tracking-tighter">Premium</div>`;
                }

                // Gestione Social Post
                const socialBtn = document.getElementById('hub-social-btn');
                socialBtn.classList.remove('hidden');
                if (rawInfo.post) {
                    currentSocialData = rawInfo.post;
                    socialBtn.onclick = () => openSocialViewer();
                    socialBtn.innerHTML = `
                        <div class="w-12 h-12 bg-black text-white rounded-2xl flex items-center justify-center">
                            <i class="fas fa-share-nodes text-lg"></i>
                        </div>
                        <span class="text-[9px] font-black uppercase tracking-widest">Social Posts</span>`;
                } else {
                    socialBtn.onclick = () => activateService('social');
                    socialBtn.innerHTML = `
                        <div class="w-12 h-12 bg-gray-50 text-gray-300 rounded-2xl flex items-center justify-center border-2 border-dashed border-gray-200">
                            <i class="fas fa-plus text-lg"></i>
                        </div>
                        <span class="text-[9px] font-black uppercase tracking-widest text-gray-400 italic">Crea Social</span>
                        <div class="absolute top-2 right-2 bg-blue-600 text-white text-[5px] font-black px-1.5 py-0.5 rounded-full uppercase tracking-tighter">Premium</div>`;
                }
            } catch (e) { console.error("Ghost Info Error:", e); }
            
            const hub = document.getElementById('hub-drawer');
            hub.classList.remove('hidden');
            setTimeout(() => hub.classList.remove('translate-y-full'), 10);
            
            if(tg.BackButton) {
                tg.BackButton.show();
                tg.BackButton.onClick(closeHub);
            }
            return;
        }
        location.href = `${page}?ash=${ash}&msg=${msg || ''}&productId=${pId}&catId=${catId}&ghostId=${pId}`;
    };

    window.activateService = async (type) => {
        const wh = type === 'blog' ? "PLACEHOLDER_WH_BLOG" : "PLACEHOLDER_WH_SOCIAL";
        tg.showConfirm(`Attivare ${type.toUpperCase()}? (Verranno scalati i crediti previsti)`, async ok => {
            if(ok) {
                try {
                    await fetch(wh, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: `activate_${type}`, sop_id: currentSopId, ash: ash, msg: msg, _auth: tg.initData })
                    });
                    tg.showAlert("Processo avviato! Riceverai una notifica su Telegram.");
                    setTimeout(() => tg.close(), 1000);
                } catch (e) { console.error("Activation Error:", e); }
            }
        });
    };

    function openSocialViewer() {
        if (!currentSocialData) return;
        const container = document.getElementById('social-content-container');
        container.innerHTML = '';

        // Psicologia
        if (currentSocialData.psycological_analysis) {
            const psi = currentSocialData.psycological_analysis;
            container.innerHTML += `
                <section class="bg-black text-white rounded-[2rem] p-6 space-y-5 shadow-xl">
                    <span class="text-[8px] font-black uppercase tracking-[0.2em] text-neutral-500 italic">Analisi Psicologica AI</span>
                    <div class="space-y-4">
                        <div><p class="text-[7px] font-black uppercase text-neutral-500 mb-1">Emotional Drivers</p><p class="text-[11px] font-medium leading-relaxed">${psi.emotional_drivers}</p></div>
                        <div><p class="text-[7px] font-black uppercase text-neutral-500 mb-1">Logical Drivers</p><p class="text-[11px] font-medium leading-relaxed">${psi.logical_drivers}</p></div>
                        <div><p class="text-[7px] font-black uppercase text-neutral-500 mb-1">Cognitive Biases</p><p class="text-[11px] font-medium leading-relaxed italic text-neutral-400">${psi.cognitive_biases_used}</p></div>
                    </div>
                </section>
            `;
        }

        // Social Platforms
        const platforms = [
            { id: 'linkedin', icon: 'fa-linkedin', label: 'LinkedIn Professional' },
            { id: 'facebook', icon: 'fa-facebook', label: 'Facebook Community' },
            { id: 'instagram', icon: 'fa-instagram', label: 'Instagram Visual' },
            { id: 'x', icon: 'fa-x-twitter', label: 'X (Twitter) Viral' },
            { id: 'tiktok', icon: 'fa-tiktok', label: 'TikTok POV' }
        ];

        platforms.forEach(p => {
            if (currentSocialData[p.id]) {
                container.innerHTML += `
                    <div class="card-noir p-6 space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-[8px] font-black uppercase tracking-widest text-gray-300"><i class="fab ${p.icon} mr-1"></i> ${p.label}</span>
                            <button onclick="copyToClipboard('post-text-${p.id}')" class="text-[8px] font-black uppercase bg-gray-100 px-3 py-1.5 rounded-lg active:scale-90 transition">Copia</button>
                        </div>
                        <p id="post-text-${p.id}" class="text-[11px] font-medium leading-relaxed text-gray-800">${currentSocialData[p.id]}</p>
                    </div>
                `;
            }
        });

        // Prompt & Visual
        if (currentSocialData.prompt || currentSocialData.veo_master_prompt_8s) {
            container.innerHTML += `
                <section class="card-noir p-6 space-y-5 border-dashed">
                    <span class="text-[8px] font-black uppercase tracking-widest text-gray-300 italic">Visual & Prompts (AI Generation)</span>
                    
                    ${currentSocialData.prompt ? `
                        <div class="space-y-2">
                            <div class="flex justify-between items-center">
                                <p class="text-[7px] font-black uppercase text-gray-400">Image Prompt (Gemini/MJ)</p>
                                <button onclick="copyToClipboard('prompt-img')" class="text-[7px] font-black uppercase text-blue-500">Copia Prompt</button>
                            </div>
                            <div id="prompt-img" class="bg-gray-50 p-4 rounded-xl text-[9px] font-mono leading-tight border border-gray-100 text-gray-600">${currentSocialData.prompt}</div>
                        </div>
                    ` : ''}

                    ${currentSocialData.veo_master_prompt_8s ? `
                        <div class="space-y-2">
                            <div class="flex justify-between items-center">
                                <p class="text-[7px] font-black uppercase text-gray-400">Video Master Prompt (VEO)</p>
                                <button onclick="copyToClipboard('prompt-video')" class="text-[7px] font-black uppercase text-blue-500">Copia Prompt</button>
                            </div>
                            <div id="prompt-video" class="bg-gray-50 p-4 rounded-xl text-[9px] font-mono leading-tight border border-gray-100 text-gray-600">${currentSocialData.veo_master_prompt_8s}</div>
                        </div>
                    ` : ''}
                </section>
            `;
        }

        // Genera Video Button
        container.innerHTML += `
            <div class="pt-6">
                <button onclick="generateVideo()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition text-[10px] uppercase tracking-widest">
                    <i class="fas fa-video"></i> Genera Video AI
                </button>
            </div>
        `;

        const drawer = document.getElementById('social-viewer-drawer');
        drawer.classList.remove('hidden');
        setTimeout(() => drawer.classList.remove('translate-y-full'), 10);
        
        if(tg.BackButton) {
            tg.BackButton.show();
            tg.BackButton.onClick(closeSocialViewer);
        }
    }

    function closeSocialViewer() {
        const drawer = document.getElementById('social-viewer-drawer');
        drawer.classList.add('translate-y-full');
        setTimeout(() => drawer.classList.add('hidden'), 300);
        if(tg.BackButton) tg.BackButton.onClick(closeHub);
    }

    window.generateVideo = async () => {
        tg.showConfirm("Generare un video per questo post? (15 crediti)", async ok => {
            if(ok) {
                try {
                    await fetch("PLACEHOLDER_WH_VIDEO", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'generate_video', sop_id: currentSopId, ash: ash, msg: msg, _auth: tg.initData })
                    });
                    tg.showAlert("Generazione video avviata!");
                    setTimeout(() => tg.close(), 1000);
                } catch(e) { console.error("Video Gen Error:", e); }
            }
        });
    };

    function copyToClipboard(elementId) {
        const text = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(text).then(() => {
            tg.showAlert("Copiato negli appunti!");
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        });
    }

    function closeHub() {
        const hub = document.getElementById('hub-drawer');
        hub.classList.add('translate-y-full');
        setTimeout(() => hub.classList.add('hidden'), 300);
        if(tg.BackButton) tg.BackButton.hide();
    }

    function launchSubEditor(page) {
        console.log(`[Hub] Launching SubEditor: ${page} for SOP: ${currentSopId}`);
        const drawer = document.getElementById('quick-editor-drawer');
        const frame = document.getElementById('quickEditorFrame');
        const url = `${page}?ash=${ash}&msg=${msg || ''}&sop_id=${currentSopId}&from_hub=true`;
        
        console.log(`[Hub] Target URL: ${url}`);
        
        frame.src = url;
        drawer.classList.remove('hidden');
        setTimeout(() => drawer.classList.remove('translate-y-full'), 10);
        
        if(tg.BackButton) {
            tg.BackButton.onClick(closeSubEditor);
        }
    }

    function closeSubEditor() {
        const drawer = document.getElementById('quick-editor-drawer');
        drawer.classList.add('translate-y-full');
        setTimeout(() => {
            drawer.classList.add('hidden');
            document.getElementById('quickEditorFrame').src = 'about:blank';
        }, 300);
        
        // Al ritorno, ripristiniamo il BackButton per chiudere l'Hub
        if(tg.BackButton) {
            tg.BackButton.onClick(closeHub);
        }
    }
    window.openEditModal = (n, s, id) => { currentEditingCatId = id; document.getElementById('edit-cat-long').value = n; document.getElementById('edit-cat-short').value = s; document.getElementById('edit-cat-modal').classList.remove('hidden'); };
    window.closeEditModal = () => { document.getElementById('edit-cat-modal').classList.add('hidden'); };
    window.saveEditCategory = async () => {
        const id = currentEditingCatId;
        const name = document.getElementById('edit-cat-long').value;
        const short_name = document.getElementById('edit-cat-short').value;
        
        if (!name) { alert("Nome richiesto"); return; }
        
        try {
            const res = await fetch(WEBHOOK_URL, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ action: "update_category", _auth: tg.initData, ash: ash, msg: msg, category_id: id, name, short_name }) 
            });
            if (res.ok) {
                closeEditModal();
                loadCatalog(true);
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
            } else {
                throw new Error("Failed to save");
            }
        } catch (e) {
            console.error("Save Error:", e);
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
        }
    };
    
    window.deleteCategory = (id, name) => { 
        tg.showConfirm(`Eliminare categoria ${name}?`, async ok => { 
            if(ok) {
                try {
                    await fetch(WEBHOOK_URL, { 
                        method: "POST", 
                        headers: { "Content-Type": "application/json" }, 
                        body: JSON.stringify({ action: "delete_category", _auth: tg.initData, ash: ash, msg: msg, category_id: id }) 
                    });
                    loadCatalog(true);
                } catch(e) { console.error("Delete Error", e); }
            } 
        }); 
    };
    window.deleteProduct = (id, name) => { 
        tg.showConfirm(`Eliminare prodotto ${name}?`, async ok => { 
            if(ok) {
                try {
                    await fetch(WEBHOOK_URL, { 
                        method: "POST", 
                        headers: { "Content-Type": "application/json" }, 
                        body: JSON.stringify({ action: "delete_product", _auth: tg.initData, ash: ash, msg: msg, product_id: id }) 
                    });
                    loadCatalog(true);
                } catch(e) { console.error("Delete Error", e); }
            }
        }); 
    };
    window.goBack = () => { tg.close(); };

    if (!ash) {
        document.getElementById('loader').innerHTML = `<div class="font-black text-red-500">ASH MISSING</div>`;
    } else {
        document.addEventListener("DOMContentLoaded", () => loadCatalog());
    }
  </script>
</body>
</html>
