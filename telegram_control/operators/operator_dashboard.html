<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <title>Dashboard Operatore | SiteBoS</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="twa_guard.js"></script>
    
    <!-- Tailwind CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #ffffff !important;
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f4f5f8 100%) !important;
            color: #0f172a !important;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            background-image: radial-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px);
            background-size: 16px 16px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Ambient Breathing Core Shadow Glow */
        @keyframes corePulse {
            0% { box-shadow: 0 0 10px rgba(15, 23, 42, 0.04), 0 0 20px rgba(15, 23, 42, 0.02); }
            50% { box-shadow: 0 0 25px rgba(15, 23, 42, 0.12), 0 0 40px rgba(15, 23, 42, 0.06); }
            100% { box-shadow: 0 0 10px rgba(15, 23, 42, 0.04), 0 0 20px rgba(15, 23, 42, 0.02); }
        }
        .jarvis-core-pulse {
            animation: corePulse 3s infinite ease-in-out;
        }

        /* Satellite Wrapper & Floating Button */
        .satellite-item {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            will-change: transform, opacity;
            transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .satellite-btn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #cbd5e1;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px -2px rgba(15, 23, 42, 0.10);
            transition: border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1), 
                        box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .satellite-item.focused .satellite-btn {
            border-color: #0f172a;
            box-shadow: 0 14px 24px -4px rgba(15, 23, 42, 0.22), 
                        0 6px 10px -2px rgba(15, 23, 42, 0.10);
            transform: scale(1.18);
        }

        /* Etichetta posizionata direttamente SOTTO il Satellite */
        .satellite-label {
            margin-top: 8px;
            padding: 4px 10px;
            border-radius: 9999px;
            background: rgba(15, 23, 42, 0.92);
            color: #ffffff;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            opacity: 0.4;
            transform: translateY(-2px);
            transition: opacity 0.3s ease, transform 0.3s ease, background-color 0.3s ease;
            pointer-events: auto;
        }

        .satellite-item.focused .satellite-label {
            opacity: 1;
            transform: translateY(0);
            background: #0f172a;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.25);
        }

        /* Drawer Slide Transition */
        .drawer-transition {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="safe-area-inset h-screen flex flex-col overflow-hidden text-sm justify-between select-none">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 bg-white z-[2000] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-slate-200 border-t-slate-900 rounded-full animate-spin"></div>
        <div class="mt-4 text-xs font-bold uppercase tracking-wider text-slate-500">Caricamento Dashboard...</div>
    </div>

    <!-- TOP BAR HEADER -->
    <header class="p-4 bg-white/85 backdrop-blur-md border-b border-slate-200/85 flex justify-between items-center z-50 shrink-0 shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="toggleDrawer(true)" class="w-10 h-10 border border-slate-200 flex items-center justify-center rounded-2xl bg-white text-slate-800 active:bg-slate-50 transition shadow-sm" title="Dettagli Operatore">
                <i class="fas fa-bars text-xs"></i>
            </button>
            <div>
                <h1 id="operatorName" class="text-xs font-black uppercase tracking-tight leading-none text-slate-900">OPERATORE</h1>
                <p id="operatorRole" class="text-[8px] font-bold uppercase tracking-widest text-slate-400 mt-1">OPERATOR CONSOLE</p>
            </div>
        </div>
        <div class="bg-slate-50 border border-slate-200/80 px-3.5 py-1.5 rounded-2xl flex items-center gap-2">
            <i class="fas fa-building text-slate-400 text-[10px]"></i>
            <span id="companyName" class="text-[10px] font-black text-slate-900 uppercase">COMPANY</span>
        </div>
    </header>

    <!-- 3D ORBIT VIEWPORT -->
    <main id="orbit-viewport" class="relative flex-1 w-full flex items-center justify-center select-none touch-none">
        
        <!-- SVG Tilted Orbit Ellipse -->
        <svg class="absolute w-[330px] h-[230px] pointer-events-none opacity-40">
            <ellipse cx="165" cy="115" rx="150" ry="105" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,5" />
        </svg>

        <!-- Soft Shadow Pulse Ring -->
        <div class="absolute w-24 h-24 rounded-full border border-slate-200/40 jarvis-core-pulse"></div>

        <!-- CORE ASSISTENTE VOCALE / PROFILO (Mantiene la sua funzione originale per l'AI) -->
        <div id="jarvis-core" onclick="handleCoreClick()" class="w-20 h-20 rounded-full bg-white text-black flex flex-col items-center justify-center cursor-pointer shadow-xl active:scale-95 transition-transform duration-300 z-10 border-2 border-slate-900 overflow-hidden relative">
            <div id="operator-avatar" class="w-full h-full flex items-center justify-center text-2xl font-bold bg-slate-50 text-slate-800">
                👤
            </div>
        </div>

        <!-- SATELLITES ORBIT CAROUSEL (Satelliti + Etichetta posizionata sotto ciascun satellite) -->
        <div id="satellites-orbit" class="absolute inset-0 pointer-events-none">
            <!-- Satelliti iniettati dinamicamente da JS -->
        </div>

    </main>

    <!-- FOOTER SUPPORTO MINIMALE -->
    <footer class="p-3 bg-white/60 backdrop-blur-md border-t border-slate-200/50 z-40 text-center">
        <button onclick="toggleDrawer(true)" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest hover:text-slate-700 transition">
            <i class="fas fa-info-circle mr-1"></i> Tocca il Satellite o scorri l'orbita per selezionare
        </button>
    </footer>

    <!-- DRAWER OVERLAY (z-index 999 per coprire satelliti) -->
    <div id="drawer-overlay" class="fixed inset-0 bg-slate-950/20 backdrop-blur-sm z-[999] hidden transition-opacity duration-300" onclick="toggleDrawer(false)">
        <!-- NAV DRAWER z-[1000] -->
        <div id="nav-drawer" class="fixed top-0 left-0 h-full w-full bg-white flex flex-col justify-between drawer-transition -translate-x-full shadow-2xl z-[1000]" onclick="event.stopPropagation()">
            
            <!-- Drawer Header -->
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <span id="drawer-header-title" class="text-[9px] font-black tracking-widest text-slate-400 uppercase">Scheda Operatore & Moduli</span>
                <button onclick="toggleDrawer(false)" class="w-10 h-10 rounded-2xl border border-slate-200 flex items-center justify-center text-slate-600 bg-white active:bg-slate-50 transition shadow-sm">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </div>

            <!-- Drawer Content Container -->
            <div id="drawer-content-body" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
                <!-- Dettagli iniettati dinamicamente da JS -->
            </div>

            <!-- Drawer Footer -->
            <div class="p-4 border-t border-slate-100 bg-slate-50/50">
                <button onclick="openSettings()" class="w-full py-3.5 border border-slate-200 bg-white text-slate-900 font-bold text-xs rounded-2xl active:bg-slate-100 transition shadow-sm flex items-center justify-center gap-2">
                    <i class="fas fa-cog text-slate-500"></i> Modifica Profilo Operatore
                </button>
            </div>
        </div>
    </div>

    <!-- LOGICA DASHBOARD SATELLITI OPERATORE -->
    <script src="operator_dashboard_logic.js"></script>

</body>
</html>
