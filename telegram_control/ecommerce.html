<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SiteBoS | Store</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function () {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-black uppercase tracking-widest">Accesso Proibito</h2></div>
                    </body>`;
                window.stop();
            }
        })();
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        bg: '#fafafa',
                        surface: '#ffffff',
                        border: '#eeeeee',
                        accent: '#000000'
                    },
                    borderRadius: { '4xl': '2rem', '5xl': '2.5rem' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #000000; -webkit-tap-highlight-color: transparent; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bento-card { transition: all 0.3s ease; border: 1px solid #eeeeee; }
        .bento-card:active { transform: scale(0.97); background-color: #fcfcfc; }
        .safe-bottom { padding-bottom: calc(130px + env(safe-area-inset-bottom)); }
        
        .overlay { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 400; background-color: #ffffff; position: fixed; inset: 0; }
        .overlay-hidden { transform: translateX(100%); }
        .modal-hidden { opacity: 0; pointer-events: none; }
        .modal-hidden .modal-content { transform: translateY(100%); }
        
        select { -webkit-appearance: none; background: transparent; border: none; outline: none; width: 100%; }
        input, textarea { outline: none; }
    </style>
</head>
<body class="safe-area-inset h-screen flex flex-col overflow-hidden text-sm">

    <!-- HEADER (Double Row for better layout) -->
    <header class="bg-white border-b border-gray-50 sticky top-0 z-50 shadow-sm flex flex-col">
        <div class="px-6 pt-6 pb-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div id="brand-logo" class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white shadow-lg overflow-hidden border border-gray-100">
                    <i class="fas fa-shopping-bag text-lg"></i>
                </div>
                <div class="flex flex-col">
                    <p id="customer-name" class="text-[10px] font-black tracking-[0.15em] text-gray-400 leading-none mb-1 uppercase truncate max-w-[120px]">Marketplace</p>
                    <h1 class="font-black text-xs tracking-tighter uppercase">Marketplace BOS</h1>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleHistory()" class="w-8 h-8 flex items-center justify-center text-gray-300 hover:text-black transition"><i class="fas fa-history"></i></button>
                <button onclick="tg.close()" class="w-8 h-8 flex items-center justify-center text-gray-300 hover:text-black transition"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
        </div>
        
        <div class="px-6 pb-4">
            <div class="relative bg-gray-50 rounded-2xl px-4 py-3 border border-gray-100 flex items-center">
                <i class="fas fa-filter text-[10px] mr-3 opacity-20"></i>
                <select id="category-select" onchange="filterCategory(this.value)" class="font-bold text-[11px] uppercase tracking-widest text-black">
                    <option value="ALL">TUTTI I PRODOTTI</option>
                </select>
                <i class="fas fa-chevron-down text-[8px] absolute right-4 pointer-events-none opacity-40"></i>
            </div>
        </div>
    </header>

    <!-- CONTENT -->
    <main id="main-content" class="flex-1 overflow-y-auto p-6 space-y-12 no-scrollbar safe-bottom">
        <section id="section-suggested" class="hidden">
            <h2 class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 mb-5 px-1 border-l-2 border-gray-100 pl-3">Top Selection</h2>
            <div id="suggested-list" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
        </section>
        <div id="catalog-container" class="space-y-12"></div>
    </main>

    <!-- PRODUCT DETAIL MODAL -->
    <div id="product-modal" class="fixed inset-0 z-[500] modal-hidden flex flex-col">
        <div class="modal-overlay absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="modal-content mt-auto bg-white rounded-t-[3rem] p-8 space-y-6 relative flex flex-col max-h-[92vh] shadow-2xl border-t border-gray-100">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-2"></div>
            <div class="overflow-y-auto no-scrollbar space-y-6 pb-10">
                <div id="modal-img-container" class="w-full aspect-video rounded-3xl bg-gray-50 overflow-hidden border border-gray-100">
                    <img id="modal-img" src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 id="modal-title" class="text-2xl font-black tracking-tighter leading-tight uppercase"></h2>
                    <p id="modal-category" class="text-[10px] font-black uppercase tracking-widest text-gray-300 mt-1"></p>
                </div>
                <div class="space-y-4">
                    <h3 class="text-xs font-black uppercase tracking-widest">Descrizione</h3>
                    <p id="modal-desc" class="text-gray-500 text-sm leading-relaxed"></p>
                </div>
                <div class="flex items-center justify-between pt-6 border-t border-gray-50">
                    <span id="modal-price" class="text-3xl font-black tracking-tighter italic"></span>
                    <div id="modal-stepper" class="flex items-center gap-4 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                        <button id="modal-minus" class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-sm active:scale-90 transition"><i class="fas fa-minus"></i></button>
                        <span id="modal-qty" class="font-black text-xl min-w-[25px] text-center">0</span>
                        <button id="modal-plus" class="w-12 h-12 bg-black text-white rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SUMMARY OVERLAY -->
    <div id="summary-overlay" class="overlay overlay-hidden flex flex-col">
        <header class="p-8 flex justify-between items-center border-b border-gray-50">
            <h2 class="text-xl font-black uppercase tracking-tighter">Conferma Ordine</h2>
            <button onclick="toggleSummary()" class="text-gray-300 text-2xl hover:text-black transition"><i class="fas fa-times-circle"></i></button>
        </header>
        <div class="flex-1 overflow-y-auto p-8 space-y-8 no-scrollbar pb-40">
            <div id="summary-list" class="space-y-4"></div>
            
            <div id="location-box" class="p-6 bg-gray-50 rounded-4xl space-y-6 border border-gray-100 relative overflow-hidden">
                <div class="flex items-center justify-between">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400 italic">Dati Consegna</h3>
                    <button onclick="requestLocation()" id="btn-location" class="text-[9px] font-black uppercase text-blue-500 px-3 py-1.5 bg-blue-50 rounded-full flex items-center gap-2">
                        <i class="fas fa-location-arrow"></i>
                        <span>Usa GPS</span>
                    </button>
                </div>
                
                <div class="space-y-4">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-gray-300" id="location-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <span id="location-status" class="font-bold text-gray-400 text-[11px]">Coordinate GPS richieste</span>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-gray-400 ml-2">Indirizzo Esatto (Via, N., Città)</label>
                        <textarea id="manual-address" rows="3" oninput="updateConfirmButton()" class="w-full bg-white border border-gray-100 rounded-2xl p-4 text-xs font-bold focus:border-black transition" placeholder="Es: Via Roma 10, Gela (CL)"></textarea>
                        <p class="text-[9px] text-gray-400 italic px-2">L'indirizzo è obbligatorio per procedere con l'ordine.</p>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-gray-50 rounded-4xl space-y-4 border border-gray-100">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400 italic">Metodo di Pagamento</h3>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm text-black"><i class="fas fa-truck text-xs"></i></div>
                    <span class="font-black text-xs uppercase">Pagamento alla consegna</span>
                </div>
            </div>
        </div>
        <footer class="p-8 bg-white border-t border-gray-50 fixed bottom-0 left-0 right-0 z-50 shadow-2xl">
            <div class="flex justify-between items-center mb-6 px-2">
                <span class="text-xs font-black uppercase text-gray-300">Da pagare</span>
                <span id="summary-total" class="text-3xl font-black tracking-tighter italic"></span>
            </div>
            <button id="final-confirm-btn" onclick="sendOrder()" class="w-full bg-gray-100 text-gray-400 h-16 rounded-[2.5rem] font-black text-xs uppercase tracking-[0.2em] transition-all cursor-not-allowed">
                Completa i dati
            </button>
        </footer>
    </div>

    <!-- HISTORY OVERLAY -->
    <div id="history-overlay" class="overlay overlay-hidden flex flex-col">
        <header class="p-8 flex justify-between items-center border-b border-gray-100">
            <h2 class="text-xl font-black uppercase tracking-tighter">I tuoi ordini</h2>
            <button onclick="toggleHistory()" class="text-gray-300 text-2xl hover:text-black transition"><i class="fas fa-times-circle"></i></button>
        </header>
        <div id="history-list" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
    </div>

    <!-- CHECKOUT BAR -->
    <div id="checkout-bar" class="fixed bottom-0 left-0 right-0 p-8 bg-white border-t border-gray-100 z-[100] translate-y-full transition-transform duration-500 shadow-[0_-15px_50px_rgba(0,0,0,0.08)]">
        <div class="flex items-center justify-between gap-6 max-w-2xl mx-auto">
            <div class="flex flex-col">
                <span class="text-[9px] font-black uppercase tracking-widest text-gray-400 mb-1">Il tuo totale</span>
                <span id="total-price-bar" class="text-2xl font-black tracking-tighter">€ 0,00</span>
            </div>
            <button onclick="toggleSummary()" class="flex-1 bg-black text-white h-16 rounded-[2.5rem] font-black text-[10px] uppercase tracking-[0.2em] active:scale-95 transition-all flex items-center justify-center gap-3 shadow-xl">
                <span>Rivedi Ordine</span><i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- LOADER -->
    <div id="global-loader" class="fixed inset-0 bg-white z-[600] flex flex-col items-center justify-center p-10 text-center transition-opacity duration-300">
        <div class="w-12 h-12 border-2 border-gray-100 border-t-black rounded-full animate-spin mb-4"></div>
        <p id="loader-msg" class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-300 animate-pulse">Sincronizzazione Operativa...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const WH_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const params = new URLSearchParams(window.location.search);
        const ashToken = params.get('ash');

        let catalog = [], categories = [], history = [], cart = {}; 
        let imgRoot = "", vat = params.get('vat') || 'default', currentFilter = 'ALL', userCoords = null;

        window.onload = async () => { if (!ashToken) { tg.showAlert("ASH Token mancante."); return; } await initApp(); };

        async function initApp() {
            try {
                const res = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_ecom_get' })
                });
                const r = await res.json();
                const d = Array.isArray(r) ? r[0] : r; 
                if (d && d.success) {
                    catalog = d.catalog || []; history = d.history || []; vat = d.vat || vat;
                    imgRoot = (d.urlMiniApp || "").replace('telegram_control/', '');
                    categories = [...new Set(catalog.map(p => p.category))];
                    renderUI(d.brand || {}); hideLoader();
                }
            } catch (e) { tg.showAlert("Connessione fallita."); }
        }

        function hideLoader() { const l = document.getElementById('global-loader'); l.classList.add('opacity-0'); setTimeout(() => l.classList.add('hidden'), 300); }

        function renderUI(brand) {
            document.getElementById('customer-name').innerText = (tg.initDataUnsafe.user?.first_name || "Cliente");
            if (brand.logo) document.getElementById('brand-logo').innerHTML = `<img src="${brand.logo}" class="w-full h-full object-cover" onerror="this.innerHTML='<i class=\'fas fa-shopping-bag\'></i>'">`;
            
            const select = document.getElementById('category-select');
            select.innerHTML = '<option value="ALL">TUTTI I PRODOTTI</option>';
            categories.forEach(cat => {
                const opt = document.createElement('option'); opt.value = cat;
                opt.innerText = cat.replace('[PRO] ', '').toUpperCase();
                select.appendChild(opt);
            });
            renderSuggested(); renderCatalog(); renderHistory();
        }

        function filterCategory(cat) {
            currentFilter = cat; renderCatalog();
            if (cat !== 'ALL') {
                const target = document.getElementById(`section-${cat.replace(/\s/g, '_')}`);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function renderSuggested() {
            const list = document.getElementById('suggested-list');
            const counts = {};
            history.forEach(o => o.items?.forEach(i => counts[i.sku] = (counts[i.sku] || 0) + 1));
            const sorted = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 4);
            const items = catalog.filter(p => sorted.includes(p.callback_data));
            if (items.length > 0) {
                document.getElementById('section-suggested').classList.remove('hidden');
                list.innerHTML = items.map(p => `
                    <div class="flex-shrink-0 w-44 bg-white p-5 rounded-[2rem] bento-card space-y-4" onclick="openProduct('${p.callback_data}')">
                        <div class="w-full aspect-square rounded-2xl bg-gray-50 overflow-hidden relative border border-gray-100">
                            <img src="${imgRoot}images/${vat}/${p.callback_data}.jpg" onerror="this.src='https://via.placeholder.com/400?text=IMG'" class="w-full h-full object-cover">
                            ${cart[p.callback_data] ? `<div class="absolute top-2 right-2 bg-black text-white w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-black border-2 border-white shadow-lg">${cart[p.callback_data]}</div>` : ''}
                        </div>
                        <div class="px-1">
                            <h3 class="font-black text-[10px] truncate uppercase tracking-tight">${p.short_name || p.name}</h3>
                            <p class="font-black text-sm mt-1">€ ${parseFloat(p.price).toFixed(2)}</p>
                        </div>
                    </div>`).join('');
            }
        }

        function renderCatalog() {
            const container = document.getElementById('catalog-container'); container.innerHTML = '';
            const filteredCategories = currentFilter === 'ALL' ? categories : [currentFilter];
            filteredCategories.forEach(cat => {
                const products = catalog.filter(p => p.category === cat);
                if (products.length === 0) return;
                const section = document.createElement('section');
                section.id = `section-${cat.replace(/\s/g, '_')}`; section.className = "space-y-6";
                section.innerHTML = `
                    <h2 class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 px-1 border-l-2 border-black ml-1 pl-3">${cat.replace('[PRO] ', '')}</h2>
                    <div class="grid grid-cols-2 gap-4">
                        ${products.map(p => `
                            <div class="bg-white p-4 rounded-[2.5rem] bento-card space-y-4 relative overflow-hidden group border border-gray-50" onclick="openProduct('${p.callback_data}')">
                                <div class="w-full aspect-square rounded-[2rem] bg-gray-50 overflow-hidden">
                                    <img src="${imgRoot}images/${vat}/${p.callback_data}.jpg" onerror="this.src='https://via.placeholder.com/400?text=IMG'" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                                </div>
                                <div class="px-1 pb-1">
                                    <h3 class="font-bold text-[11px] leading-tight mb-3 h-8 overflow-hidden text-gray-800 uppercase tracking-tighter">${p.name}</h3>
                                    <div class="flex justify-between items-center">
                                        <span class="font-black text-sm italic">€ ${parseFloat(p.price).toFixed(2)}</span>
                                        <div class="flex items-center gap-1">
                                            ${cart[p.callback_data] ? `
                                                <button onclick="event.stopPropagation(); updateQty('${p.callback_data}', -1)" class="w-8 h-8 bg-gray-50 rounded-full flex items-center justify-center active:scale-75 transition border border-gray-100"><i class="fas fa-minus text-[8px]"></i></button>
                                                <span class="font-black text-xs min-w-[15px] text-center">${cart[p.callback_data]}</span>
                                            ` : ''}
                                            <button onclick="event.stopPropagation(); updateQty('${p.callback_data}', 1)" class="w-8 h-8 bg-black text-white rounded-full flex items-center justify-center active:scale-75 transition shadow-md"><i class="fas fa-plus text-[8px]"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>`).join('')}
                    </div>`;
                container.appendChild(section);
            });
        }

        function openProduct(sku) {
            const p = catalog.find(x => x.callback_data === sku); if (!p) return;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-category').innerText = p.category;
            document.getElementById('modal-desc').innerText = p.long_description || p.description || "Nessuna descrizione.";
            document.getElementById('modal-price').innerText = `€ ${parseFloat(p.price).toFixed(2)}`;
            document.getElementById('modal-img').src = `${imgRoot}images/${vat}/${p.callback_data}.jpg`;
            updateModalQty(sku);
            document.getElementById('modal-plus').onclick = () => updateQty(sku, 1, true);
            document.getElementById('modal-minus').onclick = () => updateQty(sku, -1, true);
            document.getElementById('product-modal').classList.remove('modal-hidden');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function closeModal() { document.getElementById('product-modal').classList.add('modal-hidden'); }

        function updateQty(sku, delta, isModal = false) {
            const c = cart[sku] || 0, n = c + delta;
            if (n <= 0) delete cart[sku]; else cart[sku] = n;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            if (isModal) updateModalQty(sku);
            updateCheckoutBar(); renderCatalog(); renderSuggested();
        }

        function updateModalQty(sku) { document.getElementById('modal-qty').innerText = cart[sku] || 0; }

        function updateCheckoutBar() {
            let total = 0, count = 0;
            Object.keys(cart).forEach(sku => {
                const p = catalog.find(x => x.callback_data === sku);
                if (p) { total += (parseFloat(p.price) || 0) * cart[sku]; count += cart[sku]; }
            });
            document.getElementById('total-price-bar').innerText = `€ ${total.toFixed(2).replace('.', ',')}`;
            document.getElementById('checkout-bar').classList.toggle('translate-y-full', count === 0);
        }

        function toggleSummary() {
            const o = document.getElementById('summary-overlay');
            const h = o.classList.contains('overlay-hidden');
            if (h) { renderSummary(); o.classList.remove('overlay-hidden'); }
            else { o.classList.add('overlay-hidden'); }
        }

        function renderSummary() {
            const list = document.getElementById('summary-list'); let total = 0;
            const items = Object.keys(cart).map(sku => {
                const p = catalog.find(x => x.callback_data === sku);
                const sub = (parseFloat(p.price) || 0) * cart[sku]; total += sub;
                return `
                <div class="flex justify-between items-center bg-gray-50 p-6 rounded-4xl border border-gray-100 shadow-sm">
                    <div class="flex-1"><div class="font-black text-sm uppercase leading-tight">${p.name}</div><div class="text-[9px] text-gray-300 mt-2 uppercase font-bold tracking-widest">${cart[sku]}x € ${parseFloat(p.price).toFixed(2)}</div></div>
                    <div class="font-black text-sm ml-4">€ ${sub.toFixed(2)}</div>
                </div>`;
            });
            list.innerHTML = items.join(''); document.getElementById('summary-total').innerText = `€ ${total.toFixed(2).replace('.', ',')}`;
            updateConfirmButton();
        }

        function requestLocation() {
            if (navigator.geolocation) {
                document.getElementById('location-status').innerText = "Rilevamento hardware...";
                const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };
                navigator.geolocation.getCurrentPosition((pos) => {
                    userCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    document.getElementById('location-status').innerText = "Posizione acquisita ✅";
                    document.getElementById('location-status').classList.remove('text-gray-400');
                    document.getElementById('location-status').classList.add('text-green-600');
                    document.getElementById('location-icon').classList.add('text-green-600');
                    document.getElementById('btn-location').classList.add('hidden');
                    updateConfirmButton();
                }, (err) => { 
                    console.error(err);
                    tg.showAlert("GPS Error: " + err.message + ". Inserisci l'indirizzo manualmente.");
                    document.getElementById('location-status').innerText = "GPS Fallito. Inserire indirizzo.";
                }, options);
            }
        }

        function updateConfirmButton() {
            const btn = document.getElementById('final-confirm-btn');
            const address = document.getElementById('manual-address').value.trim();
            // L'ordine è possibile SOLO se c'è l'indirizzo manuale (GPS è opzionale ma consigliato)
            if (address.length > 5) {
                btn.classList.remove('bg-gray-100', 'text-gray-400', 'cursor-not-allowed');
                btn.classList.add('bg-black', 'text-white');
                btn.innerText = "Conferma e Ordina";
            } else {
                btn.classList.add('bg-gray-100', 'text-gray-400', 'cursor-not-allowed');
                btn.innerText = "Inserisci indirizzo per ordinare";
            }
        }

        function toggleHistory() {
            const o = document.getElementById('history-overlay');
            const h = o.classList.contains('overlay-hidden');
            if (h) o.classList.remove('overlay-hidden'); else o.classList.add('overlay-hidden');
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (history.length === 0) { list.innerHTML = `<div class="text-center py-20 opacity-20 font-black text-[9px] uppercase">Vuoto</div>`; return; }
            list.innerHTML = history.map(h => `
                <div class="bg-gray-50 p-8 rounded-5xl space-y-4 border border-gray-100">
                    <div class="flex justify-between items-start">
                        <div class="text-[9px] font-black uppercase text-gray-300">${new Date(h.timestamp).toLocaleDateString()}</div>
                        <div class="text-[10px] font-black italic">ORD-${h.timestamp.slice(-4)}</div>
                    </div>
                    <div class="space-y-2 border-t border-gray-100 pt-5">
                        ${h.items?.map(i => `<div class="flex justify-between text-xs font-medium text-gray-500"><span>${i.quantity}x ${i.name}</span><span>€ ${(i.price * i.quantity).toFixed(2)}</span></div>`).join('')}
                    </div>
                    <div class="flex justify-between items-center pt-4"><span class="text-[9px] font-black uppercase text-gray-300">Pagato</span><span class="font-black text-lg">€ ${parseFloat(h.total_amount || 0).toFixed(2)}</span></div>
                </div>`).join('');
        }

        async function sendOrder() {
            const address = document.getElementById('manual-address').value.trim();
            if (address.length <= 5) { tg.showAlert("Fornisci un indirizzo valido per la consegna."); return; }
            
            const items = Object.keys(cart).map(sku => {
                const p = catalog.find(x => x.callback_data === sku);
                return { sku, name: p.name, price: parseFloat(p.price), quantity: cart[sku] };
            });
            const total = items.reduce((acc, i) => acc + (i.price * i.quantity), 0);
            try {
                const res = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_ecom_save', order_data: { items, total_amount: total, timestamp: new Date().toISOString(), location: userCoords, address: address } })
                });
                const r = await res.json();
                if (r.success) { if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); tg.showAlert("✅ Grazie! Ordine inviato.", () => tg.close()); }
            } catch (e) { tg.showAlert("Errore invio."); }
        }
    </script>
</body>
</html>
