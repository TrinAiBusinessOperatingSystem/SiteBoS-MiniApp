<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SiteBoS | Store</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function () {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-black uppercase tracking-widest">Accesso Proibito</h2></div>
                    </body>`;
                window.stop();
            }
        })();
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        bg: '#fafafa',
                        surface: '#ffffff',
                        border: '#eeeeee',
                        accent: '#000000'
                    },
                    borderRadius: { '4xl': '2rem', '5xl': '2.5rem' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #000000; -webkit-tap-highlight-color: transparent; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bento-card { transition: all 0.3s ease; border: 1px solid #eeeeee; }
        .bento-card:active { transform: scale(0.97); background-color: #fcfcfc; }
        .safe-bottom { padding-bottom: calc(140px + env(safe-area-inset-bottom)); }
        
        .modal-overlay { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-hidden { opacity: 0; pointer-events: none; }
        .modal-hidden .modal-content { transform: translateY(100%); }

        .category-chip { transition: all 0.2s ease; border: 1px solid #eeeeee; }
        .category-chip.active { background-color: #000000; color: #ffffff; border-color: #000000; }
    </style>
</head>
<body class="safe-area-inset h-screen flex flex-col overflow-hidden text-sm">

    <!-- HEADER -->
    <header class="p-6 bg-white border-b border-gray-100 sticky top-0 z-50 flex flex-col gap-4">
        <div class="flex justify-between items-center w-full">
            <div class="flex items-center gap-4">
                <div id="brand-logo" class="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-white overflow-hidden">
                    <i class="fas fa-shopping-bag"></i>
                </div>
                <div>
                    <h1 id="brand-name" class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 leading-none mb-1">Catalog</h1>
                    <p id="customer-name" class="text-sm font-black tracking-tight uppercase">Loading...</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleHistory()" class="text-gray-300 hover:text-black transition"><i class="fas fa-history text-xl"></i></button>
                <button onclick="tg.close()" class="text-gray-300 hover:text-black transition"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
        </div>

        <!-- CATEGORY NAVIGATION -->
        <nav id="category-nav" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            <button onclick="filterCategory('ALL')" class="category-chip active flex-shrink-0 px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest" id="chip-ALL">Tutti</button>
            <!-- Dinamico: Chips -->
        </nav>
    </header>

    <!-- CONTENT -->
    <main id="main-content" class="flex-1 overflow-y-auto p-5 space-y-12 no-scrollbar safe-bottom">
        
        <!-- SUGGESTED -->
        <section id="section-suggested" class="hidden">
            <h2 class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-5 px-1">I tuoi preferiti</h2>
            <div id="suggested-list" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
        </section>

        <!-- DYNAMIC CATALOG SECTIONS -->
        <div id="catalog-container" class="space-y-12">
            <!-- Dinamico: Category Sections + Grids -->
        </div>

    </main>

    <!-- PRODUCT DETAIL MODAL -->
    <div id="product-modal" class="fixed inset-0 z-[300] modal-hidden flex flex-col">
        <div class="modal-overlay absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="modal-content mt-auto bg-white rounded-t-[3rem] p-8 space-y-6 relative flex flex-col max-h-[92vh]">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-2"></div>
            <div class="overflow-y-auto no-scrollbar space-y-6 pb-10">
                <div id="modal-img-container" class="w-full aspect-video rounded-3xl bg-gray-50 overflow-hidden">
                    <img id="modal-img" src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 id="modal-title" class="text-2xl font-black tracking-tighter leading-tight"></h2>
                    <p id="modal-category" class="text-[10px] font-black uppercase tracking-widest text-gray-400 mt-1"></p>
                </div>
                <div class="space-y-4">
                    <h3 class="text-xs font-black uppercase tracking-widest">Descrizione</h3>
                    <p id="modal-desc" class="text-gray-500 leading-relaxed"></p>
                </div>
                
                <div class="flex items-center justify-between pt-6 border-t border-gray-50">
                    <span id="modal-price" class="text-3xl font-black tracking-tighter"></span>
                    <div id="modal-stepper" class="flex items-center gap-4 bg-gray-50 p-2 rounded-2xl">
                        <button id="modal-minus" class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm active:scale-90 transition"><i class="fas fa-minus"></i></button>
                        <span id="modal-qty" class="font-black text-lg min-w-[20px] text-center">0</span>
                        <button id="modal-plus" class="w-10 h-10 bg-black text-white rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- HISTORY OVERLAY -->
    <div id="history-overlay" class="fixed inset-0 bg-white z-[400] translate-x-full transition-transform duration-500 flex flex-col hidden">
        <header class="p-8 flex justify-between items-center border-b border-gray-100">
            <h2 class="text-xl font-black uppercase tracking-tighter">Storico Ordini</h2>
            <button onclick="toggleHistory()" class="text-gray-300 text-2xl hover:text-black"><i class="fas fa-times-circle"></i></button>
        </header>
        <div id="history-list" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
    </div>

    <!-- CHECKOUT BAR -->
    <div id="checkout-bar" class="fixed bottom-0 left-0 right-0 p-8 bg-white border-t border-gray-100 z-[100] translate-y-full transition-transform duration-500 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <div class="flex items-center justify-between gap-6 max-w-2xl mx-auto">
            <div class="flex flex-col">
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Totale Ordine</span>
                <span id="total-price" class="text-2xl font-black tracking-tighter">€ 0,00</span>
            </div>
            <button onclick="confirmOrder()" class="flex-1 bg-black text-white h-16 rounded-[2rem] font-black text-xs uppercase tracking-widest active:scale-95 transition flex items-center justify-center gap-3 shadow-xl shadow-black/10">
                <span>Conferma</span>
                <i class="fas fa-check-circle"></i>
            </button>
        </div>
    </div>

    <!-- LOADER -->
    <div id="global-loader" class="fixed inset-0 bg-white z-[500] flex flex-col items-center justify-center p-10 text-center transition-opacity duration-300">
        <div class="w-12 h-12 border-2 border-gray-100 border-t-black rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-gray-300 animate-pulse">Sincronizzazione SiteBoS...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const WH_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const params = new URLSearchParams(window.location.search);
        const ashToken = params.get('ash');

        let catalog = [];
        let categories = [];
        let history = [];
        let cart = {}; 
        let imgRoot = "";
        let vat = params.get('vat') || 'default';
        let currentFilter = 'ALL';

        window.onload = async () => {
            if (!ashToken) { tg.showAlert("Accesso Negato: ASH mancante."); return; }
            await initApp();
        };

        async function initApp() {
            try {
                const res = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_ecom_get' })
                });
                const r = await res.json();
                const d = r[0] || r; 
                if (d.success) {
                    catalog = d.catalog || [];
                    history = d.history || [];
                    vat = d.vat || vat;
                    imgRoot = (d.urlMiniApp || "").replace('telegram_control/', '');
                    
                    // Estrarre categorie uniche dal catalogo
                    categories = [...new Set(catalog.map(p => p.category))];
                    
                    renderUI(d.brand || {});
                    hideLoader();
                } else { tg.showAlert("Errore caricamento."); }
            } catch (e) { tg.showAlert("Errore connessione."); }
        }

        function hideLoader() { const l = document.getElementById('global-loader'); l.classList.add('opacity-0'); setTimeout(() => l.classList.add('hidden'), 300); }

        function renderUI(brand) {
            document.getElementById('brand-name').innerText = brand.name || "BOS Store";
            document.getElementById('customer-name').innerText = (tg.initDataUnsafe.user?.first_name || "Cliente").toUpperCase();
            if (brand.logo) document.getElementById('brand-logo').innerHTML = `<img src="${brand.logo}" class="w-full h-full object-cover">`;
            
            renderCategoryNav();
            renderSuggested();
            renderCatalog();
            renderHistory();
        }

        function renderCategoryNav() {
            const nav = document.getElementById('category-nav');
            const chips = categories.map(cat => {
                const shortName = cat.replace('[PRO] ', '').split(' ').slice(0,2).join(' ');
                return `<button onclick="filterCategory('${cat}')" class="category-chip flex-shrink-0 px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest" id="chip-${cat.replace(/\s/g, '_')}">${shortName}</button>`;
            }).join('');
            nav.innerHTML += chips;
        }

        function filterCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            const activeId = cat === 'ALL' ? 'chip-ALL' : `chip-${cat.replace(/\s/g, '_')}`;
            document.getElementById(activeId).classList.add('active');
            renderCatalog();
            
            if (cat !== 'ALL') {
                const target = document.getElementById(`section-${cat.replace(/\s/g, '_')}`);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function renderSuggested() {
            const list = document.getElementById('suggested-list');
            const counts = {};
            history.forEach(o => o.items?.forEach(i => counts[i.sku] = (counts[i.sku] || 0) + 1));
            const sorted = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 4);
            const items = catalog.filter(p => sorted.includes(p.callback_data));
            if (items.length > 0) {
                document.getElementById('section-suggested').classList.remove('hidden');
                list.innerHTML = items.map(p => `
                    <div class="flex-shrink-0 w-40 bg-white p-4 rounded-3xl bento-card space-y-3" onclick="openProduct('${p.callback_data}')">
                        <div class="w-full aspect-square rounded-2xl bg-gray-50 overflow-hidden relative">
                            <img src="${imgRoot}images/${vat}/${p.callback_data}.jpg" onerror="this.src='https://via.placeholder.com/200'" class="w-full h-full object-cover">
                            ${cart[p.callback_data] ? `<div class="absolute top-2 right-2 bg-black text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black border-2 border-white">${cart[p.callback_data]}</div>` : ''}
                        </div>
                        <h3 class="font-bold text-[10px] truncate uppercase tracking-tight">${p.short_name || p.name}</h3>
                        <p class="font-black text-xs">€ ${p.price || '0.00'}</p>
                    </div>`).join('');
            }
        }

        function renderCatalog() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = '';

            const filteredCategories = currentFilter === 'ALL' ? categories : [currentFilter];

            filteredCategories.forEach(cat => {
                const products = catalog.filter(p => p.category === cat);
                if (products.length === 0) return;

                const section = document.createElement('section');
                section.id = `section-${cat.replace(/\s/g, '_')}`;
                section.className = "space-y-6";
                section.innerHTML = `
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-300 px-1 border-l-2 border-black ml-1 pl-3">${cat.replace('[PRO] ', '')}</h2>
                    <div class="grid grid-cols-2 gap-4">
                        ${products.map(p => `
                            <div class="bg-white p-4 rounded-[2rem] bento-card space-y-4 relative overflow-hidden group" onclick="openProduct('${p.callback_data}')">
                                <div class="w-full aspect-square rounded-2xl bg-gray-50 overflow-hidden">
                                    <img src="${imgRoot}images/${vat}/${p.callback_data}.jpg" onerror="this.src='https://via.placeholder.com/200'" class="w-full h-full object-cover group-hover:scale-105 transition duration-500 text-transparent">
                                </div>
                                <div class="px-1">
                                    <h3 class="font-bold text-[11px] leading-tight mb-2 h-8 overflow-hidden">${p.name}</h3>
                                    <div class="flex justify-between items-center">
                                        <span class="font-black text-sm">€ ${p.price || '0.00'}</span>
                                        <div class="flex items-center gap-1">
                                            ${cart[p.callback_data] ? `
                                                <button onclick="event.stopPropagation(); updateQty('${p.callback_data}', -1)" class="w-8 h-8 bg-gray-100 text-black rounded-full flex items-center justify-center active:scale-75 transition shadow-sm"><i class="fas fa-minus text-[8px]"></i></button>
                                                <span class="font-black text-xs min-w-[15px] text-center">${cart[p.callback_data]}</span>
                                            ` : ''}
                                            <button onclick="event.stopPropagation(); updateQty('${p.callback_data}', 1)" class="w-8 h-8 bg-black text-white rounded-full flex items-center justify-center active:scale-75 transition shadow-sm"><i class="fas fa-plus text-[8px]"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function openProduct(sku) {
            const p = catalog.find(x => x.callback_data === sku);
            if (!p) return;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-category').innerText = p.category;
            document.getElementById('modal-desc').innerText = p.long_description || p.description || "Nessuna descrizione.";
            document.getElementById('modal-price').innerText = `€ ${p.price || '0.00'}`;
            document.getElementById('modal-img').src = `${imgRoot}images/${vat}/${p.callback_data}.jpg`;
            updateModalQty(sku);
            document.getElementById('modal-plus').onclick = () => updateQty(sku, 1, true);
            document.getElementById('modal-minus').onclick = () => updateQty(sku, -1, true);
            document.getElementById('product-modal').classList.remove('modal-hidden');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function closeModal() { document.getElementById('product-modal').classList.add('modal-hidden'); }

        function updateQty(sku, delta, isModal = false) {
            const current = cart[sku] || 0;
            const next = current + delta;
            if (next <= 0) delete cart[sku]; else cart[sku] = next;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            if (isModal) updateModalQty(sku);
            updateCheckoutBar();
            renderCatalog();
            renderSuggested();
        }

        function updateModalQty(sku) {
            document.getElementById('modal-qty').innerText = cart[sku] || 0;
        }

        function updateCheckoutBar() {
            let total = 0, count = 0;
            Object.keys(cart).forEach(sku => {
                const p = catalog.find(x => x.callback_data === sku);
                if (p) { total += (parseFloat(p.price) || 0) * cart[sku]; count += cart[sku]; }
            });
            document.getElementById('total-price').innerText = `€ ${total.toFixed(2).replace('.', ',')}`;
            document.getElementById('checkout-bar').classList.toggle('translate-y-full', count === 0);
        }

        function toggleHistory() {
            const o = document.getElementById('history-overlay');
            const h = o.classList.contains('hidden');
            if (h) { o.classList.remove('hidden'); setTimeout(() => o.classList.remove('translate-x-full'), 10); }
            else { o.classList.add('translate-x-full'); setTimeout(() => o.classList.add('hidden'), 500); }
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (history.length === 0) { list.innerHTML = `<div class="text-center py-20 opacity-20 font-black text-[10px]">Vuoto</div>`; return; }
            list.innerHTML = history.map(h => `
                <div class="bg-white border border-gray-100 p-6 rounded-4xl space-y-4">
                    <div class="flex justify-between items-start">
                        <div><div class="text-[9px] font-black uppercase text-gray-400 mb-1">${h.status || 'RICHIESTO'}</div><div class="text-sm font-bold">${new Date(h.timestamp).toLocaleDateString()}</div></div>
                        <div class="text-sm font-black italic">#${h.order_id?.slice(-4) || '----'}</div>
                    </div>
                    <div class="space-y-2 border-t border-gray-50 pt-4">
                        ${h.items?.map(i => `<div class="flex justify-between text-xs text-gray-400"><span>${i.quantity}x ${i.name}</span><span>€ ${(i.price * i.quantity).toFixed(2)}</span></div>`).join('')}
                    </div>
                    <div class="flex justify-between items-center border-t border-gray-50 pt-4">
                        <span class="text-[9px] font-black uppercase text-gray-300">Totale</span>
                        <span class="font-black">€ ${h.total_amount?.toFixed(2)}</span>
                    </div>
                </div>`).join('');
        }

        async function confirmOrder() {
            const items = Object.keys(cart).map(sku => {
                const p = catalog.find(x => x.callback_data === sku);
                return { sku, name: p.name, price: p.price, quantity: cart[sku] };
            });
            const total = items.reduce((acc, i) => acc + (i.price * i.quantity), 0);
            tg.showConfirm(`Inviare l'ordine di € ${total.toFixed(2)}?\nPagamento alla consegna.`, async (ok) => {
                if (!ok) return;
                try {
                    const res = await fetch(WH_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_ecom_save', order_data: { items, total_amount: total, timestamp: new Date().toISOString() } })
                    });
                    const r = await res.json();
                    if (r.success) { if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); tg.showAlert("✅ Ordine inviato!", () => tg.close()); }
                } catch (e) { tg.showAlert("Errore invio."); }
            });
        }
    </script>
</body>
</html>
