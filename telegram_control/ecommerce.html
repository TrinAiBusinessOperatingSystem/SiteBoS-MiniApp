<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SiteBoS | Store</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function () {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-black uppercase tracking-widest">Accesso Proibito</h2></div>
                    </body>`;
                window.stop();
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', surface: '#ffffff', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #000000; -webkit-tap-highlight-color: transparent; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bento-card { transition: all 0.2s ease; border: 1px solid #eeeeee; }
        .bento-card:active { transform: scale(0.97); background-color: #fcfcfc; }
        .safe-bottom { padding-bottom: calc(140px + env(safe-area-inset-bottom)); }
        
        .overlay { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 400; background-color: #ffffff; position: fixed; inset: 0; }
        .overlay-hidden { transform: translateX(100%); }
        .modal-hidden { opacity: 0; pointer-events: none; }
        .modal-hidden .modal-content { transform: translateY(100%); }
        
        select { -webkit-appearance: none; background: transparent; border: none; outline: none; width: 100%; }
    </style>
</head>
<body class="safe-area-inset h-screen flex flex-col overflow-hidden text-sm">

    <!-- HEADER (COMPACT) -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 flex flex-col">
        <div class="px-5 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div id="brand-logo" class="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-white shadow-md overflow-hidden">
                    <i class="fas fa-shopping-bag text-sm"></i>
                </div>
                <div>
                    <p id="customer-name" class="text-[9px] font-black tracking-widest text-gray-400 leading-none mb-1 uppercase truncate max-w-[100px]">Marketplace</p>
                    <h1 class="font-black text-[11px] tracking-tight uppercase">SiteBoS Store</h1>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleHistory()" class="w-8 h-8 flex items-center justify-center text-gray-300"><i class="fas fa-history text-sm"></i></button>
                <button onclick="tg.close()" class="w-8 h-8 flex items-center justify-center text-gray-300"><i class="fas fa-times text-lg"></i></button>
            </div>
        </div>
        <div class="px-5 pb-3">
            <div class="relative bg-gray-50 rounded-xl px-3 py-2 border border-gray-100 flex items-center">
                <i class="fas fa-filter text-[9px] mr-2 opacity-20"></i>
                <select id="category-select" onchange="filterCategory(this.value)" class="font-bold text-[10px] uppercase tracking-wider text-black">
                    <option value="ALL">Tutti i prodotti</option>
                </select>
                <i class="fas fa-chevron-down text-[7px] absolute right-3 opacity-30"></i>
            </div>
        </div>
    </header>

    <!-- CONTENT -->
    <main id="main-content" class="flex-1 overflow-y-scroll p-5 space-y-8 safe-bottom">
        <section id="section-suggested" class="hidden">
            <h2 class="text-[9px] font-black uppercase tracking-widest text-gray-300 mb-4 pl-3 border-l-2 border-black">Top Picks</h2>
            <div id="suggested-list" class="flex gap-3 overflow-x-auto no-scrollbar pb-1"></div>
        </section>
        <div id="catalog-container" class="space-y-8"></div>
    </main>

    <!-- PRODUCT DETAIL MODAL (BOTTOM SHEET) -->
    <div id="product-modal" class="fixed inset-0 z-[500] modal-hidden flex flex-col">
        <div class="modal-overlay absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="modal-content mt-auto bg-white rounded-t-3xl p-6 space-y-5 relative flex flex-col max-h-[85vh] shadow-2xl border-t border-gray-100 transition-transform duration-300">
            <div class="w-10 h-1 bg-gray-100 rounded-full mx-auto"></div>
            <div class="overflow-y-auto no-scrollbar space-y-5 pb-8">
                <div id="modal-img-container" class="w-full aspect-square rounded-2xl bg-gray-50 overflow-hidden border border-gray-100">
                    <img id="modal-img" src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 id="modal-title" class="text-xl font-black tracking-tight leading-tight uppercase"></h2>
                    <p id="modal-category" class="text-[9px] font-black uppercase tracking-widest text-gray-300 mt-1"></p>
                </div>
                <div class="space-y-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Descrizione</h3>
                    <p id="modal-desc" class="text-gray-600 text-sm leading-relaxed"></p>
                </div>

                <!-- ADD-ONS SECTION -->
                <div id="modal-extras-container" class="hidden space-y-3 pt-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Aggiunte</h3>
                    <div id="modal-extras-list" class="grid grid-cols-1 gap-2">
                        <!-- Extras checkboxes will be injected here -->
                    </div>
                </div>

                <!-- CUSTOMER NOTE SECTION -->
                <div id="modal-notes-container" class="hidden space-y-2 pt-2">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Note / Modifiche</h3>
                    <textarea id="modal-customer-note" rows="2" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-3 text-xs font-bold focus:border-black transition" placeholder="Es: senza zucchero, ben cotto..."></textarea>
                </div>

                <div class="flex items-center justify-between pt-5 border-t border-gray-50">
                    <span id="modal-price" class="text-2xl font-black tracking-tighter"></span>
                    <div id="modal-stepper" class="flex items-center gap-3 bg-gray-50 p-1.5 rounded-xl border border-gray-100">
                        <button id="modal-minus" class="w-10 h-10 bg-white rounded-lg flex items-center justify-center shadow-sm active:scale-90"><i class="fas fa-minus text-xs"></i></button>
                        <span id="modal-qty" class="font-black text-lg min-w-[20px] text-center">0</span>
                        <button id="modal-plus" class="w-10 h-10 bg-black text-white rounded-lg flex items-center justify-center shadow-md active:scale-90"><i class="fas fa-plus text-xs"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SUMMARY OVERLAY (FULL) -->
    <div id="summary-overlay" class="overlay overlay-hidden flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center border-b border-gray-50">
            <h2 class="text-lg font-black uppercase tracking-tight">Riepilogo</h2>
            <button onclick="toggleSummary()" class="text-gray-300 text-xl"><i class="fas fa-times-circle"></i></button>
        </header>
        <div class="flex-1 overflow-y-scroll p-5 space-y-6 pb-32">
            <div id="summary-list" class="space-y-3"></div>
            
            <div id="location-box" class="p-5 bg-gray-50 rounded-3xl space-y-4 border border-gray-100">
                <div class="flex items-center justify-between">
                    <h3 class="text-[9px] font-black uppercase tracking-widest text-gray-400">Consegna</h3>
                    <button onclick="requestLocation()" id="btn-location" class="text-[8px] font-black uppercase text-black px-3 py-1 bg-white rounded-full border border-black">GPS</button>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center shadow-sm text-gray-200" id="location-icon"><i class="fas fa-map-marker-alt text-xs"></i></div>
                    <span id="location-status" class="font-bold text-gray-400 text-[10px]">Posizione necessaria</span>
                </div>
                <textarea id="manual-address" rows="2" oninput="updateConfirmButton()" class="w-full bg-white border border-gray-100 rounded-xl p-3 text-xs font-bold focus:border-black transition" placeholder="Indirizzo (Via, Città)"></textarea>
            </div>

            <div class="p-5 bg-gray-50 rounded-3xl space-y-4 border border-gray-100">
                <h3 class="text-[9px] font-black uppercase tracking-widest text-gray-400">Pagamento</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setPayment('DELIVERY')" id="pay-delivery" class="flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-100 bg-white active:scale-95 transition [&.active]:border-black [&.active]:bg-black [&.active]:text-white">
                        <i class="fas fa-truck text-sm"></i>
                        <span class="text-[8px] font-black uppercase">Consegna</span>
                    </button>
                    <button onclick="setPayment('CARD')" id="pay-card" class="hidden flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-100 bg-white active:scale-95 transition [&.active]:border-black [&.active]:bg-black [&.active]:text-white">
                        <i class="fas fa-credit-card text-sm"></i>
                        <span class="text-[8px] font-black uppercase">Carta</span>
                    </button>
                </div>
            </div>
        </div>
        <footer class="p-4 bg-white/90 backdrop-blur-lg border-t border-gray-50 fixed bottom-0 left-0 right-0 z-50">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="text-[10px] font-black uppercase text-gray-300">Totale</span>
                <span id="summary-total" class="text-xl font-black tracking-tighter"></span>
            </div>
            <button id="final-confirm-btn" onclick="sendOrder()" class="w-full h-12 bg-gray-100 text-gray-400 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all cursor-not-allowed">
                Completa i dati
            </button>
        </footer>
    </div>

    <!-- HISTORY OVERLAY -->
    <div id="history-overlay" class="overlay overlay-hidden flex flex-col">
        <header class="px-5 py-4 flex justify-between items-center border-b border-gray-100">
            <h2 class="text-lg font-black uppercase tracking-tight">I tuoi ordini</h2>
            <button onclick="toggleHistory()" class="text-gray-300 text-xl"><i class="fas fa-times-circle"></i></button>
        </header>
        <div id="history-list" class="flex-1 overflow-y-auto p-5 space-y-3 no-scrollbar"></div>
    </div>

    <!-- CHECKOUT BAR (MOBILE ONLY SLIM) -->
    <div id="checkout-bar" class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 z-[100] translate-y-full transition-transform duration-300 shadow-lg">
        <div class="flex items-center justify-between gap-4 max-w-md mx-auto">
            <div class="flex flex-col">
                <span class="text-[8px] font-black uppercase tracking-widest text-gray-400">Totale</span>
                <span id="total-price-bar" class="text-lg font-black tracking-tighter">€ 0,00</span>
            </div>
            <button onclick="toggleSummary()" class="flex-1 h-12 bg-black text-white rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2">
                <span>Rivedi Ordine</span><i class="fas fa-arrow-right text-[8px]"></i>
            </button>
        </div>
    </div>

    <!-- LOADER -->
    <div id="global-loader" class="fixed inset-0 bg-white z-[600] flex flex-col items-center justify-center p-10 text-center transition-opacity duration-300">
        <div class="w-10 h-10 border-2 border-gray-100 border-t-black rounded-full animate-spin mb-4"></div>
        <p class="text-[8px] font-black uppercase tracking-[0.3em] text-gray-300">SiteBoS Engine...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const WH_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const params = new URLSearchParams(window.location.search);
        const ashToken = params.get('ash');

        let catalog = [], categories = [], history = [], cart = {}, cartConfig = {}; 
        let imgRoot = "", vat = params.get('vat') || 'default', currentFilter = 'ALL', userCoords = null, paymentMode = 'DELIVERY';
        let activeSku = null, currentBasePrice = 0;

        window.onload = async () => { if (!ashToken) { tg.showAlert("ASH Token mancante."); return; } await initApp(); };

        async function initApp() {
            try {
                const res = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_ecom_get' })
                });
                const r = await res.json();
                const d = Array.isArray(r) ? r[0] : r; 
                if (d && d.success) {
                    catalog = d.catalog || []; history = d.history || []; vat = d.vat || vat;
                    imgRoot = (d.urlMiniApp || "").replace('telegram_control/', '');
                    categories = [...new Set(catalog.map(p => p.category))];
                    if (d.payment_active) document.getElementById('pay-card').classList.remove('hidden');
                    renderUI(d.brand || {}); hideLoader();
                }
            } catch (e) { tg.showAlert("Connessione fallita."); }
        }

        function hideLoader() { const l = document.getElementById('global-loader'); l.classList.add('opacity-0'); setTimeout(() => l.classList.add('hidden'), 300); }

        function renderUI(brand) {
            document.getElementById('customer-name').innerText = (tg.initDataUnsafe.user?.first_name || "Cliente");
            if (brand.logo) document.getElementById('brand-logo').innerHTML = `<img src="${brand.logo}" class="w-full h-full object-cover">`;
            const select = document.getElementById('category-select');
            select.innerHTML = '<option value="ALL">TUTTI I PRODOTTI</option>';
            categories.forEach(cat => {
                const opt = document.createElement('option'); opt.value = cat;
                opt.innerText = cat.replace('[PRO] ', '').replace('[SER] ', '').toUpperCase();
                select.appendChild(opt);
            });
            renderSuggested(); renderCatalog(); renderHistory();
        }

        function filterCategory(cat) {
            currentFilter = cat; renderCatalog();
            if (cat !== 'ALL') {
                const target = document.getElementById(`section-${cat.replace(/\s/g, '_')}`);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function renderSuggested() {
            const list = document.getElementById('suggested-list');
            const counts = {};
            history.forEach(o => o.items?.forEach(i => counts[i.sku] = (counts[i.sku] || 0) + 1));
            const sorted = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 4);
            const items = catalog.filter(p => sorted.includes(p.callback_data));
            if (items.length > 0) {
                document.getElementById('section-suggested').classList.remove('hidden');
                list.innerHTML = items.map(p => `
                    <div class="flex-shrink-0 w-24 bg-white p-1 rounded-2xl bento-card" onclick="openProduct('${p.callback_data}')">
                        <div class="w-full aspect-square rounded-xl bg-gray-50 overflow-hidden relative border border-gray-100">
                            <img src="${imgRoot}images/${vat}/${p.callback_data}.jpg" onerror="this.src='https://via.placeholder.com/200?text=IMG'" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/30 flex flex-col items-center justify-center p-2 text-center">
                                <h3 class="font-black text-[7px] text-white uppercase tracking-tighter leading-none mb-1">${p.short_name || p.name}</h3>
                                <p class="font-black text-[9px] text-white">€ ${parseFloat(p.price).toFixed(2)}</p>
                            </div>
                            ${cart[p.callback_data] ? `<div class="absolute top-1 right-1 bg-black text-white w-4 h-4 rounded-full flex items-center justify-center text-[7px] font-black border border-white z-10">${cart[p.callback_data]}</div>` : ''}
                        </div>
                    </div>`).join('');
            }
        }

        function renderCatalog() {
            const container = document.getElementById('catalog-container'); container.innerHTML = '';
            const filteredCategories = currentFilter === 'ALL' ? categories : [currentFilter];
            filteredCategories.forEach(cat => {
                const products = catalog.filter(p => p.category === cat);
                if (products.length === 0) return;
                const section = document.createElement('section');
                section.id = `section-${cat.replace(/\s/g, '_')}`; section.className = "space-y-4";
                section.innerHTML = `
                    <h2 class="text-[9px] font-black uppercase tracking-widest text-gray-300 px-1 border-l-2 border-black ml-1 pl-3">${cat.replace('[PRO] ', '').replace('[SER] ', '')}</h2>
                    <div class="grid grid-cols-2 gap-3">
                        ${products.map(p => `
                            <div class="bg-white p-3 rounded-3xl bento-card space-y-3 relative overflow-hidden group border border-gray-50" onclick="openProduct('${p.callback_data}')">
                                <div class="w-full aspect-square rounded-2xl bg-gray-50 overflow-hidden">
                                    <img src="${imgRoot}images/${vat}/${p.callback_data}.jpg" onerror="this.src='https://via.placeholder.com/200?text=IMG'" class="w-full h-full object-cover">
                                </div>
                                <div>
                                    <h3 class="font-bold text-[10px] leading-tight mb-2 h-7 overflow-hidden text-gray-800 uppercase tracking-tighter">${p.name}</h3>
                                    <div class="flex justify-between items-center">
                                        <span class="font-black text-xs">${p.pricing?.pricing_rules_engine?.is_dynamic_price ? '<span class="text-[7px] uppercase opacity-30 mr-0.5">da</span>' : ''}€ ${parseFloat(p.price).toFixed(2)}</span>
                                        <div class="flex items-center gap-1">
                                            ${cart[p.callback_data] ? `
                                                <button onclick="event.stopPropagation(); updateQty('${p.callback_data}', -1)" class="w-7 h-7 bg-gray-50 rounded-full flex items-center justify-center active:scale-75 transition"><i class="fas fa-minus text-[7px]"></i></button>
                                                <span class="font-black text-[10px] min-w-[12px] text-center">${cart[p.callback_data]}</span>
                                            ` : ''}
                                            <button onclick="event.stopPropagation(); ${(p.commercial_setup?.extra_options?.length > 0 || p.commercial_setup?.allow_customer_notes) ? `openProduct('${p.callback_data}')` : `updateQty('${p.callback_data}', 1)`}" class="w-7 h-7 bg-black text-white rounded-full flex items-center justify-center active:scale-75 transition"><i class="fas fa-plus text-[7px]"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>`).join('')}
                    </div>`;
                container.appendChild(section);
            });
        }

        function openProduct(sku) {
            const p = catalog.find(x => x.callback_data === sku); if (!p) return;
            activeSku = sku;
            currentBasePrice = parseFloat(p.price);
            
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-category').innerText = p.category;
            document.getElementById('modal-desc').innerText = p.long_description || p.description || "Nessuna descrizione.";
            document.getElementById('modal-img').src = `${imgRoot}images/${vat}/${p.callback_data}.jpg`;
            
            // Handle Extras
            const extrasContainer = document.getElementById('modal-extras-container');
            const extrasList = document.getElementById('modal-extras-list');
            const extraOptions = p.commercial_setup?.extra_options || [];
            
            if (extraOptions.length > 0) {
                extrasContainer.classList.remove('hidden');
                const config = cartConfig[sku] || { extras: [], note: "" };
                extrasList.innerHTML = extraOptions.map((opt, idx) => `
                    <label class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100 active:scale-[0.98] transition shadow-sm">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" class="extra-checkbox w-5 h-5 rounded-lg border-2 border-gray-200 text-black focus:ring-0 transition-all checked:bg-black checked:border-black" data-index="${idx}" data-price="${opt.price}" data-name="${opt.name}" 
                                ${config.extras.some(e => e.name === opt.name) ? 'checked' : ''}
                                onchange="updateModalPrice()">
                            <span class="text-[12px] font-black uppercase tracking-tight">${opt.name}</span>
                        </div>
                        <span class="text-[10px] font-black text-gray-400">+ € ${parseFloat(opt.price).toFixed(2)}</span>
                    </label>
                `).join('');
            } else {
                extrasContainer.classList.add('hidden');
            }

            // Handle Notes
            const notesContainer = document.getElementById('modal-notes-container');
            const noteInput = document.getElementById('modal-customer-note');
            if (p.commercial_setup?.allow_customer_notes) {
                notesContainer.classList.remove('hidden');
                noteInput.value = cartConfig[sku]?.note || "";
            } else {
                notesContainer.classList.add('hidden');
            }

            updateModalQty(sku);
            updateModalPrice();
            
            document.getElementById('modal-plus').onclick = () => updateQty(sku, 1, true);
            document.getElementById('modal-minus').onclick = () => updateQty(sku, -1, true);
            document.getElementById('product-modal').classList.remove('modal-hidden');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function updateModalPrice() {
            let total = currentBasePrice;
            document.querySelectorAll('.extra-checkbox:checked').forEach(cb => {
                total += parseFloat(cb.getAttribute('data-price'));
            });
            document.getElementById('modal-price').innerText = `€ ${total.toFixed(2)}`;
            
            // Sync config with current modal state if quantity > 0
            if (activeSku && cart[activeSku] > 0) {
                saveCurrentConfig();
            }
        }

        function saveCurrentConfig() {
            if (!activeSku) return;
            const extras = [];
            document.querySelectorAll('.extra-checkbox:checked').forEach(cb => {
                extras.push({ name: cb.getAttribute('data-name'), price: parseFloat(cb.getAttribute('data-price')) });
            });
            const note = document.getElementById('modal-customer-note').value;
            cartConfig[activeSku] = { extras, note };
        }

        function closeModal() { 
            if (activeSku && cart[activeSku] > 0) saveCurrentConfig();
            activeSku = null;
            document.getElementById('product-modal').classList.add('modal-hidden'); 
        }

        function updateQty(sku, delta, isModal = false) {
            const c = cart[sku] || 0, n = c + delta;
            if (n <= 0) {
                delete cart[sku];
                delete cartConfig[sku];
            } else {
                cart[sku] = n;
                if (isModal) saveCurrentConfig();
            }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            if (isModal) updateModalQty(sku);
            updateCheckoutBar(); renderCatalog(); renderSuggested();
        }

        function updateModalQty(sku) { document.getElementById('modal-qty').innerText = cart[sku] || 0; }

        function updateCheckoutBar() {
            let total = 0, count = 0;
            Object.keys(cart).forEach(sku => {
                const p = catalog.find(x => x.callback_data === sku);
                if (p) { 
                    let itemPrice = parseFloat(p.price) || 0;
                    const config = cartConfig[sku];
                    if (config && config.extras) {
                        config.extras.forEach(e => itemPrice += parseFloat(e.price) || 0);
                    }
                    total += itemPrice * cart[sku]; 
                    count += cart[sku]; 
                }
            });
            document.getElementById('total-price-bar').innerText = `€ ${total.toFixed(2).replace('.', ',')}`;
            document.getElementById('checkout-bar').classList.toggle('translate-y-full', count === 0);
        }

        function setPayment(mode) {
            paymentMode = mode;
            document.getElementById('pay-delivery').classList.toggle('active', mode === 'DELIVERY');
            document.getElementById('pay-card').classList.toggle('active', mode === 'CARD');
            updateConfirmButton();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function toggleSummary() {
            const o = document.getElementById('summary-overlay');
            const h = o.classList.contains('overlay-hidden');
            if (h) { renderSummary(); o.classList.remove('overlay-hidden'); }
            else { o.classList.add('overlay-hidden'); }
        }

        function renderSummary() {
            const list = document.getElementById('summary-list'); let total = 0;
            const items = Object.keys(cart).map(sku => {
                const p = catalog.find(x => x.callback_data === sku);
                const config = cartConfig[sku] || { extras: [], note: "" };
                let itemPrice = parseFloat(p.price) || 0;
                config.extras.forEach(e => itemPrice += parseFloat(e.price) || 0);
                
                const sub = itemPrice * cart[sku]; 
                total += sub;

                const extrasHtml = config.extras.length > 0 
                    ? `<div class="flex flex-wrap gap-1 mt-1.5">${config.extras.map(e => `<span class="bg-black/5 text-black text-[7px] font-black px-2 py-0.5 rounded-full uppercase tracking-tighter">+ ${e.name}</span>`).join('')}</div>` 
                    : '';
                const noteHtml = config.note 
                    ? `<div class="bg-amber-50/50 p-2 rounded-lg border border-amber-100/50 mt-2 text-[8px] text-amber-800 italic font-medium">Nota: ${config.note}</div>` 
                    : '';

                return `
                    <div class="flex justify-between items-start bg-white p-5 rounded-3xl border border-gray-100 shadow-sm relative overflow-hidden">
                        <div class="flex-1 pr-4">
                            <div class="font-black text-[11px] uppercase leading-tight tracking-tight">${p.name}</div>
                            ${extrasHtml}
                            ${noteHtml}
                            <div class="text-[9px] text-gray-300 mt-2 uppercase font-bold tracking-widest">${cart[sku]}x € ${itemPrice.toFixed(2)}</div>
                        </div>
                        <div class="font-black text-xs text-right">€ ${sub.toFixed(2)}</div>
                    </div>`;
            });
            list.innerHTML = items.join(''); document.getElementById('summary-total').innerText = `€ ${total.toFixed(2).replace('.', ',')}`;
            updateConfirmButton();
        }

        function requestLocation() {
            if (navigator.geolocation) {
                document.getElementById('location-status').innerText = "Rilevamento...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    userCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    document.getElementById('location-status').innerText = "Acquisita ✅";
                    document.getElementById('location-status').className = "font-bold text-green-600 text-[10px]";
                    document.getElementById('location-icon').classList.add('text-green-600');
                    document.getElementById('btn-location').classList.add('hidden');
                    updateConfirmButton();
                }, (err) => { tg.showAlert("GPS fallito. Inserisci a mano."); }, { enableHighAccuracy: true, timeout: 10000 });
            }
        }

        function updateConfirmButton() {
            const btn = document.getElementById('final-confirm-btn');
            const address = document.getElementById('manual-address').value.trim();
            if (address.length > 5 && userCoords) {
                btn.classList.remove('bg-gray-100', 'text-gray-400', 'cursor-not-allowed');
                btn.classList.add('bg-black', 'text-white');
                btn.innerText = paymentMode === 'CARD' ? "Paga e Ordina" : "Invia Ordine";
            } else {
                btn.classList.add('bg-gray-100', 'text-gray-400', 'cursor-not-allowed');
                btn.innerText = !userCoords ? "Condividi posizione" : "Inserisci indirizzo";
            }
        }

        async function sendOrder() {
            if (!userCoords || document.getElementById('manual-address').value.length <= 5) return;
            const btn = document.getElementById('final-confirm-btn');
            btn.disabled = true; btn.innerText = "Invio...";
            
            const timestamp = Date.now();
            const customerId = tg.initDataUnsafe.user?.id || "anon";
            const orderSessionId = `${customerId}_order_${timestamp}`;

            const items = Object.keys(cart).map(sku => {
                const p = catalog.find(x => x.callback_data === sku);
                const config = cartConfig[sku] || { extras: [], note: "" };
                let finalItemPrice = parseFloat(p.price) || 0;
                config.extras.forEach(e => finalItemPrice += parseFloat(e.price) || 0);

                return { 
                    sku, 
                    name: p.name, 
                    base_price: parseFloat(p.price),
                    final_price: finalItemPrice,
                    quantity: cart[sku],
                    selected_extras: config.extras,
                    customer_note: config.note
                };
            });

            const total = items.reduce((acc, i) => acc + (i.final_price * i.quantity), 0);
            
            const orderPayload = {
                sessionId: orderSessionId,
                items,
                total_amount: total,
                timestamp: new Date(timestamp).toISOString(),
                location: userCoords,
                address: document.getElementById('manual-address').value,
                payment_mode: paymentMode,
                ids: {
                    customer_id: customerId,
                    timestamp: timestamp,
                    webhook: WH_URL.split('/').pop()
                }
            };

            try {
                const res = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        _auth: tg.initData, 
                        ash: ashToken, 
                        action: 'u_calc_ecom_save', 
                        order_data: orderPayload 
                    })
                });
                const r = await res.json();
                if (r.invoice_link) {
                    tg.openInvoice(r.invoice_link, (status) => {
                        if (status === 'paid') { tg.showAlert("✅ Ordine inviato!", () => tg.close()); }
                        else { tg.showAlert("❌ Pagamento fallito."); btn.disabled = false; btn.innerText = "Riprova"; }
                    });
                } else if (r.success) {
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert("✅ Ordine ricevuto!", () => tg.close());
                }
            } catch (e) { tg.showAlert("Errore invio."); btn.disabled = false; btn.innerText = "Riprova"; }
        }

        function toggleHistory() { const o = document.getElementById('history-overlay'); o.classList.toggle('overlay-hidden'); }
        function renderHistory() {
            const list = document.getElementById('history-list');
            if (history.length === 0) { list.innerHTML = `<div class="text-center py-10 opacity-20 font-black text-[9px]">VUOTO</div>`; return; }
            list.innerHTML = history.map(h => `
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <div class="flex justify-between items-start"><div class="text-[8px] font-black uppercase text-gray-400 mb-1">${h.status || 'RICHIESTO'}</div><div class="text-[10px] font-bold">${new Date(h.timestamp).toLocaleDateString()}</div></div>
                    <div class="space-y-1 border-t border-gray-100 pt-3">${h.items?.map(i => `<div class="flex justify-between text-[10px] text-gray-400"><span>${i.quantity}x ${i.name}</span><span>€ ${(i.price * i.quantity).toFixed(2)}</span></div>`).join('')}</div>
                    <div class="flex justify-between items-center border-t border-gray-100 pt-3"><span class="text-[8px] font-black uppercase text-gray-300">Totale</span><span class="font-black text-sm">€ ${parseFloat(h.total_amount || 0).toFixed(2)}</span></div>
                </div>`).join('');
        }
    </script>
</body>
</html>
