<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Knowledge Editor | SiteBoS</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' } } }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #fafafa; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .field-label { @apply text-[10px] font-black uppercase text-gray-400 mb-2 block tracking-widest ml-1; }
        .enterprise-input { @apply w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black focus:bg-white outline-none transition-all shadow-sm mb-6; }
        .enterprise-textarea { @apply w-full bg-gray-50 p-5 rounded-[1.8rem] text-sm font-medium border border-transparent focus:border-black focus:bg-white outline-none resize-none leading-relaxed transition-all shadow-sm mb-6; }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase">Accesso Negato</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="text-black min-h-screen flex flex-col no-scrollbar pb-32">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4 transition-opacity duration-300">
        <div class="spinner"></div>
        <p id="loaderStatus" class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 italic">Caricamento...</p>
    </div>

    <!-- HEADER -->
    <header class="bg-white border-b border-border p-6 sticky top-0 z-50 shadow-sm flex items-center gap-5">
        <div class="w-14 h-14 bg-black text-white rounded-2xl flex items-center justify-center text-2xl shadow-xl flex-shrink-0">
            <i class="fas fa-brain"></i>
        </div>
        <div class="flex-1 min-w-0">
            <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-[0.2em] rounded-full mb-1">Knowledge Fragment</div>
            <h1 id="headerTitle" class="text-lg font-black tracking-tighter uppercase leading-tight text-black break-words">Editor</h1>
            <p id="fragmentIdDisplay" class="text-[8px] font-bold text-gray-400 uppercase mt-1 tracking-tighter italic">SKU: ...</p>
        </div>
    </header>

    <!-- CONTENT -->
    <div id="app-content" class="hidden flex-1 p-5 space-y-10 fade-in">
        
        <!-- CARD 1: CORE CONTEXT -->
        <section class="bg-white rounded-[2.5rem] p-8 border border-border shadow-sm space-y-2">
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-300 block mb-4 italic">General Context</span>
            
            <label class="field-label">Content Title</label>
            <input type="text" id="field-title" class="enterprise-input" oninput="updateField('title', this.value)">

            <label class="field-label">Executive Summary</label>
            <textarea id="field-summary" rows="3" class="enterprise-textarea" oninput="updateField('summary', this.value)"></textarea>

            <label class="field-label">Direct AI Answer</label>
            <textarea id="field-answer" rows="6" class="enterprise-textarea" oninput="updateField('answer_fragment', this.value)"></textarea>

            <label class="field-label">User Utterances (One per line)</label>
            <textarea id="field-utterances" rows="4" class="enterprise-textarea" oninput="updateUtterances(this.value)"></textarea>
        </section>

        <!-- SECTIONS -->
        <div class="space-y-6">
            <div class="flex items-center gap-3 mb-2 px-2">
                <div class="h-[2px] w-8 bg-black"></div>
                <p class="text-[10px] font-black uppercase text-black tracking-[0.2em]">Detailed Knowledge Sections</p>
            </div>
            <div id="sections-container" class="space-y-6"></div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="fixed bottom-8 left-0 w-full px-6 flex items-center justify-between z-[100] gap-4">
        <button onclick="tg.close()" class="w-16 h-16 bg-white text-black rounded-full shadow-2xl flex items-center justify-center text-xl border border-gray-100 active:scale-90 transition"><i class="fas fa-times"></i></button>
        <button id="save-fab" disabled onclick="handleSave()" class="flex-1 h-16 bg-black text-white rounded-full shadow-2xl font-black uppercase tracking-[0.2em] text-[11px] active:scale-95 transition-all opacity-20 flex items-center justify-center gap-3">
            <i class="fas fa-save text-sm"></i> <span id="saveBtnText">Update Fragment</span>
        </button>
    </footer>

    <script>
        'use strict';
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/0ca76af1-8c02-47f4-a3a4-fd19ad495afe";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash'), sopId = urlParams.get('sop_id');

        let currentFragment = null, initialDataString = "";
        const dom = { 
            loader: document.getElementById('loader'), 
            content: document.getElementById('app-content'), 
            saveBtn: document.getElementById('save-fab'), 
            saveBtnText: document.getElementById('saveBtnText'),
            sections: document.getElementById('sections-container')
        };

        async function init() {
            if (!ash || !sopId) { 
                document.getElementById('loaderStatus').innerHTML = "<span class='text-red-500'>PARAM ERROR</span>";
                return; 
            }
            await loadFragment();
        }

        async function loadFragment() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get_kb_details', ash: ash, fragment_id: sopId, _auth: tg.initData })
                });
                
                const data = await res.json();
                console.log("Dati ricevuti:", data);

                // --- PARSING ULTRA-ROBUSTO ---
                const raw = Array.isArray(data) ? data[0] : data;
                currentFragment = raw.Fragment || raw.fragment || raw;

                if (!currentFragment || (!currentFragment.title && !currentFragment._id)) {
                    throw new Error("Struttura dati non valida o Fragment mancante.");
                }

                // Popolamento UI
                document.getElementById('headerTitle').innerText = currentFragment.title || "Senza Titolo";
                document.getElementById('fragmentIdDisplay').innerText = `ID: ${currentFragment.fragment_id || currentFragment._id}`;
                
                document.getElementById('field-title').value = currentFragment.title || "";
                document.getElementById('field-summary').value = currentFragment.summary || "";
                document.getElementById('field-answer').value = currentFragment.answer_fragment || "";
                document.getElementById('field-utterances').value = (currentFragment.user_utterances || []).join('\n');

                renderSections();

                initialDataString = JSON.stringify(currentFragment);
                dom.loader.classList.add('hidden');
                dom.content.classList.remove('hidden');

            } catch (e) {
                console.error("Errore critico:", e);
                document.getElementById('loaderStatus').innerHTML = `<span class='text-red-500'>ERROR: ${e.message}</span>`;
            }
        }

        function renderSections() {
            dom.sections.innerHTML = '';
            const sections = currentFragment.sections || [];
            sections.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-[2.5rem] border border-border p-8 space-y-6 shadow-sm fade-in";
                div.innerHTML = `
                    <div class="space-y-1">
                        <label class="field-label !text-gray-300">Question ${i+1}</label>
                        <input type="text" value="${s.question || ''}" oninput="updateSection(${i}, 'question', this.value)" class="enterprise-input !mb-0 uppercase text-[11px]">
                    </div>
                    <div class="space-y-1">
                        <label class="field-label">Detailed Answer</label>
                        <textarea rows="4" oninput="updateSection(${i}, 'answer', this.value)" class="enterprise-textarea !mb-0">${s.answer || ''}</textarea>
                    </div>
                    <div class="space-y-1">
                        <label class="field-label italic">Analogy / Tone</label>
                        <textarea rows="2" oninput="updateSection(${i}, 'analogy', this.value)" class="enterprise-textarea !bg-stone-100 italic text-stone-600 border-none !mb-0">${s.analogy || ''}</textarea>
                    </div>`;
                dom.sections.appendChild(div);
            });
        }

        window.updateField = (k, v) => { currentFragment[k] = v; checkDirty(); };
        window.updateUtterances = (v) => { currentFragment.user_utterances = v.split('\n').filter(l => l.trim() !== ""); checkDirty(); };
        window.updateSection = (idx, k, v) => { currentFragment.sections[idx][k] = v; checkDirty(); };

        function checkDirty() {
            const isDirty = JSON.stringify(currentFragment) !== initialDataString;
            dom.saveBtn.disabled = !isDirty;
            dom.saveBtn.classList.toggle('opacity-20', !isDirty);
            dom.saveBtn.classList.toggle('opacity-100', isDirty);
        }

        window.handleSave = async function() {
            dom.saveBtn.disabled = true;
            dom.saveBtnText.innerText = "DEPLOYING...";
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'save_kb', fragments: [currentFragment], ash: ash, _auth: tg.initData })
                });
                if (res.ok) {
                    dom.saveBtn.classList.replace('bg-black', 'bg-green-600');
                    dom.saveBtnText.innerText = "SUCCESSFUL";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1200);
                } else throw new Error("Save Failed");
            } catch (e) {
                alert(e.message);
                dom.saveBtn.disabled = false;
                dom.saveBtnText.innerText = "RETRY";
            }
        }

        init();
    </script>
</body>
</html>
