<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Knowledge Editor | SiteBoS Architect</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Stile Input Enterprise */
        .field-label { @apply text-[10px] font-black uppercase text-gray-400 ml-2 tracking-[0.15em] mb-1.5 block; }
        .enterprise-input { @apply w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black focus:bg-white outline-none transition-all shadow-sm; }
        .enterprise-textarea { @apply w-full bg-gray-50 p-5 rounded-[1.5rem] text-sm font-medium border border-transparent focus:border-black focus:bg-white outline-none resize-none leading-relaxed transition-all shadow-sm; }
        
        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase tracking-widest">Accesso Negato</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="bg-bg text-black min-h-screen flex flex-col no-scrollbar pb-32">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4 transition-opacity duration-500">
        <div class="spinner"></div>
        <p class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 italic">Syncing Process Intelligence...</p>
    </div>

    <!-- HEADER -->
    <header class="bg-white border-b border-border p-6 sticky top-0 z-50 shadow-sm flex items-center gap-5 fade-in-up">
        <div class="w-14 h-14 bg-black text-white rounded-2xl flex items-center justify-center text-2xl shadow-xl flex-shrink-0">
            <i class="fas fa-brain"></i>
        </div>
        <div class="flex-1 min-w-0">
            <div class="inline-block px-2 py-0.5 bg-black text-white text-[7px] font-black uppercase tracking-[0.2em] rounded-full mb-1">Knowledge Fragment</div>
            <h1 id="headerTitle" class="text-lg font-black tracking-tighter uppercase leading-tight text-black break-words">...</h1>
            <p id="fragmentIdDisplay" class="text-[8px] font-bold text-gray-400 uppercase mt-1 tracking-tighter italic">ID: ...</p>
        </div>
    </header>

    <!-- CONTENT AREA -->
    <div id="app-content" class="hidden flex-1 p-5 space-y-10 fade-in-up" style="animation-delay: 0.1s">
        
        <!-- CARD 1: CONTESTO GENERALE -->
        <section class="bg-white rounded-[2.5rem] p-8 border border-border shadow-sm space-y-6">
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-300 block mb-4 italic">Core Context</span>
            
            <div class="space-y-1">
                <label class="field-label">Content Title</label>
                <input type="text" id="field-title" class="enterprise-input" oninput="updateField('title', this.value)">
            </div>

            <div class="space-y-1">
                <label class="field-label">Executive Summary</label>
                <textarea id="field-summary" rows="3" class="enterprise-textarea" oninput="updateField('summary', this.value)"></textarea>
            </div>

            <div class="space-y-1">
                <label class="field-label">Direct AI Answer (The "Truth")</label>
                <textarea id="field-answer" rows="6" class="enterprise-textarea" oninput="updateField('answer_fragment', this.value)"></textarea>
            </div>

            <div class="space-y-1">
                <label class="field-label">User Training Utterances</label>
                <textarea id="field-utterances" rows="4" class="enterprise-textarea" placeholder="Esempio: Come posso fare per..." oninput="updateUtterances(this.value)"></textarea>
            </div>
        </section>

        <!-- CARD 2: DETTAGLI Q&A -->
        <div class="space-y-6">
            <div class="flex items-center gap-3 mb-2 px-2">
                <div class="h-[2px] w-8 bg-black"></div>
                <p class="text-[10px] font-black uppercase text-black tracking-[0.2em]">Detailed Knowledge Sections</p>
            </div>
            
            <div id="sections-container" class="space-y-6">
                <!-- Dinamico: Q&A Cards -->
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="fixed bottom-8 left-0 w-full px-6 flex items-center justify-between z-[100] gap-4">
        <button onclick="tg.close()" class="w-16 h-16 bg-white text-black rounded-full shadow-2xl flex items-center justify-center text-xl border border-gray-100 active:scale-90 transition">
            <i class="fas fa-times"></i>
        </button>
        <button id="save-fab" disabled onclick="handleSave()" class="flex-1 h-16 bg-black text-white rounded-full shadow-2xl font-black uppercase tracking-[0.2em] text-[11px] active:scale-95 transition-all opacity-20 flex items-center justify-center gap-3">
            <i class="fas fa-save text-sm"></i> <span id="saveBtnText">Update Fragment</span>
        </button>
    </footer>

    <script>
        'use strict';
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/0ca76af1-8c02-47f4-a3a4-fd19ad495afe";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash'), sopId = urlParams.get('sop_id');

        let currentFragment = null, initialDataString = "";
        const dom = { loader: document.getElementById('loader'), content: document.getElementById('app-content'), saveBtn: document.getElementById('save-fab'), saveBtnText: document.getElementById('saveBtnText'), sections: document.getElementById('sections-container') };

        async function init() {
            if (!ash || !sopId) { alert("Context Error"); return; }
            await loadFragment();
        }

        async function loadFragment() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get_kb_details', ash: ash, fragment_id: sopId, _auth: tg.initData })
                });
                const data = await res.json();
                currentFragment = (Array.isArray(data) ? data[0] : data).Fragment || (Array.isArray(data) ? data[0] : data);
                populateUI();
                initialDataString = JSON.stringify(currentFragment);
                dom.loader.classList.add('hidden');
                dom.content.classList.remove('hidden');
            } catch (e) { console.error(e); }
        }

        function populateUI() {
            document.getElementById('headerTitle').innerText = currentFragment.title;
            document.getElementById('fragmentIdDisplay').innerText = `SKU: ${currentFragment.fragment_id}`;
            document.getElementById('field-title').value = currentFragment.title;
            document.getElementById('field-summary').value = currentFragment.summary;
            document.getElementById('field-answer').value = currentFragment.answer_fragment;
            document.getElementById('field-utterances').value = (currentFragment.user_utterances || []).join('\n');
            renderSections();
        }

        function renderSections() {
            dom.sections.innerHTML = '';
            (currentFragment.sections || []).forEach((s, i) => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-[2.5rem] border border-border p-8 space-y-6 shadow-sm";
                div.innerHTML = `
                    <div class="space-y-2">
                        <label class="field-label !text-gray-300">Question ${i+1}</label>
                        <input type="text" value="${s.question}" oninput="updateSection(${i}, 'question', this.value)" class="enterprise-input !bg-white border-border focus:!bg-gray-50 uppercase text-[11px]">
                    </div>
                    <div class="space-y-2">
                        <label class="field-label">Answer Context</label>
                        <textarea rows="4" oninput="updateSection(${i}, 'answer', this.value)" class="enterprise-textarea">${s.answer}</textarea>
                    </div>
                    <div class="space-y-2">
                        <label class="field-label italic">Analogy / Tone of Voice</label>
                        <textarea rows="3" oninput="updateSection(${i}, 'analogy', this.value)" class="enterprise-textarea !bg-stone-100 italic text-stone-600 border-none">${s.analogy || ''}</textarea>
                    </div>`;
                dom.sections.appendChild(div);
            });
        }

        window.updateField = (k, v) => { currentFragment[k] = v; checkDirty(); };
        window.updateUtterances = (v) => { currentFragment.user_utterances = v.split('\n').filter(l => l.trim() !== ""); checkDirty(); };
        window.updateSection = (idx, k, v) => { currentFragment.sections[idx][k] = v; checkDirty(); };

        function checkDirty() {
            const isDirty = JSON.stringify(currentFragment) !== initialDataString;
            dom.saveBtn.disabled = !isDirty;
            dom.saveBtn.classList.toggle('opacity-20', !isDirty);
            dom.saveBtn.classList.toggle('opacity-100', isDirty);
        }

        window.handleSave = async function() {
            dom.saveBtn.disabled = true;
            dom.saveBtnText.innerText = "DEPLOYING...";
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'save_kb', fragments: [currentFragment], ash: ash, _auth: tg.initData })
                });
                dom.saveBtn.classList.replace('bg-black', 'bg-green-600');
                dom.saveBtnText.innerText = "SUCCESSFUL";
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => tg.close(), 1500);
            } catch (e) { dom.saveBtn.disabled = false; dom.saveBtnText.innerText = "RETRY"; }
        }

        init();
    </script>
</body>
</html>
                }
            }
        }
    </script>

    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4 text-white">🚫</h1><h2 class="text-xl font-bold uppercase tracking-widest">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
