<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <title>Hub Servizi | SiteBoS</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tailwind CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // BLOCCO DI SICUREZZA TELEGRAM DISABILITATO PER CONSENTIRE L'ESPLORAZIONE IN LOCALE / BROWSER
        /*
        (function() {
            const tempTg = window.Telegram?.WebApp;
            const isTelegramSession = tempTg && tempTg.initData && tempTg.initData !== "" && tempTg.platform !== "unknown";

            if (!isTelegramSession) {
                window.location.replace("index.html");
            }
        })();
        */

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #ffffff !important;
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f4f5f8 100%) !important;
            color: #0f172a !important;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            background-image: radial-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px);
            background-size: 16px 16px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Viewport Transition */
        .viewport-wrapper {
            display: flex;
            width: 300vw;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .viewport-screen {
            width: 100vw;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Glassmorphic White Drawer Panel */
        .hud-panel {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(226, 232, 240, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Ambient Breathing Core Shadow Glow (Unified Black/Slate pulse) */
        @keyframes corePulse {
            0% { box-shadow: 0 0 10px rgba(15, 23, 42, 0.04), 0 0 20px rgba(15, 23, 42, 0.02); }
            50% { box-shadow: 0 0 25px rgba(15, 23, 42, 0.12), 0 0 40px rgba(15, 23, 42, 0.06); }
            100% { box-shadow: 0 0 10px rgba(15, 23, 42, 0.04), 0 0 20px rgba(15, 23, 42, 0.02); }
        }
        .jarvis-core-pulse {
            animation: corePulse 3s infinite ease-in-out;
        }

        @keyframes messageIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-anim { animation: messageIn 0.25s ease forwards; }

        /* Satellite Styles (Unified White/Black Outline) */
        .satellite {
            position: absolute;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #ffffff;
            border: 1.5px solid #cbd5e1;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1), 
                        box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, opacity;
        }
        .satellite.focused {
            border-color: #0f172a;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.15), 
                        0 4px 6px -2px rgba(15, 23, 42, 0.05);
        }

        /* Drawer Slide Transition */
        .drawer-transition {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="safe-area-inset h-screen flex flex-col overflow-hidden text-sm justify-between">

    <!-- TOP BAR (HEADER ALIGNMENT WITH OWNER STYLE) -->
    <header class="p-4 bg-white/85 backdrop-blur-md border-b border-slate-200/85 flex justify-between items-center z-50 shrink-0 select-none shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="toggleDrawer(true)" class="w-10 h-10 border border-slate-200 flex items-center justify-center rounded-2xl bg-white text-slate-800 active:bg-slate-50 transition shadow-sm">
                <i class="fas fa-bars text-sm"></i>
            </button>
            <div>
                <h1 id="tenant-name" class="text-xs font-black uppercase tracking-tight leading-none text-slate-900">STUDIO_HUB</h1>
                <p class="text-[8px] font-bold uppercase tracking-widest text-slate-400 mt-1">Console Servizi Cliente</p>
            </div>
        </div>
        <button onclick="tg.close()" class="w-10 h-10 rounded-2xl border border-slate-200 flex items-center justify-center text-slate-600 bg-white active:bg-slate-50 transition shadow-sm">
            <i class="fas fa-times text-sm"></i>
        </button>
    </header>

    <!-- 3D ORBIT AREA (LIGHT IMMERSIVE VIEWPORT) -->
    <main id="orbit-viewport" class="relative flex-1 w-full flex items-center justify-center select-none touch-none">
        
        <!-- SVG Tilted Orbit Ellipse (Owner Light Grey Stroke) -->
        <svg class="absolute w-[320px] h-[180px] pointer-events-none opacity-40">
            <ellipse cx="160" cy="90" rx="145" ry="80" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,5" />
        </svg>

        <!-- Soft Shadow Pulse Ring -->
        <div class="absolute w-24 h-24 rounded-full border border-slate-200/30 jarvis-core-pulse"></div>

        <!-- UNIFIED WHITE/BLACK MIC CORE -->
        <div id="jarvis-core" onclick="handleCoreClick()" class="w-20 h-20 rounded-full bg-white text-black flex flex-col items-center justify-center cursor-pointer shadow-xl active:scale-95 transition-transform duration-300 z-10 border-2 border-slate-900">
            <i class="fas fa-microphone text-lg"></i>
        </div>

        <!-- SATELLITES CAROUSEL -->
        <div id="satellites-orbit" class="absolute inset-0 pointer-events-none">
            <!-- Satellites iniettati da JS -->
        </div>

    </main>

    <!-- SYSTEM ACCESS FOOTER (SINGLE CLEAN PILL TRIGGER) -->
    <footer class="p-4 bg-white/80 backdrop-blur-md border-t border-slate-200/80 z-40 select-none shadow-sm">
        <button onclick="executeActiveModule()" id="exec-btn-text" class="w-full bg-slate-950 text-white font-black text-[10px] tracking-[0.25em] uppercase py-4 rounded-2xl active:scale-95 transition-transform duration-150 shadow-md">
            ---
        </button>
    </footer>

    <!-- SIDE DRAWER: COGNITIVE CONSOLE & ARCHIVES (LIGHT GLASS THEME) -->
    <div id="drawer-overlay" class="fixed inset-0 bg-slate-950/20 backdrop-blur-sm z-[100] hidden transition-opacity duration-300" onclick="toggleDrawer(false)">
        <div id="nav-drawer" class="fixed top-0 left-0 h-full w-[85%] max-w-sm bg-white/95 border-r border-slate-200/80 flex flex-col justify-between drawer-transition -translate-x-full shadow-2xl" onclick="event.stopPropagation()">
            
            <!-- Drawer Header -->
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <span class="text-[9px] font-black tracking-widest text-slate-400 uppercase">Console Servizi</span>
                <button onclick="toggleDrawer(false)" class="text-slate-400 hover:text-slate-800"><i class="fas fa-chevron-left text-sm"></i></button>
            </div>

            <!-- Drawer Scrollable Content -->
            <div class="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar">
                
                <!-- COGNITIVE CHAT BOX -->
                <div class="space-y-3">
                    <h4 class="text-[8px] font-black tracking-widest text-slate-400 uppercase">Assistente AI</h4>
                    <div id="chat-container" class="space-y-3 text-[11px] leading-relaxed">
                        <div class="msg-anim text-slate-400">Sistemi di puntamento attivi. Scrivi un messaggio per interagire con lo studio:</div>
                    </div>
                </div>

                <!-- TACTICAL ARCHIVE LIST -->
                <div class="space-y-3 pt-4 border-t border-slate-100">
                    <h4 class="text-[8px] font-black tracking-widest text-slate-400 uppercase">Archivio Pratiche</h4>
                    <div id="history-container" class="space-y-2 text-[9px] text-slate-400">
                        <div>Nessuna operazione salvata nel database</div>
                    </div>
                </div>

            </div>

            <!-- Drawer Interactive Input Bar -->
            <div class="p-3 border-t border-slate-100 bg-slate-50/50 flex items-center gap-2">
                <input type="text" id="chat-input" placeholder="Scrivi una richiesta..." class="flex-1 bg-white border border-slate-200 text-slate-800 rounded-xl py-2.5 px-3 text-[11px] focus:outline-none focus:border-slate-400 shadow-sm">
                <button onclick="sendText()" class="w-9 h-9 bg-slate-950 text-white rounded-xl flex items-center justify-center shrink-0 active:scale-95 transition-all shadow-md"><i class="fas fa-paper-plane text-xs"></i></button>
            </div>

        </div>
    </div>

    <!-- PROCEDURAL LOGIC -->
    <script>
        'use strict';
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');
        const msgId = urlParams.get('msg');
        const WH_CHAT = "https://prod.workflow.trinai.it/webhook/81ab5292-43c3-4f93-afaf-7411b95fc010";

        // Mappatura Satelliti
        const satellitesData = [
            { id: "ecom", code: "01", label: "CATALOGO", desc: "Catalogo e-commerce prodotti", icon: "fa-shopping-bag", url: "ecommerce.html" },
            { id: "booking", code: "02", label: "PRENOTAZIONI", desc: "Pianificazione appuntamenti", icon: "fa-calendar-alt", url: "booking.html" },
            { id: "preventivi", code: "03", label: "PREVENTIVI", desc: "Configuratore di spesa AI", icon: "fa-file-invoice-dollar", url: "preventivi.html" },
            { id: "ticket", code: "04", label: "SUPPORTO", desc: "Apertura ticket assistenza", icon: "fa-headset", url: "ticket.html" }
        ];

        // --- GESTIONE DRAWER LATERALE ---
        function toggleDrawer(show) {
            const overlay = document.getElementById('drawer-overlay');
            const drawer = document.getElementById('nav-drawer');
            if (show) {
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    drawer.classList.remove('-translate-x-full');
                }, 10);
            } else {
                overlay.classList.add('opacity-0');
                drawer.classList.add('-translate-x-full');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // --- FISICA DI ROTAZIONE & SATELLITI (TILTED ORBIT) ---
        const orbitContainer = document.getElementById('satellites-orbit');
        const rx = 145; 
        const ry = 80;  
        
        let currentAngle = Math.PI / 2; 
        let isDragging = false;
        let startX = 0;
        let baseAngle = 0;
        let activeIdx = 0;

        function buildSatellites() {
            orbitContainer.innerHTML = "";
            satellitesData.forEach((sat, idx) => {
                const div = document.createElement('div');
                div.className = "satellite pointer-events-auto";
                div.id = `sat-${idx}`;
                div.innerHTML = `<i class="fas ${sat.icon} text-sm"></i>`;
                div.addEventListener('click', () => {
                    if (idx === activeIdx) {
                        openModule(sat.url);
                    } else {
                        let targetAngle = Math.PI / 2 - (idx * Math.PI / 2);
                        animateTo(targetAngle);
                    }
                });
                orbitContainer.appendChild(div);
            });
            updateSatellites();
        }

        function updateSatellites() {
            const centerX = orbitContainer.clientWidth / 2;
            const centerY = orbitContainer.clientHeight / 2;

            satellitesData.forEach((_, idx) => {
                const satElement = document.getElementById(`sat-${idx}`);
                if (!satElement) return;

                let angle = currentAngle + (idx * Math.PI / 2);
                let x = rx * Math.cos(angle);
                let y = ry * Math.sin(angle);

                let sin = Math.sin(angle);
                let scale = 0.70 + 0.30 * ((sin + 1) / 2);
                let opacity = 0.25 + 0.75 * ((sin + 1) / 2);
                let zIndex = Math.round((sin + 1) * 100);

                satElement.style.transform = `translate3d(${centerX + x - 26}px, ${centerY + y - 26}px, 0) scale(${scale})`;
                satElement.style.opacity = opacity;
                satElement.style.zIndex = zIndex;

                if (idx === activeIdx) {
                    satElement.classList.add('focused');
                } else {
                    satElement.classList.remove('focused');
                }
            });
        }

        function findActiveSatellite() {
            let rawIdx = Math.round((Math.PI / 2 - currentAngle) / (Math.PI / 2));
            activeIdx = ((rawIdx % 4) + 4) % 4;
            document.getElementById('exec-btn-text').innerText = satellitesData[activeIdx].label;
        }

        function executeActiveModule() {
            const target = satellitesData[activeIdx];
            if (target) openModule(target.url);
        }

        // --- CLICK SUL CORE (MIC) ---
        function handleCoreClick() {
            toggleDrawer(true);
            const input = document.getElementById('chat-input');
            input.focus();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
        }

        // --- GESTURE: DRAG & SWIPE (INVERTITO) ---
        const orbitViewport = document.getElementById('orbit-viewport');

        function onDragStart(clientX) {
            isDragging = true;
            startX = clientX;
            baseAngle = currentAngle;
        }

        function onDragMove(clientX) {
            if (!isDragging) return;
            const dx = clientX - startX;
            currentAngle = baseAngle - (dx * 0.007);
            updateSatellites();
            findActiveSatellite();
        }

        function onDragEnd() {
            if (!isDragging) return;
            isDragging = false;
            snapToNearest();
        }

        // Touch events
        orbitViewport.addEventListener('touchstart', e => { onDragStart(e.touches[0].clientX); }, { passive: true });
        orbitViewport.addEventListener('touchmove', e => { onDragMove(e.touches[0].clientX); }, { passive: true });
        orbitViewport.addEventListener('touchend', onDragEnd, { passive: true });

        // Mouse events
        orbitViewport.addEventListener('mousedown', e => { onDragStart(e.clientX); });
        window.addEventListener('mousemove', e => { onDragMove(e.clientX); });
        window.addEventListener('mouseup', onDragEnd);

        // Snapping magnetico
        function snapToNearest() {
            let targetAngle = Math.round((currentAngle - Math.PI / 2) / (Math.PI / 2)) * (Math.PI / 2) + Math.PI / 2;
            animateTo(targetAngle);
        }

        function animateTo(target) {
            function step() {
                let diff = target - currentAngle;
                if (Math.abs(diff) < 0.005) {
                    currentAngle = target;
                    updateSatellites();
                    findActiveSatellite();
                } else {
                    currentAngle += diff * 0.16;
                    updateSatellites();
                    findActiveSatellite();
                    requestAnimationFrame(step);
                }
            }
            requestAnimationFrame(step);
        }

        // --- REINDIRIZZAMENTO ---
        function openModule(url) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            window.location.href = `${url}?ash=${ash}&msg=${msgId || ''}`;
        }

        // --- CONSOLE CHAT INSIDE DRAWER ---
        function addMessage(sender, text) {
            const container = document.getElementById('chat-container');
            const element = document.createElement('div');
            element.className = "msg-anim space-y-0.5 border-l border-slate-200 pl-2 mt-2";
            element.innerHTML = `
                <div class="text-[8px] text-slate-400">${sender === 'user' ? 'Tu' : 'Assistente'}</div>
                <div class="text-slate-800 font-semibold">${text}</div>
            `;
            container.appendChild(element);
            container.scrollTop = container.scrollHeight;
        }

        async function sendText() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';

            try {
                const response = await fetch(WH_CHAT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'npl_chat',
                        message: text,
                        _auth: tg.initData || "debug_auth_mode",
                        ash: ash
                    })
                });
                const data = await response.json();
                
                if (data.redirect_url) {
                    addMessage('ai', `Reindirizzamento: <code>${data.redirect_url}</code>`);
                    setTimeout(() => {
                        window.location.href = `${data.redirect_url}?ash=${ash}`;
                    }, 1200);
                } else if (data.reply) {
                    addMessage('ai', data.reply);
                }
            } catch (err) {
                addMessage('ai', "Errore di connessione col server.");
            }
        }

        // --- BRANDING & LOGS ---
        async function fetchBrandingAndHistory() {
            if (!ash) return;
            const WH_URL = "https://prod.workflow.trinai.it/webhook/83acc670-15ae-4da0-ae0e-3587c85bd5f4";
            try {
                const response = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        _auth: tg.initData || "debug_auth_mode",
                        ash: ash,
                        action: 'get_owner_data'
                    })
                });
                const result = await response.json();
                if (result.status === 'success' && result.owner_data) {
                    const data = result.owner_data;
                    document.getElementById('tenant-name').innerText = (data.ragione_sociale || "SYSTEM_NOMINAL").toUpperCase();
                    document.getElementById('sys-credits').innerText = `CR: ${data.credits_balance || 0}`;
                    
                    const vat = data.vat_number || data.fiscal_code;
                    if (vat) {
                        const logoUrl = data.logo_url || data.logo || `https://minisite.trinai.it/minisite/${vat}/images/logo.png`;
                        const logoImg = document.getElementById('tenant-logo');
                        const logoFallback = document.getElementById('tenant-logo-fallback');
                        if (logoImg && logoFallback) {
                            logoImg.src = logoUrl;
                            logoImg.onload = () => {
                                logoFallback.classList.add('hidden');
                                logoImg.classList.remove('hidden');
                            };
                        }
                    }

                    if (data.active_orders && data.active_orders.length > 0) {
                        const container = document.getElementById('history-container');
                        container.innerHTML = data.active_orders.map(o => `
                            <div class="p-2 border border-slate-100 bg-white rounded-xl space-y-1">
                                <div class="flex justify-between text-[7px] text-slate-400">
                                    <span>ID: ${o.id}</span>
                                    <span>${o.status}</span>
                                </div>
                                <div class="text-slate-800 font-semibold">${o.description || 'ORDINE_ACQUISTO'}</div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                document.getElementById('tenant-name').innerText = "STUDIO MEDICALE";
            }
        }

        fetchBrandingAndHistory();
        buildSatellites();
        findActiveSatellite();
    </script>
</body>
</html>
