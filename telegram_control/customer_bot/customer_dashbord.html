<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>SiteBoS HUD | Client Console</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Tailwind CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        //
        /*
        (function() {
            const tempTg = window.Telegram?.WebApp;
            const isTelegramSession = tempTg && tempTg.initData && tempTg.initData !== "" && tempTg.platform !== "unknown";

            if (!isTelegramSession) {
                window.location.replace("index.html");
            }
        })();
        */

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #000000 !important;
            color: #ffffff !important;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 16px 16px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Ambient Breathing JARVIS Core Glow */
        @keyframes corePulse {
            0% {
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.05), 0 0 20px rgba(255, 255, 255, 0.02);
            }

            50% {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.2), 0 0 35px rgba(255, 255, 255, 0.08);
            }

            100% {
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.05), 0 0 20px rgba(255, 255, 255, 0.02);
            }
        }

        .jarvis-core-pulse {
            animation: corePulse 3s infinite ease-in-out;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-anim {
            animation: messageIn 0.25s ease forwards;
        }

        /* Satellite Styles */
        .satellite {
            position: absolute;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            will-change: transform, opacity;
        }

        .satellite.focused {
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Navigation Drawer */
        .drawer-transition {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>

<body class="safe-area-inset h-screen flex flex-col overflow-hidden text-sm justify-between">

    <!-- TOP BAR -->
    <header
        class="p-4 bg-black/60 backdrop-blur-md border-b border-white/10 flex justify-between items-center z-50 shrink-0 select-none">
        <div class="flex items-center gap-3">
            <button onclick="toggleDrawer(true)"
                class="w-10 h-10 border border-white/10 flex items-center justify-center rounded-2xl bg-white/5 text-white active:bg-white/10 transition">
                <i class="fas fa-bars text-sm"></i>
            </button>
            <div>
                <h1 id="tenant-name" class="text-[10px] font-mono tracking-widest uppercase text-white leading-none">
                    SYS_INITIALIZING</h1>
                <p class="text-[7px] font-mono uppercase tracking-widest text-white/50 mt-1">Holographic HUD</p>
            </div>
        </div>
        <button onclick="tg.close()"
            class="w-10 h-10 rounded-2xl border border-white/10 flex items-center justify-center text-white/60 active:bg-white/10 transition">
            <i class="fas fa-times text-sm"></i>
        </button>
    </header>

    <!-- 3D ORBIT AREA (PRISTINE VIEWPORT) -->
    <main id="orbit-viewport" class="relative flex-1 w-full flex items-center justify-center select-none touch-none">

        <!-- SVG Tilted Orbit Ellipse (Dimensionata per non sovrapporsi) -->
        <svg class="absolute w-[320px] h-[130px] pointer-events-none opacity-20">
            <ellipse cx="160" cy="65" rx="145" ry="55" fill="none" stroke="white" stroke-width="1.2"
                stroke-dasharray="4,5" />
        </svg>

        <!-- Breathing Glow Ring -->
        <div class="absolute w-24 h-24 rounded-full border border-white/5 jarvis-core-pulse"></div>

        <!-- JARVIS CORE MICROPHONE -->
        <div id="jarvis-core" onclick="handleCoreClick()"
            class="w-20 h-20 rounded-full bg-white text-black flex flex-col items-center justify-center cursor-pointer shadow-2xl active:scale-95 transition-transform duration-300 z-10 border border-black">
            <i class="fas fa-microphone text-lg animate-pulse"></i>
        </div>

        <!-- SATELLITES CAROUSEL -->
        <div id="satellites-orbit" class="absolute inset-0 pointer-events-none">
            <!-- Satellites iniettati da JS -->
        </div>

    </main>

    <!-- SYSTEM ACCESS FOOTER (SINGLE CLEAN RUN TRIGGER) -->
    <footer class="p-4 bg-black/60 border-t border-white/10 z-40 select-none">
        <button onclick="executeActiveModule()" id="exec-btn-text"
            class="w-full bg-white text-black font-mono text-[10px] tracking-[0.25em] uppercase py-4 rounded-2xl active:scale-95 transition-transform duration-150">
            ---
        </button>
    </footer>

    <!-- SIDE DRAWER: CONSOLE AI & HISTORICAL LOGS -->
    <div id="drawer-overlay"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden transition-opacity duration-300"
        onclick="toggleDrawer(false)">
        <div id="nav-drawer"
            class="fixed top-0 left-0 h-full w-[85%] max-w-sm bg-black border-r border-white/10 flex flex-col justify-between drawer-transition -translate-x-full"
            onclick="event.stopPropagation()">

            <!-- Drawer Header -->
            <div class="p-4 border-b border-white/10 flex justify-between items-center bg-white/[0.02]">
                <span class="text-[9px] font-mono tracking-widest text-white/40 uppercase">CONSOLE_SYSTEM_LOGS</span>
                <button onclick="toggleDrawer(false)" class="text-white/60"><i
                        class="fas fa-chevron-left text-sm"></i></button>
            </div>

            <!-- Drawer Scrollable Content -->
            <div class="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar">

                <!-- COGNITIVE CHAT BOX -->
                <div class="space-y-3">
                    <h4 class="text-[8px] font-mono tracking-widest text-white/30 uppercase">COGNITIVE_INTERFACE</h4>
                    <div id="chat-container" class="space-y-3 font-mono text-[10px] leading-relaxed">
                        <div class="msg-anim text-white/40">Sistemi di puntamento attivi. Digita un comando per operare:
                        </div>
                    </div>
                </div>

                <!-- TACTICAL ARCHIVE LIST -->
                <div class="space-y-3 pt-4 border-t border-white/5">
                    <h4 class="text-[8px] font-mono tracking-widest text-white/30 uppercase">DATABASE_PRATICHE</h4>
                    <div id="history-container" class="space-y-2 font-mono text-[9px] text-white/30">
                        <div>NESSUNA TRANSAZIONE RILEVATA</div>
                    </div>
                </div>

            </div>

            <!-- Drawer Interactive Input Bar -->
            <div class="p-3 border-t border-white/10 bg-white/[0.01] flex items-center gap-2">
                <input type="text" id="chat-input" placeholder="Comando AI..."
                    class="flex-1 bg-white/[0.04] border border-white/10 text-white rounded-xl py-2.5 px-3 text-[11px] font-mono focus:outline-none focus:border-white/50">
                <button onclick="sendText()"
                    class="w-9 h-9 bg-white text-black rounded-xl flex items-center justify-center shrink-0 active:scale-95 transition-all"><i
                        class="fas fa-paper-plane text-xs"></i></button>
            </div>

        </div>
    </div>

    <!-- PROCEDURAL LOGIC -->
    <script>
        'use strict';
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');
        const msgId = urlParams.get('msg');
        const WH_CHAT = "https://prod.workflow.trinai.it/webhook/81ab5292-43c3-4f93-afaf-7411b95fc010";

        // Mappatura Satelliti
        const satellitesData = [
            { id: "ecom", code: "01", label: "CATALOGO", desc: "Catalogo e-commerce prodotti", icon: "fa-shopping-bag", url: "ecommerce.html" },
            { id: "booking", code: "02", label: "PRENOTAZIONI", desc: "Pianificazione appuntamenti", icon: "fa-calendar-alt", url: "booking.html" },
            { id: "preventivi", code: "03", label: "PREVENTIVI", desc: "Configuratore di spesa AI", icon: "fa-file-invoice-dollar", url: "preventivi.html" },
            { id: "ticket", code: "04", label: "SUPPORTO", desc: "Apertura ticket assistenza", icon: "fa-headset", url: "ticket.html" }
        ];

        // --- GESTIONE DRAWER LATERALE ---
        function toggleDrawer(show) {
            const overlay = document.getElementById('drawer-overlay');
            const drawer = document.getElementById('nav-drawer');
            if (show) {
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    drawer.classList.remove('-translate-x-full');
                }, 10);
            } else {
                overlay.classList.add('opacity-0');
                drawer.classList.add('-translate-x-full');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // --- FISICA DI ROTAZIONE & SATELLITI (TILTED ORBIT) ---
        const orbitContainer = document.getElementById('satellites-orbit');
        const rx = 145; // Raggio orizzontale espanso
        const ry = 55;  // Raggio verticale aumentato per evitare sovrapposizione

        let currentAngle = Math.PI / 2; // Primo satellite davanti
        let isDragging = false;
        let startX = 0;
        let baseAngle = 0;
        let activeIdx = 0;

        function buildSatellites() {
            orbitContainer.innerHTML = "";
            satellitesData.forEach((sat, idx) => {
                const div = document.createElement('div');
                div.className = "satellite pointer-events-auto";
                div.id = `sat-${idx}`;
                div.innerHTML = `<i class="fas ${sat.icon} text-sm"></i>`;
                div.addEventListener('click', () => {
                    if (idx === activeIdx) {
                        openModule(sat.url);
                    } else {
                        let targetAngle = Math.PI / 2 - (idx * Math.PI / 2);
                        animateTo(targetAngle);
                    }
                });
                orbitContainer.appendChild(div);
            });
            updateSatellites();
        }

        function updateSatellites() {
            const centerX = orbitContainer.clientWidth / 2;
            const centerY = orbitContainer.clientHeight / 2;

            satellitesData.forEach((_, idx) => {
                const satElement = document.getElementById(`sat-${idx}`);
                if (!satElement) return;

                let angle = currentAngle + (idx * Math.PI / 2);
                let x = rx * Math.cos(angle);
                let y = ry * Math.sin(angle);

                let sin = Math.sin(angle);
                let scale = 0.70 + 0.30 * ((sin + 1) / 2);
                let opacity = 0.25 + 0.75 * ((sin + 1) / 2);
                let zIndex = Math.round((sin + 1) * 100);

                satElement.style.transform = `translate3d(${centerX + x - 26}px, ${centerY + y - 26}px, 0) scale(${scale})`;
                satElement.style.opacity = opacity;
                satElement.style.zIndex = zIndex;

                if (idx === activeIdx) {
                    satElement.classList.add('focused');
                } else {
                    satElement.classList.remove('focused');
                }
            });
        }

        function findActiveSatellite() {
            let rawIdx = Math.round((Math.PI / 2 - currentAngle) / (Math.PI / 2));
            activeIdx = ((rawIdx % 4) + 4) % 4;

            // Aggiorna l'etichetta del pulsante solo con il nome del modulo
            document.getElementById('exec-btn-text').innerText = satellitesData[activeIdx].label;
        }

        function executeActiveModule() {
            const target = satellitesData[activeIdx];
            if (target) openModule(target.url);
        }

        // --- CLICK SUL CORE (MIC) ---
        function handleCoreClick() {
            toggleDrawer(true);
            const input = document.getElementById('chat-input');
            input.focus();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
        }

        // --- GESTURE: DRAG & SWIPE (INVERTITO) ---
        const orbitViewport = document.getElementById('orbit-viewport');

        function onDragStart(clientX) {
            isDragging = true;
            startX = clientX;
            baseAngle = currentAngle;
        }

        function onDragMove(clientX) {
            if (!isDragging) return;
            const dx = clientX - startX;
            // Modificatore di inversione dello swipe (segno - invece di +)
            currentAngle = baseAngle - (dx * 0.007);
            updateSatellites();
            findActiveSatellite();
        }

        function onDragEnd() {
            if (!isDragging) return;
            isDragging = false;
            snapToNearest();
        }

        // Touch events
        orbitViewport.addEventListener('touchstart', e => { onDragStart(e.touches[0].clientX); }, { passive: true });
        orbitViewport.addEventListener('touchmove', e => { onDragMove(e.touches[0].clientX); }, { passive: true });
        orbitViewport.addEventListener('touchend', onDragEnd, { passive: true });

        // Mouse events
        orbitViewport.addEventListener('mousedown', e => { onDragStart(e.clientX); });
        window.addEventListener('mousemove', e => { onDragMove(e.clientX); });
        window.addEventListener('mouseup', onDragEnd);

        // Snapping magnetico
        function snapToNearest() {
            let targetAngle = Math.round((currentAngle - Math.PI / 2) / (Math.PI / 2)) * (Math.PI / 2) + Math.PI / 2;
            animateTo(targetAngle);
        }

        function animateTo(target) {
            function step() {
                let diff = target - currentAngle;
                if (Math.abs(diff) < 0.005) {
                    currentAngle = target;
                    updateSatellites();
                    findActiveSatellite();
                } else {
                    currentAngle += diff * 0.16;
                    updateSatellites();
                    findActiveSatellite();
                    requestAnimationFrame(step);
                }
            }
            requestAnimationFrame(step);
        }

        // --- REINDIRIZZAMENTO ---
        function openModule(url) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            window.location.href = `${url}?ash=${ash}&msg=${msgId || ''}`;
        }

        // --- CONSOLE CHAT INSIDE DRAWER ---
        function addMessage(sender, text) {
            const container = document.getElementById('chat-container');
            const element = document.createElement('div');
            element.className = "msg-anim space-y-0.5 border-l border-white/10 pl-2 mt-2";
            element.innerHTML = `
                <div class="text-[8px] text-white/30">${sender === 'user' ? '[STATION]' : '[JARVIS]'}</div>
                <div class="${sender === 'user' ? 'text-white' : 'text-white/70'}">${text}</div>
            `;
            container.appendChild(element);
            container.scrollTop = container.scrollHeight;
        }

        async function sendText() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';

            try {
                const response = await fetch(WH_CHAT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'npl_chat',
                        message: text,
                        _auth: tg.initData,
                        ash: ash
                    })
                });
                const data = await response.json();

                if (data.redirect_url) {
                    addMessage('ai', `>>> REDIRECT: <code>${data.redirect_url}</code>`);
                    setTimeout(() => {
                        window.location.href = `${data.redirect_url}?ash=${ash}`;
                    }, 1200);
                } else if (data.reply) {
                    addMessage('ai', data.reply);
                }
            } catch (err) {
                addMessage('ai', "SYSTEM_ERROR: OFFLINE");
            }
        }

        // --- BRANDING & LOGS ---
        async function fetchBrandingAndHistory() {
            if (!ash) return;
            const WH_URL = "https://prod.workflow.trinai.it/webhook/83acc670-15ae-4da0-ae0e-3587c85bd5f4";
            try {
                const response = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        _auth: tg.initData,
                        ash: ash,
                        action: 'get_owner_data'
                    })
                });
                const result = await response.json();
                if (result.status === 'success' && result.owner_data) {
                    const data = result.owner_data;
                    document.getElementById('tenant-name').innerText = (data.ragione_sociale || "SYSTEM_NOMINAL").toUpperCase();
                    document.getElementById('sys-credits').innerText = `CR: ${data.credits_balance || 0}`;

                    const vat = data.vat_number || data.fiscal_code;
                    if (vat) {
                        const logoUrl = data.logo_url || data.logo || `https://minisite.trinai.it/minisite/${vat}/images/logo.png`;
                        const logoImg = document.getElementById('tenant-logo');
                        const logoFallback = document.getElementById('tenant-logo-fallback');
                        if (logoImg && logoFallback) {
                            logoImg.src = logoUrl;
                            logoImg.onload = () => {
                                logoFallback.classList.add('hidden');
                                logoImg.classList.remove('hidden');
                            };
                        }
                    }

                    if (data.active_orders && data.active_orders.length > 0) {
                        const container = document.getElementById('history-container');
                        container.innerHTML = data.active_orders.map(o => `
                            <div class="p-2 border border-white/5 bg-white/[0.01] rounded-xl space-y-1">
                                <div class="flex justify-between text-[7px] text-white/30">
                                    <span>ID: ${o.id}</span>
                                    <span>${o.status}</span>
                                </div>
                                <div class="text-white">${o.description || 'DATAPACK_REC'}</div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                document.getElementById('tenant-name').innerText = "JARVIS_HUB";
            }
        }

        fetchBrandingAndHistory();
        buildSatellites();
        findActiveSatellite();
    </script>
</body>

</html>
