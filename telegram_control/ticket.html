<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="color-scheme" content="light">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Support Ticket | SiteBoS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
(function() {
    // Riferimento locale e temporaneo all'SDK per il controllo iniziale
    const tempTg = window.Telegram?.WebApp;
    const isTelegramSession = tempTg && tempTg.initData && tempTg.initData !== "" && tempTg.platform !== "unknown";

    if (!isTelegramSession) {
        const currentPath = window.location.pathname;
        let redirectPath = "index.html";

        if (//telegram_control/[^/]+//.test(currentPath)) {
            redirectPath = "../../index.html";
        } else if (currentPath.includes("/telegram_control/")) {
            redirectPath = "../index.html";
        }

        window.location.replace(redirectPath);
    }
})();

        tailwind.config = {
            theme: { extend: { colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' }, borderRadius: { '3xl': '1.5rem' } } }
        }
    </script>
    <style>

/* SiteBoS Architect Alignment */
body { background-color: #fafafa !important; color: #000000 !important; }
.card, .section-card, .dark-card, .upload-box { 
    background: white !important; 
    border: 1px solid #eeeeee !important; 
    box-shadow: none !important; 
}
input:focus, textarea:focus, select:focus { 
    border-color: #000000 !important; 
    box-shadow: none !important; 
    outline: none !important;
}
.text-primary, .text-black, .text-blue-600, .text-black { color: #000000 !important; }
.bg-primary, .bg-black, .bg-black, .bg-black { background-color: #000000 !important; color: #ffffff !important; }
.border-primary, .border-black, .border-blue-600, .border-black { border-color: #000000 !important; }
.spinner { border-top-color: #000 !important; }
input[type="checkbox"]:checked { background-color: #000 !important; border-color: #000 !important; }
/* Forza icone pesanti */
.fas, .far, .fal { font-weight: 900 !important; font-family: "Font Awesome 6 Free" !important; }


        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #fafafa; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="checkbox"] { appearance: none; width: 18px; height: 18px; border: 2px solid #000; border-radius: 4px; position: relative; cursor: pointer; }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after { content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; color: white; font-size: 8px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .spinner { border: 2px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.75rem center; background-size: 0.8em; }
    </style>
</head>
<body class="bg-bg text-black min-h-screen flex flex-col pb-24 overflow-x-hidden no-scrollbar">

    <header class="bg-white border-b border-border p-5 sticky top-0 z-50 shadow-sm flex items-center gap-4">
        <div class="w-10 h-10 bg-black text-white rounded-xl flex items-center justify-center text-lg shadow-md"><i class="fas fa-ticket-alt"></i></div>
        <div>
            <h1 class="text-base font-black tracking-tighter uppercase leading-none">Support Center</h1>
            <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mt-0.5">Apertura Pratica</p>
        </div>
    </header>

    <main class="flex-1 p-5 space-y-5">
        <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
                <label class="text-[8px] font-black uppercase text-gray-500 ml-1">Reparto</label>
                <select id="department" class="w-full bg-white p-3 rounded-xl text-[10px] font-bold border border-border outline-none">
                    <option value="Tecnico">Tecnico</option>
                    <option value="Amministrazione">Amministrazione</option>
                    <option value="Commerciale">Commerciale</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="text-[8px] font-black uppercase text-gray-500 ml-1">Urgenza</label>
                <select id="priority" class="w-full bg-white p-3 rounded-xl text-[10px] font-bold border border-border outline-none">
                    <option value="Bassa">Bassa</option>
                    <option value="Media" selected>Media</option>
                    <option value="Alta">Alta 🔥</option>
                </select>
            </div>
        </div>

        <div class="space-y-1">
            <label class="text-[8px] font-black uppercase text-gray-500 ml-1">Descrizione</label>
            <textarea id="messageInput" rows="5" oninput="validateForm()" class="w-full bg-white p-4 rounded-3xl text-sm font-medium border border-border outline-none transition-all resize-none shadow-sm" placeholder="Spiega qui il problema (min. 10 car.)..."></textarea>
        </div>

        <div class="space-y-2">
            <span class="text-[8px] font-black uppercase text-gray-500 ml-1 italic text-center block">Allegato (Opzionale)</span>
            <div id="uploadBox" onclick="document.getElementById('fileInput').click()" class="border-2 border-dashed border-gray-100 bg-white rounded-3xl py-8 flex flex-col items-center justify-center cursor-pointer hover:border-black transition-all">
                <div id="uploadUI" class="text-center"><i class="fas fa-camera text-xl text-gray-200 mb-1"></i><p class="text-[8px] font-black uppercase text-gray-500 tracking-widest leading-none">Foto o PDF</p></div>
                <div id="filePreviewUI" class="hidden text-center"><i class="fas fa-file-circle-check text-xl text-black mb-1"></i><p id="fileName" class="text-[9px] font-black text-black truncate max-w-[150px] uppercase"></p><button onclick="removeFile(event)" class="text-[7px] font-black uppercase text-red-500 mt-1">Rimuovi</button></div>
            </div>
            <input type="file" id="fileInput" class="hidden" accept=".pdf,image/jpeg,image/png" onchange="handleFileSelect(event)">
        </div>

        <div class="bg-white rounded-2xl p-4 border border-border shadow-sm flex items-start gap-3 active:scale-[0.98] transition">
            <input type="checkbox" id="privacyCheck" onchange="validateForm()">
            <label for="privacyCheck" class="flex-1 cursor-pointer">
                <p class="text-[9px] font-black uppercase text-black leading-tight">Accetto Privacy Policy</p>
                <p class="text-[7px] text-gray-500 font-bold uppercase mt-1">Acconsento al trattamento dei dati SiteBoS.</p>
            </label>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-lg border-t border-gray-100 z-[100]">
        <div class="flex items-center gap-3 max-w-md mx-auto">
            <button onclick="tg.close()" class="w-10 h-10 bg-white text-black rounded-xl shadow-md flex items-center justify-center text-lg border border-gray-100 active:scale-90 transition"><i class="fas fa-times"></i></button>
            <button id="sendBtn" disabled class="flex-1 h-10 bg-black text-white rounded-xl shadow-sm font-black uppercase tracking-widest text-[9px] active:scale-95 transition-all disabled:opacity-10 flex items-center justify-center gap-2"><i class="fas fa-paper-plane text-xs"></i> <span>Invia Ticket</span></button>
        </div>
    </footer>

    <div id="loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[999] hidden flex items-center justify-center"><div class="spinner"></div></div>

    <script>
        'use strict';
        const tg = window.Telegram.WebApp;
        if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#ffffff'); tg.expand(); tg.ready();
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');
        const dom = { dept:byId('department'), prior:byId('priority'), msg:byId('messageInput'), file:byId('fileInput'), privacy:byId('privacyCheck'), btn:byId('sendBtn'), loader:byId('loader'), uploadUI:byId('uploadUI'), previewUI:byId('filePreviewUI'), fileName:byId('fileName') };
        let sF = null; function byId(id){ return document.getElementById(id); }

        function validateForm() { dom.btn.disabled = !(dom.msg.value.trim().length >= 10 && dom.privacy.checked); }
        function handleFileSelect(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (x) => { sF = x.target.result.split(',')[1]; dom.uploadUI.classList.add('hidden'); dom.previewUI.classList.remove('hidden'); dom.fileName.innerText = f.name; };
            r.readAsDataURL(f);
        }
        function removeFile(e) { e.stopPropagation(); sF = null; dom.file.value = ''; dom.previewUI.classList.add('hidden'); dom.uploadUI.classList.remove('hidden'); }

        dom.btn.onclick = async () => {
            dom.btn.disabled = true; dom.loader.classList.remove('hidden');
            const p = { _auth: tg.initData, action: "submit_ticket", ash: ash, ticket_data: { department: dom.dept.value, priority: dom.prior.value, message: dom.msg.value.trim(), attachment: sF }, timestamp: new Date().toISOString() };
            try {
                const r = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p) });
                if (r.ok) { if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); tg.close(); } else throw 0;
            } catch (err) { dom.loader.classList.add('hidden'); dom.btn.disabled = false; tg.showAlert("Errore."); }
        };
    </script>
</body>
</html>
