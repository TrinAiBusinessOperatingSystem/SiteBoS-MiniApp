<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Support Ticket | SiteBoS</title>
    
    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' } } }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Checkbox Custom Black */
        input[type="checkbox"] {
            appearance: none; width: 22px; height: 22px; border: 2px solid #000; border-radius: 6px;
            position: relative; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after {
            content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            color: white; font-size: 11px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>

    <script>
        // ── SICUREZZA ──
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase tracking-widest">Accesso Negato</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="bg-bg text-black min-h-screen flex flex-col pb-24 overflow-x-hidden">

    <!-- HEADER -->
    <header class="bg-white border-b border-border p-6 sticky top-0 z-50 shadow-sm flex items-center gap-4">
        <div class="w-12 h-12 bg-black text-white rounded-2xl flex items-center justify-center text-xl shadow-lg">
            <i class="fas fa-ticket-alt"></i>
        </div>
        <div>
            <h1 class="text-xl font-black tracking-tighter uppercase leading-none">Support Center</h1>
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">Apertura Ticket Assistenza</p>
        </div>
    </header>

    <main class="flex-1 p-6 space-y-8">
        
        <!-- SELEZIONE REPARTO E URGENZA -->
        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-1">
                <label class="text-[9px] font-black uppercase text-gray-400 ml-2">Reparto</label>
                <select id="department" class="w-full bg-white p-4 rounded-2xl text-xs font-bold border border-border outline-none transition-all focus:border-black">
                    <option value="Tecnico">Supporto Tecnico</option>
                    <option value="Amministrazione">Amministrazione</option>
                    <option value="Commerciale">Commerciale</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-black uppercase text-gray-400 ml-2">Urgenza</label>
                <select id="priority" class="w-full bg-white p-4 rounded-2xl text-xs font-bold border border-border outline-none transition-all focus:border-black">
                    <option value="Bassa">Bassa</option>
                    <option value="Media" selected>Media</option>
                    <option value="Alta">Alta 🔥</option>
                </select>
            </div>
        </div>

        <!-- DESCRIZIONE -->
        <div class="space-y-1">
            <label class="text-[9px] font-black uppercase text-gray-400 ml-2 tracking-widest">Descrizione Problema</label>
            <textarea id="messageInput" rows="6" oninput="validateForm()"
                class="w-full bg-white p-6 rounded-[2rem] text-sm font-medium border border-border outline-none transition-all resize-none leading-relaxed shadow-sm"
                placeholder="Spiega dettagliatamente la tua richiesta (min. 10 caratteri)..."></textarea>
        </div>

        <!-- ALLEGATO -->
        <div class="space-y-3">
            <span class="text-[9px] font-black uppercase text-gray-400 ml-2 italic">Allegato (Opzionale)</span>
            <div id="uploadBox" onclick="document.getElementById('fileInput').click()" 
                class="w-full border-2 border-dashed border-gray-200 bg-white rounded-[2rem] py-10 flex flex-col items-center justify-center cursor-pointer hover:border-black transition-all group">
                <div id="uploadUI" class="text-center">
                    <i class="fas fa-camera text-2xl text-gray-200 group-hover:text-black mb-2 transition-colors"></i>
                    <p class="text-[9px] font-black uppercase text-gray-400 group-hover:text-black leading-none tracking-widest">Foto o PDF</p>
                </div>
                <div id="filePreviewUI" class="hidden text-center">
                    <i class="fas fa-file-circle-check text-2xl text-black mb-2"></i>
                    <p id="fileName" class="text-[10px] font-black text-black truncate max-w-[200px] uppercase"></p>
                    <button onclick="removeFile(event)" class="text-[8px] font-black uppercase text-red-500 mt-2 tracking-tighter">Rimuovi</button>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" accept=".pdf,image/jpeg,image/png" onchange="handleFileSelect(event)">
        </div>

        <!-- PRIVACY BARRIER -->
        <div class="bg-white rounded-[2rem] p-6 border border-border shadow-sm flex items-start gap-4 transition-all">
            <input type="checkbox" id="privacyCheck" onchange="validateForm()">
            <label for="privacyCheck" class="flex-1 cursor-pointer">
                <p class="text-[10px] font-black uppercase text-black leading-tight">Accetto i Termini e la Privacy Policy</p>
                <p class="text-[9px] text-gray-400 font-medium mt-1 leading-relaxed">
                    Ho letto l'informativa su <a href="legal.html" class="underline text-black font-bold">legal.html</a> e acconsento al trattamento dei dati.
                </p>
            </label>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="fixed bottom-8 left-0 w-full px-6 flex items-center justify-between z-[100] gap-4">
        <button onclick="tg.close()" class="w-16 h-16 bg-white text-black rounded-full shadow-md flex items-center justify-center text-xl border border-border active:scale-90 transition">
            <i class="fas fa-times"></i>
        </button>
        <button id="sendBtn" disabled class="flex-1 h-16 bg-black text-white rounded-full shadow-2xl font-black uppercase tracking-[0.2em] text-[11px] active:scale-95 transition-all disabled:opacity-10 flex items-center justify-center gap-3">
            <i class="fas fa-paper-plane text-sm"></i> <span id="btnText">Invia Ticket</span>
        </button>
    </footer>

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[999] hidden flex items-center justify-center">
        <div class="spinner"></div>
    </div>

    <script>
        'use strict';
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const ash = urlParams.get('ash');

        const dom = {
            dept: document.getElementById('department'),
            prior: document.getElementById('priority'),
            msg: document.getElementById('messageInput'),
            file: document.getElementById('fileInput'),
            privacy: document.getElementById('privacyCheck'),
            btn: document.getElementById('sendBtn'),
            btnTxt: document.getElementById('btnText'),
            loader: document.getElementById('loader'),
            uploadUI: document.getElementById('uploadUI'),
            previewUI: document.getElementById('filePreviewUI'),
            fileName: document.getElementById('fileName')
        };

        let selectedFile = null;

        function validateForm() {
            const isMsgValid = dom.msg.value.trim().length >= 10;
            const isPrivacyAccepted = dom.privacy.checked;
            dom.btn.disabled = !(isMsgValid && isPrivacyAccepted);
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) { tg.showAlert("File troppo grande (Max 10MB)"); return; }
            
            const reader = new FileReader();
            reader.onload = (event) => {
                selectedFile = event.target.result.split(',')[1];
                dom.uploadUI.classList.add('hidden');
                dom.previewUI.classList.remove('hidden');
                dom.fileName.innerText = file.name;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            };
            reader.readAsDataURL(file);
        }

        function removeFile(e) {
            e.stopPropagation();
            selectedFile = null; dom.file.value = '';
            dom.previewUI.classList.add('hidden'); dom.uploadUI.classList.remove('hidden');
        }

        dom.btn.onclick = async () => {
            dom.btn.disabled = true;
            dom.loader.classList.remove('hidden');
            dom.btnTxt.innerText = "TRASMISSIONE...";

            const payload = {
                _auth: tg.initData,
                action: "submit_ticket",
                ash: ash,
                ticket_data: {
                    department: dom.dept.value,
                    priority: dom.prior.value,
                    message: dom.msg.value.trim(),
                    attachment: selectedFile
                },
                privacy_accepted: true,
                timestamp: new Date().toISOString()
            };

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    dom.btn.className = "flex-1 h-16 bg-green-600 text-white rounded-full shadow-2xl font-black uppercase text-[11px] flex items-center justify-center gap-3 transition-all";
                    dom.btnTxt.innerText = "TICKET APERTO!";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tg.close(), 1500);
                } else throw new Error();
            } catch (err) {
                dom.loader.classList.add('hidden');
                dom.btn.disabled = false;
                dom.btnTxt.innerText = "RIPROVA INVIO";
                tg.showAlert("Errore durante l'apertura del ticket.");
            }
        };
    </script>
</body>
</html>
