<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="color-scheme" content="light">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SiteBoS | Receipt Viewer</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
(function() {
    // Riferimento locale e temporaneo all'SDK per il controllo iniziale
    const tempTg = window.Telegram?.WebApp;
    const isTelegramSession = tempTg && tempTg.initData && tempTg.initData !== "" && tempTg.platform !== "unknown";

    if (!isTelegramSession) {
        const currentPath = window.location.pathname;
        let redirectPath = "index.html";

        if (currentPath.includes('/telegram_control/')) {
            const parts = currentPath.split('/telegram_control/');
            const subPath = parts[1] || '';
            if (subPath.includes('/')) {
                redirectPath = "../../index.html";
            } else {
                redirectPath = "../index.html";
            }
        }

        window.location.replace(redirectPath);
    }
})();

        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#ffffff', border: '#eeeeee' },
                    fontFamily: { mono: ['JetBrains Mono', 'monospace'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>

.card, .section-card, .dark-card, .upload-box { 
    background: white !important;

}

}

.border-primary, .border-black, .border-blue-600, .border-black { border-color: #000000 !important; }

/* Forza icone pesanti */

        body { font-family: 'Inter', sans-serif; background-color: #f5f5f5; color: #000000; -webkit-tap-highlight-color: transparent; }
        .receipt-paper { background: white; width: 100%; max-width: 400px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); min-height: 100vh; position: relative; padding-bottom: 350px; }
        .dotted-line { border-top: 2px dotted #000; width: 100%; height: 1px; margin: 15px 0; }
        
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .receipt-paper { box-shadow: none; max-width: 100%; margin: 0; padding: 10mm; padding-bottom: 0; }
            .no-print { display: none !important; }
            .safe-area-inset { padding: 0 !important; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease forwards; }


    </style>
</head>
<body class="safe-area-inset min-h-screen">

    <div id="loader" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-10 text-center transition-opacity duration-300">
        <div class="w-10 h-10 border-2 border-gray-100 border-t-black rounded-full animate-spin mb-4"></div>
        <p class="text-[8px] font-black uppercase tracking-[0.3em] text-gray-300">Recupero Ordine...</p>
    </div>

    <!-- UI CONTROLS (Floating) -->
    <div class="no-print fixed top-5 left-5 right-5 flex justify-between items-center z-50">
        <button onclick="tg.close()" class="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center shadow-sm active:scale-90 transition">
            <i class="fas fa-times"></i>
        </button>
        <button onclick="window.print()" id="btn-print" class="hidden h-10 px-5 bg-black text-white rounded-full flex items-center justify-center gap-2 shadow-sm active:scale-90 transition font-black text-[10px] uppercase tracking-widest">
            <i class="fas fa-print"></i> Stampa
        </button>
    </div>

    <main class="receipt-paper p-8 pt-24 flex flex-col items-center animate-in overflow-hidden" id="receipt-content">
        <!-- HEADER -->
        <div class="text-center space-y-2 mb-6">
            <div id="brand-logo" class="w-16 h-16 bg-black rounded-2xl mx-auto flex items-center justify-center text-black mb-2 overflow-hidden">
                <i class="fas fa-shopping-bag text-2xl"></i>
            </div>
            <h1 id="brand-name" class="font-black text-xl uppercase tracking-tighter leading-none">SiteBoS Store</h1>
            <p id="order-id" class="font-mono text-[10px] text-gray-500 uppercase font-bold"></p>
            <p id="order-date" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest"></p>
            <div id="order-status-badge" class="inline-block px-3 py-1 bg-gray-100 rounded-full text-[8px] font-black uppercase tracking-widest mt-2 text-gray-500">RECUPERO STATO...</div>
        </div>

        <div class="dotted-line"></div>

        <!-- CUSTOMER SECTION -->
        <div class="w-full space-y-4 mb-6 text-left">
            <div class="space-y-1">
                <span class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-300">Destinatario</span>
                <p id="customer-info" class="font-black text-sm uppercase"></p>
            </div>
            <div class="space-y-2">
                <span class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-300">Consegna</span>
                <p id="customer-address" class="text-xs font-bold leading-tight"></p>
                <div id="gps-box" class="bg-gray-50 p-2 rounded-lg border border-gray-100 hidden">
                    <span class="text-[7px] font-black uppercase text-gray-500 block mb-0.5">Posizione GPS (Rilevata)</span>
                    <p id="gps-display-name" class="text-[9px] font-medium text-gray-500 italic leading-tight"></p>
                    <p class="text-[6px] font-bold text-amber-500 uppercase mt-1 leading-none italic">* La posizione rilevata potrebbe non essere precisa</p>
                </div>
                <div id="maps-link-container" class="mt-2">
                    <a id="maps-url" href="" target="_blank" class="text-[9px] font-black uppercase text-blue-600 flex items-center gap-1">
                        <i class="fas fa-map-marker-alt"></i> Calcola Percorso (Maps)
                    </a>
                </div>
            </div>
        </div>

        <div class="dotted-line"></div>

        <!-- ITEMS SECTION -->
        <div class="w-full space-y-5 mb-8">
            <span class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-300 block mb-2">Dettaglio Ordine</span>
            <div id="items-list" class="space-y-6">
                <!-- Items injected here -->
            </div>
        </div>

        <div class="dotted-line border-gray-100"></div>

        <!-- TOTAL SECTION -->
        <div class="w-full space-y-4 py-6">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-gray-500">Metodo Pagamento</span>
                <span id="payment-mode" class="text-[10px] font-black uppercase tracking-tight"></span>
            </div>
            <div class="flex justify-between items-end border-t-2 border-black pt-6 pb-4">
                <span class="text-xs font-black uppercase tracking-widest">Totale Finale</span>
                <span id="order-total" class="text-3xl font-black tracking-tighter"></span>
            </div>
        </div>

        <div class="dotted-line"></div>

        <!-- FOOTER -->
        <div class="text-center mt-4 pb-10">
            <p class="text-[8px] font-black uppercase text-gray-300 tracking-[0.3em]">SiteBoS Intelligence Engine</p>
        </div>
        
        <!-- SPACER PER SCROLL SOPRA PANNELLO EVASIONE -->
        <div class="h-32 no-print"></div>
    </main>

    <!-- EVASION PANEL (Owner Only) -->
    <div id="evade-panel" class="no-print fixed bottom-0 left-0 right-0 p-5 bg-white/95 backdrop-blur-md border-t border-gray-100 z-50 transform translate-y-full transition-transform duration-300 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-[9px] font-black uppercase tracking-widest text-gray-500">Tempo di Consegna</h3>
                <span id="selected-time-display" class="text-[10px] font-black text-black">Seleziona...</span>
            </div>
            
            <div class="flex gap-2">
                <select id="time-presets" onchange="updateFromPreset(this.value)" class="flex-1 h-12 px-3 border-2 border-gray-100 rounded-2xl text-[10px] font-black outline-none focus:border-black bg-white">
                    <option value="">Rapidi...</option>
                    <option value="Al più presto">Al più presto</option>
                    <option value="15 minuti">15 min</option>
                    <option value="30 minuti">30 min</option>
                    <option value="45 minuti">45 min</option>
                    <option value="60 minuti">60 min</option>
                    <option value="Da definire">Indefinito</option>
                </select>
                <div class="flex-[2] relative">
                    <input type="text" id="delivery-time-input" placeholder="Specifica tempo o note..." oninput="setTime(this.value)" class="w-full h-12 px-4 border-2 border-gray-100 rounded-2xl text-[10px] font-bold focus:border-black outline-none bg-white">
                    <i class="fas fa-edit absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none text-[10px]"></i>
                </div>
            </div>

            <button onclick="evadeOrder()" id="btn-evade" disabled class="w-full h-12 bg-gray-100 text-gray-500 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3">
                <span>Conferma ed Evadi</span><i class="fas fa-paper-plane text-[10px]"></i>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#ffffff');
        tg.expand();
        tg.ready();

        const WH_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const params = new URLSearchParams(window.location.search);
        const orderSessionId = params.get('session_id');
        const ashToken = params.get('ash');

        let currentOrder = null, selectedTime = null;

        window.onload = async () => {
            if (!orderSessionId) { renderError("ID Ordine mancante."); return; }
            await fetchOrder();
        };

        async function fetchOrder() {
            try {
                const res = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_get_order', session_id: orderSessionId })
                });
                const r = await res.json();
                if (r.success && r.order_data) {
                    currentOrder = r.order_data;
                    renderUI(r.order_data, r.brand || {});
                    hideLoader();
                } else { renderError("Ordine non trovato."); }
            } catch (e) { renderError("Connessione fallita."); }
        }

        function updateFromPreset(val) {
            if (!val) return;
            const input = document.getElementById('delivery-time-input');
            input.value = val;
            setTime(val);
        }

        function setTime(val) {
            selectedTime = val;
            const display = document.getElementById('selected-time-display');
            const btn = document.getElementById('btn-evade');
            
            if (!val || val.trim() === "") {
                display.innerText = "Seleziona...";
                btn.disabled = true;
                btn.classList.add('bg-gray-100', 'text-gray-500');
                btn.classList.remove('bg-black', 'text-black');
                return;
            }

            display.innerText = val;
            btn.disabled = false;
            btn.classList.remove('bg-gray-100', 'text-gray-500');
            btn.classList.add('bg-black', 'text-black');
        }

        async function evadeOrder() {
            if (!selectedTime || !currentOrder) return;
            const btn = document.getElementById('btn-evade');
            btn.disabled = true; btn.innerText = "Invio...";
            
            try {
                const res = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        _auth: tg.initData, ash: ashToken, action: 'u_calc_evade_order', 
                        session_id: orderSessionId, 
                        evasion_data: { delivery_time: selectedTime, status: 'CONFIRMED', timestamp: new Date().toISOString() } 
                    })
                });
                const r = await res.json();
                if (r.success) {
                    tg.showAlert("✅ Ordine confermato! Il cliente è stato avvisato.");
                    document.getElementById('evade-panel').classList.add('translate-y-full');
                    document.getElementById('order-status-badge').innerText = "CONFERMATO";
                    document.getElementById('order-status-badge').className = "inline-block px-3 py-1 bg-green-500 rounded-full text-[8px] font-black uppercase tracking-widest mt-2 text-black";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    window.print(); // Stampa automatica dopo conferma
                } else { tg.showAlert("Errore durante l'evasione."); btn.disabled = false; btn.innerText = "Riprova"; }
            } catch (e) { tg.showAlert("Errore connessione."); btn.disabled = false; btn.innerText = "Riprova"; }
        }

        function hideLoader() { 
            const l = document.getElementById('loader');
            l.classList.add('opacity-0');
            setTimeout(() => {
                l.classList.add('hidden');
                document.getElementById('btn-print').classList.remove('hidden');
                if (currentOrder?.order_info?.status === 'PENDING' || !currentOrder?.order_info?.status) {
                    document.getElementById('evade-panel').classList.remove('translate-y-full');
                }
            }, 300);
        }

        function renderError(msg) {
            document.getElementById('loader').innerHTML = `<div class="text-center p-10"><h1 class="text-4xl mb-4">❌</h1><h2 class="text-sm font-black uppercase tracking-widest text-red-500">${msg}</h2><button onclick="tg.close()" class="mt-6 px-6 py-2 bg-black text-white rounded-full text-xs font-black uppercase">Chiudi</button></div>`;
        }

        function renderUI(order, brand) {
            const info = order.order_info || order;
            const customer = order.customer || {};
            const items = order.items || [];

            if (brand.logo) { document.getElementById('brand-logo').innerHTML = `<img src="${brand.logo}" class="w-full h-full object-cover">`; }
            document.getElementById('brand-name').innerText = brand.name || "SiteBoS Store";
            document.getElementById('order-id').innerText = `ID: ${info.order_id || orderSessionId.split('_').pop()}`;
            document.getElementById('order-date').innerText = new Date(info.timestamp || Date.now()).toLocaleString('it-IT', { dateStyle: 'medium', timeStyle: 'short' });
            
            const badge = document.getElementById('order-status-badge');
            const status = (info.status || 'PENDING').toUpperCase();
            badge.innerText = status;
            if (status === 'CONFIRMED') badge.className = "inline-block px-3 py-1 bg-green-500 rounded-full text-[8px] font-black uppercase tracking-widest mt-2 text-black";
            else if (status === 'PENDING') badge.className = "inline-block px-3 py-1 bg-amber-400 rounded-full text-[8px] font-black uppercase tracking-widest mt-2 text-black";

            // Sezione Destinatario Avanzata (Struttura stakeholder.user_ref)
            const nomeCompleto = `${customer.nome || ''} ${customer.cognome || ''}`.trim();
            let customerHtml = `<span class="text-sm font-black uppercase">${nomeCompleto || 'Cliente'}</span>`;
            if (customer.telefono) customerHtml += `<br><a href="tel:${customer.telefono}" class="text-[10px] font-bold text-blue-600"><i class="fas fa-phone-alt mr-1"></i> ${customer.telefono}</a>`;
            if (customer.email) customerHtml += `<br><span class="text-[9px] font-medium text-gray-500">${customer.email}</span>`;
            document.getElementById('customer-info').innerHTML = customerHtml;

            document.getElementById('customer-address').innerText = order.address || "Ritiro in sede";
            
            // Gestione Nuova Struttura Location (Display Name)
            if (order.location?.display_name) {
                document.getElementById('gps-box').classList.remove('hidden');
                document.getElementById('gps-display-name').innerText = order.location.display_name;
            }

            // Link a Google Maps basato sull'indirizzo testuale di consegna
            if (order.address && order.address !== "Ritiro in sede") {
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(order.address)}`;
                document.getElementById('maps-url').href = mapsUrl;
            } else {
                document.getElementById('maps-link-container').classList.add('hidden');
            }

            document.getElementById('payment-mode').innerText = order.payment_mode === 'CARD' ? 'Carta di Credito' : 'Pagamento alla Consegna';
            document.getElementById('order-total').innerText = `€ ${parseFloat(order.total_amount || 0).toFixed(2)}`;

            const list = document.getElementById('items-list');
            list.innerHTML = items.map(i => {
                const extras = i.selected_extras || [];
                const extrasHtml = extras.length > 0 ? `<div class="mt-1 pl-2 border-l-2 border-gray-100 space-y-0.5">${extras.map(e => `<p class="text-[9px] font-bold text-gray-500 uppercase">+ ${e.name} (€${parseFloat(e.price).toFixed(2)})</p>`).join('')}</div>` : '';
                const noteHtml = i.customer_note ? `<div class="mt-2 p-2 bg-gray-50 rounded text-[9px] font-medium italic text-gray-500">Nota: ${i.customer_note}</div>` : '';
                return `<div class="space-y-1"><div class="flex justify-between items-start gap-4"><div class="flex-1"><h3 class="font-black text-[12px] uppercase leading-tight">${i.quantity}x ${i.name}</h3>${extrasHtml}${noteHtml}</div><span class="font-mono text-[11px] font-bold">€${parseFloat(i.final_price || i.price).toFixed(2)}</span></div></div>`;
            }).join('');
        }
    </script>
</body>
</html>

    <!-- User Guide and Audio Guide Integration Engine -->
    <script>
    (function() {
        if (document.getElementById('userguide-drawer-overlay')) return;

        // 1. Determine HTML filename to play the correct WAV file
        const pathParts = window.location.pathname.split('/');
        const pageName = pathParts[pathParts.length - 1] || 'index.html';
        const baseName = pageName.replace('.html', '');
        
        let audioSrc = baseName + '.wav';
        if (baseName === 'add-product') audioSrc = 'catalog_add-product.wav';
        if (baseName === 'edit-product') audioSrc = 'catalog_edit-product.wav';

        // 2. Determine corresponding userguide page
        let guidePage = 'userguide/index.html';
        if (window.location.pathname.includes('/gestione/')) {
            guidePage = 'userguide/03_catalog.html';
        } else if (window.location.pathname.includes('/identity/')) {
            guidePage = 'userguide/02_onboarding.html';
        } else if (window.location.pathname.includes('/agents/')) {
            if (baseName.includes('controllo')) guidePage = 'userguide/09_controllo_gestione.html';
            else if (baseName.includes('sicurezza')) guidePage = 'userguide/11_agente_sicurezza.html';
            else guidePage = 'userguide/01_intro.html';
        } else {
            if (baseName === 'agenda') guidePage = 'userguide/10_agenda_radar.html';
            else if (baseName === 'certificator') guidePage = 'userguide/07_certificator.html';
            else if (baseName === 'ecommerce') guidePage = 'userguide/04_online.html';
            else if (baseName === 'preventivi') guidePage = 'userguide/09_controllo_gestione.html';
        }

        // Calculate relative path depth
        const tcIndex = window.location.pathname.indexOf('/telegram_control/');
        let rootPath = '';
        if (tcIndex !== -1) {
            const subPath = window.location.pathname.substring(tcIndex + '/telegram_control/'.length);
            const slashCount = (subPath.match(/\//g) || []).length;
            rootPath = '../'.repeat(slashCount);
        }
        
        const finalGuideUrl = rootPath + guidePage;
        const finalAudioUrl = audioSrc;

        // 3. Inject Font Awesome stylesheet if missing
        if (!document.querySelector('link[href*="font-awesome"]') && !document.querySelector('link[href*="all.min.css"]')) {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
            document.head.appendChild(link);
        }

        // 4. Inject Drawer HTML structure into Body
        const drawerHtml = `
        <div id="userguide-drawer-overlay" class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-[99] hidden opacity-0 transition-opacity duration-300" onclick="closeUserGuide()">
            <div id="userguide-drawer" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-[85vh] bg-white rounded-t-3xl border-t border-slate-200 shadow-2xl flex flex-col translate-y-full transition-transform duration-300" onclick="event.stopPropagation()">
                <div class="w-full flex items-center justify-between p-4 border-b border-slate-100 shrink-0 select-none">
                    <div class="flex items-center gap-2">
                        <div class="w-2.5 h-2.5 rounded-full bg-blue-600 animate-pulse"></div>
                        <span class="text-xs font-black uppercase tracking-widest text-slate-800">Guida Utente</span>
                    </div>
                    <button onclick="closeUserGuide()" class="w-8 h-8 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-100 active:scale-90 transition">
                        <i class="fas fa-times text-xs"></i>
                    </button>
                </div>
                <div class="flex-1 w-full overflow-hidden bg-slate-50 relative">
                    <iframe id="userguide-iframe" class="w-full h-full border-none" src=""></iframe>
                </div>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', drawerHtml);

        // 5. Inject Globe and Volume Buttons
        const header = document.querySelector('header');
        let buttonContainer = null;
        if (header) {
            buttonContainer = header.querySelector('.flex.gap-2') || header.querySelector('.flex.items-center.gap-2') || header.querySelector('.flex.gap-3');
        }

        const btnHtml = `
        <!-- User Guide Button -->
        <button id="btn-nav-guide" onclick="openUserGuide('${finalGuideUrl}')" class="w-10 h-10 bg-white border border-gray-200 rounded-2xl flex items-center justify-center text-slate-500 shadow-sm active:scale-90 transition shrink-0" title="Manuale Utente">
            <i class="fas fa-globe text-xs"></i>
        </button>
        <!-- Speech Audio Button -->
        <button id="btn-nav-audio" onclick="toggleAudio()" class="w-10 h-10 bg-white border border-gray-200 rounded-2xl flex items-center justify-center text-slate-500 shadow-sm active:scale-90 transition shrink-0" title="Guida Vocale">
            <i class="fas fa-volume-high text-xs"></i>
        </button>`;

        if (buttonContainer) {
            buttonContainer.insertAdjacentHTML('afterbegin', btnHtml);
        } else if (header) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex gap-2 items-center';
            wrapper.innerHTML = btnHtml;
            header.appendChild(wrapper);
        } else {
            const floatingDiv = document.createElement('div');
            floatingDiv.className = 'fixed top-4 right-4 flex gap-2 z-50';
            floatingDiv.innerHTML = btnHtml;
            document.body.appendChild(floatingDiv);
        }

        // 6. Action Functions (Drawer & Audio)
        let voiceAudio = null;
        let isAudioPlaying = false;

        window.openUserGuide = function(url) {
            const overlay = document.getElementById('userguide-drawer-overlay');
            const drawer = document.getElementById('userguide-drawer');
            const iframe = document.getElementById('userguide-iframe');
            if (!overlay || !drawer || !iframe) return;

            window.stopAudio();
            
            iframe.src = url;
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                drawer.classList.remove('translate-y-full');
            }, 10);
        };

        window.closeUserGuide = function() {
            const overlay = document.getElementById('userguide-drawer-overlay');
            const drawer = document.getElementById('userguide-drawer');
            if (!overlay || !drawer) return;

            overlay.classList.add('opacity-0');
            drawer.classList.add('translate-y-full');
            setTimeout(() => {
                overlay.classList.add('hidden');
                document.getElementById('userguide-iframe').src = "";
            }, 300);
        };

        window.stopAudio = function() {
            if (isAudioPlaying && voiceAudio) {
                voiceAudio.pause();
                voiceAudio.currentTime = 0;
            }
            isAudioPlaying = false;
            voiceAudio = null;
            const btn = document.getElementById('btn-nav-audio');
            const icon = btn ? btn.querySelector('i') : null;
            if (icon) {
                icon.className = 'fas fa-volume-high text-xs';
            }
            if (btn) {
                btn.classList.remove('bg-black', 'text-white', 'border-black');
                btn.classList.add('bg-white', 'text-slate-500', 'border-gray-200');
            }
        };

        window.toggleAudio = function() {
            const btn = document.getElementById('btn-nav-audio');
            const icon = btn ? btn.querySelector('i') : null;

            if (!voiceAudio) {
                voiceAudio = new Audio(finalAudioUrl);
                voiceAudio.addEventListener('ended', () => {
                    isAudioPlaying = false;
                    voiceAudio.currentTime = 0;
                    if (icon) {
                        icon.className = 'fas fa-volume-high text-xs';
                        btn.classList.remove('bg-black', 'text-white', 'border-black');
                        btn.classList.add('bg-white', 'text-slate-500', 'border-gray-200');
                    }
                });
            }

            if (isAudioPlaying) {
                window.stopAudio();
            } else {
                voiceAudio.play().then(() => {
                    isAudioPlaying = true;
                    if (icon) {
                        icon.className = 'fas fa-stop text-xs';
                        btn.classList.remove('bg-white', 'text-slate-500', 'border-gray-200');
                        btn.classList.add('bg-black', 'text-white', 'border-black');
                    }
                }).catch(err => {
                    console.error("Errore riproduzione audio:", err);
                });
            }
        };
    })();
    </script>
</body>
</html>
