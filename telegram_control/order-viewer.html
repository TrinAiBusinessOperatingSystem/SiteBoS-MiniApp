<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SiteBoS | Receipt Viewer</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#ffffff', border: '#eeeeee' },
                    fontFamily: { mono: ['JetBrains Mono', 'monospace'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f5; color: #000000; -webkit-tap-highlight-color: transparent; }
        .receipt-paper { background: white; width: 100%; max-width: 400px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); min-height: 100vh; position: relative; padding-bottom: 250px; }
        .dotted-line { border-top: 2px dotted #000; width: 100%; height: 1px; margin: 15px 0; }
        
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .receipt-paper { box-shadow: none; max-width: 100%; margin: 0; padding: 10mm; padding-bottom: 0; }
            .no-print { display: none !important; }
            .safe-area-inset { padding: 0 !important; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease forwards; }

        .time-btn.active { background-color: #000; color: #fff; border-color: #000; }
    </style>
</head>
<body class="safe-area-inset min-h-screen">

    <div id="loader" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-10 text-center transition-opacity duration-300">
        <div class="w-10 h-10 border-2 border-gray-100 border-t-black rounded-full animate-spin mb-4"></div>
        <p class="text-[8px] font-black uppercase tracking-[0.3em] text-gray-300">Recupero Ordine...</p>
    </div>

    <!-- UI CONTROLS (Floating) -->
    <div class="no-print fixed top-5 left-5 right-5 flex justify-between items-center z-50">
        <button onclick="tg.close()" class="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
            <i class="fas fa-times"></i>
        </button>
        <button onclick="window.print()" id="btn-print" class="hidden h-10 px-5 bg-black text-white rounded-full flex items-center justify-center gap-2 shadow-lg active:scale-90 transition font-black text-[10px] uppercase tracking-widest">
            <i class="fas fa-print"></i> Stampa
        </button>
    </div>

    <main class="receipt-paper p-8 pt-24 flex flex-col items-center animate-in overflow-hidden" id="receipt-content">
        <!-- HEADER -->
        <div class="text-center space-y-2 mb-6">
            <div id="brand-logo" class="w-16 h-16 bg-black rounded-2xl mx-auto flex items-center justify-center text-white mb-2 overflow-hidden">
                <i class="fas fa-shopping-bag text-2xl"></i>
            </div>
            <h1 id="brand-name" class="font-black text-xl uppercase tracking-tighter leading-none">SiteBoS Store</h1>
            <p id="order-id" class="font-mono text-[10px] text-gray-400 uppercase font-bold"></p>
            <p id="order-date" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest"></p>
            <div id="order-status-badge" class="inline-block px-3 py-1 bg-gray-100 rounded-full text-[8px] font-black uppercase tracking-widest mt-2 text-gray-400">RECUPERO STATO...</div>
        </div>

        <div class="dotted-line"></div>

        <!-- CUSTOMER SECTION -->
        <div class="w-full space-y-4 mb-6 text-left">
            <div class="space-y-1">
                <span class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-300">Destinatario</span>
                <p id="customer-info" class="font-black text-sm uppercase"></p>
            </div>
            <div class="space-y-1">
                <span class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-300">Indirizzo Consegna</span>
                <p id="customer-address" class="text-xs font-bold leading-tight"></p>
                <div id="gps-link" class="mt-2 hidden">
                    <a href="" target="_blank" class="text-[9px] font-black uppercase text-blue-600 flex items-center gap-1">
                        <i class="fas fa-map-marker-alt"></i> Apri su Maps
                    </a>
                </div>
            </div>
        </div>

        <div class="dotted-line"></div>

        <!-- ITEMS SECTION -->
        <div class="w-full space-y-5 mb-8">
            <span class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-300 block mb-2">Dettaglio Ordine</span>
            <div id="items-list" class="space-y-6">
                <!-- Items injected here -->
            </div>
        </div>

        <div class="dotted-line border-gray-100"></div>

        <!-- TOTAL SECTION -->
        <div class="w-full space-y-4 py-6">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-gray-400">Metodo Pagamento</span>
                <span id="payment-mode" class="text-[10px] font-black uppercase tracking-tight"></span>
            </div>
            <div class="flex justify-between items-end border-t-2 border-black pt-6 pb-4">
                <span class="text-xs font-black uppercase tracking-widest">Totale Finale</span>
                <span id="order-total" class="text-3xl font-black tracking-tighter"></span>
            </div>
        </div>

        <div class="dotted-line"></div>

        <!-- FOOTER -->
        <div class="text-center mt-4 pb-10">
            <p class="text-[8px] font-black uppercase text-gray-300 tracking-[0.3em]">SiteBoS Intelligence Engine</p>
        </div>
    </main>

    <!-- EVASION PANEL (Owner Only) -->
    <div id="evade-panel" class="no-print fixed bottom-0 left-0 right-0 p-5 bg-white/95 backdrop-blur-md border-t border-gray-100 z-50 transform translate-y-full transition-transform duration-300 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-[9px] font-black uppercase tracking-widest text-gray-400">Tempo di Consegna</h3>
                <span id="selected-time-display" class="text-[10px] font-black text-black">Seleziona...</span>
            </div>
            <div class="grid grid-cols-4 gap-2">
                <button onclick="setTime(15)" class="time-btn h-10 border-2 border-gray-100 rounded-xl text-[10px] font-black transition-all active:scale-95">15'</button>
                <button onclick="setTime(30)" class="time-btn h-10 border-2 border-gray-100 rounded-xl text-[10px] font-black transition-all active:scale-95">30'</button>
                <button onclick="setTime(45)" class="time-btn h-10 border-2 border-gray-100 rounded-xl text-[10px] font-black transition-all active:scale-95">45'</button>
                <button onclick="setTime(60)" class="time-btn h-10 border-2 border-gray-100 rounded-xl text-[10px] font-black transition-all active:scale-95">60'</button>
            </div>
            <button onclick="evadeOrder()" id="btn-evade" disabled class="w-full h-12 bg-gray-100 text-gray-400 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3">
                <span>Conferma ed Evadi</span><i class="fas fa-paper-plane text-[10px]"></i>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const WH_URL = "https://prod.workflow.trinai.it/webhook/8eb69e84-d20d-486e-a70e-9acf31c3da9e";
        const params = new URLSearchParams(window.location.search);
        const orderSessionId = params.get('session_id');
        const ashToken = params.get('ash');

        let currentOrder = null, selectedTime = null;

        window.onload = async () => {
            if (!orderSessionId) { renderError("ID Ordine mancante."); return; }
            await fetchOrder();
        };

        async function fetchOrder() {
            try {
                const res = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, ash: ashToken, action: 'u_calc_get_order', session_id: orderSessionId })
                });
                const r = await res.json();
                if (r.success && r.order_data) {
                    currentOrder = r.order_data;
                    renderUI(r.order_data, r.brand || {});
                    hideLoader();
                } else { renderError("Ordine non trovato."); }
            } catch (e) { renderError("Connessione fallita."); }
        }

        function setTime(mins) {
            selectedTime = mins;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.toggle('active', parseInt(b.innerText) === mins));
            document.getElementById('selected-time-display').innerText = `Consegna in ${mins} minuti`;
            const btn = document.getElementById('btn-evade');
            btn.disabled = false;
            btn.classList.remove('bg-gray-100', 'text-gray-400');
            btn.classList.add('bg-black', 'text-white');
        }

        async function evadeOrder() {
            if (!selectedTime || !currentOrder) return;
            const btn = document.getElementById('btn-evade');
            btn.disabled = true; btn.innerText = "Invio...";
            
            try {
                const res = await fetch(WH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        _auth: tg.initData, ash: ashToken, action: 'u_calc_evade_order', 
                        session_id: orderSessionId, 
                        evasion_data: { delivery_time: selectedTime, status: 'CONFIRMED', timestamp: new Date().toISOString() } 
                    })
                });
                const r = await res.json();
                if (r.success) {
                    tg.showAlert("✅ Ordine confermato! Il cliente è stato avvisato.");
                    document.getElementById('evade-panel').classList.add('translate-y-full');
                    document.getElementById('order-status-badge').innerText = "CONFERMATO";
                    document.getElementById('order-status-badge').className = "inline-block px-3 py-1 bg-green-500 rounded-full text-[8px] font-black uppercase tracking-widest mt-2 text-white";
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    window.print(); // Stampa automatica dopo conferma
                } else { tg.showAlert("Errore durante l'evasione."); btn.disabled = false; btn.innerText = "Riprova"; }
            } catch (e) { tg.showAlert("Errore connessione."); btn.disabled = false; btn.innerText = "Riprova"; }
        }

        function hideLoader() { 
            const l = document.getElementById('loader');
            l.classList.add('opacity-0');
            setTimeout(() => {
                l.classList.add('hidden');
                document.getElementById('btn-print').classList.remove('hidden');
                if (currentOrder?.order_info?.status === 'PENDING' || !currentOrder?.order_info?.status) {
                    document.getElementById('evade-panel').classList.remove('translate-y-full');
                }
            }, 300);
        }

        function renderError(msg) {
            document.getElementById('loader').innerHTML = `<div class="text-center p-10"><h1 class="text-4xl mb-4">❌</h1><h2 class="text-sm font-black uppercase tracking-widest text-red-500">${msg}</h2><button onclick="tg.close()" class="mt-6 px-6 py-2 bg-black text-white rounded-full text-xs font-black uppercase">Chiudi</button></div>`;
        }

        function renderUI(order, brand) {
            const info = order.order_info || order;
            const customer = order.customer || {};
            const items = order.items || [];

            if (brand.logo) { document.getElementById('brand-logo').innerHTML = `<img src="${brand.logo}" class="w-full h-full object-cover">`; }
            document.getElementById('brand-name').innerText = brand.name || "SiteBoS Store";
            document.getElementById('order-id').innerText = `ID: ${info.order_id || orderSessionId.split('_').pop()}`;
            document.getElementById('order-date').innerText = new Date(info.timestamp || Date.now()).toLocaleString('it-IT', { dateStyle: 'medium', timeStyle: 'short' });
            
            const badge = document.getElementById('order-status-badge');
            const status = (info.status || 'PENDING').toUpperCase();
            badge.innerText = status;
            if (status === 'CONFIRMED') badge.className = "inline-block px-3 py-1 bg-green-500 rounded-full text-[8px] font-black uppercase tracking-widest mt-2 text-white";
            else if (status === 'PENDING') badge.className = "inline-block px-3 py-1 bg-amber-400 rounded-full text-[8px] font-black uppercase tracking-widest mt-2 text-white";

            // Sezione Destinatario Avanzata (Struttura stakeholder.user_ref)
            const nomeCompleto = `${customer.nome || ''} ${customer.cognome || ''}`.trim();
            let customerHtml = `<span class="text-sm font-black uppercase">${nomeCompleto || 'Cliente'}</span>`;
            if (customer.telefono) customerHtml += `<br><a href="tel:${customer.telefono}" class="text-[10px] font-bold text-blue-600"><i class="fas fa-phone-alt mr-1"></i> ${customer.telefono}</a>`;
            if (customer.email) customerHtml += `<br><span class="text-[9px] font-medium text-gray-400">${customer.email}</span>`;
            document.getElementById('customer-info').innerHTML = customerHtml;

            document.getElementById('customer-address').innerText = order.address || "Ritiro in sede";
            if (order.location?.lat) {
                const mapsUrl = `https://www.google.com/maps?q=${order.location.lat},${order.location.lon}`;
                document.getElementById('gps-link').classList.remove('hidden');
                document.getElementById('gps-link').querySelector('a').href = mapsUrl;
            }

            document.getElementById('payment-mode').innerText = order.payment_mode === 'CARD' ? 'Carta di Credito' : 'Pagamento alla Consegna';
            document.getElementById('order-total').innerText = `€ ${parseFloat(order.total_amount || 0).toFixed(2)}`;

            const list = document.getElementById('items-list');
            list.innerHTML = items.map(i => {
                const extras = i.selected_extras || [];
                const extrasHtml = extras.length > 0 ? `<div class="mt-1 pl-2 border-l-2 border-gray-100 space-y-0.5">${extras.map(e => `<p class="text-[9px] font-bold text-gray-400 uppercase">+ ${e.name} (€${parseFloat(e.price).toFixed(2)})</p>`).join('')}</div>` : '';
                const noteHtml = i.customer_note ? `<div class="mt-2 p-2 bg-gray-50 rounded text-[9px] font-medium italic text-gray-500">Nota: ${i.customer_note}</div>` : '';
                return `<div class="space-y-1"><div class="flex justify-between items-start gap-4"><div class="flex-1"><h3 class="font-black text-[12px] uppercase leading-tight">${i.quantity}x ${i.name}</h3>${extrasHtml}${noteHtml}</div><span class="font-mono text-[11px] font-bold">€${parseFloat(i.final_price || i.price).toFixed(2)}</span></div></div>`;
            }).join('');
        }
    </script>
</body>
</html>
</body>
</html>
