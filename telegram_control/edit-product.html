<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title data-i18n="page_title">Product Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem' }
                }
            }
        }
    </script>

    <style>

/* SiteBoS Architect Alignment */
body { background-color: #fafafa !important; color: #000000 !important; }
.card, .section-card, .dark-card, .upload-box { 
    background: white !important; 
    border: 1px solid #eeeeee !important; 
    box-shadow: none !important; 
}
input:focus, textarea:focus, select:focus { 
    border-color: #000000 !important; 
    box-shadow: none !important; 
    outline: none !important;
}
.text-primary, .text-black, .text-blue-600, .text-black { color: #000000 !important; }
.bg-primary, .bg-black, .bg-black, .bg-black { background-color: #000000 !important; color: #ffffff !important; }
.border-primary, .border-black, .border-blue-600, .border-black { border-color: #000000 !important; }
.spinner { border-top-color: #000 !important; }
input[type="checkbox"]:checked { background-color: #000 !important; border-color: #000 !important; }
/* Forza icone pesanti */
.fas, .far, .fal { font-weight: 900 !important; font-family: "Font Awesome 6 Free" !important; }


        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px; border: 2px solid #000; border-radius: 4px;
            position: relative; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after {
            content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            color: white; font-size: 9px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        .tag-anim { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="bg-bg text-black pb-10">

    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <div id="loaderText" data-i18n="loading" class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-500">Caricamento...</div>
    </div>

    <div class="hidden max-w-md mx-auto p-5" id="app-content">
        
        <header class="mb-6">
            <h1 id="pageTitle" data-i18n="title" class="text-lg font-black tracking-tighter uppercase leading-tight">✏️ Modifica</h1>
            <p id="pageSubtitle" data-i18n="subtitle" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mt-1 italic">Setup Prodotto / Servizio</p>
        </header>

        <form id="productForm" class="space-y-4">
            
            <!-- 1. IDENTITÀ -->
            <div class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-4">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block" data-i18n="secIdentity">📋 Identità</span>
                
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1" data-i18n="lblName">Nome Prodotto *</label>
                    <input type="text" id="itemName" required class="w-full bg-gray-50 p-3.5 rounded-xl text-sm font-bold border border-transparent focus:border-black outline-none transition">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-500 uppercase ml-1">SKU</label>
                        <input type="text" id="itemSku" disabled class="w-full bg-gray-100 text-gray-500 p-3.5 rounded-xl text-[10px] font-bold outline-none opacity-60">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-500 uppercase ml-1" data-i18n="lblType">Tipo</label>
                        <select id="itemType" class="w-full bg-gray-50 p-3.5 rounded-xl text-[10px] font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="SERVICE" data-i18n="optService">Servizio</option>
                            <option value="PRODUCT" data-i18n="optProduct">Prodotto</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1" data-i18n="lblShort">Descrizione Breve *</label>
                    <input type="text" id="descShort" maxlength="100" required class="w-full bg-gray-50 p-3.5 rounded-xl text-sm border border-transparent focus:border-black outline-none">
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1" data-i18n="lblLong">Descrizione Completa</label>
                    <textarea id="descLong" rows="3" class="w-full bg-gray-50 p-3.5 rounded-xl text-sm border border-transparent focus:border-black outline-none resize-none"></textarea>
                </div>
            </div>

            <!-- 2. PRICING -->
            <div class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-4">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block" data-i18n="secPricing">💰 Pricing</span>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-500 uppercase ml-1" data-i18n="lblPrice">Prezzo Base *</label>
                        <input type="number" id="basePrice" step="0.01" class="w-full bg-gray-50 p-3.5 rounded-xl text-lg font-black border border-transparent focus:border-black outline-none text-right">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-500 uppercase ml-1" data-i18n="lblCurrency">Valuta</label>
                        <select id="currency" class="w-full bg-gray-50 p-3.5 rounded-xl text-sm font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="EUR">EUR (€)</option>
                            <option value="USD">USD ($)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-500 uppercase ml-1" data-i18n="lblUnit">Unità</label>
                        <select id="unitOfMeasure" class="w-full bg-gray-50 p-3.5 rounded-xl text-[10px] font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="item" data-i18n="optItem">Pezzo</option>
                            <option value="hour" data-i18n="optHour">Ora</option>
                            <option value="day" data-i18n="optDay">Giorno</option>
                            <option value="project" data-i18n="optProject">Progetto</option>
                            <option value="month" data-i18n="optMonth">Mese</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-500 uppercase ml-1" data-i18n="lblTax">IVA (%)</label>
                        <input type="number" id="taxRate" class="w-full bg-gray-50 p-3.5 rounded-xl text-sm font-bold border border-transparent focus:border-black outline-none">
                    </div>
                </div>
            </div>

            <!-- 3. OPERATIVITÀ -->
            <div class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-4">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block" data-i18n="secOps">⚙️ Operatività</span>
                
                <div class="flex gap-3">
                    <div class="flex-1 flex items-center gap-2 p-3 bg-gray-50 rounded-xl border border-gray-100">
                        <input type="checkbox" id="requiresBooking">
                        <label for="requiresBooking" class="text-[10px] font-black uppercase" data-i18n="chkBooking">Prenotazione</label>
                    </div>
                    <div class="flex-1 flex items-center gap-2 p-3 bg-gray-50 rounded-xl border border-gray-100">
                        <input type="checkbox" id="requiresInventory">
                        <label for="requiresInventory" class="text-[10px] font-black uppercase" data-i18n="chkInventory">Inventario</label>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1" data-i18n="lblSkills">Skill Richieste</label>
                    <div class="w-full bg-gray-50 p-2 rounded-xl flex flex-wrap gap-2 items-center min-h-[44px]" id="skillTagsContainer">
                        <input type="text" id="skillTagInput" class="flex-1 bg-transparent outline-none text-[10px] p-1 font-bold">
                    </div>
                </div>
            </div>

            <!-- 4. HORECA & ADD-ONS -->
            <div class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-4">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block" data-i18n="secHoreca">🍔 HORECA & Add-ons</span>
                
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <label class="text-[9px] font-black text-gray-500 uppercase ml-1" data-i18n="lblAddons">Aggiunte Programmate</label>
                        <button type="button" onclick="addAddon()" class="text-[9px] font-black uppercase text-blue-600 hover:text-blue-800 transition">
                            <i class="fas fa-plus-circle mr-1"></i> <span data-i18n="btnAddAddon">Aggiungi</span>
                        </button>
                    </div>
                    <div id="addonsContainer" class="space-y-2">
                        <!-- Add-on rows will be injected here -->
                    </div>
                </div>

                <div class="pt-2 border-t border-gray-50">
                    <div class="flex items-center gap-2 p-3 bg-gray-50 rounded-xl border border-gray-100">
                        <input type="checkbox" id="allowCustomerNotes">
                        <label for="allowCustomerNotes" class="text-[10px] font-black uppercase" data-i18n="chkAllowNotes">Abilita Note Cliente</label>
                    </div>
                </div>
            </div>

            <div class="pt-2 space-y-3">
                <button type="button" onclick="openAdvancedDrawer()" class="w-full h-12 bg-gray-50 text-black rounded-xl font-black uppercase tracking-widest text-[10px] active:scale-95 transition-all flex items-center justify-center gap-2 border border-border">
                    <i class="fas fa-layer-group text-[10px]"></i> Gestione Avanzata
                </button>

                <button id="saveBtn" type="submit" disabled class="w-full h-12 bg-black text-white rounded-xl font-black uppercase tracking-widest text-[10px] active:scale-95 transition-all disabled:opacity-20 flex items-center justify-center gap-2 shadow-xl">
                    <i class="fas fa-save text-[10px]"></i> <span id="saveBtnText" data-i18n="btnSave">Salva Modifiche</span>
                </button>
            </div>

        </form>
    </div>

    <!-- ADVANCED DRAWER -->
    <div id="advanced-drawer" class="fixed inset-0 bg-white z-[100] transition-transform duration-300 translate-y-full flex flex-col">
        <header class="flex justify-between items-center p-5 border-b border-gray-100 bg-white">
            <div>
                <h2 class="text-sm font-black uppercase tracking-tighter">Gestione Avanzata</h2>
                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mt-0.5">Supply Chain & Logistica</p>
            </div>
            <button type="button" onclick="closeAdvancedDrawer()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-lg active:scale-95 transition">
                <i class="fas fa-times text-xs"></i>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-5 space-y-8 no-scrollbar pb-24">
            
            <!-- SEZIONE FORNITORI -->
            <div class="space-y-4">
                <div class="flex items-center justify-between border-b border-black pb-2">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-truck text-xs"></i>
                        <h3 class="text-[10px] font-black uppercase tracking-widest">Fornitore</h3>
                    </div>
                    <button type="button" onclick="scanSupplier()" class="text-[9px] font-black text-blue-600 uppercase tracking-widest active:scale-95 transition flex items-center">
                        <div id="scanAiLoader" class="spinner hidden mr-1" style="width:12px; height:12px; border-width: 1px;"></div>
                        <i id="scanAiIcon" class="fas fa-search mr-1"></i> Scan AI
                    </button>
                </div>
                
                <!-- RISULTATI RICERCA AI (In-page) -->
                <div id="supplier-results-container" class="hidden bg-gray-50 border border-border rounded-xl p-3 space-y-2 mt-2">
                    <div class="text-[8px] font-black uppercase tracking-widest text-gray-500 mb-1">Seleziona Fornitore</div>
                    <div id="supplier-results-list" class="space-y-2 max-h-32 overflow-y-auto pr-1">
                        <!-- JS populated -->
                    </div>
                    <button type="button" onclick="document.getElementById('supplier-results-container').classList.add('hidden')" class="w-full mt-2 py-2 bg-white border border-border text-black rounded-lg text-[8px] font-black uppercase tracking-widest">Chiudi</button>
                </div>

                <div class="space-y-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-gray-500 uppercase ml-1">Nome Fornitore</label>
                        <input type="text" id="drawerSupplierName" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none transition" oninput="checkDirty()">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-gray-500 uppercase ml-1">P.IVA / VAT</label>
                        <input type="text" id="drawerSupplierVat" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none transition" oninput="checkDirty()">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[8px] font-black text-gray-500 uppercase ml-1">Costo Acquisto (€)</label>
                            <input type="number" step="0.01" id="drawerSupplierPrice" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-black border border-transparent focus:border-black outline-none text-right transition" oninput="checkDirty()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[8px] font-black text-gray-500 uppercase ml-1">SKU Fornitore</label>
                            <input type="text" id="drawerSupplierSku" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none transition" oninput="checkDirty()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SEZIONE SEMILAVORAZIONI -->
            <div class="space-y-4">
                <div class="flex items-center justify-between border-b border-black pb-2">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-cogs text-xs"></i>
                        <h3 class="text-[10px] font-black uppercase tracking-widest">Semilavorazioni</h3>
                    </div>
                    <button type="button" onclick="openBomSelector()" class="text-[9px] font-black text-blue-600 uppercase tracking-widest active:scale-95 transition">
                        + Aggiungi
                    </button>
                </div>
                <div id="bomContainer" class="space-y-2">
                    <!-- JS injected -->
                </div>
            </div>

            <!-- SEZIONE LOGISTICA -->
            <div class="space-y-4">
                <div class="flex items-center gap-2 border-b border-black pb-2">
                    <i class="fas fa-boxes text-xs"></i>
                    <h3 class="text-[10px] font-black uppercase tracking-widest">Logistica & Stoccaggio</h3>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label id="lblStorageLoc" class="text-[8px] font-black text-gray-500 uppercase ml-1">Scaffale/Area</label>
                        <input type="text" id="drawerStorageLocation" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none transition" oninput="checkDirty()">
                    </div>
                    <div class="space-y-1" id="divStorageTemp">
                        <label class="text-[8px] font-black text-gray-500 uppercase ml-1">Temp. (°C)</label>
                        <input type="text" id="drawerStorageTemp" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border border-transparent focus:border-black outline-none transition" placeholder="Ambiente" oninput="checkDirty()">
                    </div>
                </div>

                <!-- ASSET LIST -->
                <div class="pt-2 border-t border-gray-100 mt-4">
                    <div class="flex items-center justify-between mb-2 mt-2">
                        <label class="text-[8px] font-black text-gray-500 uppercase ml-1">Attrezzature / Asset Necessari</label>
                        <button type="button" onclick="addAssetItem()" class="text-[8px] font-black text-blue-600 uppercase tracking-widest active:scale-95 transition">
                            + Aggiungi
                        </button>
                    </div>
                    <div id="assetContainer" class="space-y-2">
                        <!-- JS injected -->
                    </div>
                </div>
            </div>

        </div>
        
        <div class="absolute bottom-0 left-0 right-0 p-5 bg-white border-t border-border">
            <button type="button" onclick="closeAdvancedDrawer()" class="w-full h-12 bg-black text-white rounded-xl font-black uppercase tracking-widest text-[10px] active:scale-95 transition-all shadow-xl">
                Chiudi Avanzate
            </button>
        </div>
    </div>

    <script>
        'use strict';
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/2c6416b1-32c6-4661-bd8f-b175d24fd035";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const sopId = urlParams.get('sop_id');
        const messageId = urlParams.get('message_id');
        const langParam = tg.initDataUnsafe?.user?.language_code || 'it';

        let currentData = null, initialDataString = "", skillTags = [], keywords = [], extraOptions = [], bomItems = [], assetItems = [];

        const i18n = {
            it: { 
                page_title: "Modifica Prodotto", title: "✏️ Modifica", subtitle: "Gestione dettagli e prezzi", 
                loading: "Caricamento...", saving: "Salvataggio...", saved: "✅ Salvato!", error: "❌ Errore", 
                secIdentity: "📋 Identità", secPricing: "💰 Pricing", secOps: "⚙️ Operatività", 
                secHoreca: "🍔 HORECA & Add-ons", lblName: "Nome Prodotto/Servizio", lblType: "Tipo", 
                lblShort: "Descrizione Breve", lblLong: "Descrizione Completa", lblPrice: "Prezzo Base", 
                lblCurrency: "Valuta", lblUnit: "Unità", lblTax: "IVA (%)", chkBooking: "Prenotazione", 
                chkInventory: "Inventario", lblSkills: "Skill Richieste", btnSave: "Salva Modifiche", 
                optService: "Servizio", optProduct: "Prodotto", optItem: "Pezzo", optHour: "Ora", 
                optDay: "Giorno", optProject: "Progetto", optMonth: "Mese", phSkill: "Premi Invio...",
                lblAddons: "Aggiunte Programmate", lblAddonName: "Nome Add-on", lblAddonPrice: "Prezzo", 
                btnAddAddon: "Aggiungi Opzione", chkAllowNotes: "Abilita Note Cliente"
            },
            en: { 
                page_title: "Edit Product", title: "✏️ Edit", subtitle: "Details and pricing", 
                loading: "Loading...", saving: "Saving...", saved: "✅ Saved!", error: "❌ Error", 
                secIdentity: "📋 Identity", secPricing: "💰 Pricing", secOps: "⚙️ Operations", 
                secHoreca: "🍔 HORECA & Add-ons", lblName: "Product Name", lblType: "Type", 
                lblShort: "Short Desc", lblLong: "Full Desc", lblPrice: "Base Price", 
                lblCurrency: "Currency", lblUnit: "Unit", lblTax: "Tax (%)", chkBooking: "Booking", 
                chkInventory: "Inventory", lblSkills: "Skills", btnSave: "Save Changes", 
                optService: "Service", optProduct: "Product", optItem: "Item", optHour: "Hour", 
                optDay: "Day", optProject: "Project", optMonth: "Month", phSkill: "Enter to add...",
                lblAddons: "Scheduled Add-ons", lblAddonName: "Add-on Name", lblAddonPrice: "Price", 
                btnAddAddon: "Add Option", chkAllowNotes: "Allow Customer Notes"
            }
        };
        const t = i18n[langParam.slice(0,2)] || i18n.it;

        const dom = {
            loader: document.getElementById('loader'),
            content: document.getElementById('app-content'),
            form: document.getElementById('productForm'),
            saveBtn: document.getElementById('saveBtn'),
            skillInput: document.getElementById('skillTagInput'),
            skillContainer: document.getElementById('skillTagsContainer')
        };

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });
            dom.skillInput.placeholder = t.phSkill;
        }

        async function init() {
            applyTranslations();
            if (!sopId) { alert("SOP ID Missing"); return; }
            await loadProduct();
        }

        async function loadProduct() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'GET', type: 'PRODUCT', sop_id: sopId, message_id: messageId })
                });
                const rawData = await res.json();
                const d = Array.isArray(rawData) ? rawData[0] : rawData;
                const productData = d.catalog_item || d.catalog_item_draft || d;
                currentData = JSON.parse(JSON.stringify(productData));
                populateForm(productData);
                initialDataString = JSON.stringify(collectDataFromForm());
                setupTagInput(dom.skillInput, dom.skillContainer, skillTags);
                dom.form.addEventListener('input', checkDirty);
                dom.loader.classList.add('hidden');
                dom.content.classList.remove('hidden');
            } catch (e) { console.error(e); }
        }

        function populateForm(data) {
            const val = (id, v) => { if (document.getElementById(id)) document.getElementById(id).value = v || ''; };
            const chk = (id, v) => { if (document.getElementById(id)) document.getElementById(id).checked = !!v; };
            val('itemName', data.identity?.item_name);
            val('itemSku', data.identity?.item_sku);
            val('itemType', data.identity?.item_type);
            val('descShort', data.identity?.description?.short);
            val('descLong', data.identity?.description?.long);
            val('basePrice', data.pricing?.base_price);
            val('currency', data.pricing?.currency);
            val('unitOfMeasure', data.pricing?.unit_of_measure);
            val('taxRate', data.pricing?.tax_info?.tax_rate_percentage);
            chk('requiresBooking', data.operations?.requires_booking);
            chk('requiresInventory', data.operations?.requires_inventory_check);
            chk('allowCustomerNotes', data.commercial_setup?.allow_customer_notes);
            skillTags = data.operations?.provider_info?.required_skill_tags || [];
            extraOptions = data.commercial_setup?.extra_options || [];
            
            // Drawer fields
            val('drawerSupplierName', data.procurement?.supplier_name);
            val('drawerSupplierVat', data.procurement?.supplier_vat);
            val('drawerSupplierPrice', data.procurement?.cost_of_goods);
            val('drawerSupplierSku', data.procurement?.supplier_sku);
            val('drawerStorageLocation', data.logistics?.storage_location);
            val('drawerStorageTemp', data.logistics?.storage_temperature);
            val('drawerStorageTemp', data.logistics?.storage_temperature);
            bomItems = data.bom || [];
            assetItems = data.assets || [];

            renderTags(dom.skillContainer, skillTags);
            renderAddons();
            renderBom();
            renderAssets();
        }

        function renderAddons() {
            const container = document.getElementById('addonsContainer');
            container.innerHTML = '';
            if (extraOptions.length === 0) {
                container.innerHTML = `<div class="text-[8px] text-gray-300 italic text-center py-4 border-2 border-dashed border-gray-50 rounded-2xl uppercase tracking-widest font-black">Nessun extra attivo</div>`;
                return;
            }
            extraOptions.forEach((opt, index) => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-3 bg-white p-3 rounded-2xl border border-gray-100 shadow-sm tag-anim transition-all hover:border-black/10';
                row.innerHTML = `
                    <div class="flex-1 space-y-1">
                        <label class="text-[7px] font-black uppercase text-gray-300 ml-1">Nome Opzione</label>
                        <input type="text" placeholder="${t.lblAddonName}" value="${opt.name}" oninput="updateAddon(${index}, 'name', this.value)" class="w-full bg-gray-50 border border-transparent rounded-lg p-2 text-[10px] font-bold outline-none focus:border-black transition-colors">
                    </div>
                    <div class="w-24 space-y-1">
                        <label class="text-[7px] font-black uppercase text-gray-300 ml-1">Prezzo</label>
                        <div class="relative">
                            <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[8px] font-black text-gray-300">€</span>
                            <input type="number" step="0.01" placeholder="0.00" value="${opt.price}" oninput="updateAddon(${index}, 'price', this.value)" class="w-full bg-gray-50 border border-transparent rounded-lg p-2 pl-5 text-[10px] font-black outline-none focus:border-black text-right transition-colors">
                        </div>
                    </div>
                    <button type="button" onclick="removeAddon(${index})" class="mt-4 w-8 h-8 flex items-center justify-center bg-red-50 text-red-400 rounded-lg hover:bg-red-100 transition-colors">
                        <i class="fas fa-trash-alt text-[10px]"></i>
                    </button>
                `;
                container.appendChild(row);
            });
        }

        function addAddon() {
            extraOptions.push({ name: '', price: 0 });
            renderAddons();
            checkDirty();
        }

        function updateAddon(index, field, value) {
            if (field === 'price') value = parseFloat(value) || 0;
            extraOptions[index][field] = value;
            checkDirty();
        }

        function removeAddon(index) {
            extraOptions.splice(index, 1);
            renderAddons();
            checkDirty();
        }

        // --- DRAWER & BOM & ASSET LOGIC ---
        async function scanSupplier() {
            const productName = document.getElementById('itemName').value;
            if(!productName) {
                tg.showAlert("Inserisci il Nome Prodotto prima di cercare fornitori.");
                return;
            }
            document.getElementById('scanAiIcon').classList.add('hidden');
            document.getElementById('scanAiLoader').classList.remove('hidden');
            
            try {
                // Esecuzione chiamata API action: 'ai_supplier_search'
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'ai_supplier_search', product_name: productName })
                });
                
                let suppliers = [];
                if(res.ok) {
                    const respData = await res.json();
                    suppliers = respData.suppliers || [];
                }
                
                if (suppliers.length === 0) {
                    // Fallback visual
                    suppliers = [
                        { name: "GlobalTech Italia SRL", vat: "IT0123456789", price: 14.50, sku: "GT-991" },
                        { name: "Forniture Rapide SPA", vat: "IT9876543210", price: 15.00, sku: "FR-AX2" }
                    ];
                }

                const container = document.getElementById('supplier-results-list');
                container.innerHTML = '';
                suppliers.forEach(s => {
                    const row = document.createElement('div');
                    row.className = 'bg-white p-2 rounded-lg border border-border flex justify-between items-center cursor-pointer active:scale-95 transition';
                    row.onclick = () => {
                        document.getElementById('drawerSupplierName').value = s.name;
                        document.getElementById('drawerSupplierVat').value = s.vat;
                        document.getElementById('drawerSupplierPrice').value = s.price;
                        document.getElementById('drawerSupplierSku').value = s.sku;
                        document.getElementById('supplier-results-container').classList.add('hidden');
                        checkDirty();
                    };
                    row.innerHTML = `
                        <div>
                            <div class="text-[9px] font-bold uppercase">${s.name}</div>
                            <div class="text-[7px] text-gray-400 font-bold">P.IVA: ${s.vat} - SKU: ${s.sku}</div>
                        </div>
                        <div class="text-[9px] font-black">${s.price} €</div>
                    `;
                    container.appendChild(row);
                });
                
                document.getElementById('supplier-results-container').classList.remove('hidden');
            } catch(e) {
                tg.showAlert("Errore durante la ricerca IA.");
            } finally {
                document.getElementById('scanAiIcon').classList.remove('hidden');
                document.getElementById('scanAiLoader').classList.add('hidden');
            }
        }

        function renderAssets() {
            const container = document.getElementById('assetContainer');
            container.innerHTML = '';
            if (assetItems.length === 0) {
                container.innerHTML = `<div class="text-[8px] text-gray-300 italic text-center py-3 border-2 border-dashed border-gray-50 rounded-xl uppercase tracking-widest font-black">Nessun asset correlato</div>`;
                return;
            }
            assetItems.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-2 bg-gray-50 p-2 rounded-xl border border-gray-100 tag-anim';
                row.innerHTML = `
                    <div class="flex-[2]">
                        <input type="text" placeholder="ID/Nome Asset" value="${item.asset_id || ''}" oninput="updateAssetItem(${index}, 'asset_id', this.value)" class="w-full bg-white border border-transparent rounded-lg p-2 text-[10px] font-bold outline-none focus:border-black transition-colors">
                    </div>
                    <div class="flex-[3]">
                        <input type="text" placeholder="Note operative" value="${item.notes || ''}" oninput="updateAssetItem(${index}, 'notes', this.value)" class="w-full bg-white border border-transparent rounded-lg p-2 text-[10px] font-medium outline-none focus:border-black transition-colors">
                    </div>
                    <button type="button" onclick="removeAssetItem(${index})" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-400 rounded-lg hover:bg-red-100 transition-colors">
                        <i class="fas fa-trash-alt text-[10px]"></i>
                    </button>
                `;
                container.appendChild(row);
            });
        }

        function addAssetItem() {
            assetItems.push({ asset_id: '', notes: '' });
            renderAssets();
            checkDirty();
        }

        function updateAssetItem(index, field, value) {
            assetItems[index][field] = value;
            checkDirty();
        }

        function removeAssetItem(index) {
            assetItems.splice(index, 1);
            renderAssets();
            checkDirty();
        }

        function openAdvancedDrawer() {
            const itemType = document.getElementById('itemType').value;
            if (itemType === 'SERVICE') {
                document.getElementById('lblStorageLoc').innerText = "Luogo Erogazione";
                document.getElementById('drawerStorageLocation').placeholder = "Es. Sala 1, Ufficio...";
                document.getElementById('divStorageTemp').classList.add('hidden');
            } else {
                document.getElementById('lblStorageLoc').innerText = "Scaffale/Area Stoccaggio";
                document.getElementById('drawerStorageLocation').placeholder = "";
                document.getElementById('divStorageTemp').classList.remove('hidden');
            }

            document.getElementById('advanced-drawer').classList.remove('translate-y-full');
            document.body.style.overflow = 'hidden';
            if(tg.BackButton) {
                tg.BackButton.show();
                tg.BackButton.onClick(closeAdvancedDrawer);
            }
        }

        function closeAdvancedDrawer() {
            document.getElementById('advanced-drawer').classList.add('translate-y-full');
            document.body.style.overflow = '';
            if(tg.BackButton) tg.BackButton.hide();
        }

        function renderBom() {
            const container = document.getElementById('bomContainer');
            container.innerHTML = '';
            if (bomItems.length === 0) {
                container.innerHTML = `<div class="text-[8px] text-gray-300 italic text-center py-4 border-2 border-dashed border-gray-50 rounded-2xl uppercase tracking-widest font-black">Nessun semilavorato collegato</div>`;
                return;
            }
            bomItems.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-2 bg-gray-50 p-2 rounded-xl border border-gray-100 tag-anim';
                row.innerHTML = `
                    <div class="flex-1">
                        <input type="text" placeholder="ID Semilavorato" value="${item.semi_id || ''}" oninput="updateBomItem(${index}, 'semi_id', this.value)" class="w-full bg-white border border-transparent rounded-lg p-2 text-[10px] font-bold outline-none focus:border-black transition-colors">
                    </div>
                    <div class="w-16">
                        <input type="number" step="0.01" placeholder="Q.tà" value="${item.qty || 1}" oninput="updateBomItem(${index}, 'qty', this.value)" class="w-full bg-white border border-transparent rounded-lg p-2 text-[10px] font-black outline-none focus:border-black text-center transition-colors">
                    </div>
                    <button type="button" onclick="editSemi('${item.semi_id}')" class="w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-500 rounded-lg hover:bg-gray-200 transition-colors">
                        <i class="fas fa-pencil-alt text-[10px]"></i>
                    </button>
                    <button type="button" onclick="removeBomItem(${index})" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-400 rounded-lg hover:bg-red-100 transition-colors">
                        <i class="fas fa-trash-alt text-[10px]"></i>
                    </button>
                `;
                container.appendChild(row);
            });
        }

        function openBomSelector() {
            tg.showConfirm("Vuoi inserire un semilavorato esistente? Premi ANNULLA per crearne uno nuovo.", (conf) => {
                if(conf) {
                    addBomItem(); 
                } else {
                    window.location.href = `edit-semilavorati.html?ash=${ash}&sop_id=${sopId}`;
                }
            });
        }

        function editSemi(semiId) {
            if(!semiId) { tg.showAlert("Imposta l'ID prima di modificare."); return; }
            window.location.href = `edit-semilavorati.html?ash=${ash}&sop_id=${sopId}&edit_id=${semiId}`;
        }

        function addBomItem() {
            bomItems.push({ semi_id: '', qty: 1 });
            renderBom();
            checkDirty();
        }

        function updateBomItem(index, field, value) {
            if (field === 'qty') value = parseFloat(value) || 0;
            bomItems[index][field] = value;
            checkDirty();
        }

        function removeBomItem(index) {
            bomItems.splice(index, 1);
            renderBom();
            checkDirty();
        }
        // --------------------------

        function collectDataFromForm() {
            return {
                name: document.getElementById('itemName').value,
                type: document.getElementById('itemType').value,
                short: document.getElementById('descShort').value,
                long: document.getElementById('descLong').value,
                price: document.getElementById('basePrice').value,
                cur: document.getElementById('currency').value,
                uom: document.getElementById('unitOfMeasure').value,
                tax: document.getElementById('taxRate').value,
                booking: document.getElementById('requiresBooking').checked,
                inv: document.getElementById('requiresInventory').checked,
                notes_enabled: document.getElementById('allowCustomerNotes').checked,
                st: skillTags.join(','),
                ex: JSON.stringify(extraOptions),
                suppName: document.getElementById('drawerSupplierName').value,
                suppVat: document.getElementById('drawerSupplierVat').value,
                suppPrice: document.getElementById('drawerSupplierPrice').value,
                suppSku: document.getElementById('drawerSupplierSku').value,
                locLoc: document.getElementById('drawerStorageLocation').value,
                locTemp: document.getElementById('drawerStorageTemp').value,
                bom: JSON.stringify(bomItems),
                assets: JSON.stringify(assetItems)
            };
        }

        function checkDirty() {
            const current = JSON.stringify(collectDataFromForm());
            dom.saveBtn.disabled = current === initialDataString;
        }

        function setupTagInput(input, container, tags) {
            input.onkeydown = (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const val = input.value.trim();
                    if (val && !tags.includes(val)) {
                        tags.push(val); input.value = '';
                        renderTags(container, tags); checkDirty();
                    }
                } else if (e.key === 'Backspace' && !input.value && tags.length) {
                    tags.pop(); renderTags(container, tags); checkDirty();
                }
            };
        }

        function renderTags(container, tags) {
            container.querySelectorAll('.custom-tag').forEach(t => t.remove());
            tags.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = 'custom-tag tag-anim bg-black text-white px-3 py-1 rounded-lg text-[9px] font-black uppercase flex items-center gap-1.5';
                el.innerHTML = `${t} <i class="fas fa-times opacity-40"></i>`;
                el.onclick = () => { tags.splice(i, 1); renderTags(container, tags); checkDirty(); };
                container.insertBefore(el, container.lastElementChild);
            });
        }

        dom.form.onsubmit = async (e) => {
            e.preventDefault();
            dom.saveBtn.disabled = true;
            document.getElementById('saveBtnText').innerText = t.saving;
            const form = collectDataFromForm();
            const payload = currentData;
            payload.identity.item_name = form.name;
            payload.identity.item_type = form.type;
            payload.identity.description.short = form.short;
            payload.identity.description.long = form.long;
            payload.pricing.base_price = parseFloat(form.price);
            payload.pricing.currency = form.cur;
            payload.pricing.unit_of_measure = form.uom;
            payload.pricing.tax_info.tax_rate_percentage = parseInt(form.tax);
            payload.operations.requires_booking = form.booking;
            payload.operations.requires_inventory_check = form.inv;
            payload.operations.provider_info.required_skill_tags = skillTags;
            
            // Add HORECA specific fields
            if (!payload.commercial_setup) payload.commercial_setup = {};
            payload.commercial_setup.extra_options = extraOptions;
            payload.commercial_setup.allow_customer_notes = form.notes_enabled;
            
            // Toggle Dynamic Price if extra options exist
            if (!payload.pricing.pricing_rules_engine) payload.pricing.pricing_rules_engine = { rules_ids: [], notes: null };
            payload.pricing.pricing_rules_engine.is_dynamic_price = extraOptions.length > 0;

            // Update Drawer specific nodes
            if (!payload.procurement) payload.procurement = {};
            payload.procurement.supplier_name = form.suppName;
            payload.procurement.supplier_vat = form.suppVat;
            payload.procurement.cost_of_goods = parseFloat(form.suppPrice) || 0;
            payload.procurement.supplier_sku = form.suppSku;

            if (!payload.logistics) payload.logistics = {};
            payload.logistics.storage_location = form.locLoc;
            payload.logistics.storage_temperature = form.locTemp;

            payload.bom = bomItems;
            payload.assets = assetItems;

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'SAVE', type: 'PRODUCT', sop_id: sopId, message_id: messageId, payload: payload })
                });
                dom.saveBtn.classList.replace('bg-black', 'bg-green-600');
                document.getElementById('saveBtnText').innerText = t.saved;
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => tg.close(), 1200);
            } catch (err) { dom.saveBtn.disabled = false; document.getElementById('saveBtnText').innerText = t.btnSave; }
        };
        init();
    </script>
</body>
</html>
