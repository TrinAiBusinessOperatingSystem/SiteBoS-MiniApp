<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Product Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type="checkbox"] {
            appearance: none; width: 22px; height: 22px; border: 2px solid #000; border-radius: 6px;
            position: relative; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after {
            content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            color: white; font-size: 11px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="bg-bg text-black pb-10">

    <!-- LOADING -->
    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <div id="loaderText" class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">Caricamento...</div>
    </div>

    <div class="hidden max-w-2xl mx-auto p-5" id="app-content">
        
        <!-- HEADER PULITO -->
        <header class="mb-8">
            <h1 id="pageTitle" class="text-xl font-black tracking-tight uppercase leading-tight">Modifica Prodotto</h1>
            <p id="pageSubtitle" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Gestione dettagli e prezzi</p>
        </header>

        <form id="productForm" class="space-y-6">
            
            <!-- 1. IDENTITÀ -->
            <div class="bg-white rounded-[2rem] p-6 border border-border shadow-sm space-y-4">
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-300 block mb-2">📋 Identità</span>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Nome Prodotto *</label>
                    <input type="text" id="itemName" required class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1">SKU</label>
                        <input type="text" id="itemSku" disabled class="w-full bg-gray-100 text-gray-400 p-4 rounded-2xl text-xs font-bold outline-none opacity-60">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Tipo</label>
                        <select id="itemType" class="w-full bg-gray-50 p-4 rounded-2xl text-xs font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="SERVICE">Servizio</option>
                            <option value="PRODUCT">Prodotto</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Descrizione Breve *</label>
                    <input type="text" id="descShort" maxlength="100" required class="w-full bg-gray-50 p-4 rounded-2xl text-sm border border-transparent focus:border-black outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Descrizione Completa</label>
                    <textarea id="descLong" rows="3" class="w-full bg-gray-50 p-4 rounded-2xl text-sm border border-transparent focus:border-black outline-none resize-none"></textarea>
                </div>
            </div>

            <!-- 2. PRICING -->
            <div class="bg-white rounded-[2rem] p-6 border border-border shadow-sm space-y-4">
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-300 block mb-2">💰 Pricing</span>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Prezzo Base *</label>
                        <input type="number" id="basePrice" step="0.01" class="w-full bg-gray-50 p-4 rounded-2xl text-lg font-black border border-transparent focus:border-black outline-none text-right">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Valuta</label>
                        <select id="currency" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="EUR">EUR (€)</option>
                            <option value="USD">USD ($)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 3. OPERATIVITÀ -->
            <div class="bg-white rounded-[2rem] p-6 border border-border shadow-sm space-y-6">
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-300 block mb-2">⚙️ Operatività</span>
                <div class="flex flex-col gap-4 p-4 bg-gray-50 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="requiresBooking">
                        <label for="requiresBooking" class="text-xs font-bold uppercase flex-1">Prenotazione</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="requiresInventory">
                        <label for="requiresInventory" class="text-xs font-bold uppercase flex-1">Inventario</label>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1">Skill Richieste</label>
                    <div class="w-full bg-gray-50 p-2 rounded-2xl flex flex-wrap gap-2 items-center min-h-[50px]" id="skillTagsContainer">
                        <input type="text" id="skillTagInput" placeholder="..." class="flex-1 bg-transparent outline-none text-xs p-2">
                    </div>
                </div>
            </div>

            <!-- 4. PROVIDER -->
            <div class="bg-black text-white rounded-[2rem] p-6 shadow-xl space-y-4">
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-600 block mb-2">👤 Provider</span>
                <div id="skills-display" class="flex flex-wrap gap-2"></div>
                <div id="providers-display" class="flex flex-col gap-3 mt-4"></div>
            </div>

            <!-- PULSANTE SALVA -->
            <div class="pt-6">
                <button id="saveBtn" type="submit" disabled class="w-full h-16 bg-black text-white rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all disabled:bg-gray-100 disabled:text-gray-300 flex items-center justify-center gap-3">
                    <i class="fas fa-save"></i> <span id="saveBtnText">Salva Modifiche</span>
                </button>
            </div>

        </form>
    </div>

    <script>
        'use strict';
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/2c6416b1-32c6-4661-bd8f-b175d24fd035";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const sopId = urlParams.get('sop_id');
        const messageId = urlParams.get('message_id');

        let currentData = null, initialDataString = "", skillTags = [];

        const dom = {
            loader: document.getElementById('loader'),
            content: document.getElementById('app-content'),
            form: document.getElementById('productForm'),
            saveBtn: document.getElementById('saveBtn'),
            saveBtnText: document.getElementById('saveBtnText'),
            skillInput: document.getElementById('skillTagInput'),
            skillContainer: document.getElementById('skillTagsContainer'),
            skillsDisplay: document.getElementById('skills-display'),
            providersDisplay: document.getElementById('providers-display')
        };

        async function init() {
            if (!sopId) { alert("SOP ID Mancante"); return; }
            await loadProduct();
        }

        async function loadProduct() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'GET', type: 'PRODUCT', sop_id: sopId, message_id: messageId })
                });
                const rawData = await res.json();
                const productData = (Array.isArray(rawData) ? rawData[0] : rawData).catalog_item || (Array.isArray(rawData) ? rawData[0] : rawData);

                currentData = productData;
                populateForm(productData);
                
                initialDataString = JSON.stringify(collectDataFromForm());

                setupTagInput(dom.skillInput, dom.skillContainer, skillTags);
                dom.form.addEventListener('input', checkDirty);
                
                dom.loader.classList.add('hidden');
                dom.content.classList.remove('hidden');
            } catch (e) { console.error(e); }
        }

        function populateForm(data) {
            const val = (id, v) => { if (document.getElementById(id)) document.getElementById(id).value = v || ''; };
            const chk = (id, v) => { if (document.getElementById(id)) document.getElementById(id).checked = !!v; };

            val('itemName', data.identity?.item_name);
            val('itemSku', data.identity?.item_sku);
            val('itemType', data.identity?.item_type);
            val('descShort', data.identity?.description?.short);
            val('descLong', data.identity?.description?.long);
            val('basePrice', data.pricing?.base_price);
            chk('requiresBooking', data.operations?.requires_booking);
            chk('requiresInventory', data.operations?.requires_inventory_check);

            skillTags = data.operations?.provider_info?.required_skill_tags || [];
            renderTags(dom.skillContainer, skillTags);
            renderProviders(data.operations?.provider_info || {});
            
            document.getElementById('pageTitle').textContent = data.identity?.item_name || 'Modifica Prodotto';
        }

        function collectDataFromForm() {
            return {
                name: document.getElementById('itemName').value,
                type: document.getElementById('itemType').value,
                short: document.getElementById('descShort').value,
                long: document.getElementById('descLong').value,
                price: document.getElementById('basePrice').value,
                booking: document.getElementById('requiresBooking').checked,
                inv: document.getElementById('requiresInventory').checked,
                tags: skillTags.join(',')
            };
        }

        function checkDirty() {
            const current = JSON.stringify(collectDataFromForm());
            const isDirty = current !== initialDataString;
            dom.saveBtn.disabled = !isDirty;
        }

        function renderProviders(info) {
            const skills = info.required_skill_tags || [];
            dom.skillsDisplay.innerHTML = skills.map(s => `<span class="bg-neutral-800 text-[9px] px-3 py-1 rounded-full uppercase font-bold text-gray-400">${s}</span>`).join('');
            const providers = info.specific_provider_ids || [];
            dom.providersDisplay.innerHTML = providers.length ? providers.map(p => `<div class="bg-neutral-900 p-3 rounded-xl text-xs border border-neutral-800 font-bold">👤 ${p.provider_name || p}</div>`).join('') : '<div class="text-[9px] text-neutral-600 font-bold uppercase">Qualsiasi provider abilitato</div>';
        }

        function setupTagInput(input, container, tags) {
            input.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (input.value.trim() && !tags.includes(input.value.trim())) {
                        tags.push(input.value.trim());
                        input.value = '';
                        renderTags(container, tags);
                        checkDirty();
                    }
                }
            };
        }

        function renderTags(container, tags) {
            container.querySelectorAll('.custom-tag').forEach(t => t.remove());
            tags.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = 'custom-tag bg-black text-white px-3 py-1 rounded-lg text-[10px] font-bold flex items-center gap-2';
                el.innerHTML = `${t} <i class="fas fa-times opacity-50 cursor-pointer"></i>`;
                el.onclick = () => { tags.splice(i, 1); renderTags(container, tags); checkDirty(); };
                container.insertBefore(el, container.firstChild);
            });
        }

        dom.form.onsubmit = async (e) => {
            e.preventDefault();
            dom.saveBtn.disabled = true;
            dom.saveBtnText.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Salvataggio...`;

            const data = currentData;
            const form = collectDataFromForm();
            data.identity.item_name = form.name;
            data.identity.item_type = form.type;
            data.identity.description.short = form.short;
            data.identity.description.long = form.long;
            data.pricing.base_price = parseFloat(form.price);
            data.operations.requires_booking = form.booking;
            data.operations.requires_inventory_check = form.inv;
            data.operations.provider_info.required_skill_tags = skillTags;

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'SAVE', type: 'PRODUCT', sop_id: sopId, message_id: messageId, payload: data })
                });
                dom.saveBtn.classList.replace('bg-black', 'bg-green-600');
                dom.saveBtnText.innerText = "✅ Salvato";
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => tg.close(), 1500);
            } catch (err) { dom.saveBtn.disabled = false; dom.saveBtnText.innerText = "Salva"; }
        };

        init();
    </script>
</body>
</html>
