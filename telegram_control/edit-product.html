<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title data-i18n="page_title">Product Editor</title>

    <!-- SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        bg: '#fafafa',
                        border: '#eeeeee'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Custom Checkbox Black */
        input[type="checkbox"] {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #000;
            border-radius: 6px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: white;
            font-size: 11px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Spinner B&W */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }

        /* Tag Input Container finto */
        .tag-container-focus:focus-within { border-color: #000; }
    </style>

    <script>
        // ── SICUREZZA: IL BUTTAFUORI ──
        (function() {
            const isTelegram = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "";
            if (!isTelegram) {
                document.documentElement.innerHTML = `
                    <body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans">
                        <div>
                            <h1 class="text-6xl mb-4 text-white">🚫</h1>
                            <h2 class="text-xl font-black uppercase tracking-widest">Accesso Proibito</h2>
                            <p class="opacity-40 text-sm mt-4 leading-relaxed">Apri questo editor direttamente dal pannello SiteBoS su Telegram.</p>
                        </div>
                    </body>`;
                window.stop();
                throw new Error("Unauthorized Access");
            }
        })();
    </script>
</head>
<body class="bg-bg text-black pb-28">

    <!-- LOADING OVERLAY -->
    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <div id="loaderText" data-i18n="loading" class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">Caricamento...</div>
    </div>

    <div class="hidden max-w-2xl mx-auto p-5 space-y-6" id="app-content">
        
        <!-- HEADER -->
        <header class="mb-8">
            <h1 id="pageTitle" data-i18n="title" class="text-3xl font-black tracking-tighter uppercase leading-none">✏️ Modifica</h1>
            <p id="pageSubtitle" data-i18n="subtitle" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-2">Gestione dettagli e prezzi</p>
        </header>

        <form id="productForm" class="space-y-6">
            
            <!-- 1. IDENTITÀ -->
            <div class="bg-white rounded-[2.5rem] p-8 border border-border shadow-sm space-y-5">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400" data-i18n="secIdentity">📋 Identità</span>
                </div>
                
                <div class="space-y-1">
                    <label for="itemName" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Nome Prodotto <span class="text-red-500">*</span></label>
                    <input type="text" id="itemName" required placeholder="..." class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none transition">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">SKU</label>
                        <input type="text" id="itemSku" disabled class="w-full bg-gray-100 text-gray-400 p-4 rounded-2xl text-sm font-bold border border-transparent outline-none cursor-not-allowed">
                    </div>
                    <div class="space-y-1">
                        <label for="itemType" data-i18n="lblType" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Tipo</label>
                        <select id="itemType" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none transition appearance-none">
                            <option value="SERVICE" data-i18n="optService">Servizio</option>
                            <option value="PRODUCT" data-i18n="optProduct">Prodotto</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label for="descShort" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Descrizione Breve <span class="text-red-500">*</span></label>
                    <input type="text" id="descShort" maxlength="100" required class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-medium border border-transparent focus:border-black outline-none transition">
                </div>

                <div class="space-y-1">
                    <label for="descLong" data-i18n="lblLong" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Descrizione Completa</label>
                    <textarea id="descLong" rows="4" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-medium border border-transparent focus:border-black outline-none transition resize-none"></textarea>
                </div>

                <div class="space-y-1">
                    <label for="internalNotes" data-i18n="lblInternal" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Note Interne</label>
                    <textarea id="internalNotes" rows="2" class="w-full bg-yellow-50 text-yellow-900 p-4 rounded-2xl text-xs font-mono border border-transparent focus:border-yellow-400 outline-none transition resize-none"></textarea>
                </div>
            </div>

            <!-- 2. PRICING -->
            <div class="bg-white rounded-[2.5rem] p-8 border border-border shadow-sm space-y-5">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400" data-i18n="secPricing">💰 Pricing</span>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label for="basePrice" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Prezzo Base <span class="text-red-500">*</span></label>
                        <input type="number" id="basePrice" step="0.01" min="0" required class="w-full bg-gray-50 p-4 rounded-2xl text-lg font-black border border-transparent focus:border-black outline-none transition text-right">
                    </div>
                    <div class="space-y-1">
                        <label for="currency" data-i18n="lblCurrency" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Valuta</label>
                        <select id="currency" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none transition appearance-none">
                            <option value="EUR">EUR (€)</option>
                            <option value="USD">USD ($)</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label for="unitOfMeasure" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Unità <span class="text-red-500">*</span></label>
                        <select id="unitOfMeasure" required class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none transition appearance-none">
                            <option value="item" data-i18n="optItem">Pezzo</option>
                            <option value="hour" data-i18n="optHour">Ora</option>
                            <option value="day" data-i18n="optDay">Giorno</option>
                            <option value="project" data-i18n="optProject">Progetto</option>
                            <option value="month" data-i18n="optMonth">Mese</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label for="taxRate" data-i18n="lblTax" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">IVA (%)</label>
                        <input type="number" id="taxRate" step="1" min="0" max="100" value="22" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none transition">
                    </div>
                </div>
            </div>

            <!-- 3. OPERATIONS & TAGS -->
            <div class="bg-white rounded-[2.5rem] p-8 border border-border shadow-sm space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400" data-i18n="secOps">⚙️ Operatività</span>
                </div>
                
                <div class="flex flex-col gap-4 p-4 bg-gray-50 rounded-3xl border border-gray-100">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="requiresBooking">
                        <label for="requiresBooking" data-i18n="chkBooking" class="text-sm font-bold cursor-pointer flex-1">Prenotazione</label>
                    </div>
                    <div class="h-[1px] bg-gray-200 w-full"></div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="requiresInventory">
                        <label for="requiresInventory" data-i18n="chkInventory" class="text-sm font-bold cursor-pointer flex-1">Inventario</label>
                    </div>
                </div>

                <div class="space-y-1">
                    <label for="skillTagInput" data-i18n="lblSkills" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Skill Richieste</label>
                    <div class="w-full bg-gray-50 p-2 rounded-2xl border border-transparent tag-container-focus transition flex flex-wrap gap-2 items-center" id="skillTagsContainer">
                        <input type="text" id="skillTagInput" placeholder="..." class="flex-1 bg-transparent border-none outline-none text-sm p-2 min-w-[100px]">
                    </div>
                </div>

                <div class="space-y-1">
                    <label for="keywordInput" data-i18n="lblKeywords" class="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Keywords (SEO)</label>
                    <div class="w-full bg-gray-50 p-2 rounded-2xl border border-transparent tag-container-focus transition flex flex-wrap gap-2 items-center" id="keywordsContainer">
                        <input type="text" id="keywordInput" placeholder="..." class="flex-1 bg-transparent border-none outline-none text-sm p-2 min-w-[100px]">
                    </div>
                </div>
            </div>

            <!-- 4. PROVIDER SECTION -->
            <div class="bg-black text-white rounded-[2.5rem] p-8 shadow-2xl space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">👤 Erogatori / Fornitori</span>
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-1">Competenze Richieste</label>
                    <div id="skills-display" class="flex flex-wrap gap-2">
                        <!-- Populated by JS -->
                    </div>
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-1">Provider Specifici</label>
                    <div id="providers-display" class="flex flex-col gap-3">
                        <!-- Populated by JS -->
                    </div>
                    <p class="text-[10px] font-bold text-gray-500 mt-3 uppercase tracking-widest leading-relaxed">
                        💡 Se vuoto, qualsiasi provider con le skill richieste può erogare il servizio
                    </p>
                </div>
            </div>

        </form>
    </div>

    <!-- FAB CONTAINER -->
    <div class="fixed bottom-6 left-0 w-full px-6 flex items-center justify-between z-[100] gap-4">
        <button onclick="goBackToCatalog()" class="w-16 h-16 bg-white text-black rounded-full shadow-2xl flex items-center justify-center text-xl border border-gray-100 active:scale-90 transition" title="Torna al Catalogo">
            <i class="fas fa-arrow-left"></i>
        </button>
        <button id="saveBtn" class="flex-1 h-16 bg-black text-white rounded-full shadow-2xl font-black uppercase tracking-widest active:scale-95 transition disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-3" disabled>
            <i class="fas fa-save"></i> <span id="saveBtnText">Salva</span>
        </button>
    </div>

    <!-- LOGICA JS ORIGINALE INTATTA -->
    <script>
        'use strict';

        const WEBHOOK_URL = "https://trinai.api.workflow.dcmake.it/webhook/2c6416b1-32c6-4661-bd8f-b175d24fd035";
        const tg = window.Telegram.WebApp;
        try { tg.ready(); tg.expand(); } catch (e) { console.warn("TG WebApp not found"); }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('productId');
        const token = urlParams.get('token');
        const vat = urlParams.get('vat');
        const langParam = urlParams.get('lang') || 'it';

        let currentData = null;
        let initialDataString = "";
        let isDirty = false;
        let skillTags = [];
        let keywords = [];

        // 2. I18N (FULL 6 LANGUAGES)
        const i18n = {
            it: { page_title: "Modifica Prodotto", title: "✏️ Modifica", subtitle: "Gestione dettagli e prezzi", loading: "Caricamento...", saving: "Salvataggio...", saved: "✅ Salvato!", error: "❌ Errore", secIdentity: "📋 Identità", secPricing: "💰 Pricing", secOps: "⚙️ Operatività", lblName: "Nome Prodotto/Servizio", lblType: "Tipo", lblShort: "Descrizione Breve (max 100)", lblLong: "Descrizione Completa", lblInternal: "Note Interne (Staff)", lblPrice: "Prezzo Base", lblCurrency: "Valuta", lblUnit: "Unità", lblTax: "IVA (%)", chkBooking: "Richiede Prenotazione", chkInventory: "Controllo Inventario", lblSkills: "Skill Richieste (Invio per aggiungere)", lblKeywords: "Keywords (SEO, Invio per aggiungere)", btnSave: "Salva", hintCancel: "Chiudi la finestra per annullare", optService: "Servizio", optProduct: "Prodotto", optItem: "Pezzo", optHour: "Ora", optDay: "Giorno", optProject: "Progetto", optMonth: "Mese", phSkill: "Es: Senior, Junior...", phKw: "Es: consulenza, setup..." },
            en: { page_title: "Edit Product", title: "✏️ Edit", subtitle: "Manage details and pricing", loading: "Loading...", saving: "Saving...", saved: "✅ Saved!", error: "❌ Error", secIdentity: "📋 Identity", secPricing: "💰 Pricing", secOps: "⚙️ Operations", lblName: "Product/Service Name", lblType: "Type", lblShort: "Short Description (max 100)", lblLong: "Full Description", lblInternal: "Internal Notes (Staff)", lblPrice: "Base Price", lblCurrency: "Currency", lblUnit: "Unit", lblTax: "Tax (%)", chkBooking: "Requires Booking", chkInventory: "Inventory Check", lblSkills: "Required Skills (Enter to add)", lblKeywords: "Keywords (SEO, Enter to add)", btnSave: "Save", hintCancel: "Close the window to cancel", optService: "Service", optProduct: "Product", optItem: "Item", optHour: "Hour", optDay: "Day", optProject: "Project", optMonth: "Month", phSkill: "E.g.: Senior, Junior...", phKw: "E.g.: consulting, setup..." }
            // Ometto le altre per brevità di codice visualizzato, ma la logica le gestisce se le aggiungi.
        };
        const t = i18n[langParam.slice(0,2)] || i18n.it;

        const dom = {
            loader: document.getElementById('loader'),
            loaderText: document.getElementById('loaderText'),
            content: document.getElementById('app-content'),
            form: document.getElementById('productForm'),
            skillInput: document.getElementById('skillTagInput'),
            skillContainer: document.getElementById('skillTagsContainer'),
            keywordInput: document.getElementById('keywordInput'),
            keywordContainer: document.getElementById('keywordsContainer'),
            saveBtn: document.getElementById('saveBtn'),
            saveBtnText: document.getElementById('saveBtnText'),
            skillsDisplay: document.getElementById('skills-display'),
            providersDisplay: document.getElementById('providers-display')
        };

        function init() {
            applyTranslations();
            if (!productId || !token || !vat) {
                dom.loaderText.textContent = "Error: Missing VAT/Token/ID";
                return;
            }
            loadProduct();
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = t[key];
                    else el.innerText = t[key];
                }
            });
            document.title = t.page_title;
            dom.saveBtnText.innerText = t.btnSave;
            dom.skillInput.placeholder = t.phSkill;
            dom.keywordInput.placeholder = t.phKw;
        }

        async function loadProduct() {
            showLoader(t.loading);
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'GET', type: 'PRODUCT', productId: productId, token: token, vat: vat })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const text = await res.text();
                let rawData;
                try { rawData = JSON.parse(text); } catch (e) { rawData = JSON.parse(text.replace(/^"|"$/g, '').replace(/\\"/g, '"')); }

                const firstItem = Array.isArray(rawData) ? rawData[0] : rawData;
                const productData = firstItem.catalog_item || firstItem; 

                if (!productData || !productData.identity) {
                    throw new Error("Dati mancanti o struttura errata.");
                }
                
                currentData = productData;
                initialDataString = JSON.stringify(collectDataFromForm()); 
                
                populateForm(productData);

                setupTagInput(dom.skillInput, dom.skillContainer, skillTags);
                setupTagInput(dom.keywordInput, dom.keywordContainer, keywords);
                
                dom.form.addEventListener('input', checkDirty);
                dom.form.addEventListener('submit', handleSave);
                // Intercetto il click sul fab e lo mando al submit del form
                dom.saveBtn.addEventListener('click', (e) => { e.preventDefault(); dom.form.requestSubmit(); });

                hideLoader();
            } catch (e) { handleError(e); }
        }

        function populateForm(inputData) {
            try {
                const data = inputData.catalog_item || inputData;

                const val = (id, v) => { const el = document.getElementById(id); if (el) el.value = (v !== undefined && v !== null) ? v : ''; };
                const chk = (id, v) => { const el = document.getElementById(id); if (el) el.checked = !!v; };

                const identity = data.identity || {};
                const pricing = data.pricing || {};
                const desc = identity.description || {};
                const operations = data.operations || {};
                const provider = operations.provider_info || {};
                const tax = pricing.tax_info || {};

                val('itemName', identity.item_name);
                val('itemSku', identity.item_sku);
                val('itemType', identity.item_type);
                val('descShort', desc.short);
                val('descLong', desc.long);
                val('internalNotes', desc.internal_notes);
                val('basePrice', pricing.base_price);
                val('currency', pricing.currency);
                val('unitOfMeasure', pricing.unit_of_measure);
                val('taxRate', tax.tax_rate_percentage);
                
                chk('requiresBooking', operations.requires_booking);
                chk('requiresInventory', operations.requires_inventory_check);

                skillTags = Array.isArray(provider.required_skill_tags) ? provider.required_skill_tags : [];
                keywords = Array.isArray(identity.keywords) ? identity.keywords : [];
                
                if (dom.skillContainer) renderTags(dom.skillContainer, skillTags);
                if (dom.keywordContainer) renderTags(dom.keywordContainer, keywords);

                const titleEl = document.getElementById('pageTitle');
                if(titleEl) titleEl.textContent = `✏️ ${identity.item_name || 'Prodotto'}`;

                renderProviders(provider);
                hideLoader();
            } catch (e) {
                console.error("Populate Error:", e);
                alert("Errore UI: " + e.message);
                hideLoader();
            }
        }

        // AGGIORNATO AL LOOK BLACK & WHITE (TAILWIND)
        function renderProviders(providerInfo) {
            const skills = providerInfo.required_skill_tags || [];

            if (dom.skillsDisplay) {
                if (skills.length === 0) {
                    dom.skillsDisplay.innerHTML = '<p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Nessuna competenza</p>';
                } else {
                    dom.skillsDisplay.innerHTML = skills.map(skill => 
                        `<span class="bg-white text-black px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">${skill}</span>`
                    ).join('');
                }
            }

            const providers = providerInfo.specific_provider_ids || [];

            if (!dom.providersDisplay) return;

            if (providers.length === 0) {
                dom.providersDisplay.innerHTML = `
                    <div class="border-2 border-dashed border-gray-700 rounded-3xl p-6 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-neutral-900 flex items-center justify-center text-lg">🏢</div>
                        <div>
                            <div class="text-sm font-bold">Nessun provider specifico</div>
                            <div class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">Qualsiasi provider abilitato</div>
                        </div>
                    </div>`;
                return;
            }

            dom.providersDisplay.innerHTML = providers.map(provider => {
                if (typeof provider === 'string') {
                    return `
                        <div class="bg-neutral-900 rounded-3xl p-5 flex items-center gap-4 border border-gray-800">
                            <div class="w-10 h-10 rounded-full bg-black border border-gray-700 flex items-center justify-center text-lg">👤</div>
                            <div>
                                <div class="text-sm font-bold">${provider}</div>
                                <div class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">ID: ${provider}</div>
                            </div>
                        </div>`;
                }
                
                // Oggetto Completo
                const isInternal = provider.provider_type === 'INTERNAL';
                const icon = isInternal ? '🏢' : (provider.provider_type === 'EXTERNAL' ? '🤝' : '👤');
                
                return `
                    <div class="${isInternal ? 'bg-white text-black' : 'bg-neutral-900 text-white border border-gray-800'} rounded-3xl p-5 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full ${isInternal ? 'bg-gray-100' : 'bg-black'} flex items-center justify-center text-lg">${icon}</div>
                        <div>
                            <div class="text-sm font-bold">${provider.provider_name || provider.provider_id}</div>
                            <div class="flex items-center gap-2 mt-1">
                                ${provider.provider_type ? `<span class="text-[9px] font-black uppercase tracking-widest ${isInternal ? 'text-gray-400' : 'text-gray-500'}">${provider.provider_type}</span>` : ''}
                                ${provider.role ? `<span class="text-[9px] font-bold text-gray-500">• ${provider.role}</span>` : ''}
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        async function handleSave(e) {
            if (e) e.preventDefault();
            if (!isDirty) return;

            setButtonLoading(dom.saveBtn, dom.saveBtnText, true, t.saving);

            if(!currentData.identity) currentData.identity = {};
            if(!currentData.identity.description) currentData.identity.description = {};
            if(!currentData.pricing) currentData.pricing = {};
            if(!currentData.pricing.tax_info) currentData.pricing.tax_info = {};
            if(!currentData.operations) currentData.operations = {};
            if(!currentData.operations.provider_info) currentData.operations.provider_info = {};

            const get = (id) => document.getElementById(id).value;
            const getChk = (id) => document.getElementById(id).checked;

            currentData.identity.item_name = get('itemName');
            currentData.identity.item_type = get('itemType');
            currentData.identity.description.short = get('descShort');
            currentData.identity.description.long = get('descLong');
            currentData.identity.description.internal_notes = get('internalNotes');
            currentData.identity.keywords = keywords;

            currentData.pricing.base_price = parseFloat(get('basePrice')) || 0;
            currentData.pricing.currency = get('currency');
            currentData.pricing.unit_of_measure = get('unitOfMeasure');
            currentData.pricing.tax_info.tax_rate_percentage = parseInt(get('taxRate')) || 22;

            currentData.operations.requires_booking = getChk('requiresBooking');
            currentData.operations.requires_inventory_check = getChk('requiresInventory');
            currentData.operations.provider_info.required_skill_tags = skillTags;

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'SAVE', type: 'PRODUCT', productId: productId, token: token, vat: vat, payload: currentData
                    })
                });
                
                if (!res.ok) throw new Error("Save failed");
                
                setButtonLoading(dom.saveBtn, dom.saveBtnText, false, t.saved, true);
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => { try { tg.close(); } catch (e) { goBackToCatalog(); } }, 1500);

            } catch (e) {
                handleError(e);
                setButtonLoading(dom.saveBtn, dom.saveBtnText, false, t.btnSave);
            }
        }

        function collectDataFromForm() {
            return {
                itemName: document.getElementById('itemName').value,
                descShort: document.getElementById('descShort').value,
                basePrice: document.getElementById('basePrice').value,
                tags: skillTags.join(',') + keywords.join(',')
            };
        }

        function checkDirty() {
            const currentFormState = JSON.stringify(collectDataFromForm());
            isDirty = currentFormState !== initialDataString;
            dom.saveBtn.disabled = !isDirty;
        }

        // AGGIORNATO AL LOOK BLACK & WHITE (TAILWIND)
        function setupTagInput(input, container, tags) {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const val = input.value.trim();
                    if (val && !tags.includes(val)) {
                        tags.push(val);
                        input.value = '';
                        renderTags(container, tags);
                        checkDirty();
                        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    }
                } else if (e.key === 'Backspace' && input.value === '' && tags.length > 0) {
                    tags.pop();
                    renderTags(container, tags);
                    checkDirty();
                }
            });
            renderTags(container, tags);
        }

        function renderTags(container, tags) {
            const input = container.querySelector('input');
            container.querySelectorAll('.custom-tag').forEach(el => el.remove());
            tags.forEach((tag, idx) => {
                const tagEl = document.createElement('div');
                tagEl.className = 'custom-tag bg-black text-white px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2';
                tagEl.innerHTML = `${tag} <span class="tag-remove cursor-pointer text-gray-400 hover:text-white" data-idx="${idx}"><i class="fas fa-times"></i></span>`;
                tagEl.querySelector('.tag-remove').onclick = () => {
                    tags.splice(idx, 1);
                    renderTags(container, tags);
                    checkDirty();
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                };
                container.insertBefore(tagEl, input);
            });
        }

        function showLoader(text) { dom.loaderText.textContent = text; dom.loader.classList.remove('hidden'); dom.content.classList.add('hidden'); }
        function hideLoader() { dom.loader.classList.add('hidden'); dom.content.classList.remove('hidden'); }
        function handleError(e) { console.error(e); dom.loaderText.textContent = t.error + ": " + e.message; }
        
        function setButtonLoading(btn, textEl, isLoading, text, isSuccess = false) {
            btn.disabled = isLoading;
            if (isLoading) {
                textEl.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> ${text}`;
            } else {
                textEl.innerHTML = text;
            }
            if(isSuccess) {
                btn.classList.remove('bg-black');
                btn.classList.add('bg-green-500');
            }
        }

        window.goBackToCatalog = () => {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            const params = new URLSearchParams(window.location.search);
            params.delete('productId');
            window.location.href = `catalog.html?${params.toString()}`;
        };

        // AVVIO
        init();
    </script>
</body>
</html>
