<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title data-i18n="page_title">Product Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' },
                    borderRadius: { '3xl': '1.5rem' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px; border: 2px solid #000; border-radius: 4px;
            position: relative; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after {
            content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            color: white; font-size: 9px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        .tag-anim { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="bg-bg text-black pb-10">

    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <div id="loaderText" data-i18n="loading" class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-400">Caricamento...</div>
    </div>

    <div class="hidden max-w-md mx-auto p-5" id="app-content">
        
        <header class="mb-6">
            <h1 id="pageTitle" data-i18n="title" class="text-lg font-black tracking-tighter uppercase leading-tight">✏️ Modifica</h1>
            <p id="pageSubtitle" data-i18n="subtitle" class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1 italic">Setup Prodotto / Servizio</p>
        </header>

        <form id="productForm" class="space-y-4">
            
            <!-- 1. IDENTITÀ -->
            <div class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-4">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block" data-i18n="secIdentity">📋 Identità</span>
                
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1" data-i18n="lblName">Nome Prodotto *</label>
                    <input type="text" id="itemName" required class="w-full bg-gray-50 p-3.5 rounded-xl text-sm font-bold border border-transparent focus:border-black outline-none transition">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1">SKU</label>
                        <input type="text" id="itemSku" disabled class="w-full bg-gray-100 text-gray-400 p-3.5 rounded-xl text-[10px] font-bold outline-none opacity-60">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1" data-i18n="lblType">Tipo</label>
                        <select id="itemType" class="w-full bg-gray-50 p-3.5 rounded-xl text-[10px] font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="SERVICE" data-i18n="optService">Servizio</option>
                            <option value="PRODUCT" data-i18n="optProduct">Prodotto</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1" data-i18n="lblShort">Descrizione Breve *</label>
                    <input type="text" id="descShort" maxlength="100" required class="w-full bg-gray-50 p-3.5 rounded-xl text-sm border border-transparent focus:border-black outline-none">
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1" data-i18n="lblLong">Descrizione Completa</label>
                    <textarea id="descLong" rows="3" class="w-full bg-gray-50 p-3.5 rounded-xl text-sm border border-transparent focus:border-black outline-none resize-none"></textarea>
                </div>
            </div>

            <!-- 2. PRICING -->
            <div class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-4">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block" data-i18n="secPricing">💰 Pricing</span>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1" data-i18n="lblPrice">Prezzo Base *</label>
                        <input type="number" id="basePrice" step="0.01" class="w-full bg-gray-50 p-3.5 rounded-xl text-lg font-black border border-transparent focus:border-black outline-none text-right">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1" data-i18n="lblCurrency">Valuta</label>
                        <select id="currency" class="w-full bg-gray-50 p-3.5 rounded-xl text-sm font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="EUR">EUR (€)</option>
                            <option value="USD">USD ($)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1" data-i18n="lblUnit">Unità</label>
                        <select id="unitOfMeasure" class="w-full bg-gray-50 p-3.5 rounded-xl text-[10px] font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="item" data-i18n="optItem">Pezzo</option>
                            <option value="hour" data-i18n="optHour">Ora</option>
                            <option value="day" data-i18n="optDay">Giorno</option>
                            <option value="project" data-i18n="optProject">Progetto</option>
                            <option value="month" data-i18n="optMonth">Mese</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1" data-i18n="lblTax">IVA (%)</label>
                        <input type="number" id="taxRate" class="w-full bg-gray-50 p-3.5 rounded-xl text-sm font-bold border border-transparent focus:border-black outline-none">
                    </div>
                </div>
            </div>

            <!-- 3. OPERATIVITÀ -->
            <div class="bg-white rounded-3xl p-5 border border-border shadow-sm space-y-4">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block" data-i18n="secOps">⚙️ Operatività</span>
                
                <div class="flex gap-3">
                    <div class="flex-1 flex items-center gap-2 p-3 bg-gray-50 rounded-xl border border-gray-100">
                        <input type="checkbox" id="requiresBooking">
                        <label for="requiresBooking" class="text-[10px] font-black uppercase" data-i18n="chkBooking">Prenotazione</label>
                    </div>
                    <div class="flex-1 flex items-center gap-2 p-3 bg-gray-50 rounded-xl border border-gray-100">
                        <input type="checkbox" id="requiresInventory">
                        <label for="requiresInventory" class="text-[10px] font-black uppercase" data-i18n="chkInventory">Inventario</label>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1" data-i18n="lblSkills">Skill Richieste</label>
                    <div class="w-full bg-gray-50 p-2 rounded-xl flex flex-wrap gap-2 items-center min-h-[44px]" id="skillTagsContainer">
                        <input type="text" id="skillTagInput" class="flex-1 bg-transparent outline-none text-[10px] p-1 font-bold">
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button id="saveBtn" type="submit" disabled class="w-full h-12 bg-black text-white rounded-xl font-black uppercase tracking-widest text-[10px] active:scale-95 transition-all disabled:opacity-20 flex items-center justify-center gap-2">
                    <i class="fas fa-save text-[10px]"></i> <span id="saveBtnText" data-i18n="btnSave">Salva Modifiche</span>
                </button>
            </div>

        </form>
    </div>

    <script>
        'use strict';
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/2c6416b1-32c6-4661-bd8f-b175d24fd035";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const sopId = urlParams.get('sop_id');
        const messageId = urlParams.get('message_id');
        const langParam = tg.initDataUnsafe?.user?.language_code || 'it';

        let currentData = null, initialDataString = "", skillTags = [], keywords = [];

        const i18n = {
            it: { page_title: "Modifica Prodotto", title: "✏️ Modifica", subtitle: "Gestione dettagli e prezzi", loading: "Caricamento...", saving: "Salvataggio...", saved: "✅ Salvato!", error: "❌ Errore", secIdentity: "📋 Identità", secPricing: "💰 Pricing", secOps: "⚙️ Operatività", lblName: "Nome Prodotto/Servizio", lblType: "Tipo", lblShort: "Descrizione Breve", lblLong: "Descrizione Completa", lblPrice: "Prezzo Base", lblCurrency: "Valuta", lblUnit: "Unità", lblTax: "IVA (%)", chkBooking: "Prenotazione", chkInventory: "Inventario", lblSkills: "Skill Richieste", btnSave: "Salva Modifiche", optService: "Servizio", optProduct: "Prodotto", optItem: "Pezzo", optHour: "Ora", optDay: "Giorno", optProject: "Progetto", optMonth: "Mese", phSkill: "Premi Invio..." },
            en: { page_title: "Edit Product", title: "✏️ Edit", subtitle: "Details and pricing", loading: "Loading...", saving: "Saving...", saved: "✅ Saved!", error: "❌ Error", secIdentity: "📋 Identity", secPricing: "💰 Pricing", secOps: "⚙️ Operations", lblName: "Product Name", lblType: "Type", lblShort: "Short Desc", lblLong: "Full Desc", lblPrice: "Base Price", lblCurrency: "Currency", lblUnit: "Unit", lblTax: "Tax (%)", chkBooking: "Booking", chkInventory: "Inventory", lblSkills: "Skills", btnSave: "Save Changes", optService: "Service", optProduct: "Product", optItem: "Item", optHour: "Hour", optDay: "Day", optProject: "Project", optMonth: "Month", phSkill: "Enter to add..." }
        };
        const t = i18n[langParam.slice(0,2)] || i18n.it;

        const dom = {
            loader: document.getElementById('loader'),
            content: document.getElementById('app-content'),
            form: document.getElementById('productForm'),
            saveBtn: document.getElementById('saveBtn'),
            skillInput: document.getElementById('skillTagInput'),
            skillContainer: document.getElementById('skillTagsContainer')
        };

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });
            dom.skillInput.placeholder = t.phSkill;
        }

        async function init() {
            applyTranslations();
            if (!sopId) { alert("SOP ID Missing"); return; }
            await loadProduct();
        }

        async function loadProduct() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'GET', type: 'PRODUCT', sop_id: sopId, message_id: messageId })
                });
                const rawData = await res.json();
                const productData = (Array.isArray(rawData) ? rawData[0] : rawData).catalog_item || (Array.isArray(rawData) ? rawData[0] : rawData);
                currentData = JSON.parse(JSON.stringify(productData));
                populateForm(productData);
                initialDataString = JSON.stringify(collectDataFromForm());
                setupTagInput(dom.skillInput, dom.skillContainer, skillTags);
                dom.form.addEventListener('input', checkDirty);
                dom.loader.classList.add('hidden');
                dom.content.classList.remove('hidden');
            } catch (e) { console.error(e); }
        }

        function populateForm(data) {
            const val = (id, v) => { if (document.getElementById(id)) document.getElementById(id).value = v || ''; };
            const chk = (id, v) => { if (document.getElementById(id)) document.getElementById(id).checked = !!v; };
            val('itemName', data.identity?.item_name);
            val('itemSku', data.identity?.item_sku);
            val('itemType', data.identity?.item_type);
            val('descShort', data.identity?.description?.short);
            val('descLong', data.identity?.description?.long);
            val('basePrice', data.pricing?.base_price);
            val('currency', data.pricing?.currency);
            val('unitOfMeasure', data.pricing?.unit_of_measure);
            val('taxRate', data.pricing?.tax_info?.tax_rate_percentage);
            chk('requiresBooking', data.operations?.requires_booking);
            chk('requiresInventory', data.operations?.requires_inventory_check);
            skillTags = data.operations?.provider_info?.required_skill_tags || [];
            renderTags(dom.skillContainer, skillTags);
        }

        function collectDataFromForm() {
            return {
                name: document.getElementById('itemName').value,
                type: document.getElementById('itemType').value,
                short: document.getElementById('descShort').value,
                long: document.getElementById('descLong').value,
                price: document.getElementById('basePrice').value,
                cur: document.getElementById('currency').value,
                uom: document.getElementById('unitOfMeasure').value,
                tax: document.getElementById('taxRate').value,
                booking: document.getElementById('requiresBooking').checked,
                inv: document.getElementById('requiresInventory').checked,
                st: skillTags.join(',')
            };
        }

        function checkDirty() {
            const current = JSON.stringify(collectDataFromForm());
            dom.saveBtn.disabled = current === initialDataString;
        }

        function setupTagInput(input, container, tags) {
            input.onkeydown = (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const val = input.value.trim();
                    if (val && !tags.includes(val)) {
                        tags.push(val); input.value = '';
                        renderTags(container, tags); checkDirty();
                    }
                } else if (e.key === 'Backspace' && !input.value && tags.length) {
                    tags.pop(); renderTags(container, tags); checkDirty();
                }
            };
        }

        function renderTags(container, tags) {
            container.querySelectorAll('.custom-tag').forEach(t => t.remove());
            tags.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = 'custom-tag tag-anim bg-black text-white px-3 py-1 rounded-lg text-[9px] font-black uppercase flex items-center gap-1.5';
                el.innerHTML = `${t} <i class="fas fa-times opacity-40"></i>`;
                el.onclick = () => { tags.splice(i, 1); renderTags(container, tags); checkDirty(); };
                container.insertBefore(el, container.lastElementChild);
            });
        }

        dom.form.onsubmit = async (e) => {
            e.preventDefault();
            dom.saveBtn.disabled = true;
            document.getElementById('saveBtnText').innerText = t.saving;
            const form = collectDataFromForm();
            const payload = currentData;
            payload.identity.item_name = form.name;
            payload.identity.item_type = form.type;
            payload.identity.description.short = form.short;
            payload.identity.description.long = form.long;
            payload.pricing.base_price = parseFloat(form.price);
            payload.pricing.currency = form.cur;
            payload.pricing.unit_of_measure = form.uom;
            payload.pricing.tax_info.tax_rate_percentage = parseInt(form.tax);
            payload.operations.requires_booking = form.booking;
            payload.operations.requires_inventory_check = form.inv;
            payload.operations.provider_info.required_skill_tags = skillTags;
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'SAVE', type: 'PRODUCT', sop_id: sopId, message_id: messageId, payload: payload })
                });
                dom.saveBtn.classList.replace('bg-black', 'bg-green-600');
                document.getElementById('saveBtnText').innerText = t.saved;
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => tg.close(), 1200);
            } catch (err) { dom.saveBtn.disabled = false; document.getElementById('saveBtnText').innerText = t.btnSave; }
        };
        init();
    </script>
</body>
</html>
