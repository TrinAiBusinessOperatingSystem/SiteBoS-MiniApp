<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title data-i18n="page_title">Product Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#000000', bg: '#fafafa', border: '#eeeeee' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type="checkbox"] {
            appearance: none; width: 22px; height: 22px; border: 2px solid #000; border-radius: 6px;
            position: relative; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background-color: #000; }
        input[type="checkbox"]:checked::after {
            content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            color: white; font-size: 11px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        .tag-anim { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>

    <script>
        (function() {
            if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                document.documentElement.innerHTML = `<body class="bg-black text-white flex items-center justify-center h-screen text-center p-10 font-sans"><div><h1 class="text-6xl mb-4">🚫</h1><h2 class="text-xl font-bold uppercase">Accesso Proibito</h2></div></body>`;
                window.stop();
            }
        })();
    </script>
</head>
<body class="bg-bg text-black pb-10">

    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center space-y-4">
        <div class="spinner"></div>
        <div id="loaderText" data-i18n="loading" class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">Caricamento...</div>
    </div>

    <div class="hidden max-w-2xl mx-auto p-5" id="app-content">
        
        <header class="mb-8">
            <h1 id="pageTitle" data-i18n="title" class="text-xl font-black tracking-tight uppercase leading-tight">✏️ Modifica Prodotto</h1>
            <p id="pageSubtitle" data-i18n="subtitle" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Gestione dettagli e prezzi</p>
        </header>

        <form id="productForm" class="space-y-6">
            
            <!-- 1. IDENTITÀ -->
            <div class="bg-white rounded-[2rem] p-6 border border-border shadow-sm space-y-5">
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-300 block mb-2" data-i18n="secIdentity">📋 Identità</span>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblName">Nome Prodotto *</label>
                    <input type="text" id="itemName" required class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none transition">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1">SKU</label>
                        <input type="text" id="itemSku" disabled class="w-full bg-gray-100 text-gray-400 p-4 rounded-2xl text-xs font-bold outline-none opacity-60">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblType">Tipo</label>
                        <select id="itemType" class="w-full bg-gray-50 p-4 rounded-2xl text-xs font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="SERVICE" data-i18n="optService">Servizio</option>
                            <option value="PRODUCT" data-i18n="optProduct">Prodotto</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblShort">Descrizione Breve *</label>
                    <input type="text" id="descShort" maxlength="100" required class="w-full bg-gray-50 p-4 rounded-2xl text-sm border border-transparent focus:border-black outline-none">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblLong">Descrizione Completa</label>
                    <textarea id="descLong" rows="3" class="w-full bg-gray-50 p-4 rounded-2xl text-sm border border-transparent focus:border-black outline-none resize-none"></textarea>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblInternal">Note Interne (Staff)</label>
                    <textarea id="internalNotes" rows="2" class="w-full bg-stone-100 p-4 rounded-2xl text-xs font-mono border border-transparent focus:border-black outline-none resize-none"></textarea>
                </div>
            </div>

            <!-- 2. PRICING -->
            <div class="bg-white rounded-[2rem] p-6 border border-border shadow-sm space-y-5">
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-300 block mb-2" data-i18n="secPricing">💰 Pricing</span>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblPrice">Prezzo Base *</label>
                        <input type="number" id="basePrice" step="0.01" class="w-full bg-gray-50 p-4 rounded-2xl text-lg font-black border border-transparent focus:border-black outline-none text-right">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblCurrency">Valuta</label>
                        <select id="currency" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="EUR">EUR (€)</option>
                            <option value="USD">USD ($)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblUnit">Unità</label>
                        <select id="unitOfMeasure" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none appearance-none">
                            <option value="item" data-i18n="optItem">Pezzo</option>
                            <option value="hour" data-i18n="optHour">Ora</option>
                            <option value="day" data-i18n="optDay">Giorno</option>
                            <option value="project" data-i18n="optProject">Progetto</option>
                            <option value="month" data-i18n="optMonth">Mese</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblTax">IVA (%)</label>
                        <input type="number" id="taxRate" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold border border-transparent focus:border-black outline-none transition">
                    </div>
                </div>
            </div>

            <!-- 3. OPERATIVITÀ & SEO -->
            <div class="bg-white rounded-[2rem] p-6 border border-border shadow-sm space-y-6">
                <span class="text-[10px] font-black uppercase tracking-widest text-gray-300 block mb-2" data-i18n="secOps">⚙️ Operatività</span>
                
                <div class="flex flex-col gap-4 p-4 bg-gray-50 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="requiresBooking">
                        <label for="requiresBooking" class="text-xs font-bold uppercase flex-1" data-i18n="chkBooking">Prenotazione</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="requiresInventory">
                        <label for="requiresInventory" class="text-xs font-bold uppercase flex-1" data-i18n="chkInventory">Inventario</label>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblSkills">Skill Richieste</label>
                    <div class="w-full bg-gray-50 p-2 rounded-2xl flex flex-wrap gap-2 items-center min-h-[50px]" id="skillTagsContainer">
                        <input type="text" id="skillTagInput" class="flex-1 bg-transparent outline-none text-xs p-2">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1" data-i18n="lblKeywords">Keywords SEO</label>
                    <div class="w-full bg-gray-50 p-2 rounded-2xl flex flex-wrap gap-2 items-center min-h-[50px]" id="keywordsContainer">
                        <input type="text" id="keywordInput" class="flex-1 bg-transparent outline-none text-xs p-2">
                    </div>
                </div>
            </div>

            <!-- 4. PROVIDER -->
            <div class="bg-black text-white rounded-[2rem] p-6 shadow-xl space-y-4">
                <span class="text-[10px] font-black uppercase tracking-widest text-neutral-700 block mb-2">👤 Provider Specifici</span>
                <div id="skills-display" class="flex flex-wrap gap-2"></div>
                <div id="providers-display" class="flex flex-col gap-3 mt-4"></div>
                <p class="text-[9px] font-bold text-neutral-500 uppercase tracking-widest">💡 Se vuoto, qualsiasi provider con le skill richieste può erogare il servizio</p>
            </div>

            <div class="pt-6">
                <button id="saveBtn" type="submit" disabled class="w-full h-16 bg-black text-white rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all disabled:bg-gray-100 disabled:text-gray-300 flex items-center justify-center gap-3">
                    <i class="fas fa-save"></i> <span id="saveBtnText" data-i18n="btnSave">Salva Modifiche</span>
                </button>
            </div>

        </form>
    </div>

    <script>
        'use strict';
        const WEBHOOK_URL = "https://prod.workflow.trinai.it/webhook/2c6416b1-32c6-4661-bd8f-b175d24fd035";
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const sopId = urlParams.get('sop_id');
        const messageId = urlParams.get('message_id');
        const langParam = tg.initDataUnsafe?.user?.language_code || 'it';

        let currentData = null, initialDataString = "", skillTags = [], keywords = [];

        // ── I18N COMPLETO ──
        const i18n = {
            it: { page_title: "Modifica Prodotto", title: "✏️ Modifica Prodotto", subtitle: "Gestione dettagli e prezzi", loading: "Caricamento...", saving: "Salvataggio...", saved: "✅ Salvato!", error: "❌ Errore", secIdentity: "📋 Identità", secPricing: "💰 Pricing", secOps: "⚙️ Operatività", lblName: "Nome Prodotto/Servizio", lblType: "Tipo", lblShort: "Descrizione Breve (max 100)", lblLong: "Descrizione Completa", lblInternal: "Note Interne (Staff)", lblPrice: "Prezzo Base", lblCurrency: "Valuta", lblUnit: "Unità", lblTax: "IVA (%)", chkBooking: "Richiede Prenotazione", chkInventory: "Controllo Inventario", lblSkills: "Skill Richieste", lblKeywords: "Keywords (SEO)", btnSave: "Salva Modifiche", optService: "Servizio", optProduct: "Prodotto", optItem: "Pezzo", optHour: "Ora", optDay: "Giorno", optProject: "Progetto", optMonth: "Mese", phSkill: "Premi Invio...", phKw: "Esempio: SEO..." },
            en: { page_title: "Edit Product", title: "✏️ Edit Product", subtitle: "Manage details and pricing", loading: "Loading...", saving: "Saving...", saved: "✅ Saved!", error: "❌ Error", secIdentity: "📋 Identity", secPricing: "💰 Pricing", secOps: "⚙️ Operations", lblName: "Product Name", lblType: "Type", lblShort: "Short Desc", lblLong: "Full Desc", lblInternal: "Internal Notes", lblPrice: "Base Price", lblCurrency: "Currency", lblUnit: "Unit", lblTax: "Tax (%)", chkBooking: "Booking", chkInventory: "Inventory", lblSkills: "Required Skills", lblKeywords: "Keywords", btnSave: "Save Changes", optService: "Service", optProduct: "Product", optItem: "Item", optHour: "Hour", optDay: "Day", optProject: "Project", optMonth: "Month", phSkill: "Enter to add...", phKw: "SEO..." },
            fr: { page_title: "Modifier Produit", title: "✏️ Modifier", subtitle: "Prix et détails", loading: "Chargement...", saving: "Sauvegarde...", saved: "✅ Enregistré!", error: "❌ Erreur", secIdentity: "📋 Identité", secPricing: "💰 Tarifs", secOps: "⚙️ Opérations", lblName: "Nom", lblType: "Type", lblShort: "Brève description", lblLong: "Description complète", lblInternal: "Notes internes", lblPrice: "Prix", lblCurrency: "Devise", lblUnit: "Unité", lblTax: "TVA (%)", chkBooking: "Réservation", chkInventory: "Inventaire", lblSkills: "Compétences", lblKeywords: "Mots-clés", btnSave: "Enregistrer", optService: "Service", optProduct: "Produit", optItem: "Pièce", optHour: "Heure", optDay: "Jour", optProject: "Projet", optMonth: "Mois", phSkill: "Entrée...", phKw: "Keywords..." },
            de: { page_title: "Produkt Bearbeiten", title: "✏️ Bearbeiten", subtitle: "Details und Preise", loading: "Laden...", saving: "Speichern...", saved: "✅ Gespeichert!", error: "❌ Fehler", secIdentity: "📋 Identität", secPricing: "💰 Preis", secOps: "⚙️ Betrieb", lblName: "Name", lblType: "Typ", lblShort: "Kurzbeschreibung", lblLong: "Vollständige Beschreibung", lblInternal: "Notizen", lblPrice: "Grundpreis", lblCurrency: "Währung", lblUnit: "Einheit", lblTax: "MwSt (%)", chkBooking: "Buchung", chkInventory: "Inventar", lblSkills: "Fähigkeiten", lblKeywords: "Schlagworte", btnSave: "Speichern", optService: "Dienst", optProduct: "Produkt", optItem: "Stück", optHour: "Stunde", optDay: "Tag", optProject: "Projekt", optMonth: "Monat", phSkill: "Eingabe...", phKw: "SEO..." },
            es: { page_title: "Editar Producto", title: "✏️ Editar", subtitle: "Gestión de precios", loading: "Cargando...", saving: "Guardando...", saved: "✅ Guardado!", error: "❌ Error", secIdentity: "📋 Identidad", secPricing: "💰 Precios", secOps: "⚙️ Operaciones", lblName: "Nombre", lblType: "Tipo", lblShort: "Desc. corta", lblLong: "Desc. completa", lblInternal: "Notas internas", lblPrice: "Precio", lblCurrency: "Moneda", lblUnit: "Unidad", lblTax: "IVA (%)", chkBooking: "Reserva", chkInventory: "Inventario", lblSkills: "Habilidades", lblKeywords: "Palabras clave", btnSave: "Guardar", optService: "Servicio", optProduct: "Producto", optItem: "Pieza", optHour: "Hora", optDay: "Día", optProject: "Proyecto", optMonth: "Mes", phSkill: "Enter...", phKw: "Palabras..." },
            pt: { page_title: "Editar Produto", title: "✏️ Editar", subtitle: "Gerenciar preços", loading: "Carregando...", saving: "Salvando...", saved: "✅ Salvo!", error: "❌ Erro", secIdentity: "📋 Identidade", secPricing: "💰 Preços", secOps: "⚙️ Operações", lblName: "Nome", lblType: "Tipo", lblShort: "Descrição Curta", lblLong: "Descrição Completa", lblInternal: "Notas Internas", lblPrice: "Preço", lblCurrency: "Moeda", lblUnit: "Unidade", lblTax: "Imposto (%)", chkBooking: "Reserva", chkInventory: "Estoque", lblSkills: "Habilidades", lblKeywords: "Palavras-chave", btnSave: "Salvar", optService: "Serviço", optProduct: "Produto", optItem: "Item", optHour: "Hora", optDay: "Dia", optProject: "Projeto", optMonth: "Mês", phSkill: "Enter...", phKw: "Keywords..." }
        };
        const t = i18n[langParam.slice(0,2)] || i18n.it;

        const dom = {
            loader: document.getElementById('loader'),
            content: document.getElementById('app-content'),
            form: document.getElementById('productForm'),
            saveBtn: document.getElementById('saveBtn'),
            skillInput: document.getElementById('skillTagInput'),
            skillContainer: document.getElementById('skillTagsContainer'),
            keywordInput: document.getElementById('keywordInput'),
            keywordContainer: document.getElementById('keywordsContainer')
        };

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });
            dom.skillInput.placeholder = t.phSkill;
            dom.keywordInput.placeholder = t.phKw;
        }

        async function init() {
            applyTranslations();
            if (!sopId) { alert("SOP ID Missing"); return; }
            await loadProduct();
        }

        async function loadProduct() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'GET', type: 'PRODUCT', sop_id: sopId, message_id: messageId })
                });
                const rawData = await res.json();
                const productData = (Array.isArray(rawData) ? rawData[0] : rawData).catalog_item || (Array.isArray(rawData) ? rawData[0] : rawData);
                
                currentData = JSON.parse(JSON.stringify(productData));
                populateForm(productData);
                initialDataString = JSON.stringify(collectDataFromForm());

                setupTagInput(dom.skillInput, dom.skillContainer, skillTags);
                setupTagInput(dom.keywordInput, dom.keywordContainer, keywords);
                
                dom.form.addEventListener('input', checkDirty);
                dom.loader.classList.add('hidden');
                dom.content.classList.remove('hidden');
            } catch (e) { console.error(e); }
        }

        function populateForm(data) {
            const val = (id, v) => { if (document.getElementById(id)) document.getElementById(id).value = v || ''; };
            const chk = (id, v) => { if (document.getElementById(id)) document.getElementById(id).checked = !!v; };

            val('itemName', data.identity?.item_name);
            val('itemSku', data.identity?.item_sku);
            val('itemType', data.identity?.item_type);
            val('descShort', data.identity?.description?.short);
            val('descLong', data.identity?.description?.long);
            val('internalNotes', data.identity?.description?.internal_notes);
            
            val('basePrice', data.pricing?.base_price);
            val('currency', data.pricing?.currency);
            val('unitOfMeasure', data.pricing?.unit_of_measure);
            val('taxRate', data.pricing?.tax_info?.tax_rate_percentage);

            chk('requiresBooking', data.operations?.requires_booking);
            chk('requiresInventory', data.operations?.requires_inventory_check);

            skillTags = data.operations?.provider_info?.required_skill_tags || [];
            keywords = data.identity?.keywords || [];
            
            renderTags(dom.skillContainer, skillTags);
            renderTags(dom.keywordContainer, keywords);
            renderProviders(data.operations?.provider_info || {});
            
            document.getElementById('pageTitle').textContent = `✏️ ${data.identity?.item_name || 'Prodotto'}`;
        }

        function collectDataFromForm() {
            return {
                name: document.getElementById('itemName').value,
                type: document.getElementById('itemType').value,
                short: document.getElementById('descShort').value,
                long: document.getElementById('descLong').value,
                notes: document.getElementById('internalNotes').value,
                price: document.getElementById('basePrice').value,
                cur: document.getElementById('currency').value,
                uom: document.getElementById('unitOfMeasure').value,
                tax: document.getElementById('taxRate').value,
                booking: document.getElementById('requiresBooking').checked,
                inv: document.getElementById('requiresInventory').checked,
                st: skillTags.join(','),
                kw: keywords.join(',')
            };
        }

        function checkDirty() {
            const current = JSON.stringify(collectDataFromForm());
            const isDirty = current !== initialDataString;
            dom.saveBtn.disabled = !isDirty;
        }

        function renderProviders(info) {
            const skills = info.required_skill_tags || [];
            document.getElementById('skills-display').innerHTML = skills.map(s => `<span class="bg-neutral-800 text-[9px] px-3 py-1 rounded-full uppercase font-bold text-gray-400">${s}</span>`).join('');
            
            const providers = info.specific_provider_ids || [];
            document.getElementById('providers-display').innerHTML = providers.length ? providers.map(p => {
                const isInternal = p.provider_type === 'INTERNAL';
                return `<div class="${isInternal?'bg-white text-black':'bg-neutral-900 text-white'} p-4 rounded-3xl text-xs border border-neutral-800 font-bold flex items-center gap-3">
                    <span>${isInternal?'🏢':'👤'}</span>
                    <div>
                        <p>${p.provider_name || p}</p>
                        <p class="text-[8px] opacity-40 uppercase tracking-tighter">${p.provider_type || 'SPECIFIC'}</p>
                    </div>
                </div>`;
            }).join('') : '<div class="text-[9px] text-neutral-600 font-bold uppercase py-2">Qualsiasi provider abilitato</div>';
        }

        function setupTagInput(input, container, tags) {
            input.onkeydown = (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const val = input.value.trim();
                    if (val && !tags.includes(val)) {
                        tags.push(val);
                        input.value = '';
                        renderTags(container, tags);
                        checkDirty();
                    }
                } else if (e.key === 'Backspace' && !input.value && tags.length) {
                    tags.pop();
                    renderTags(container, tags);
                    checkDirty();
                }
            };
        }

        function renderTags(container, tags) {
            container.querySelectorAll('.custom-tag').forEach(t => t.remove());
            tags.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = 'custom-tag tag-anim bg-black text-white px-3 py-1.5 rounded-xl text-[10px] font-black uppercase flex items-center gap-2';
                el.innerHTML = `${t} <i class="fas fa-times opacity-40 cursor-pointer"></i>`;
                el.onclick = () => { tags.splice(i, 1); renderTags(container, tags); checkDirty(); };
                container.insertBefore(el, container.lastElementChild);
            });
        }

        dom.form.onsubmit = async (e) => {
            e.preventDefault();
            dom.saveBtn.disabled = true;
            document.getElementById('saveBtnText').innerText = t.saving;

            const form = collectDataFromForm();
            const payload = currentData;
            
            payload.identity.item_name = form.name;
            payload.identity.item_type = form.type;
            payload.identity.description.short = form.short;
            payload.identity.description.long = form.long;
            payload.identity.description.internal_notes = form.notes;
            payload.identity.keywords = keywords;
            
            payload.pricing.base_price = parseFloat(form.price);
            payload.pricing.currency = form.cur;
            payload.pricing.unit_of_measure = form.uom;
            payload.pricing.tax_info.tax_rate_percentage = parseInt(form.tax);
            
            payload.operations.requires_booking = form.booking;
            payload.operations.requires_inventory_check = form.inv;
            payload.operations.provider_info.required_skill_tags = skillTags;

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ _auth: tg.initData, action: 'SAVE', type: 'PRODUCT', sop_id: sopId, message_id: messageId, payload: payload })
                });
                dom.saveBtn.classList.replace('bg-black', 'bg-green-600');
                document.getElementById('saveBtnText').innerText = t.saved;
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => tg.close(), 1200);
            } catch (err) { dom.saveBtn.disabled = false; document.getElementById('saveBtnText').innerText = t.btnSave; }
        };

        init();
    </script>
</body>
</html>
