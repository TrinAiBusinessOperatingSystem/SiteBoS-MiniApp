        .card { background: #fff; padding: 50px 40px; border-radius: var(--r); border: 1px solid #e2e8f0; transition: 0.4s; }

        .acc-trigger span { font-weight: 800; color: var(--p); display: flex; align-items: center; gap: 15px; font-size: 1.2rem; }
        .acc-panel { max-height: 0; overflow: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: #fafafa; }
        .acc-panel p { padding: 30px 30px 35px 75px; font-size: 1.05rem; color: #64748b; }

    <script>
        function toggleSvc(i) {
            const p = document.getElementById('svc-' + i);
            const a = document.getElementById('arr-' + i);
            const open = p.style.maxHeight !== '0px' && p.style.maxHeight !== '';
            document.querySelectorAll('.acc-panel').forEach(el => el.style.maxHeight = '0');
            document.querySelectorAll('.acc-trigger i').forEach(el => el.style.transform = 'rotate(0deg)');
